                                )}
                              </div>
                              {bay.accessible && bay.loads.length > 0 && (
                                <div className="text-[13px] text-neutral-60 mt-1">
                                  {tEN(`${rem.loads} ${rem.loads === 1 ? 'load' : 'loads'} · ${fmtKg(rem.weight)} total`,
                                       `${rem.loads} ${rem.loads === 1 ? 'lote' : 'lotes'} · ${fmtKg(rem.weight)} total`)}
                                </div>
                              )}
                            </div>
                          </div>

                          {/* Per-load detail panel - accessible loads visible, blocked under expander */}
                          {bay.accessible && bay.loads.length > 0 && (() => {
                            const bayKey = `${zone.id}:${bay.id}`;
                            const expanded = expandedBlocked.has(bayKey);
                            // Loads with accessibility info, in pick order
                            const annotated = bay.loads.map(load => ({
                              load,
                              access: accessibilityOf(zone, bay, load, recommendedLoads)
                            }));
                            const accessibleRows = annotated.filter(a => a.access.status === 'accessible');
                            const blockedRows = annotated.filter(a => a.access.status !== 'accessible');
                            const visibleRows = expanded ? annotated : accessibleRows;

                            const renderRow = ({ load, access }) => {
                              const onList = recommendedLoads.has(load.id);
                              // R34: when the SL sent a partial pick (e.g. 5 of 25 bales) the FO should
                              // process only that portion, not the full load. Clamp to accessibleBales
                              // because the bay's inventory rule may further restrict reachable bales.
                              const scheduledBales = scheduledBalesByLoad[load.id];
                              const actBales = onList && scheduledBales != null
                                ? Math.min(scheduledBales, access.accessibleBales)
                                : access.accessibleBales;
                              const partialPick = onList && scheduledBales != null && scheduledBales < load.bales;
                              const canAct = access.status === 'accessible' && actBales > 0;
                              const bgCls = canAct ? 'bg-white' : 'bg-neutral-5/60';
                              return (
                                <li key={load.id} className={'px-3 sm:px-4 py-3 flex flex-wrap items-center gap-x-3 gap-y-2 ' + bgCls}>
                                  <div className="flex-1 min-w-0">
                                    <div className="flex items-center gap-2 flex-wrap">
                                      <span className="text-[13px] font-medium text-neutral-100">{load.supplier}</span>
                                      <span className="text-[13px] text-neutral-60">{tEN('Order ref', 'Lote')} <span className="font-mono">#{load.lot}</span></span>
                                      {onList && (
                                        <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-safi-100 text-safi-700 text-[13px] font-medium whitespace-nowrap">
                                          <Icon d={I.list} className="w-3.5 h-3.5" />
                                          {partialPick
                                            ? tEN(`On picking list (${scheduledBales}/${load.bales} bales)`, `En lista (${scheduledBales}/${load.bales} pacas)`)
                                            : tEN('On picking list', 'En lista de recolección')}
                                        </span>
                                      )}
                                      {/* R25: "Accessible (N bales)" chip removed. Accessibility is now implicit -
                                          a load row sits in the accessible list because it's actionable. Split-load loads
                                          (where access.accessibleBales < load.bales) still flag this in the Process modal. */}
                                      {access.status === 'blocked' && (
                                        <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-neutral-10 text-neutral-80 text-[13px] font-medium whitespace-nowrap">
                                          <Icon d={I.lock} className="w-3.5 h-3.5" />
                                          {tEN(`Blocked by #${access.blockedBy?.lot}`, `Bloqueada por #${access.blockedBy?.lot}`)}
                                        </span>
                                      )}
                                      {access.status === 'blocked-clearable-via-list' && (
                                        <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-amber-50 text-amber-800 text-[13px] font-medium whitespace-nowrap">
                                          <Icon d={I.info} className="w-3.5 h-3.5" />
                                          {tEN('Unblocks after list', 'Se desbloquea con lista')}
                                        </span>
                                      )}
                                    </div>
                                    <div className="text-[13px] text-neutral-60 mt-0.5">
                                      {fmtNum(load.bales)} {tEN('bales', 'pacas')} · {fmtKg(load.weight)}
                                    </div>
                                  </div>
                                  <div className="flex gap-1.5 flex-wrap shrink-0 w-full sm:w-auto">
                                    <button
                                      disabled={!canAct}
                                      onClick={() => setModal({ type: 'reject', source: 'load', zone, bay, load, accessibleBales: actBales })}
                                      className={
                                        'inline-flex items-center gap-1.5 px-3 py-2 rounded-lg border text-[13px] font-medium min-h-[40px] whitespace-nowrap ' +
                                        (canAct
                                          ? 'border-red-300 text-red-700 hover:bg-red-50'
                                          : 'border-neutral-10 text-neutral-40 cursor-not-allowed')
                                      }
                                    >
                                      <Icon d={I.trash} className="w-4 h-4" />
                                      {tEN('Reject', 'Rechazar')}
                                    </button>
                                    {bufferVisible && (
                                      <button
                                        disabled={!canAct}
                                        onClick={() => setModal({ type: 'move', source: 'load', zone, bay, load, accessibleBales: actBales })}
                                        className={
                                          'inline-flex items-center gap-1.5 px-3 py-2 rounded-lg border text-[13px] font-medium min-h-[40px] whitespace-nowrap ' +
                                          (canAct
                                            ? 'border-neutral-10 text-neutral-100 hover:bg-neutral-5'
                                            : 'border-neutral-10 text-neutral-40 cursor-not-allowed')
                                        }
                                      >
                                        <Icon d={I.arrowR} className="w-4 h-4" />
                                        {tEN('Buffer', 'Búfer')}
                                      </button>
                                    )}
                                    {/* R34: Remove-from-picking-list - only available when load is on the list. */}
                                    {onList && (
                                      <button
                                        onClick={() => setModal({ type: 'remove-from-list', source: 'load', zone, bay, load })}
                                        className="inline-flex items-center gap-1.5 px-3 py-2 rounded-lg border border-neutral-10 text-neutral-100 text-[13px] font-medium min-h-[40px] whitespace-nowrap hover:bg-neutral-5"
                                      >
                                        <Icon d={I.close} className="w-4 h-4" />
                                        {tEN('Remove from list', 'Quitar de la lista')}
                                      </button>
                                    )}
                                    <button
                                      disabled={!canAct}
                                      onClick={() => setModal({ type: 'process', source: 'load', zone, bay, load, accessibleBales: actBales })}
                                      className={
                                        'inline-flex items-center gap-1.5 px-3 py-2 rounded-lg text-[13px] font-medium min-h-[40px] whitespace-nowrap ' +
                                        (canAct
                                          ? 'bg-safi-600 text-white hover:bg-safi-700'
                                          : 'bg-neutral-10 text-neutral-40 cursor-not-allowed')
                                      }
                                    >
                                      {tEN('Process', 'Procesar')}
                                      <Icon d={I.arrowR} className="w-4 h-4" />
                                    </button>
                                  </div>
                                </li>
                              );
                            };

                            return (
                              <div className="px-4 sm:px-5 pb-3 pt-1 -mt-1">
                                <ul className="rounded-lg border border-neutral-10 bg-white divide-y divide-neutral-10 overflow-hidden">
                                  {visibleRows.map(renderRow)}
                                  {blockedRows.length > 0 && (
                                    <li className="px-3 sm:px-4">
                                      <button
                                        onClick={() => toggleBlockedExpander(bayKey)}
                                        className="w-full py-2.5 text-[13px] font-medium text-safi-700 hover:underline flex items-center justify-center gap-1.5 min-h-[40px]"
                                        aria-expanded={expanded}
                                      >
                                        <Icon d={expanded ? I.chevron : I.chevronR} className="w-4 h-4" />
                                        {expanded
                                          ? tEN(`Hide ${blockedRows.length} blocked ${blockedRows.length === 1 ? 'load' : 'loads'}`,
                                                `Ocultar ${blockedRows.length} ${blockedRows.length === 1 ? 'lote bloqueado' : 'lotes bloqueados'}`)
                                          : tEN(`Show ${blockedRows.length} more ${blockedRows.length === 1 ? 'load' : 'loads'}`,
                                                `Mostrar ${blockedRows.length} ${blockedRows.length === 1 ? 'lote más' : 'lotes más'}`)}
                                      </button>
                                    </li>
                                  )}
                                </ul>
                              </div>
                            );
                          })()}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* Modals */}
        {modal?.type === 'move' && modal.source === 'load' && (
          <MoveToBufferModal
            zone={modal.zone}
            bay={modal.bay}
            load={modal.load}
            remaining={{
              bales: modal.accessibleBales,
              weight: Math.round(modal.accessibleBales * (modal.load.weight / modal.load.bales)),
              loads: 1
            }}
            avgWeight={modal.load.weight / modal.load.bales}
            splits={SPLIT_LOAD_DEMO[modal.load.lot] ? [{ load: modal.load, locations: SPLIT_LOAD_DEMO[modal.load.lot] }] : []}
            lang={lang}
            onCancel={() => setModal(null)}
            onConfirm={({ bales }) => {
              const weightPerBale = modal.load.weight / modal.load.bales;
              const uid = `${modal.zone.id}:${modal.bay.id}:${modal.load.id}:${Date.now()}`;
              setBuffer(prev => [...prev, {
                uid,
                loadId: modal.load.id,
                supplier: modal.load.supplier,
                lot: modal.load.lot,
                material: modal.load.material,
                bales,
                weightPerBale,
                sourceZoneId: modal.zone.id,
                sourceBayId: modal.bay.id
              }]);
              setModal(null);
              setToast?.({
                message: tEN(`${bales} bales moved to buffer (#${modal.load.lot})`, `${bales} pacas movidas al búfer (#${modal.load.lot})`),
                kind: 'success'
              });
            }}
          />
        )}

        {modal?.type === 'process' && (
          <ProcessMaterialModal
            source={modal.source}
            zone={modal.zone}
            bay={modal.bay}
            load={modal.load}
            bufferItems={modal.bufferItems}
            remaining={modal.source === 'load' ? {
              bales: modal.accessibleBales,
              weight: Math.round(modal.accessibleBales * (modal.load.weight / modal.load.bales)),
              loads: 1
            } : null}
            avgWeight={modal.source === 'load'
              ? (modal.load.weight / modal.load.bales)
              : (modal.bufferItems?.reduce((a, b) => a + b.weightPerBale * b.bales, 0) / Math.max(1, modal.bufferItems?.reduce((a, b) => a + b.bales, 0)))}
            splits={modal.source === 'load' && SPLIT_LOAD_DEMO[modal.load.lot]
              ? [{ load: modal.load, locations: SPLIT_LOAD_DEMO[modal.load.lot] }] : []}
            lang={lang}
            pickerMode={pickerMode}
            onPickingList={modal.source === 'load' && modal.load ? recommendedLoads.has(modal.load.id) : false}
            onCancel={() => setModal(null)}
            onConfirm={({ bales, weight }) => {
              if (modal.source === 'buffer') {
                setBuffer(prev => {
                  let toTake = bales;
                  return prev.map(it => {
                    if (toTake <= 0) return it;
                    const take = Math.min(it.bales, toTake);
                    toTake -= take;
                    return { ...it, bales: it.bales - take };
                  }).filter(it => it.bales > 0);
                });
                const pid = `merged-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`;
                setProcessed(prev => ({
                  ...prev,
                  [pid]: { bales, weight, at: new Date().toISOString(), partial: true, source: 'Buffer' }
                }));
                setModal(null);
                setToast?.({ message: tEN(`Processed ${bales} bales (${fmtKg(weight)})`, `Procesadas ${bales} pacas (${fmtKg(weight)})`), kind: 'success' });
              } else {
                // Load source - record processed entry tied to the specific load
                const pid = `merged-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`;
                setProcessed(prev => ({
                  ...prev,
                  [pid]: {
                    bales, weight, at: new Date().toISOString(), partial: true,
                    source: `${modal.zone.esName} · ${modal.bay.esName} · #${modal.load.lot}`,
                    loadId: modal.load.id
                  }
                }));
                setModal(null);
                setToast?.({
                  message: tEN(`Processed ${bales} bales from #${modal.load.lot} (${fmtKg(weight)})`, `Procesadas ${bales} pacas de #${modal.load.lot} (${fmtKg(weight)})`),
                  kind: 'success'
                });
              }
            }}
          />
        )}

        {modal?.type === 'reject' && (
          <RejectMaterialModal
            source={modal.source}
            zone={modal.zone}
            bay={modal.bay}
            load={modal.load}
            remaining={modal.source === 'load'
              ? { bales: modal.accessibleBales, weight: Math.round(modal.accessibleBales * (modal.load.weight / modal.load.bales)), loads: 1 }
              : { bales: bufferBales, weight: bufferWeight, loads: 1 }}
            avgWeight={modal.source === 'load'
              ? (modal.load.weight / modal.load.bales)
              : (bufferBales === 0 ? 0 : bufferWeight / bufferBales)}
            lang={lang}
            pickerMode={pickerMode}
            onCancel={() => setModal(null)}
            onConfirm={({ bales, reason, weight }) => {
              setModal(null);
              setToast?.({
                message: tEN(`Rejected ${bales} bales (${reason})`, `Rechazadas ${bales} pacas (${reason})`),
                kind: 'success'
              });
              if (modal.source === 'buffer') {
                setBuffer(prev => {
                  let toTake = bales;
                  return prev.map(it => {
                    if (toTake <= 0) return it;
                    const take = Math.min(it.bales, toTake);
                    toTake -= take;
                    return { ...it, bales: it.bales - take };
                  }).filter(it => it.bales > 0);
                });
              }
            }}
          />
        )}

        {modal?.type === 'remove-from-list' && (
          <RemoveFromListModal
            zone={modal.zone}
            bay={modal.bay}
            load={modal.load}
            lang={lang}
            onCancel={() => setModal(null)}
            onConfirm={({ reason }) => {
              setModal(null);
              setToast?.({
                message: tEN(
                  `Removed #${modal.load.lot} from the picking list (${reason}).`,
                  `Quitada #${modal.load.lot} de la lista (${reason}).`),
                kind: 'success'
              });
              // NOTE prototype: in production this would call an API to remove
              // the load from the picking list. State here is owned by the page.
            }}
          />
        )}
      </div>
    );
  }

  // ----------------------------------------------------------------------------
  // Modals used by the merged Picker tab
  // ----------------------------------------------------------------------------

  // Reusable numeric stepper with +1/+2/+3/+10 quick-add chips
  function BaleStepper({ value, setValue, max, label, lang }) {
    const tEN = (en, es) => lang === 'es' ? es : en;
    const clamp = (n) => Math.max(0, Math.min(max, n));
    return (
      <div>
        <label className="block text-[13px] font-medium text-neutral-80 mb-1.5">{label}</label>
        <div className="flex items-center gap-2">

            className="w-12 h-12 rounded-lg border border-neutral-10 text-xl font-semibold hover:bg-neutral-5"
            aria-label="Decrease"
          >−</button>
          <input
            type="number"
            min={0}
            max={max}
            value={value}
            onChange={e => setValue(clamp(Number(e.target.value) || 0))}
            className="w-24 h-12 text-center border border-neutral-10 rounded-lg text-2xl font-bold text-neutral-100 bg-[#fafafa] focus:bg-white focus:outline-none focus:ring-2 focus:ring-safi-600"
          />
          <button
            type="button"
            onClick={() => setValue(clamp(value + 1))}
            className="w-12 h-12 rounded-lg border border-neutral-10 text-xl font-semibold hover:bg-neutral-5"
            aria-label="Increase"
          >+</button>
          {[1, 2, 3, 10].map(n => (
            <button
              key={n}
              type="button"
              disabled={value + n > max}
              onClick={() => setValue(clamp(value + n))}
              className={
                'h-12 px-3 rounded-lg border text-[13px] font-medium ' +
                (value + n > max
                  ? 'border-neutral-10 text-neutral-40 cursor-not-allowed'
                  : 'border-safi-300 text-safi-700 hover:bg-safi-50')
              }
            >+{n}</button>
          ))}
          <button
            type="button"
            onClick={() => setValue(max)}
            className="h-12 px-3 rounded-lg border border-neutral-10 text-[13px] font-medium text-neutral-100 hover:bg-neutral-5"

            {tEN(`All ${max}`, `Todas ${max}`)}

        </div>
      </div>

  function SplitLoadBanner({ splits, lang }) {
    if (!splits || splits.length === 0) return null;
    const tEN = (en, es) => lang === 'es' ? es : en;
    return (
      <div className="rounded-md bg-amber-50 border border-amber-200 px-3 py-2.5 text-[13px] text-amber-900 flex items-start gap-2">
        <Icon d={I.info} className="w-4 h-4 mt-0.5 shrink-0" />
        <div>
          <div className="font-semibold mb-0.5">
            {tEN('Some of this material is stored elsewhere', 'Parte de este material está en otra ubicación')}
          </div>
          {splits.map(({ load, locations }) => (
            <div key={load.id}>
              <span className="font-mono font-semibold">{load.lot}</span>:{' '}
              {locations.map((loc, i) => (
                <span key={i}>
                  <span className="font-medium">+{loc.bales} {tEN('bales', 'pacas')} {tEN('in', 'en')} Bay {loc.bayId}</span>
                  {!loc.accessible && (
                    <span> ({tEN('blocked by Bay', 'bloqueada por Fila')} {loc.blockedBy} - {tEN('not accessible', 'no accesible')})</span>
                  )}

                </span>
              ))}

            </div>
          ))}
        </div>
      </div>
    );
  }

  // -------------------------------------------------------------------------
  // FieldsetInput - notched-fieldset input. The label rides on top of the
  // border (white bg punches through the stroke). Used by all picker modals.
  // -------------------------------------------------------------------------
  function FieldsetInput({ label, suffix, value, onChange, type = 'number', placeholder, min = 0, step = '1', max, required = false, focused = false, readOnly = false, children }) {
    const borderCls = focused ? 'border-safi-600 ring-2 ring-safi-600/30' : 'border-neutral-10';
    const labelCls = focused ? 'text-safi-700' : 'text-neutral-60';
    return (
      <div className={'relative bg-white border rounded-md ' + borderCls}>
        <div className={'absolute -top-2 left-3 bg-white px-1.5 flex items-center text-[13px] font-medium leading-none ' + labelCls}>
          {label}{required && <span className="ml-0.5">*</span>}
        </div>
        {children ? (
          children
        ) : (
          <input
            type={type}
            min={min}
            max={max}
            step={step}
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            readOnly={readOnly}
            className={'w-full h-14 px-4 pr-12 bg-transparent text-2xl font-medium text-neutral-100 focus:outline-none ' + (readOnly ? 'cursor-default' : '')}
          />
        )}
        {suffix && (
          <div className="absolute right-3 top-1/2 -translate-y-1/2 text-[13px] text-neutral-60 pointer-events-none">
            {suffix}
          </div>
        )}
      </div>
    );
  }

  // -------------------------------------------------------------------------
  // R25: MoveToBufferModal - bale-based only (buffer is hidden in load-based).
  // Layout per Figma screenshot 2: a row of quick-pick buttons (1 / 2 / 3) +
  // a notched-fieldset "Number of bales" input. The buttons set the value.

    const tEN = (en, es) => lang === 'es' ? es : en;
    const [bales, setBales] = useState(1);
    const clamp = (n) => Math.max(0, Math.min(remaining.bales, n));
    const estimatedWeight = Math.round(bales * avgWeight);
    return (
      <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4" onClick={onCancel}>
        <div className="bg-white rounded-xl shadow-xl w-full max-w-xl p-6" onClick={e => e.stopPropagation()}>
          <h3 className="font-bold text-lg text-neutral-100">
            {tEN(`Move bales to buffer`, `Mover pacas al búfer`)}
          </h3>
          <p className="text-[13px] text-neutral-60 mt-1">
            {tEN('Select the amount of bales you are moving to buffer.',
                 'Selecciona la cantidad de pacas que estás moviendo al búfer.')}
          </p>

          <div className="mt-5 flex items-stretch gap-3 flex-wrap">
            {[1, 2, 3].filter(n => n <= remaining.bales).map(n => (
              <button
                key={n}
                type="button"
                onClick={() => setBales(n)}
                aria-pressed={bales === n}
                className={
                  'w-20 h-20 rounded-lg border text-2xl font-medium transition flex items-center justify-center ' +
                  (bales === n
                    ? 'border-safi-600 bg-safi-50 text-safi-700'

                }
              >
                {n}
              </button>
            ))}
            <div className="flex-1 min-w-[160px]">
              <FieldsetInput
                label={tEN('Number of bales', 'Número de pacas')}
                value={bales || ''}
                onChange={e => setBales(clamp(Number(e.target.value) || 0))}
                min={0}
                max={remaining.bales}
                focused={false}
              >
                <input
                  type="number"
                  min={0}
                  max={remaining.bales}
                  value={bales || ''}
                  onChange={e => setBales(clamp(Number(e.target.value) || 0))}
                  className="w-full h-20 px-4 bg-transparent text-2xl font-medium text-neutral-100 focus:outline-none"
                />

          </div>
          <p className="text-[13px] text-neutral-60 mt-2">
            {tEN(`Up to ${remaining.bales} bales available · ~${fmtKg(estimatedWeight)} at ${Math.round(avgWeight)} kg/bale`,
                 `Hasta ${remaining.bales} pacas disponibles · ~${fmtKg(estimatedWeight)} a ${Math.round(avgWeight)} kg/paca`)}
          </p>
          <div className="mt-4">
            <SplitLoadBanner splits={splits} lang={lang} />
          </div>

          <div className="mt-6 flex gap-2 justify-end">
            <button onClick={onCancel} className="px-4 py-2.5 rounded-lg border border-neutral-10 text-[13px] font-medium hover:bg-neutral-5 min-h-[44px]">
              {tEN('Cancel', 'Cancelar')}

            <button
              disabled={bales === 0}
              onClick={() => onConfirm({ bales })}
              className={
                'px-4 py-2.5 rounded-lg text-[13px] font-medium min-h-[44px] ' +
                (bales === 0
                  ? 'bg-neutral-10 text-neutral-40 cursor-not-allowed'
                  : 'bg-safi-600 text-white hover:bg-safi-700')
              }
            >
              {tEN('Save', 'Guardar')}
            </button>

  // -------------------------------------------------------------------------
  // R25: ProcessMaterialModal - branches on pickerMode.
  //
  // load-based: FO picks N bales (default = all accessible bales). Layout per
  //   screenshot 1 - [-] [Number of bales input] [+], helper text, and the
  //   weight field is gone (system already knows the per-bale weight). Shows
  //   split-load indicator + "on picking list" chip when relevant.
  //
  // bale-based: implicit 1 bale at a time. Single notched "Processed weight"
  //   input is REQUIRED. Per screenshot 3. Buffer-sourced processing uses the
  //   same flow (1 bale at a time, weight required).
  // -------------------------------------------------------------------------
  function ProcessMaterialModal({ source, zone, bay, load, bufferItems, remaining, avgWeight, splits, lang, pickerMode = 'load', onPickingList = false, onCancel, onConfirm }) {
    const tEN = (en, es) => lang === 'es' ? es : en;
    const isBale = pickerMode === 'bale';
    const max = source === 'buffer'
      ? bufferItems.reduce((a, b) => a + b.bales, 0)
      : remaining.bales;
    const accessibleWeight = source === 'buffer'
      ? bufferItems.reduce((a, b) => a + Math.round(b.bales * b.weightPerBale), 0)
      : remaining.weight;

    // Load-based: bale count selector, default = all accessible bales.
    const [bales, setBales] = useState(isBale ? 1 : Math.max(1, max));
    const clamp = (n) => Math.max(0, Math.min(max, n));
    // Bale-based: required processed weight input.
    const [processedWeight, setProcessedWeight] = useState('');
    const pwNum = Number(processedWeight) || 0;

    const titleEN = source === 'buffer'
      ? 'Process bales from buffer'
      : `Process bales from Bay ${bay?.id}`;
    const titleES = source === 'buffer'
      ? 'Procesar pacas del búfer'
      : `Procesar pacas de Fila ${bay?.id}`;

    const isSplit = splits && splits.length > 0;
    const loadTotalWeight = load?.weight;
    const loadTotalBales = load?.bales;

    const canSubmit = isBale ? pwNum > 0 : (bales > 0);

    return (
      <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4" onClick={onCancel}>
        <div className="bg-white rounded-xl shadow-xl w-full max-w-xl p-6" onClick={e => e.stopPropagation()}>
          <h3 className="font-bold text-lg text-neutral-100">{tEN(titleEN, titleES)}</h3>

          {/* Context strip - load total weight + on-picking-list indicator (load-based, bay source only) */}
          {!isBale && load && (
            <div className="mt-1 flex items-center gap-2 flex-wrap text-[13px] text-neutral-60">
              <span>
                {tEN(`Load #${load.lot} · ${fmtNum(loadTotalBales)} bales total · ${fmtKg(loadTotalWeight)}`,
                     `Lote #${load.lot} · ${fmtNum(loadTotalBales)} pacas totales · ${fmtKg(loadTotalWeight)}`)}
              </span>
              {onPickingList && (
                <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-safi-100 text-safi-700 text-[13px] font-medium">
                  <Icon d={I.list} className="w-3.5 h-3.5" />
                  {tEN('On picking list', 'En lista de recolección')}
                </span>
              )}
              {isSplit && (
                <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-amber-50 text-amber-900 text-[13px] font-medium">
                  <Icon d={I.info} className="w-3.5 h-3.5" />
                  {tEN(`${max} of ${loadTotalBales} bales here`, `${max} de ${loadTotalBales} pacas aquí`)}
                </span>
              )}
            </div>
          )}

          {/* Load-based: bale count picker [-] [input] [+] */}
          {!isBale && (
            <>
              <div className="mt-5 flex items-stretch gap-3">
                <button
                  type="button"
                  onClick={() => setBales(clamp(bales - 1))}
                  className="w-20 h-20 rounded-lg border border-neutral-10 text-3xl font-semibold text-neutral-100 hover:bg-neutral-5"
                  aria-label="Decrease"
                >−</button>
                <div className="flex-1 min-w-[160px]">
                  <FieldsetInput
                    label={tEN('Number of bales', 'Número de pacas')}
                    required
                    focused
                  >
                    <input
                      type="number"
                      min={0}
                      max={max}
                      value={bales}
                      onChange={e => setBales(clamp(Number(e.target.value) || 0))}
                      className="w-full h-20 px-4 bg-transparent text-3xl font-medium text-neutral-100 text-center focus:outline-none"
                    />
                  </FieldsetInput>
                </div>
                <button
                  type="button"
                  onClick={() => setBales(clamp(bales + 1))}
                  className="w-20 h-20 rounded-lg border border-neutral-10 text-3xl font-semibold text-neutral-100 hover:bg-neutral-5"
                  aria-label="Increase"
                >+</button>
              </div>
              <p className="text-[13px] text-neutral-60 text-center mt-2">
                {tEN(`Pick up to ${max} bales from the top batch.`,
                     `Recoge hasta ${max} pacas del lote superior.`)}
              </p>
              <div className="mt-4">
                <SplitLoadBanner splits={splits} lang={lang} />
              </div>
            </>
          )}

          {/* Bale-based: required processed weight input */}
          {isBale && (
            <>
              <p className="text-[13px] text-neutral-60 mt-1">
                {source === 'buffer'
                  ? tEN(`From buffer · 1 bale at a time`, `Desde búfer · 1 paca a la vez`)
                  : tEN(`From Zone ${zone?.id} · Bay ${bay?.id} · 1 bale at a time`,
                        `Desde Zona ${zone?.id} · Fila ${bay?.id} · 1 paca a la vez`)}
              </p>
              <div className="mt-5">
                <FieldsetInput
                  label={tEN('Processed weight', 'Peso procesado')}
                  suffix="kg"
                  value={processedWeight}
                  onChange={e => setProcessedWeight(e.target.value)}
                  type="number"
                  step="0.1"
                  min={0}
                  required
                  focused
                />
              </div>
            </>
          )}

          <div className="mt-6 flex gap-2 justify-end">
            <button onClick={onCancel} className="px-4 py-2.5 rounded-lg border border-neutral-10 text-[13px] font-medium hover:bg-neutral-5 min-h-[44px]">
              {tEN('Cancel', 'Cancelar')}
            </button>
            <button
              disabled={!canSubmit}
              onClick={() => {
                if (isBale) {
                  onConfirm({ bales: 1, weight: pwNum });
                } else {
                  const weight = Math.round(bales * avgWeight);
                  onConfirm({ bales, weight });
                }
              }}
              className={
                'px-4 py-2.5 rounded-lg text-[13px] font-medium min-h-[44px] ' +
                (!canSubmit
                  ? 'bg-neutral-10 text-neutral-40 cursor-not-allowed'
                  : 'bg-safi-600 text-white hover:bg-safi-700')
              }
            >
              {tEN('Process bales', 'Procesar pacas')}
            </button>
          </div>
        </div>
      </div>
    );
  }

  // -------------------------------------------------------------------------
  // R25: RejectMaterialModal - branches on pickerMode.
  //
  // load-based: FO chooses N bales (whole load or partial). Reason required.
  //   Weight is auto pro-rated (load.weight / load.bales) × bales — no input.
  //
  // bale-based: 1 bale only (max enforced). Reason required. Bale weight is
  //   REQUIRED (no longer optional, per R25 spec).
  // -------------------------------------------------------------------------
  function RejectMaterialModal({ source, zone, bay, load, remaining, avgWeight, lang, pickerMode = 'load', onCancel, onConfirm }) {
    const tEN = (en, es) => lang === 'es' ? es : en;
    const isBale = pickerMode === 'bale';
    const maxAccessible = remaining.bales;
    const max = isBale ? 1 : maxAccessible;
    // R28: defaults - load-based starts at the full load (max), bale-based starts at 0
    // and the FO must explicitly set it to 1 before they can reject.
    const [bales, setBales] = useState(isBale ? 0 : maxAccessible);
    const [reason, setReason] = useState('');
    const [bWeight, setBWeight] = useState('');
    const clamp = (n) => Math.max(0, Math.min(max, n));
    const reasons = lang === 'es'
      ? ['Contaminación', 'Material incorrecto', 'Daño por humedad', 'Otro']
      : ['Contamination', 'Wrong material', 'Moisture damage', 'Other'];

    const bWeightNum = Number(bWeight) || 0;
    const proRatedWeight = Math.round(bales * avgWeight);
    const finalWeight = isBale ? bWeightNum : proRatedWeight;

    // R28: title copy - "Reject material from Bay X" (was "bales") in both modes.
    const titleEN = source === 'buffer'
      ? 'Reject material from buffer'
      : `Reject material from Bay ${bay?.id}`;
    const titleES = source === 'buffer'
      ? 'Rechazar material del búfer'
      : `Rechazar material de Fila ${bay?.id}`;

    const canSubmit = bales > 0 && !!reason && (!isBale || bWeightNum > 0);

    return (
      <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4" onClick={onCancel}>
        <div className="bg-white rounded-xl shadow-xl w-full max-w-lg p-6" onClick={e => e.stopPropagation()}>
          <h3 className="font-bold text-lg text-neutral-100">{tEN(titleEN, titleES)}</h3>
          {load && (
            <p className="text-[13px] text-neutral-60 mt-1">
              {tEN(`Load #${load.lot} · ${fmtNum(load.bales)} bales total · ${fmtKg(load.weight)}`,
                   `Lote #${load.lot} · ${fmtNum(load.bales)} pacas totales · ${fmtKg(load.weight)}`)}
            </p>
          )}

          <div className="mt-5 space-y-4">
            {/* Number of bales - load-based gets a stepper, bale-based is read-only at 1 */}
            <div>
              <FieldsetInput
                label={tEN('Number of bales', 'Número de pacas')}
                required
                focused
              >
                <input
                  type="number"
                  min={0}
                  max={max}
                  value={bales}
                  onChange={e => setBales(clamp(Number(e.target.value) || 0))}
                  className="w-full h-14 px-4 bg-transparent text-2xl font-medium text-neutral-100 focus:outline-none"
                />
              </FieldsetInput>
              <p className="text-[13px] text-neutral-60 mt-1.5">
                {isBale
                  ? tEN('Max 1 (taken from the top batch).', 'Máximo 1 (tomada del lote superior).')
                  : tEN(`Max ${maxAccessible} (taken from the top batch).`,
                        `Máximo ${maxAccessible} (tomadas del lote superior).`)}
              </p>
            </div>

            <div>
              <FieldsetInput label={tEN('Reason', 'Motivo')} required focused={!!reason}>
                <select
                  value={reason}
                  onChange={e => setReason(e.target.value)}
                  className="w-full h-14 px-4 bg-transparent text-base text-neutral-100 focus:outline-none appearance-none"
                >
                  <option value="">{tEN('Select a reason…', 'Selecciona un motivo…')}</option>
                  {reasons.map(r => <option key={r} value={r}>{r}</option>)}
                </select>
              </FieldsetInput>
            </div>

            {isBale ? (
              <div>
                <FieldsetInput
                  label={tEN('Bale weight', 'Peso de la paca')}
                  suffix="kg"
                  required
                  value={bWeight}
                  onChange={e => setBWeight(e.target.value)}
                  type="number"
                  step="0.1"
                  min={0}
                  focused={bWeightNum > 0}
                />
              </div>
            ) : (
              <div className="text-[13px] text-neutral-60">
                {tEN(`Estimated weight: ${fmtKg(proRatedWeight)} (auto pro-rated from load total).`,
                     `Peso estimado: ${fmtKg(proRatedWeight)} (calculado automáticamente).`)}
              </div>
            )}
          </div>

          <div className="mt-6 flex gap-2 justify-end">
            <button onClick={onCancel} className="px-4 py-2.5 rounded-lg border border-neutral-10 text-[13px] font-medium hover:bg-neutral-5 min-h-[44px]">
              {tEN('Cancel', 'Cancelar')}
            </button>
            <button
              disabled={!canSubmit}
              onClick={() => onConfirm({ bales, reason, weight: finalWeight })}
              className={
                'px-4 py-2.5 rounded-lg text-[13px] font-medium min-h-[44px] ' +
                (!canSubmit
                  ? 'bg-neutral-10 text-neutral-40 cursor-not-allowed'
                  : 'bg-red-600 text-white hover:bg-red-700')
              }
            >
              {tEN('Reject', 'Rechazar')}
            </button>
          </div>
        </div>
      </div>
    );
  }

  // -------------------------------------------------------------------------
  // R34: RemoveFromListModal - SL/FO removes a load from the active picking
  // list with a reason. Reason dropdown is required. The actual list mutation
  // happens in the parent's onConfirm.
  // -------------------------------------------------------------------------
  function RemoveFromListModal({ zone, bay, load, lang, onCancel, onConfirm }) {
    const tEN = (en, es) => lang === 'es' ? es : en;
    const [reason, setReason] = useState('');
    const reasons = lang === 'es'
      ? ['Avería del montacargas - no se pudo recoger',
         'Fila inaccesible',
         'Material no necesario en este turno',
         'Sustituido por otro lote',
         'Otro']
      : ['Forklift breakdown - couldn\'t finish picking',
         'Bay inaccessible',
         'Material not needed this shift',
         'Replaced with another load',
         'Other'];
    const canSubmit = !!reason;
    return (
      <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4" onClick={onCancel}>
        <div className="bg-white rounded-xl shadow-xl w-full max-w-lg p-6" onClick={e => e.stopPropagation()}>
          <h3 className="font-bold text-lg text-neutral-100">
            {tEN('Remove from picking list', 'Quitar de la lista de recolección')}
          </h3>
          <p className="text-[13px] text-neutral-60 mt-1">
            {load && tEN(
              `Load #${load.lot} · ${load.supplier} · Bay ${bay?.id}`,
              `Lote #${load.lot} · ${load.supplier} · Fila ${bay?.id}`)}
          </p>
          <div className="mt-5">
            <FieldsetInput label={tEN('Reason', 'Motivo')} required focused={!!reason}>
              <select
                value={reason}
                onChange={e => setReason(e.target.value)}
                className="w-full h-14 px-4 bg-transparent text-base text-neutral-100 focus:outline-none appearance-none"
              >
                <option value="">{tEN('Select a reason…', 'Selecciona un motivo…')}</option>
                {reasons.map(r => <option key={r} value={r}>{r}</option>)}
              </select>
            </FieldsetInput>
            <p className="text-[13px] text-neutral-60 mt-2">
              {tEN('The load stays in the yard - it is just dropped from this picking list.',
                   'El lote permanece en el patio - solo se quita de esta lista de recolección.')}
            </p>
          </div>
          <div className="mt-6 flex gap-2 justify-end">
            <button onClick={onCancel} className="px-4 py-2.5 rounded-lg border border-neutral-10 text-[13px] font-medium hover:bg-neutral-5 min-h-[44px]">
              {tEN('Cancel', 'Cancelar')}
            </button>
            <button
              disabled={!canSubmit}
              onClick={() => onConfirm({ reason })}
              className={
                'px-4 py-2.5 rounded-lg text-[13px] font-medium min-h-[44px] ' +
                (!canSubmit
                  ? 'bg-neutral-10 text-neutral-40 cursor-not-allowed'
                  : 'bg-safi-600 text-white hover:bg-safi-700')
              }
            >
              {tEN('Remove from list', 'Quitar de la lista')}
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ----------------------------------------------------------------------------
  // MOUNT
  // ----------------------------------------------------------------------------
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<ProductionManagementPage />);
  </script>
</body>
</html>

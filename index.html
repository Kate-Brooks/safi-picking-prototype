                  {zone.inventoryRule && zone.inventoryRule !== 'NONE' && (
                    <span
                      className="inline-flex items-center px-2 py-0.5 rounded-full bg-neutral-5 border border-neutral-10 text-[13px] font-semibold text-neutral-80"
                      title={zone.inventoryRule === 'LIFO' ? 'Last in, first out' : 'First in, first out'}
                    >
                      {zone.inventoryRule}
                    </span>
                  )}
                  {/* R37: bay-claim summary chip during create/edit. */}
                  <BayClaimChip summary={bayClaimSummary(bay)} />
                </div>
                <div className="text-[13px] text-neutral-60 mt-1">
                  In {zoneName(zone, lang)} · {s.loads} {tr('loads', lang).toLowerCase()} · {fmtNum(s.bales)} {tr('bales', lang).toLowerCase()} · {fmtKg(s.weight)}
                </div>
              </div>
              <div className="flex items-center gap-2 flex-wrap">
                <CapacityChip bales={s.bales} />
                {/* R39: bay-level edit + bulk-select actions, default mode only. */}
                {!isCreating && yardOps?.updateBay && (
                  <>
                    <button
                      onClick={() => setEditor({ type: 'editBay', zoneId: zone.id, bayId: bay.id })}
                      className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded border border-neutral-10 text-[13px] font-medium text-neutral-100 bg-white hover:bg-neutral-5"
                    >
                      <Icon d={I.edit} className="w-3.5 h-3.5" />
                      {lang === 'es' ? 'Editar fila' : 'Edit bay'}
                    </button>
                    {bay.loads.length > 0 && yard.length > 1 && (
                      <button
                        onClick={() => { setSelectionMode(v => !v); setBulkSelected(new Set()); }}
                        aria-pressed={selectionMode}
                        className={'inline-flex items-center gap-1.5 px-3 py-1.5 rounded border text-[13px] font-medium ' + (selectionMode ? 'border-safi-600 bg-safi-50 text-safi-700' : 'border-neutral-10 text-neutral-100 bg-white hover:bg-neutral-5')}
                      >
                        <Icon d={selectionMode ? I.check : I.list} className="w-3.5 h-3.5" />
                        {selectionMode ? (lang === 'es' ? 'Cancelar selección' : 'Done selecting') : (lang === 'es' ? 'Mover cargas' : 'Move loads')}
                      </button>
                    )}
                  </>
                )}
              </div>
            </div>
            {isCreating && !bay.accessible && (
              <div className="mt-3 inline-flex items-center gap-2 px-3 py-2 rounded bg-amber-50 text-amber-900 text-[13px]">
                <Icon d={I.lock} className="w-4 h-4" />
                This bay is blocked by {bay.blockedBy}. Loads here can’t be added to the picking list until the bays in front are cleared.
              </div>
            )}
          </div>
          {bay.loads.length === 0 ? (
            <div className="px-6 py-10 text-center text-neutral-60 text-[13px]">
              No loads have been stored in this bay yet
            </div>
          ) : (
            <>
              {/* Select all loads - visible during Create picking list when the bay has > 1 load */}
              {isCreating && bay.loads.length > 1 && (() => {
                const bayKeys = bay.loads.map(l => `${zone.id}|${bay.id}|${l.id}`);
                const allSel = bay.accessible && bayKeys.every(k => selectionBales[k] != null);
                const someSel = bayKeys.some(k => selectionBales[k] != null);
                const toggleAll = () => {
                  if (!bay.accessible) return;
                  setSelectionBales(prev => {
                    const next = { ...prev };
                    if (allSel) {
                      bayKeys.forEach(k => { delete next[k]; });
                    } else {
                      bay.loads.forEach(l => {
                        const k = `${zone.id}|${bay.id}|${l.id}`;
                        if (next[k] == null) next[k] = l.bales;
                      });
                    }
                    return next;
                  });
                };
                return (
                  <label className={
                    'flex items-center gap-3 px-4 py-3 border-b border-neutral-10 cursor-pointer text-[13px] font-medium ' +
                    (bay.accessible ? 'text-neutral-80 hover:bg-neutral-5' : 'text-neutral-40 cursor-not-allowed')
                  }>
                    <input
                      type="checkbox"
                      className="rounded text-safi-600 focus:ring-safi-500 disabled:opacity-40"
                      checked={allSel}
                      ref={el => { if (el) el.indeterminate = someSel && !allSel; }}
                      onChange={toggleAll}
                      disabled={!bay.accessible}
                      aria-label={`Select all loads in ${bay.esName}`}
                    />
                    <span>
                      {allSel ? `All ${bay.loads.length} loads selected` : `Select all ${bay.loads.length} loads`}
                    </span>
                  </label>
                );
              })()}
              <div className="divide-y divide-neutral-10">
                {bay.loads.map(load => {
                  const key = `${zone.id}|${bay.id}|${load.id}`;
                  const access = accessibilityOf(zone, bay, load);
                  const lifoOk = isLifoSelectable(zone, bay, load, selectionBales, pickerMode);
                  const alreadySelected = selectionBales[key] != null;
                  // R39: selection mode for bulk-move. Overrides isCreating treatment.
                  if (!isCreating && selectionMode) {
                    const isBulkSel = bulkSelected.has(load.id);
                    return (
                      <label key={load.id} className={'flex items-center gap-3 pl-4 pr-3 py-3 cursor-pointer ' + (isBulkSel ? 'bg-safi-50' : 'hover:bg-neutral-5')}>
                        <input
                          type="checkbox"
                          checked={isBulkSel}
                          onChange={() => setBulkSelected(prev => {
                            const next = new Set(prev);
                            if (next.has(load.id)) next.delete(load.id); else next.add(load.id);
                            return next;
                          })}
                          className="w-5 h-5 rounded text-safi-600 focus:ring-safi-500"
                        />
                        <div className="flex-1 min-w-0">
                          <div className="text-neutral-100">{load.supplier} <span className="text-neutral-40 text-sm">#{load.lot}</span></div>
                          <div className="text-[13px] text-neutral-60 mt-0.5">{fmtNum(load.bales)} bales · {fmtKg(load.weight)}</div>
                        </div>
                      </label>
                    );
                  }
                  // R35: loadClaimMap is loadId -> {productionLine, shift}. A load on
                  // ANOTHER (line, shift) combination is locked from this list.
                  const claimOwner = loadClaimMap[load.id] || null;
                  const isOwnedByThisDraft = claimOwner && claimOwner.productionLine === creationLine && claimOwner.shift === creationShift;
                  const lockedByOther = isCreating && claimOwner && !isOwnedByThisDraft
                    ? `${claimOwner.productionLine} · ${claimOwner.shift}` : false;
                  const accessible = !isCreating || ((bay.accessible && (lifoOk || alreadySelected)) && !lockedByOther);
                  let onPickingList = false;
                  let claimLabel = null;
                  if (!isCreating && claimOwner) {
                    claimLabel = `${claimOwner.productionLine} · ${claimOwner.shift}`;
                    const owningList = pickingLists.find(pl => pl.productionLine === claimOwner.productionLine && pl.shift === claimOwner.shift);
                    const entry = owningList?.loads.find(l => l.loadId === load.id);
                    if (entry) onPickingList = entry.bales != null && entry.bales < load.bales
                      ? { partial: true, bales: entry.bales, label: claimLabel }
                      : { partial: false, label: claimLabel };
                  }
                  return (
                    <LoadRow
                      key={load.id}
                      load={load}
                      isCreating={isCreating}
                      accessible={accessible}
                      isAccessibleLoad={access.status === 'accessible'}
                      isSelected={alreadySelected}
                      onToggle={() => toggleLoad(key)}
                      onPickingList={onPickingList}
                      claimedByLine={claimLabel}
                      lockedByOtherLine={lockedByOther}
                      onReject={() => setRejectModal({ zone, bay, load, accessibleBales: access.accessibleBales })}
                    />
                  );
                })}
              </div>
              {/* R39: bulk-move action bar - appears when at least one load is ticked in selection mode. */}
              {!isCreating && selectionMode && bulkSelected.size > 0 && (
                <div className="sticky bottom-4 z-30 mt-3 mx-4 mb-4 px-4 py-3 rounded-lg bg-neutral-100 text-white shadow-lg flex items-center justify-between gap-3 flex-wrap">
                  <div className="text-sm font-medium">
                    {bulkSelected.size} {bulkSelected.size === 1 ? (lang === 'es' ? 'lote seleccionado' : 'load selected') : (lang === 'es' ? 'lotes seleccionados' : 'loads selected')}
                  </div>
                  <div className="flex items-center gap-2">
                    <button
                      onClick={() => { setBulkSelected(new Set()); }}
                      className="px-3 py-1.5 rounded border border-white/20 text-white text-[13px] font-medium hover:bg-white/10"
                    >
                      {lang === 'es' ? 'Limpiar' : 'Clear'}
                    </button>
                    <button
                      onClick={() => setEditor({ type: 'moveLoads', fromZoneId: zone.id, fromBayId: bay.id, loadIds: Array.from(bulkSelected) })}
                      className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded bg-safi-600 text-white text-[13px] font-medium hover:bg-safi-700"
                    >
                      <Icon d={I.arrowR} className="w-3.5 h-3.5" />
                      {lang === 'es'
                        ? `Mover ${bulkSelected.size} ${bulkSelected.size === 1 ? 'lote' : 'lotes'}`
                        : `Move ${bulkSelected.size} ${bulkSelected.size === 1 ? 'load' : 'loads'}`}
                    </button>
                  </div>
                </div>
              )}
            </>
          )}
        </div>
      );
    };

    // R39: when the move modal closes successfully, clear the selection.
    useEffect(() => {
      if (!editor) { /* may have been move - clear selection if so */ setBulkSelected(prev => prev.size > 0 ? new Set() : prev); }
    }, [editor]);

    // R42: buffer detail view. Mirrors the bay-detail layout:
    // - breadcrumb (Yard overview / Buffer)
    // - title + summary line (items, bales, weight)
    // - per-item rows showing supplier + lot + (looked-up) material chips, with
    //   a prominent "X of Y bales in buffer" metric on the right
    const renderBuffer = () => {
      const bufferBales = buffer.reduce((a, b) => a + b.bales, 0);
      const bufferWeight = buffer.reduce((a, b) => a + Math.round(b.bales * b.weightPerBale), 0);
      // Look up each item against the live yard so we can show the existing
      // green material chips and the per-load context (zone · bay source).
      const resolved = buffer.map(item => {
        let load = null, sourceZone = null, sourceBay = null;
        for (const z of yard) {
          for (const b of z.bays) {
            const ld = b.loads.find(l => l.id === item.loadId);
            if (ld) { load = ld; sourceZone = z; sourceBay = b; break; }
          }
          if (load) break;
        }
        return { item, load, sourceZone, sourceBay };
      });
      return (
        <div className="bg-white border border-neutral-10 rounded-xl">
          <div className="p-5 border-b border-neutral-10">
            {/* Breadcrumb (custom for buffer - Yard overview / Buffer) */}
            <nav aria-label="Breadcrumb" className="flex items-center gap-2 text-[13px] flex-wrap">
              <button onClick={goOverview} className="text-safi-600 hover:underline">
                {tr('yardOverview', lang)}
              </button>
              <span className="text-neutral-40">/</span>
              <span className="text-neutral-100 font-medium">{lang === 'es' ? 'Búfer' : 'Buffer'}</span>
            </nav>
            <div className="mt-2 flex items-center justify-between gap-6 flex-wrap">
              <div>
                <div className="flex items-center gap-3 flex-wrap">
                  <span className="w-3 h-3 rounded-full bg-amber-400" aria-hidden="true" />
                  <h3 className="text-2xl font-bold text-neutral-100">{lang === 'es' ? 'Búfer' : 'Buffer'}</h3>
                </div>
                <div className="text-[13px] text-neutral-60 mt-1">
                  {`${buffer.length} ${buffer.length === 1 ? (lang === 'es' ? 'lote' : 'load') : (lang === 'es' ? 'lotes' : 'loads')} · ${fmtNum(bufferBales)} ${tr('bales', lang).toLowerCase()} · ${fmtKg(bufferWeight)}`}
                </div>
              </div>
            </div>
          </div>
          {buffer.length === 0 ? (
            <div className="px-6 py-10 text-center text-neutral-60 text-[13px]">
              {lang === 'es' ? 'No hay pacas en el búfer todavía' : 'No bales in the buffer yet'}
            </div>
          ) : (
            // R44: each row is now an INDIVIDUAL BALE (not a load). For each buffer
            // item we expand its bales into N rows numbered Load #001..#NNN. The
            // load description ("Caps still on some bales...") is dropped per the
            // feedback.
            <div className="divide-y divide-neutral-10">
              {resolved.flatMap(({ item, load, sourceZone, sourceBay }) => {
                return Array.from({ length: item.bales }).map((_, idx) => {
                  const baleNo = String(idx + 1).padStart(3, '0');
                  const sourceLabel = `${sourceZone ? zoneName(sourceZone, lang) : `Zone ${item.sourceZoneId}`} · ${sourceBay ? bayName(sourceBay, lang) : `Bay ${item.sourceBayId}`}`;
                  return (
                    <div key={`${item.uid}-${idx}`} className="px-5 py-4">
                      <div className="flex items-center gap-2 flex-wrap text-neutral-100">
                        <span className="font-medium">{item.supplier}</span>
                        <span className="text-neutral-40 text-[13px]">##{item.lot}</span>
                        <span className="text-neutral-40 text-[13px]">{lang === 'es' ? 'Lote' : 'Load'} #{baleNo}</span>
                      </div>
                      {/* Reuse the standard AI result chips (green when in-spec, red when off). */}
                      {load && (
                        <div className="mt-2">
                          <AIResultChips load={load} />
                        </div>
                      )}
                      <div className="text-[13px] text-neutral-60 mt-2">
                        {lang === 'es' ? 'Peso est.' : 'Est. weight'} {fmtKg(Math.round(item.weightPerBale))}
                        {' · '}{lang === 'es' ? 'Origen' : 'From'}: {sourceLabel}
                      </div>
                    </div>
                  );
                });
              })}
            </div>
          )}
        </div>
      );
    };

    const renderContent = () => {
      if (view.level === 'zone') return renderZone();
      if (view.level === 'bay') return renderBay();
      if (view.level === 'buffer') return renderBuffer();
      return renderOverview();
    };

    return (
      <>
        {renderContent()}
        {rejectModal && (
          <RejectMaterialModal
            source="load"
            zone={rejectModal.zone}
            bay={rejectModal.bay}
            load={rejectModal.load}
            remaining={{
              bales: rejectModal.accessibleBales,
              weight: Math.round(rejectModal.accessibleBales * (rejectModal.load.weight / rejectModal.load.bales)),
              loads: 1
            }}
            avgWeight={rejectModal.load.weight / rejectModal.load.bales}
            lang={lang}
            pickerMode={pickerMode}
            onCancel={() => setRejectModal(null)}
            onConfirm={({ bales, reason, weight }) => {
              setRejectModal(null);
              setToast?.({
                message: (lang === 'es'
                  ? `Rechazadas ${bales} pacas de #${rejectModal.load.lot} (${reason}, ${fmtKg(weight)})`
                  : `Rejected ${bales} bales from #${rejectModal.load.lot} (${reason}, ${fmtKg(weight)})`),
                kind: 'success'
              });
            }}
          />
        )}
        {editor && (
          <WarehouseEditorModal
            editor={editor}
            yard={yard}
            yardOps={yardOps}
            lang={lang}
            setToast={setToast}
            onClose={() => setEditor(null)}
          />
        )}
      </>
    );
  }

  // -------------------------------------------------------------------------
  // R39: WarehouseEditorModal - handles all warehouse editing flows from the
  // layout tab. Picks the right form based on editor.type. Each flow validates
  // and calls the corresponding yardOps mutator, then closes.
  // -------------------------------------------------------------------------
  function WarehouseEditorModal({ editor, yard, yardOps, lang = 'en', setToast, onClose }) {
    const tEN = (en, es) => lang === 'es' ? es : en;
    const Title = ({ children }) => <h3 className="font-bold text-lg text-neutral-100">{children}</h3>;
    const Field = ({ label, children }) => (
      <div>
        <label className="block text-[13px] font-semibold text-neutral-80 mb-1.5">{label}</label>
        {children}
      </div>
    );
    const TextInput = (props) => (
      <input
        type="text"
        {...props}
        className={'w-full h-11 px-3 border border-neutral-10 rounded-lg text-base text-neutral-100 bg-white focus:outline-none focus:ring-2 focus:ring-safi-600 ' + (props.className || '')}
      />
    );
    const Footer = ({ onCancel, onConfirm, confirmLabel, confirmDanger, confirmDisabled }) => (
      <div className="mt-6 flex gap-2 justify-end">
        <button onClick={onCancel} className="px-4 py-2.5 rounded-lg border border-neutral-10 text-[13px] font-medium hover:bg-neutral-5 min-h-[44px]">
          {tEN('Cancel', 'Cancelar')}
        </button>
        <button
          disabled={confirmDisabled}
          onClick={onConfirm}
          className={'px-4 py-2.5 rounded-lg text-[13px] font-medium min-h-[44px] ' + (
            confirmDisabled ? 'bg-neutral-10 text-neutral-40 cursor-not-allowed' :
              confirmDanger ? 'bg-rose-600 text-white hover:bg-rose-700' :
                'bg-safi-600 text-white hover:bg-safi-700'
          )}
        >{confirmLabel}</button>
      </div>
    );

    // Build flow components inline. Each handles its own local state.
    const CreateZoneForm = () => {
      const [name, setName] = useState('');
      const [colorId, setColorId] = useState('none');
      // R40: bays managed inline. Starts with one bay defaulted to "Bay 1".
      const [bays, setBays] = useState([{ key: 'b1', name: 'Bay 1' }]);
      const addBay = () => {
        // Pick the next numeric "Bay N" that doesn't clash with what's already in the list.
        const existing = new Set(bays.map(b => b.name.trim().toLowerCase()));
        let n = bays.length + 1;
        while (existing.has(`bay ${n}`.toLowerCase())) n += 1;
        setBays(prev => [...prev, { key: `b${Date.now()}`, name: `Bay ${n}` }]);
      };
      const trimmed = name.trim();
      const duplicate = trimmed && yard.some(z => (z.name || '').toLowerCase() === trimmed.toLowerCase());
      // Bay validation: all non-empty + unique within the new zone.
      const bayNames = bays.map(b => b.name.trim());
      const baysAllFilled = bayNames.every(n => n.length > 0);
      const baysUnique = new Set(bayNames.map(n => n.toLowerCase())).size === bayNames.length;
      const baysValid = bays.length > 0 && baysAllFilled && baysUnique;
      const canSave = !!trimmed && !duplicate && baysValid;
      return (
        <div className="bg-white rounded-xl shadow-xl w-full max-w-lg p-6 max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
          <Title>{tEN('Create zone', 'Crear zona')}</Title>
          <p className="text-[13px] text-neutral-60 mt-1">{tEN('Name your new zone, pick a colour, and add bays.', 'Nombra tu nueva zona, elige un color y añade filas.')}</p>
          <div className="mt-5 space-y-4">
            <Field label={tEN('Zone name', 'Nombre de la zona')}>
              <TextInput value={name} onChange={e => setName(e.target.value)} placeholder={tEN('e.g. Zone D', 'p. ej. Zona D')} />
              {duplicate && <p className="text-[13px] text-rose-700 mt-1.5">{tEN('A zone with that name already exists.', 'Ya existe una zona con ese nombre.')}</p>}
            </Field>
            <Field label={tEN('Colour', 'Color')}>
              <div className="grid grid-cols-6 gap-2">
                {ZONE_COLORS.map(c => (
                  <button
                    key={c.id}
                    type="button"
                    onClick={() => setColorId(c.id)}
                    aria-pressed={colorId === c.id}
                    className={'h-10 rounded-lg border-2 flex items-center justify-center transition ' + (colorId === c.id ? 'border-safi-600 ring-2 ring-safi-200' : 'border-neutral-10 hover:border-neutral-40')}
                    title={c.label}
                  >
                    {c.id === 'none' ? (
                      <span className="text-[13px] text-neutral-60">—</span>
                    ) : (
                      <span className="w-5 h-5 rounded-full" style={{ backgroundColor: c.swatch }} />
                    )}
                  </button>
                ))}
              </div>
              <p className="text-[13px] text-neutral-60 mt-1.5">{getZoneColor(colorId).label}</p>
            </Field>
            {/* R40: inline bay editor. Always starts with one default bay. */}
            <Field label={tEN('Bays', 'Filas')}>
              <div className="space-y-2">
                {bays.map((b, i) => (
                  <div key={b.key} className="flex items-center gap-2">
                    <TextInput
                      value={b.name}
                      onChange={e => setBays(prev => prev.map((bay, j) => j === i ? { ...bay, name: e.target.value } : bay))}
                      placeholder={`Bay ${i + 1}`}
                    />
                    {/* New zones have no loads yet, so delete is always allowed - except when only one bay remains. */}
                    <button
                      type="button"
                      disabled={bays.length === 1}
                      onClick={() => setBays(prev => prev.filter((_, j) => j !== i))}
                      title={bays.length === 1 ? tEN('A zone needs at least one bay.', 'Una zona necesita al menos una fila.') : tEN('Remove bay', 'Eliminar fila')}
                      className={'p-2 rounded ' + (bays.length === 1 ? 'text-neutral-40 cursor-not-allowed' : 'text-rose-700 hover:bg-rose-50')}
                      aria-label="Remove bay"
                    >
                      <Icon d={I.trash} className="w-4 h-4" />
                    </button>
                  </div>
                ))}
                <button
                  type="button"
                  onClick={addBay}
                  className="inline-flex items-center gap-1.5 px-3 py-2 rounded border border-dashed border-neutral-10 text-[13px] font-medium text-neutral-80 hover:bg-neutral-5"
                >
                  <Icon d={I.plus} className="w-4 h-4" />
                  {tEN('Add another bay', 'Añadir otra fila')}
                </button>
                {!baysUnique && <p className="text-[13px] text-rose-700 mt-1.5">{tEN('Bay names must be unique within the zone.', 'Los nombres de filas deben ser únicos dentro de la zona.')}</p>}
                {baysUnique && !baysAllFilled && <p className="text-[13px] text-rose-700 mt-1.5">{tEN('Bay names cannot be empty.', 'Los nombres de filas no pueden estar vacíos.')}</p>}
              </div>
            </Field>
          </div>
          <Footer
            onCancel={onClose}
            onConfirm={() => {
              const finalBays = bayNames.filter(Boolean);
              yardOps.createZone({ name: trimmed, color: colorId, bays: finalBays });
              setToast?.({
                message: tEN(
                  `Zone "${trimmed}" created with ${finalBays.length} bay${finalBays.length === 1 ? '' : 's'}.`,
                  `Zona "${trimmed}" creada con ${finalBays.length} fila${finalBays.length === 1 ? '' : 's'}.`),
                kind: 'success'
              });
              onClose();
            }}
            confirmLabel={tEN('Create zone', 'Crear zona')}
            confirmDisabled={!canSave}
          />
        </div>
      );
    };

    const EditZoneForm = () => {
      const zone = yard.find(z => z.id === editor.zoneId);
      const [name, setName] = useState(zone?.name || '');
      const [colorId, setColorId] = useState(zone?.color || 'none');
      const [confirmDelete, setConfirmDelete] = useState(false);
      if (!zone) return null;
      const totalLoads = zone.bays.reduce((a, b) => a + b.loads.length, 0);
      const trimmed = name.trim();
      const duplicate = trimmed && yard.some(z => z.id !== zone.id && (z.name || '').toLowerCase() === trimmed.toLowerCase());
      const canSave = !!trimmed && !duplicate;
      const canDelete = totalLoads === 0 && zone.bays.every(b => b.loads.length === 0);
      return (
        <div className="bg-white rounded-xl shadow-xl w-full max-w-lg p-6" onClick={e => e.stopPropagation()}>
          <Title>{tEN('Edit zone', 'Editar zona')}</Title>
          <div className="mt-5 space-y-4">
            <Field label={tEN('Zone name', 'Nombre de la zona')}>
              <TextInput value={name} onChange={e => setName(e.target.value)} />
              {duplicate && <p className="text-[13px] text-rose-700 mt-1.5">{tEN('A zone with that name already exists.', 'Ya existe una zona con ese nombre.')}</p>}
            </Field>
            <Field label={tEN('Colour', 'Color')}>
              <div className="grid grid-cols-6 gap-2">
                {ZONE_COLORS.map(c => (
                  <button
                    key={c.id}
                    type="button"
                    onClick={() => setColorId(c.id)}
                    aria-pressed={colorId === c.id}
                    className={'h-10 rounded-lg border-2 flex items-center justify-center transition ' + (colorId === c.id ? 'border-safi-600 ring-2 ring-safi-200' : 'border-neutral-10 hover:border-neutral-40')}
                    title={c.label}
                  >
                    {c.id === 'none' ? <span className="text-[13px] text-neutral-60">—</span> : <span className="w-5 h-5 rounded-full" style={{ backgroundColor: c.swatch }} />}
                  </button>
                ))}
              </div>
            </Field>
            <div className="pt-3 border-t border-neutral-10">
              <button
                disabled={!canDelete}
                onClick={() => setConfirmDelete(true)}
                className={'inline-flex items-center gap-1.5 px-3 py-2 rounded border text-[13px] font-medium ' + (canDelete ? 'border-rose-300 text-rose-700 hover:bg-rose-50' : 'border-neutral-10 text-neutral-40 cursor-not-allowed')}
                title={canDelete ? '' : tEN('Only empty zones can be deleted', 'Solo se pueden eliminar zonas vacías')}
              >
                <Icon d={I.trash} className="w-4 h-4" />
                {tEN('Delete zone', 'Eliminar zona')}
              </button>
              {!canDelete && (
                <p className="text-[13px] text-neutral-60 mt-1.5">
                  {tEN('Only empty zones can be deleted. Move or process all loads first.', 'Solo se pueden eliminar zonas vacías. Mueve o procesa todas las cargas primero.')}
                </p>
              )}
            </div>
          </div>
          {confirmDelete ? (
            <div className="mt-6 p-4 rounded-lg bg-rose-50 border border-rose-200">
              <p className="text-sm text-rose-900 font-semibold">{tEN(`Delete "${zone.name}"?`, `¿Eliminar "${zone.name}"?`)}</p>
              <p className="text-[13px] text-rose-800 mt-1">{tEN('This cannot be undone.', 'No se puede deshacer.')}</p>
              <div className="mt-3 flex items-center gap-2 justify-end">
                <button onClick={() => setConfirmDelete(false)} className="px-3 py-2 rounded border border-neutral-10 text-[13px] font-medium bg-white">{tEN('Cancel', 'Cancelar')}</button>
                <button onClick={() => { yardOps.deleteZone(zone.id); setToast?.({ message: tEN(`Zone "${zone.name}" deleted.`, `Zona "${zone.name}" eliminada.`), kind: 'success' }); onClose(); }} className="px-3 py-2 rounded bg-rose-600 text-white text-[13px] font-medium">{tEN('Delete', 'Eliminar')}</button>
              </div>
            </div>
          ) : (
            <Footer
              onCancel={onClose}
              onConfirm={() => { yardOps.updateZone(zone.id, { name: trimmed, color: colorId }); setToast?.({ message: tEN('Zone updated.', 'Zona actualizada.'), kind: 'success' }); onClose(); }}
              confirmLabel={tEN('Save changes', 'Guardar cambios')}
              confirmDisabled={!canSave}
            />
          )}
        </div>
      );
    };

    const CreateBaysForm = () => {
      const zone = yard.find(z => z.id === editor.zoneId);
      const [names, setNames] = useState(['']);
      if (!zone) return null;
      const trimmed = names.map(n => n.trim()).filter(Boolean);
      const seen = new Set();
      const existing = new Set(zone.bays.map(b => b.name.toLowerCase()));
      const dups = trimmed.filter(n => {
        const key = n.toLowerCase();
        const isDup = seen.has(key) || existing.has(key);
        seen.add(key);
        return isDup;
      });
      const canSave = trimmed.length > 0 && dups.length === 0;
      return (
        <div className="bg-white rounded-xl shadow-xl w-full max-w-lg p-6" onClick={e => e.stopPropagation()}>
          <Title>{tEN(`Create bays in ${zone.name}`, `Crear filas en ${zone.name}`)}</Title>
          <p className="text-[13px] text-neutral-60 mt-1">{tEN('Add one or more bays. Names must be unique.', 'Añade una o más filas. Los nombres deben ser únicos.')}</p>
          <div className="mt-5 space-y-2">
            {names.map((n, i) => (
              <div key={i} className="flex items-center gap-2">
                <TextInput value={n} onChange={e => setNames(prev => prev.map((v, j) => j === i ? e.target.value : v))} placeholder={tEN(`Bay name`, `Nombre de la fila`)} />
                {names.length > 1 && (
                  <button onClick={() => setNames(prev => prev.filter((_, j) => j !== i))} className="p-2 rounded text-neutral-60 hover:bg-neutral-5" aria-label="Remove"><Icon d={I.close} className="w-4 h-4" /></button>
                )}
              </div>
            ))}
            <button
              onClick={() => setNames(prev => [...prev, ''])}
              className="inline-flex items-center gap-1.5 px-3 py-2 rounded border border-dashed border-neutral-10 text-[13px] font-medium text-neutral-80 hover:bg-neutral-5"
            >
              <Icon d={I.plus} className="w-4 h-4" />
              {tEN('Add another bay', 'Añadir otra fila')}
            </button>
            {dups.length > 0 && <p className="text-[13px] text-rose-700 mt-1.5">{tEN('Bay names must be unique within the zone.', 'Los nombres deben ser únicos dentro de la zona.')}</p>}
          </div>
          <Footer
            onCancel={onClose}
            onConfirm={() => { yardOps.createBays(zone.id, trimmed); setToast?.({ message: tEN(`${trimmed.length} bay${trimmed.length === 1 ? '' : 's'} created in ${zone.name}.`, `${trimmed.length} fila${trimmed.length === 1 ? '' : 's'} creada${trimmed.length === 1 ? '' : 's'} en ${zone.name}.`), kind: 'success' }); onClose(); }}
            confirmLabel={tEN(`Create ${trimmed.length || ''} ${trimmed.length === 1 ? 'bay' : 'bays'}`.replace('  ', ' '), `Crear ${trimmed.length || ''} fila${trimmed.length === 1 ? '' : 's'}`.replace('  ', ' '))}
            confirmDisabled={!canSave}
          />
        </div>
      );
    };

    const EditBaysForm = () => {
      const zone = yard.find(z => z.id === editor.zoneId);
      const [rows, setRows] = useState(zone ? zone.bays.map(b => ({ id: b.id, name: b.name, originalName: b.name, empty: b.loads.length === 0, deleted: false })) : []);
      if (!zone) return null;
      const trimmedNames = rows.filter(r => !r.deleted).map(r => r.name.trim());
      const namesUnique = new Set(trimmedNames.map(n => n.toLowerCase())).size === trimmedNames.length;
      const canSave = trimmedNames.every(n => n.length > 0) && namesUnique;
      return (
        <div className="bg-white rounded-xl shadow-xl w-full max-w-lg p-6" onClick={e => e.stopPropagation()}>
          <Title>{tEN(`Edit bays in ${zone.name}`, `Editar filas en ${zone.name}`)}</Title>
          <p className="text-[13px] text-neutral-60 mt-1">{tEN('Rename or delete bays. Only empty bays can be deleted.', 'Renombra o elimina filas. Solo las filas vacías se pueden eliminar.')}</p>
          <div className="mt-5 space-y-2 max-h-[50vh] overflow-y-auto">
            {rows.map((r, i) => (
              <div key={r.id} className={'flex items-center gap-2 ' + (r.deleted ? 'opacity-40' : '')}>
                <TextInput
                  value={r.name}
                  disabled={r.deleted}
                  onChange={e => setRows(prev => prev.map((row, j) => j === i ? { ...row, name: e.target.value } : row))}
                />
                <button
                  onClick={() => setRows(prev => prev.map((row, j) => j === i ? { ...row, deleted: !row.deleted } : row))}
                  disabled={!r.empty}
                  title={!r.empty ? tEN('Bay has loads - move them first.', 'La fila tiene cargas - muévelas primero.') : ''}
                  className={'p-2 rounded ' + (!r.empty ? 'text-neutral-40 cursor-not-allowed' : r.deleted ? 'bg-neutral-5 text-neutral-100' : 'text-rose-700 hover:bg-rose-50')}
                  aria-label="Delete"
                >
                  <Icon d={r.deleted ? I.close : I.trash} className="w-4 h-4" />
                </button>
              </div>
            ))}
          </div>
          <Footer
            onCancel={onClose}
            onConfirm={() => {
              rows.forEach(r => {
                if (r.deleted) { yardOps.deleteBay(zone.id, r.id); }
                else if (r.name.trim() !== r.originalName) { yardOps.updateBay(zone.id, r.id, { name: r.name.trim() }); }
              });
              setToast?.({ message: tEN('Bay changes saved.', 'Cambios guardados.'), kind: 'success' });
              onClose();
            }}
            confirmLabel={tEN('Save changes', 'Guardar cambios')}
            confirmDisabled={!canSave}
          />
        </div>
      );
    };

    const EditBayForm = () => {
      const zone = yard.find(z => z.id === editor.zoneId);
      const bay = zone?.bays.find(b => b.id === editor.bayId);
      const [name, setName] = useState(bay?.name || '');
      const [confirmDelete, setConfirmDelete] = useState(false);
      if (!bay) return null;
      const trimmed = name.trim();
      const duplicate = trimmed && zone.bays.some(b => b.id !== bay.id && b.name.toLowerCase() === trimmed.toLowerCase());
      const canSave = !!trimmed && !duplicate;
      const canDelete = bay.loads.length === 0;
      return (
        <div className="bg-white rounded-xl shadow-xl w-full max-w-lg p-6" onClick={e => e.stopPropagation()}>
          <Title>{tEN('Edit bay', 'Editar fila')}</Title>
          <div className="mt-5 space-y-4">
            <Field label={tEN('Bay name', 'Nombre de la fila')}>
              <TextInput value={name} onChange={e => setName(e.target.value)} />
              {duplicate && <p className="text-[13px] text-rose-700 mt-1.5">{tEN('A bay with that name already exists in this zone.', 'Ya existe una fila con ese nombre en esta zona.')}</p>}
            </Field>
            <div className="pt-3 border-t border-neutral-10">
              <button
                disabled={!canDelete}
                onClick={() => setConfirmDelete(true)}
                className={'inline-flex items-center gap-1.5 px-3 py-2 rounded border text-[13px] font-medium ' + (canDelete ? 'border-rose-300 text-rose-700 hover:bg-rose-50' : 'border-neutral-10 text-neutral-40 cursor-not-allowed')}
              >
                <Icon d={I.trash} className="w-4 h-4" />
                {tEN('Delete bay', 'Eliminar fila')}
              </button>
              {!canDelete && (
                <p className="text-[13px] text-neutral-60 mt-1.5">{tEN('Only empty bays can be deleted. Move or process all loads first.', 'Solo se pueden eliminar filas vacías. Mueve o procesa todas las cargas primero.')}</p>
              )}
            </div>
          </div>
          {confirmDelete ? (
            <div className="mt-6 p-4 rounded-lg bg-rose-50 border border-rose-200">
              <p className="text-sm text-rose-900 font-semibold">{tEN(`Delete "${bay.name}"?`, `¿Eliminar "${bay.name}"?`)}</p>
              <div className="mt-3 flex items-center gap-2 justify-end">
                <button onClick={() => setConfirmDelete(false)} className="px-3 py-2 rounded border border-neutral-10 text-[13px] font-medium bg-white">{tEN('Cancel', 'Cancelar')}</button>
                <button onClick={() => { yardOps.deleteBay(zone.id, bay.id); setToast?.({ message: tEN(`Bay "${bay.name}" deleted.`, `Fila "${bay.name}" eliminada.`), kind: 'success' }); onClose(); }} className="px-3 py-2 rounded bg-rose-600 text-white text-[13px] font-medium">{tEN('Delete', 'Eliminar')}</button>
              </div>
            </div>
          ) : (
            <Footer
              onCancel={onClose}
              onConfirm={() => { yardOps.updateBay(zone.id, bay.id, { name: trimmed }); setToast?.({ message: tEN('Bay updated.', 'Fila actualizada.'), kind: 'success' }); onClose(); }}
              confirmLabel={tEN('Save changes', 'Guardar cambios')}
              confirmDisabled={!canSave}
            />
          )}
        </div>
      );
    };

    const MoveLoadsForm = () => {
      const [toZoneId, setToZoneId] = useState(yard.find(z => z.id !== editor.fromZoneId)?.id || '');
      const targetZone = yard.find(z => z.id === toZoneId);
      const validBays = targetZone ? targetZone.bays.filter(b => b.id !== editor.fromBayId) : [];
      const [toBayId, setToBayId] = useState(validBays[0]?.id || '');
      const [confirmed, setConfirmed] = useState(false);
      // Re-derive when target zone changes
      useEffect(() => {
        const nextValid = targetZone ? targetZone.bays.filter(b => b.id !== editor.fromBayId) : [];
        setToBayId(nextValid[0]?.id || '');
      }, [toZoneId]);
      const count = editor.loadIds.length;
      const fromZone = yard.find(z => z.id === editor.fromZoneId);
      const fromBay = fromZone?.bays.find(b => b.id === editor.fromBayId);
      const canMove = !!toBayId;
      const bulk = count > 1;
      const goConfirm = () => {
        if (bulk && !confirmed) { setConfirmed(true); return; }
        yardOps.moveLoads(editor.fromZoneId, editor.fromBayId, editor.loadIds, toZoneId, toBayId);
        setToast?.({
          message: tEN(`${count} load${count === 1 ? '' : 's'} moved to ${targetZone?.name} · ${validBays.find(b => b.id === toBayId)?.name}.`,
                       `${count} lote${count === 1 ? '' : 's'} movido${count === 1 ? '' : 's'} a ${targetZone?.name} · ${validBays.find(b => b.id === toBayId)?.name}.`),
          kind: 'success'
        });
        onClose();
      };
      return (
        <div className="bg-white rounded-xl shadow-xl w-full max-w-lg p-6" onClick={e => e.stopPropagation()}>
          <Title>{tEN(bulk ? `Move ${count} loads` : 'Move load', bulk ? `Mover ${count} lotes` : 'Mover lote')}</Title>
          <p className="text-[13px] text-neutral-60 mt-1">
            {tEN(`From ${fromZone?.name} · ${fromBay?.name}`, `Desde ${fromZone?.name} · ${fromBay?.name}`)}
          </p>
          <div className="mt-5 space-y-4">
            <Field label={tEN('Target zone', 'Zona destino')}>
              <select value={toZoneId} onChange={e => setToZoneId(e.target.value)} className="w-full h-11 px-3 border border-neutral-10 rounded-lg text-base text-neutral-100 bg-white focus:outline-none focus:ring-2 focus:ring-safi-600">
                {yard.map(z => <option key={z.id} value={z.id} disabled={z.bays.length === 0}>{z.name}</option>)}
              </select>
            </Field>
            <Field label={tEN('Target bay', 'Fila destino')}>
              <select value={toBayId} onChange={e => setToBayId(e.target.value)} className="w-full h-11 px-3 border border-neutral-10 rounded-lg text-base text-neutral-100 bg-white focus:outline-none focus:ring-2 focus:ring-safi-600">
                {validBays.map(b => <option key={b.id} value={b.id}>{b.name}</option>)}
              </select>
            </Field>
          </div>
          {bulk && confirmed ? (
            <div className="mt-5 p-4 rounded-lg bg-amber-50 border border-amber-200">
              <p className="text-sm text-amber-900 font-semibold">{tEN(`Confirm moving ${count} loads?`, `¿Confirmar mover ${count} lotes?`)}</p>
              <p className="text-[13px] text-amber-800 mt-1">{tEN(`This will move all ${count} loads in one go to ${targetZone?.name} · ${validBays.find(b => b.id === toBayId)?.name}.`, `Se moverán los ${count} lotes a ${targetZone?.name} · ${validBays.find(b => b.id === toBayId)?.name}.`)}</p>
              <div className="mt-3 flex items-center gap-2 justify-end">
                <button onClick={() => setConfirmed(false)} className="px-3 py-2 rounded border border-neutral-10 text-[13px] font-medium bg-white">{tEN('Back', 'Atrás')}</button>
                <button onClick={goConfirm} className="px-3 py-2 rounded bg-safi-600 text-white text-[13px] font-medium">{tEN(`Yes, move ${count} loads`, `Sí, mover ${count} lotes`)}</button>
              </div>
            </div>
          ) : (
            <Footer
              onCancel={onClose}
              onConfirm={goConfirm}
              confirmLabel={bulk ? tEN(`Move ${count} loads`, `Mover ${count} lotes`) : tEN('Move load', 'Mover lote')}
              confirmDisabled={!canMove}
            />
          )}
        </div>
      );
    };

    return (
      <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4" onClick={onClose}>
        {editor.type === 'createZone' && <CreateZoneForm />}
        {editor.type === 'editZone' && <EditZoneForm />}
        {editor.type === 'createBays' && <CreateBaysForm />}
        {editor.type === 'editBays' && <EditBaysForm />}
        {editor.type === 'editBay' && <EditBayForm />}
        {editor.type === 'moveLoads' && <MoveLoadsForm />}
      </div>
    );
  }

  // High-emphasis metric pair (label small, value large/bold) for the spatial view
  const Metric2 = ({ label, value }) => (
    <div className="leading-tight">
      <div className="text-[13px] text-neutral-60">{label}</div>
      <div className="text-base font-bold text-neutral-100">{value}</div>
    </div>
  );

  // LoadRow - single tappable row.
  //   - Default mode: hover shows "Open load details" tooltip. Clicking is a no-op
  //     (conceptual - no real load details page exists).
  //   - Create mode: clicking toggles selection.
  //   - Three AI result chips inline next to the order ref. Shown only if analysed.
  //   - "On picking list" indicator when this load is on the active picking list (default mode only).
  const LoadRow = ({ load, isCreating, accessible, isSelected, onToggle, onPickingList, isAccessibleLoad, onReject, claimedByLine = null, lockedByOtherLine = false }) => {
    const openDetails = (e) => {
      e.stopPropagation();
      // Conceptual placeholder - would normally navigate to a load details page.
    };
    const handleRowClick = () => {
      if (!accessible) return;
      if (isCreating) onToggle();
      // Default mode: no-op. Tooltip on hover advertises the intent.
    };
    return (
      <div
        id={'load-' + load.id}
        onClick={handleRowClick}
        role="button"
        tabIndex={accessible ? 0 : -1}
        aria-pressed={isCreating ? isSelected : undefined}
        title={isCreating ? undefined : 'Open load details'}
        onKeyDown={(e) => {
          if (!accessible) return;
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleRowClick(); }
        }}
        className={
          'group flex items-start gap-3 pl-11 pr-3 py-4 transition-colors ' + // 16px vertical, 12px horizontal
          (accessible
            ? 'cursor-pointer hover:bg-safi-100 ' + (isCreating && isSelected ? 'bg-safi-50' : '')
            : 'opacity-60 cursor-not-allowed')
        }
      >
        {isCreating && (
          <input
            type="checkbox"
            checked={isSelected}
            onChange={onToggle}
            disabled={!accessible}
            className="mt-1 rounded text-safi-600 focus:ring-safi-500 disabled:opacity-40"
            aria-label={`Select load ${load.lot}`}
            onClick={e => e.stopPropagation()}
          />
        )}
        <div className="flex-1 min-w-0">
          {/* Top line: supplier name (default text, turns purple on row hover), lot, and the three AI chips inline */}
          <div className="flex items-center gap-2 flex-wrap">
            <span className="text-neutral-100 group-hover:text-safi-600 transition-colors">{load.supplier}</span>
            <span className="text-neutral-40 text-sm">#{load.lot}</span>
            <AIResultChips load={load} />
          </div>
          {/* R34: operator description surfaced when present. Sometimes carries critical handling notes. */}
          {load.description && (
            <div className="text-[13px] text-amber-900 bg-amber-50/50 border border-amber-200/60 rounded px-2 py-1 mt-1 inline-flex items-start gap-1.5 max-w-full">
              <Icon d={I.info} className="w-3.5 h-3.5 mt-0.5 text-amber-700 shrink-0" />
              <span className="break-words">{load.description}</span>
            </div>
          )}
          <div className="text-[13px] text-neutral-60 mt-1 flex items-center gap-2 flex-wrap">
            <span>{fmtNum(load.bales)} bales · {fmtKg(load.weight)}</span>
            {/* R26: "Accessible to FO" chip removed globally - accessibility is now implicit from the row context. */}
            {onPickingList && (() => {
              // R33/R35: chip surfaces the (productionLine · shift) that claimed this load.
              // Apan 1 = sky tones, Apan 2 = amber.
              const label = claimedByLine || (typeof onPickingList === 'object' ? onPickingList.label : null);
              const isApan2 = typeof label === 'string' && label.startsWith('Apan 2');
              const chipCls = isApan2
                ? 'bg-amber-50 text-amber-900 ring-1 ring-amber-200'
                : 'bg-safi-100 text-safi-700';
              const baseText = typeof onPickingList === 'object' && onPickingList.partial
                ? `On picking list (${onPickingList.bales}/${load.bales} bales)`
                : 'On picking list';
              return (
                <span className={'inline-flex items-center gap-1 px-1.5 py-0.5 rounded text-[13px] font-medium ' + chipCls}>
                  <Icon d={I.list} className="w-3 h-3" />
                  {baseText}{label ? ` · ${label}` : ''}
                </span>
              );
            })()}
            {lockedByOtherLine && (
              <span className="inline-flex items-center gap-1 px-1.5 py-0.5 rounded text-[13px] font-medium bg-neutral-10 text-neutral-80">
                <Icon d={I.lock} className="w-3 h-3" />
                On {String(lockedByOtherLine).replace(' · ', ' - ')} picking list
              </span>
            )}
          </div>
        </div>
        {/* Actions cluster on the right - Reject (when offered) + External-link icon */}
        <div className="flex items-center gap-1 shrink-0 mt-0.5">

  // ----------------------------------------------------------------------------

  function ProductionManagementPage() {
    // EN / ES language toggle (replaces the old role switcher)
    const [lang, setLang] = useState('en');
    // The "role" concept is gone - the SL is always the persona. Picker tab can still be visited.
    const role = 'SL';
    const setRole = () => {};

    // Tabs - accordion variant removed. Sticky is the default.
    // R41: default landing tab is now the (renamed) Warehouse layout — vertical-list tab removed.
    const [tab, setTab] = useState('pw-layout');

    // R39: editable warehouse - yard structure now lives in state so the SL can
    // create / rename / delete zones + bays + move loads at runtime.
    const [yard, setYard] = useState(INITIAL_YARD);
    // R42: buffer lives at the page level so both the Warehouse tab (Buffer card
    // + buffer detail view) and the Picker (move/return/process actions) can
    // share it. Seeded so the bale-based Warehouse view shows realistic content
    // out of the box.
    const [buffer, setBuffer] = useState(SEED_BUFFER);
    // Mutator helpers - thin wrappers that keep call sites readable.
    const yardOps = {
      createZone: ({ name, color, bays = [] }) => setYard(prev => {
        const id = name.replace(/\s+/g, '').slice(0, 4).toUpperCase() + '-' + Date.now().toString(36).slice(-4);
        // R40: bays passed in are created together with the zone.
        const bayObjs = bays.map(bn => ({ id: bn, name: bn, esName: bn, accessible: true, loads: [] }));
        return [...prev, { id, name, esName: name, color: color || 'none', inventoryRule: 'NONE', bays: bayObjs }];
      }),
      updateZone: (zoneId, patch) => setYard(prev => prev.map(z => z.id === zoneId ? { ...z, ...patch, esName: patch.name || z.esName } : z)),
      deleteZone: (zoneId) => setYard(prev => prev.filter(z => z.id !== zoneId)),
      createBays: (zoneId, names) => setYard(prev => prev.map(z => {
        if (z.id !== zoneId) return z;
        const newBays = names.map(name => ({ id: name, name, esName: name, accessible: true, loads: [] }));
        return { ...z, bays: [...z.bays, ...newBays] };
      })),
      updateBay: (zoneId, bayId, patch) => setYard(prev => prev.map(z => {
        if (z.id !== zoneId) return z;
        return { ...z, bays: z.bays.map(b => b.id === bayId ? { ...b, ...patch, esName: patch.name || b.esName } : b) };
      })),
      deleteBay: (zoneId, bayId) => setYard(prev => prev.map(z => {
        if (z.id !== zoneId) return z;
        return { ...z, bays: z.bays.filter(b => b.id !== bayId || b.loads.length > 0) };
      })),
      moveLoads: (fromZoneId, fromBayId, loadIds, toZoneId, toBayId) => setYard(prev => {
        const moved = [];
        const next = prev.map(z => {
          if (z.id !== fromZoneId) return z;
          return {
            ...z,
            bays: z.bays.map(b => {
              if (b.id !== fromBayId) return b;
              const keep = []; b.loads.forEach(l => { if (loadIds.includes(l.id)) moved.push(l); else keep.push(l); });
              return { ...b, loads: keep };
            })
          };
        });
        return next.map(z => {
          if (z.id !== toZoneId) return z;
          return {
            ...z,
            bays: z.bays.map(b => b.id === toBayId ? { ...b, loads: [...b.loads, ...moved] } : b)
          };
        });
      }),
    };

    // R35/R36: Picking list state - identified by (productionLine, shift).
    // Apan 1 / Apan 2 are PRODUCTION LINES. Each line can have multiple picking
    // lists, typically one per shift. Up to 6 unique slots (2 lines * 3 shifts).
    // R36: removed the header line switcher - all lists are visible everywhere
    // and the Picker has its own per-list filter dropdown.
    // Shape: [{ id, name, createdAt, productionLine, shift, createdBy, loads, note }]
    const [pickingLists, setPickingLists] = useState([]);
    // Which (productionLine, shift) the SL is currently building / editing.
    const [creationLine, setCreationLine] = useState('Apan 1');
    const [creationShift, setCreationShift] = useState('Shift 1');
    // Mock current user - in production this comes from auth.
    const currentUser = 'Kate Brooks';

    // R35/R36: Helpers for the multi-(line, shift) picking-list model.
    // upsertList accepts a composite key (line, shift) string.
    const KEY = (line, shift) => `${line}||${shift}`;
    const parseKey = (k) => { const [line, shift] = k.split('||'); return { line, shift }; };
    const upsertList = (key, list) => {
      const { line, shift } = parseKey(key);
      setPickingLists(prev => {
        const i = prev.findIndex(l => l.productionLine === line && l.shift === shift);
        if (list === null || list === undefined) {
          return i >= 0 ? prev.filter((_, j) => j !== i) : prev;
        }
        const withMeta = { ...list, productionLine: line, shift };
        if (i >= 0) { const next = [...prev]; next[i] = withMeta; return next; }
        return [...prev, withMeta];
      });
    };
    // Map loadId -> { productionLine, shift } across ALL picking lists.
    // A load can only be on ONE picking list. Used for "claimed" chips +
    // selection-claim validation when creating/editing another list.
    const loadClaimMap = (() => {
      const m = {};
      pickingLists.forEach(pl => pl.loads.forEach(({ loadId }) => {
        m[loadId] = { productionLine: pl.productionLine, shift: pl.shift };
      }));
      return m;
    })();

    // Processed load IDs (FO marks these as processed in the Picker tab)
    const [processed, setProcessed] = useState({}); // { loadId: { bales, weight, at } }

    // Active production window flag (so SL can start one from the confirm step)
    const [windowActive, setWindowActive] = useState(true);

    // SL workflow mode: 'default' (overview only) | 'create' (selecting loads) | 'confirm' (review modal)
    const [slMode, setSlMode] = useState('default');

    // Lifted: selection state for the in-progress picking list (was inside ShiftLeaderView).
    // Lifting lets the create-mode breadcrumb consult the count for its confirm-back dialog.
    const [selectionBales, setSelectionBales] = useState({});
    // Confirm-back-from-create dialog
    const [showConfirmBack, setShowConfirmBack] = useState(false);
    const onBreadcrumbBack = () => {
      if (Object.keys(selectionBales).length > 1) {
        setShowConfirmBack(true);
      } else {
        setSelectionBales({});
        setSlMode('default');
      }
    };

    // Toast - { message, kind: 'success' } | null
    const [toast, setToast] = useState(null);
    useEffect(() => {
      if (!toast) return;
      const t = setTimeout(() => setToast(null), 6000);
      return () => clearTimeout(t);
    }, [toast]);

    // Picker mode plant setting - 'load' (default) | 'bale'.
    // Lives in the global header toggle next to the language switch.
    // Load-based: FO processes whole loads, no buffer zone.
    // Bale-based: FO processes one bale at a time, buffer zone visible, reject + process require weight.
    const [pickerMode, setPickerMode] = useState('load');
    const bufferEnabled = pickerMode === 'bale';

    // Loads remaining to pick (for Picker tab badge) - summed across ALL lists.
    const loadsRemaining = pickingLists.reduce(
      (acc, pl) => acc + pl.loads.filter(({ loadId }) => !processed[loadId]).length, 0
    );
    const hasAnyList = pickingLists.length > 0;

    return (
      <LangContext.Provider value={lang}>
      <AppShell lang={lang} setLang={setLang} pickerMode={pickerMode} setPickerMode={setPickerMode}>
        <div className="px-8 py-6">
          {/* Page heading swaps when SL enters Create picking list mode */}
          {slMode === 'create' && tab === 'pw-layout' ? (
            <div>
              <nav aria-label="Breadcrumb" className="flex items-center gap-2 text-[13px] mb-2">
                <button
                  onClick={onBreadcrumbBack}
                  className="text-safi-600 hover:underline"
                >
                  {lang === 'es' ? 'Almacén' : 'Warehouse'}
                </button>
                <span className="text-neutral-40">/</span>
                <span className="text-neutral-100 font-medium">
                  {lang === 'es' ? 'Alimentación a la banda' : 'Create picking list'}
                </span>
              </nav>
              <div className="flex items-start justify-between gap-6">
                <div>
                  <h1 id="create-picking-list-h1" className="text-3xl font-bold tracking-tight text-neutral-100">
                    {lang === 'es' ? 'Alimentación a la banda' : 'Create picking list'}
                  </h1>
                  <p className="text-[13px] text-neutral-60 mt-1">
                    {lang === 'es'
                      ? 'Selecciona los lotes para enviar a los recolectores.'
                      : 'Select loads below to send to pickers.'}
                  </p>
                </div>
              </div>
            </div>
          ) : (
            <div className="mb-4">
              <h1 className="text-3xl font-bold tracking-tight text-neutral-100">
                {lang === 'es' ? 'Producción' : 'Production'}
              </h1>
            </div>
          )}

          {/* Tabs - hidden during Create picking list to keep focus on the workflow.
              R25: the original load-only Picker tab (id="picker") is no longer exposed
              in the nav - its component (ForkliftPickerView) is left in the source so
              we can reinstate it cheaply if needed. The merged tab now drives both
              load-based and bale-based flows via the header Picker mode toggle. */}
          {!(slMode === 'create' && tab === 'pw-layout') && (
            <div className="border-b border-neutral-10 mb-6 flex gap-6 text-[13px] overflow-x-auto">
              {/* R41: vertical-list tab removed; layout tab renamed to just "Warehouse". */}
              <Tab id="pw-layout" label={lang === 'es' ? 'Almacén' : 'Warehouse'} tab={tab} setTab={setTab} />
              <Tab id="picker-merged" label={lang === 'es' ? 'Recolección' : 'Picker'}                                    tab={tab} setTab={setTab}
                   badge={hasAnyList ? loadsRemaining : null} />
              <Tab id="history"   label={lang === 'es' ? 'Historial' : 'History'}                                         tab={tab} setTab={setTab} />
              {/* R29: "Rejected bales" tab removed - rejections now surface inside the History drawer for the relevant production window. */}
            </div>
          )}

          {/* R41: vertical-list (layout="sticky") tab removed. The component is retained in source.
              R42: buffer + setBuffer passed in so the Warehouse tab can render the Buffer card / detail. */}
          {tab === 'pw-layout' && <ShiftLeaderView
                                    buffer={buffer} setBuffer={setBuffer}
                                    layout="spatial"
                                    pickingLists={pickingLists} upsertList={upsertList} loadClaimMap={loadClaimMap}
                                    creationLine={creationLine} setCreationLine={setCreationLine}
                                    creationShift={creationShift} setCreationShift={setCreationShift}
                                    yard={yard} yardOps={yardOps}
                                    setTab={setTab} setRole={setRole}
                                    slMode={slMode} setSlMode={setSlMode}
                                    windowActive={windowActive} setWindowActive={setWindowActive}
                                    setToast={setToast} processed={processed} lang={lang}
                                    selectionBales={selectionBales} setSelectionBales={setSelectionBales}
                                    pickerMode={pickerMode} />}
          {/* tab === 'picker' (original load-only Picker) is no longer routed - ForkliftPickerView retained in source */}
          {/* R42: buffer + setBuffer lifted from inside the picker so the Warehouse tab can share it. */}
          {tab === 'picker-merged' && <ForkliftPickerMergedView pickingLists={pickingLists} processed={processed}
                                  setProcessed={setProcessed} lang={lang} setToast={setToast} bufferEnabled={bufferEnabled} pickerMode={pickerMode} yard={yard}
                                  buffer={buffer} setBuffer={setBuffer} />}
          {tab === 'history' && <HistoryView processed={processed} pickerMode={pickerMode} lang={lang} yard={yard} />}
        </div>

        {/* Confirm-back dialog when leaving Create with > 1 selected load */}
        {showConfirmBack && (
          <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4" onClick={() => setShowConfirmBack(false)}>
            <div className="bg-white rounded-xl shadow-xl w-full max-w-md p-6" onClick={e => e.stopPropagation()}>

                {lang === 'es' ? 'Salir sin guardar' : 'Leave without saving?'}

  // R30: TablePagination - MUI-aligned footer with "1-N of M" + prev/next.
  // Rows per page is fixed at 5 in this prototype; in production it would be a
  // dropdown. Renders nothing when there's <= one page of data.
  function TablePagination({ total, page, perPage = 5, onPage, lang = 'en' }) {
    const tEN = (en, es) => lang === 'es' ? es : en;
    if (total <= perPage) return null;
    const totalPages = Math.max(1, Math.ceil(total / perPage));
    const start = total === 0 ? 0 : page * perPage + 1;
    const end = Math.min(total, (page + 1) * perPage);
    return (
      <div className="flex items-center justify-end gap-4 px-4 py-2.5 text-[13px] text-neutral-80 border-t border-neutral-10">
        <div className="tabular-nums">
          {start}-{end} {tEN('of', 'de')} {total}
        </div>
        <div className="flex items-center gap-1">
          <button
            onClick={() => onPage(Math.max(0, page - 1))}
            disabled={page === 0}
            aria-label={tEN('Previous page', 'Página anterior')}
            className={'p-1.5 rounded-full ' + (page === 0 ? 'text-neutral-40 cursor-not-allowed' : 'text-neutral-100 hover:bg-neutral-5')}
          >
            <Icon d={I.arrowL} className="w-4 h-4" />
          </button>
          <button
            onClick={() => onPage(Math.min(totalPages - 1, page + 1))}
            disabled={page >= totalPages - 1}
            aria-label={tEN('Next page', 'Página siguiente')}
            className={'p-1.5 rounded-full ' + (page >= totalPages - 1 ? 'text-neutral-40 cursor-not-allowed' : 'text-neutral-100 hover:bg-neutral-5')}
          >
            <Icon d={I.arrowR} className="w-4 h-4" />
          </button>
        </div>
      </div>
    );
  }

  // R29/R30: HistoryView - one row per production window (active first, then most-recent-first).
  // Supplier filter sits above; clicking a row opens the side drawer with per-window detail.
  function HistoryView({ processed, pickerMode = 'load', lang = 'en', yard = [] }) {
    const tEN = (en, es) => lang === 'es' ? es : en;
    const [supplierQuery, setSupplierQuery] = useState('');
    const [selectedWindow, setSelectedWindow] = useState(null);
    const [page, setPage] = useState(0);
    const perPage = 5;
    const isBale = pickerMode === 'bale';

    // Filter by supplier - matches against any supplier in recentItems / mismatches / rejectedBales.
    const matchesSupplier = (w) => {
      if (!supplierQuery.trim()) return true;
      const q = supplierQuery.trim().toLowerCase();
      const pool = [
        ...w.recentItems.map(x => x.supplier),
        ...w.mismatches.map(x => x.supplier),
        ...w.rejectedBales.map(x => x.supplier),
      ];
      return pool.some(s => (s || '').toLowerCase().includes(q));
    };

    // Active first, then most-recent-first by startedAt.
    const orderedWindows = [...PRODUCTION_WINDOWS].sort((a, b) => {
      if (a.endedAt === null && b.endedAt !== null) return -1;
      if (b.endedAt === null && a.endedAt !== null) return 1;
      return new Date(b.startedAt) - new Date(a.startedAt);
    });
    const visibleWindows = orderedWindows.filter(matchesSupplier);
    const pagedWindows = visibleWindows.slice(page * perPage, (page + 1) * perPage);

    // Reset to first page whenever the filter changes
    useEffect(() => { setPage(0); }, [supplierQuery]);

    const active = orderedWindows.find(w => w.endedAt === null);
    // R31: load-based processing doesn't weigh material, so mismatches don't apply.
    // Suppress them everywhere on the History tab when in load-based mode.
    const showMismatches = pickerMode === 'bale';
    const activeAlerts = active
      ? { mismatches: showMismatches ? active.mismatches.length : 0, rejected: active.rejectedBales.length }
      : { mismatches: 0, rejected: 0 };
    const hasActiveAlert = activeAlerts.mismatches + activeAlerts.rejected > 0;

    // R30: single-line date range with hyphen separator. Active window reads "X - ongoing".
    const fmtDateRange = (started, ended) => {
      const fmt = (d) => new Date(d).toLocaleString('en-GB', {
        day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false
      });
      if (!ended) return `${fmt(started)} - ${tEN('ongoing', 'en curso')}`;
      return `${fmt(started)} - ${fmt(ended)}`;
    };

    return (
      <Fragment>
        {/* Supplier search filter */}
        <div className="mb-4 max-w-md">
          <FieldsetInput
            label={tEN('Search by supplier', 'Buscar por proveedor')}
            focused={!!supplierQuery}
          >
            <div className="relative">
              <Icon d={I.search} className="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-neutral-60" />
              <input
                type="text"
                value={supplierQuery}
                onChange={e => setSupplierQuery(e.target.value)}
                placeholder={tEN('Supplier name', 'Nombre del proveedor')}
                className="w-full h-14 pl-11 pr-4 bg-transparent text-base text-neutral-100 placeholder-neutral-40 focus:outline-none"
              />
            </div>
          </FieldsetInput>
        </div>

        {/* Active window alert - mismatches or rejected bales need the SL's eyes */}
        {hasActiveAlert && (
          <div className="mb-4 rounded-lg border border-amber-300 bg-amber-50 px-4 py-3 flex items-start gap-3">
            <Icon d={I.errorCircle} className="w-5 h-5 text-amber-700 mt-0.5 shrink-0" />
            <div className="flex-1 min-w-0">
              <div className="font-semibold text-amber-900 text-[15px]">
                {tEN('Attention needed for the ongoing production window', 'Atención necesaria para la ventana de producción en curso')}
              </div>
              <div className="text-[13px] text-amber-900 mt-0.5">
                {[
                  activeAlerts.mismatches > 0 && (activeAlerts.mismatches === 1
                    ? tEN('1 weight mismatch identified', '1 discrepancia de peso identificada')
                    : tEN(`${activeAlerts.mismatches} weight mismatches identified`, `${activeAlerts.mismatches} discrepancias de peso identificadas`)),
                  activeAlerts.rejected > 0 && (activeAlerts.rejected === 1
                    ? tEN('1 bale rejected', '1 paca rechazada')
                    : tEN(`${activeAlerts.rejected} bales rejected`, `${activeAlerts.rejected} pacas rechazadas`)),
                ].filter(Boolean).join(' · ')}
              </div>
            </div>
            <button
              onClick={() => setSelectedWindow(active)}
              className="shrink-0 px-3 py-2 rounded border border-amber-300 bg-white text-amber-900 text-[13px] font-medium hover:bg-amber-100"
            >
              {tEN('Review', 'Revisar')}
            </button>
          </div>
        )}

        {/* Previous windows table */}
        <div className="bg-white border border-neutral-10 rounded-xl overflow-hidden">
          <div className="px-5 py-4 border-b border-neutral-10">
            <h3 className="font-bold text-neutral-100 text-lg">{tEN('Previous production windows', 'Ventanas de producción anteriores')}</h3>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-sm table-fixed">
              <colgroup>
                <col className="w-[300px]" />
                <col className="w-[160px]" />
                <col className="w-[160px]" />
                <col className="w-[140px]" />
                <col className="w-[120px]" />
                <col />
              </colgroup>
              <thead>
                <tr className="text-left text-[13px] font-medium text-neutral-60 border-b border-neutral-10">
                  <th className="px-5 py-3 whitespace-nowrap font-medium">{tEN('Time period', 'Período')}</th>
                  <th className="px-5 py-3 whitespace-nowrap font-medium">{tEN('Material', 'Material')}</th>
                  <th className="px-5 py-3 whitespace-nowrap font-medium">{isBale ? tEN('Bales processed', 'Pacas procesadas') : tEN('Loads processed', 'Lotes procesados')}</th>
                  <th className="px-5 py-3 whitespace-nowrap font-medium">{tEN('Weight processed', 'Peso procesado')}</th>
                  <th className="px-5 py-3 whitespace-nowrap font-medium">{tEN('Actual input', 'Entrada real')}</th>
                  <th className="px-5 py-3 whitespace-nowrap font-medium">{tEN('Spec averages', 'Promedios')}</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-neutral-10">
                {pagedWindows.map(w => {
                  const range = fmtDateRange(w.startedAt, w.endedAt);
                  const isActive = w.endedAt === null;
                  const counted = isBale ? w.balesProcessed : w.loadsProcessed;
                  const issuesText = [
                    w.rejectedBales.length > 0 && tEN(
                      `${w.rejectedBales.length} rejected`,
                      `${w.rejectedBales.length} rechazadas`),
                    showMismatches && w.mismatches.length > 0 && tEN(
                      `${w.mismatches.length} mismatch${w.mismatches.length === 1 ? '' : 'es'}`,
                      `${w.mismatches.length} discrepancia${w.mismatches.length === 1 ? '' : 's'}`),
                  ].filter(Boolean).join(' · ');
                  return (
                    <tr
                      key={w.id}
                      onClick={() => setSelectedWindow(w)}
                      tabIndex={0}
                      onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setSelectedWindow(w); } }}
                      className="hover:bg-safi-50/50 cursor-pointer focus:outline-none focus:bg-safi-50"
                    >
                      <td className="px-5 py-3 align-top text-[13px] text-neutral-100">
                        <div className="leading-snug">{range}</div>
                        {isActive && (
                          <div className="mt-1 inline-flex items-center gap-1 px-1.5 py-0.5 rounded-full bg-emerald-50 text-emerald-800 text-[13px] font-medium">
                            <span className="w-1.5 h-1.5 rounded-full bg-emerald-500" />
                            {tEN('Active', 'Activa')}
                          </div>
                        )}
                      </td>
                      <td className="px-5 py-3 text-neutral-100 align-top">{w.material}</td>
                      <td className="px-5 py-3 align-top">
                        <div className="text-neutral-100">{fmtNum(counted)}</div>
                        {issuesText && (
                          <div className="mt-0.5 inline-flex items-center gap-1 text-[13px] text-amber-800">
                            <Icon d={I.errorCircle} className="w-3.5 h-3.5 text-amber-700" />
                            {issuesText}
                          </div>
                        )}
                      </td>
                      <td className="px-5 py-3 text-neutral-100 align-top whitespace-nowrap">{fmtKg(w.weightProcessed)}</td>
                      <td className="px-5 py-3 text-neutral-100 align-top">{w.actualInputPct.toFixed(1)}%</td>
                      <td className="px-5 py-3 align-top">
                        {w.specAverages ? (
                          <div className="flex items-center gap-1 flex-wrap">
                            {Object.entries(w.specAverages).map(([k, v]) => (
                              <span key={k} className="text-[13px] px-1.5 py-0.5 rounded bg-safi-50 text-safi-700">
                                {k === 'transparent' && 'Transparent PET'}
                                {k === 'light' && 'Light'}
                                {k === 'coloured' && 'Coloured PET'}
                                {k === 'contaminants' && 'Contaminants'}
                                {' '}{v.toFixed(1)}%
                              </span>
                            ))}
                          </div>
                        ) : <span className="text-neutral-40 text-[13px]">-</span>}
                      </td>
                    </tr>
                  );
                })}
                {visibleWindows.length === 0 && (
                  <tr>
                    <td colSpan={6} className="px-5 py-10 text-center text-[13px] text-neutral-60">
                      {tEN('No windows match this supplier search.', 'Ninguna ventana coincide con esta búsqueda.')}
                    </td>
                  </tr>
                )}
              </tbody>
            </table>
          </div>
          <TablePagination total={visibleWindows.length} page={page} perPage={perPage} onPage={setPage} lang={lang} />
        </div>

        {/* Right-side drawer */}
        {selectedWindow && (
          <ProductionWindowDrawer
            window={selectedWindow}
            pickerMode={pickerMode}
            lang={lang}
            onClose={() => setSelectedWindow(null)}
            fmtDateRange={fmtDateRange}
          />
        )}
      </Fragment>
    );
  }

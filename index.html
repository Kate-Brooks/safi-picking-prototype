  // ============================================================================
  // SHIFT LEADER VIEW - progressive disclosure + picking-list creation
  // ============================================================================

  function ShiftLeaderView({ layout = 'accordion', pickingLists = [], upsertList, creationLine = 'Apan 1', setCreationLine, creationShift = 'Shift 1', setCreationShift, loadClaimMap = {}, setTab, setRole, slMode, setSlMode, windowActive, setWindowActive, setToast, processed = {}, setProcessed = () => {}, lang = 'en', selectionBales, setSelectionBales, pickerMode = 'load', yard = [], yardOps = {}, buffer = [], setBuffer = () => {}, onEditWarehouse = () => {} }) {
    const isCreating = slMode === 'create';
    const isSticky = layout === 'sticky';
    const isSpatial = layout === 'spatial';

    // R67: auto-generate picking-list configuration. When enabled, Safi picks
    // loads that (a) fit the requested load count and (b) whose aggregated
    // material breakdown satisfies every threshold. In this prototype the
    // controls persist within the session but don't yet drive the auto-pick
    // algorithm — the design is what we're validating.
    const AUTO_GEN_MATERIALS = [
      'Thermoforms', 'Contaminants', 'Coloured PET', 'Green PET',
      'Non PET', 'Metal', 'Bottles/Jars', 'Clear PET',
    ];
    const [autoGenEnabled,     setAutoGenEnabled]     = useState(false);
    const [autoGenLoadCount,   setAutoGenLoadCount]   = useState(5);
    const [autoGenThresholds,  setAutoGenThresholds]  = useState([
      { id: 't1', material: 'Thermoforms',  operator: '<=', pct: 20 },
      { id: 't2', material: 'Contaminants', operator: '<=', pct: 2  },
    ]);
    const addAutoGenThreshold = () => {
      const usedMaterials = new Set(autoGenThresholds.map(t => t.material));
      const nextMaterial = AUTO_GEN_MATERIALS.find(m => !usedMaterials.has(m)) || AUTO_GEN_MATERIALS[0];
      setAutoGenThresholds(prev => [
        ...prev,
        { id: 't' + Date.now(), material: nextMaterial, operator: '<=', pct: 10 },
      ]);
    };
    const updateAutoGenThreshold = (id, patch) =>
      setAutoGenThresholds(prev => prev.map(t => t.id === id ? { ...t, ...patch } : t));
    const removeAutoGenThreshold = (id) =>
      setAutoGenThresholds(prev => prev.filter(t => t.id !== id));
    // R35: composite key helper - picking lists are unique on (productionLine, shift).
    const PLKEY = (line, shift) => `${line}||${shift}`;
    // R37: bay-level claim summary helper - mirrors SpatialLayoutView's. Returns
    // null when no external claims, { kind: 'all-same', label } when every load
    // is on the same other list, { kind: 'all-mixed' } when all claimed but
    // by different lists, or { kind: 'partial' } when some loads are claimed.
    const bayClaimSummary = (bay) => {
      if (!isCreating || !bay || bay.loads.length === 0) return null;
      const externalClaims = bay.loads
        .map(l => loadClaimMap[l.id])
        .filter(c => c && (c.productionLine !== creationLine || c.shift !== creationShift));
      if (externalClaims.length === 0) return null;
      if (externalClaims.length === bay.loads.length) {
        const first = externalClaims[0];
        const allSame = externalClaims.every(c => c.productionLine === first.productionLine && c.shift === first.shift);
        if (allSame) return { kind: 'all-same', label: `${first.productionLine} - ${first.shift}` };
        return { kind: 'all-mixed' };
      }
      return { kind: 'partial' };
    };
    // R38: matches load-level chip styling - grey + lock + "On picking list".
    const BayClaimChip = ({ summary }) => {
      if (!summary) return null;
      return (
        <span className="inline-flex items-center gap-1 px-1.5 py-0.5 rounded text-[13px] font-medium bg-neutral-10 text-neutral-80 whitespace-nowrap">
          <Icon d={I.lock} className="w-3 h-3" />
          On picking list
        </span>
      );
    };
    // Derive a single "active list" for the legacy logic that expects one
    // pickingList - this is whichever list matches the (creationLine, creationShift)
    // currently being built, or just the first list in display mode.
    const pickingList = pickingLists.find(pl => pl.productionLine === creationLine && pl.shift === creationShift)
      || (isCreating ? null : pickingLists[0] || null);
    const setPickingList = (list) => upsertList?.(PLKEY(creationLine, creationShift), list);
    // R35: cross-line + cross-shift claim check. loadClaimMap is loadId -> {productionLine, shift}.
    // A load is locked out of THIS list if it's already on any OTHER (line, shift) combination.
    const claimedByOther = (loadId) => {
      const owner = loadClaimMap[loadId];
      if (!owner) return null;
      if (owner.productionLine === creationLine && owner.shift === creationShift) return null;
      return owner; // { productionLine, shift }
    };
    // Filter out fully processed loads - they live in History now.
    const visibleYard = useMemo(() => YARD.map(zone => ({
      ...zone,
      bays: zone.bays.map(bay => ({
        ...bay,
        loads: bay.loads.filter(l => !processed[l.id] || processed[l.id].partial)
      }))
    })), [processed]);

    // Zone & bay filter - when active, only show selected bays and force-expand their zones.
    const [bayFilter, setBayFilter] = useState(new Set());

    const filteredYard = useMemo(() => {
      if (bayFilter.size === 0) return visibleYard;
      return visibleYard.map(zone => ({
        ...zone,
        bays: zone.bays.filter(b => bayFilter.has(`${zone.id}|${b.id}`))
      })).filter(zone => zone.bays.length > 0);
    }, [visibleYard, bayFilter]);

    // Selection state lives in ProductionManagementPage and is passed in via props.
    // Helper view that looks/feels like a Set membership check
    const selected = useMemo(() => new Set(Object.keys(selectionBales)), [selectionBales]);
    const setSelected = (updater) => {
      setSelectionBales(prev => {
        const prevSet = new Set(Object.keys(prev));
        const nextSet = typeof updater === 'function' ? updater(prevSet) : updater;
        const out = {};
        for (const key of nextSet) {
          out[key] = prev[key] != null ? prev[key] : findLoadByKey(key)?.bales ?? 0;
        }
        return out;
      });
    };
    const findLoadByKey = (key) => {
      const [zid, bid, lid] = key.split('|');
      const z = YARD.find(z => z.id === zid);
      const b = z?.bays.find(b => b.id === bid);
      return b?.loads.find(l => l.id === lid);
    };
    // Expansion state for progressive disclosure (accordion layout only)
    const [openZones, setOpenZones] = useState(() => ({ A: true })); // first zone open by default
    const [openBays, setOpenBays] = useState(() => ({ A1: true }));
    // Sticky layout: per-bay "Show all loads" expansion
    const [bayShowAll, setBayShowAll] = useState({});

    // Zones expand and collapse freely - including all closed at once.
    const toggleZone = (id) => {
      setOpenZones(prev => ({ ...prev, [id]: !prev[id] }));
    };

    const toggleLoad = (key, accessible) => {
      if (!isCreating || !accessible) return;
      setSelected(prev => {
        const next = new Set(prev);
        if (next.has(key)) next.delete(key); else next.add(key);
        return next;
      });
    };

    const selectedLoads = useMemo(() => {
      const result = [];
      for (const zone of YARD) {
        for (const bay of zone.bays) {
          for (const load of bay.loads) {
            const key = `${zone.id}|${bay.id}|${load.id}`;
            if (selectionBales[key] != null) {
              const bales = selectionBales[key];
              const ratio = load.bales > 0 ? bales / load.bales : 0;
              const weight = Math.round(load.weight * ratio);
              const partial = bales < load.bales;
              result.push({ key, zone, bay, load, bales, weight, partial });
            }
          }
        }
      }
      return result;
    }, [selectionBales]);

    const summary = useMemo(() => {
      const analysedLoads = selectedLoads.filter(x => x.load.results);
      const totalWeight = sum(selectedLoads, x => x.weight);
      const totalBales  = sum(selectedLoads, x => x.bales);
      const analysedWeight = sum(analysedLoads, x => x.weight);
      const components = { transparentPET: 0, colouredPET: 0, contaminants: 0 };
      analysedLoads.forEach(({ load, weight }) => {
        components.transparentPET += load.results.transparentPET * weight;
        components.colouredPET    += load.results.colouredPET    * weight;
        components.contaminants   += load.results.contaminants   * weight;
      });
      Object.keys(components).forEach(k => {
        components[k] = analysedWeight > 0 ? components[k] / analysedWeight : 0;
      });
      return {
        totalWeight, totalBales,
        loadCount: selectedLoads.length,
        analysedCount: analysedLoads.length,
        components
      };
    }, [selectedLoads]);

    const cancelCreate = () => {
      setSelectionBales({});
      setSlMode('default');
    };

    // Scroll the LHS to a particular load row and briefly highlight it.
    // Used by the clickable zone:bay link in the picking-list card.
    const scrollToLoad = (loadId) => {
      // Find the zone for this load and make sure its bay (in accordion mode) is open
      for (const zone of YARD) {
        for (const bay of zone.bays) {
          if (bay.loads.some(l => l.id === loadId)) {
            setOpenZones(prev => ({ ...prev, [zone.id]: true }));
            setOpenBays(prev => ({ ...prev, [bay.id]: true }));
            break;
          }
        }
      }
      // Give React a tick to render the open accordion, then scroll
      setTimeout(() => {
        const el = document.getElementById('load-' + loadId);
        if (!el) return;
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        el.classList.add('flash-highlight');
        setTimeout(() => el.classList.remove('flash-highlight'), 1600);
      }, 80);
    };

    const confirmList = () => {
      const previousSelection = { ...selectionBales };
      const previousList = pickingLists.find(pl => pl.productionLine === creationLine && pl.shift === creationShift) || null;
      const list = {
        id: 'pl-' + Date.now(),
        productionLine: creationLine,
        shift: creationShift,
        name: `${creationLine} · ${creationShift} - ${new Date().toLocaleDateString()} ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`,
        createdAt: new Date().toISOString(),
        // R34: visit-notes spec - each list carries who created it.
        createdBy: 'Kate Brooks',
        loads: Object.entries(selectionBales).map(([k, bales]) => {
          const [zoneId, bayId, loadId] = k.split('|');
          return { zoneId, bayId, loadId, bales };
        })
      };
      upsertList?.(PLKEY(creationLine, creationShift), list);
      setSelectionBales({});
      setSlMode('default');
      // Scroll to top so the user sees the tabs + Picker tab badge
      window.scrollTo({ top: 0, behavior: 'smooth' });
      setToast({
        message: `${creationLine} · ${creationShift} picking list sent. ${list.loads.length} load${list.loads.length === 1 ? '' : 's'} ready to pick.`,
        kind: 'success',
        onUndo: () => {
          upsertList?.(PLKEY(creationLine, creationShift), previousList);
          setSelectionBales(previousSelection);
          setSlMode('create');
        }
      });
    };

    return (
      <Fragment>
        {/* Active production window - hidden during Create picking list */}
        {!isCreating && <ActiveProductionWindow active={windowActive} />}

        {/* R35: Existing-list banner - one row per (line, shift) picking list in the current line. */}
        {!isCreating && pickingLists.length > 0 && (
          <ActivePickingListAlert
            pickingLists={pickingLists}
            onEdit={(line, shift) => {
              const list = pickingLists.find(pl => pl.productionLine === line && pl.shift === shift);
              if (!list) return;
              const next = {};
              list.loads.forEach(l => {
                next[`${l.zoneId}|${l.bayId}|${l.loadId}`] = l.bales != null ? l.bales : findLoadByKey(`${l.zoneId}|${l.bayId}|${l.loadId}`)?.bales ?? 0;
              });
              setSelectionBales(next);
              setCreationLine?.(line);
              setCreationShift?.(shift);
              setSlMode('create');
            }}
            onClear={(line, shift) => {
              const previous = pickingLists.find(pl => pl.productionLine === line && pl.shift === shift);
              if (!previous) return;
              upsertList?.(PLKEY(line, shift), null);
              setToast({
                message: `${line} · ${shift} picking list cleared.`,
                kind: 'success',
                onUndo: () => upsertList?.(PLKEY(line, shift), previous)
              });
            }}
            lang={lang}
          />
        )}

        {/* Warehouse header - outside the grid so both columns align with the first zone card. */}
        <div className="sticky top-14 z-20 bg-[#fafafa] pt-6 pb-3 -mx-8 px-8">
          <h2 className="text-lg font-bold text-neutral-100">Warehouse</h2>
          <div className="mt-3 flex flex-wrap items-center gap-3">
            {/* Material - the most important filter, first in order */}
            <div className="relative w-[180px]">
              <select
                aria-label="Filter by material"
                className="appearance-none w-full pl-3 pr-9 py-2 text-sm border border-neutral-10 rounded-md bg-white text-neutral-100 focus:border-safi-600"
                defaultValue="Clear PET Bottles"
              >
                <option>Clear PET Bottles</option>
                <option>Coloured PET Bottles</option>
                <option>PET Trays</option>
                <option>All materials</option>
              </select>
              <label className="absolute -top-2 left-3 px-1 bg-[#fafafa] text-[13px] font-medium text-neutral-60">Material</label>
              <Icon d={I.chevron} className="w-4 h-4 absolute right-3 top-1/2 -translate-y-1/2 text-neutral-60 pointer-events-none" />
            </div>
            <div className="relative w-[180px]">
              <Icon d={I.search} className="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-neutral-40" />
              <input
                type="search"
                placeholder="Enter…"
                aria-label="Search loads"
                className="pl-9 pr-3 py-2 w-full text-sm border border-neutral-10 rounded-md bg-white placeholder:text-neutral-40 focus:border-safi-600"
              />
              <label className="absolute -top-2 left-3 px-1 bg-[#fafafa] text-[13px] font-medium text-neutral-60">Search loads</label>
            </div>
            <div className="relative w-[160px]">
              <select
                aria-label="Filter by supplier"
                className="appearance-none w-full pl-3 pr-9 py-2 text-sm border border-neutral-10 rounded-md bg-white text-neutral-100 focus:border-safi-600"
                defaultValue=""
              >
                <option value="">All suppliers</option>
                <option>Supplier A</option><option>Supplier B</option><option>Supplier C</option>
                <option>Supplier D</option><option>Supplier E</option><option>Supplier F</option>
                <option>Supplier G</option><option>Supplier H</option><option>Supplier I</option>
                <option>Supplier J</option><option>Supplier K</option><option>Supplier L</option>
                <option>Supplier M</option><option>Supplier N</option><option>Supplier O</option>
                <option>Supplier P</option>
              </select>
              <label className="absolute -top-2 left-3 px-1 bg-[#fafafa] text-[13px] font-medium text-neutral-60">Supplier</label>
              <Icon d={I.chevron} className="w-4 h-4 absolute right-3 top-1/2 -translate-y-1/2 text-neutral-60 pointer-events-none" />
            </div>
            <ZoneBayFilter value={bayFilter} onChange={setBayFilter} yard={visibleYard} lang={lang} />
            <div className="flex-1" />
            {!isCreating && pickingLists.length < 6 && (
              <button
                onClick={() => {
                  // R36: default to the first (line, shift) combo that doesn't already have a list.
                  const combos = ['Apan 1', 'Apan 2'].flatMap(line => ['Shift 1', 'Shift 2', 'Shift 3'].map(shift => ({ line, shift })));
                  const open = combos.find(c => !pickingLists.some(pl => pl.productionLine === c.line && pl.shift === c.shift)) || combos[0];
                  setCreationLine?.(open.line);
                  setCreationShift?.(open.shift);
                  setSlMode('create');
                }}
                className="inline-flex items-center gap-2 px-4 py-2 rounded bg-safi-600 text-white text-sm font-medium hover:bg-safi-700 shadow-sm"
              >
                <Icon d={I.plus} className="w-4 h-4" />
                {lang === 'es' ? 'Alimentación a la banda' : 'Create picking list'}
              </button>
            )}
          </div>
        </div>{/* /sticky warehouse header */}

      <div className="grid grid-cols-12 gap-6">
        {/* Main column - zone list or spatial layout */}
        <div className={isCreating ? 'col-span-12 lg:col-span-8' : 'col-span-12'}>
          {isSpatial ? (
            <SpatialLayoutView
              yard={filteredYard}
              isCreating={isCreating}
              selectionBales={selectionBales}
              setSelectionBales={setSelectionBales}
              pickingList={pickingList}
              pickingLists={pickingLists}
              loadClaimMap={loadClaimMap}
              creationLine={creationLine}
              creationShift={creationShift}
              lang={lang}
              bayFilter={bayFilter}
              setSlMode={setSlMode}
              pickerMode={pickerMode}
              setToast={setToast}
              yardOps={yardOps}
              buffer={buffer}
              setBuffer={setBuffer}
              setProcessed={setProcessed}
              onEditWarehouse={onEditWarehouse}
            />
          ) : (
          /* Yard - Zones / Bays / Loads */
          <div className="space-y-3">
            {filteredYard.map(zone => {
              const z = zoneStats(zone);
              // Force-expand zones when the bay filter is active so the user can immediately see their selection.
              const zoneOpen = bayFilter.size > 0 ? true : !!openZones[zone.id];
              return (
                <div key={zone.id} className="bg-white border border-neutral-10 rounded-xl">
                  <button
                    onClick={() => toggleZone(zone.id)}
                    style={{ top: 176 }}
                    className={
                      'w-full flex items-center justify-between pl-5 py-4 sticky z-10 bg-white hover:bg-neutral-5 ' +
                      // Top corners rounded only when not the only visible part of the container;
                      // bottom border separates header from content while sticky.
                      'rounded-t-xl border-b border-neutral-10 ' +
                      // When the zone is closed, also round the bottom so it doesn't look weird
                      (zoneOpen ? '' : 'rounded-b-xl ') +
                      (isSticky ? 'pr-5' : 'pr-9') // align zone chip with bay chips
                    }
                    aria-expanded={zoneOpen}
                  >
                    <div className="flex items-center gap-3 text-left">
                      <Icon d={zoneOpen ? I.chevron : I.chevronR} className="w-4 h-4 text-neutral-60" />
                      <div>
                        <div className="font-semibold text-neutral-100">
                          {zone.esName}
                        </div>
                        <div className="text-[13px] text-neutral-60 mt-0.5 flex items-center gap-1.5">
                          <span>Bays: {z.bays} · Loads: {z.loads} · Bales: {fmtNum(z.bales)} · Weight: {fmtKg(z.weight)}</span>
                          {isCreating && <ZoneSelectionBadge zoneId={zone.id} selected={selected} />}
                        </div>
                      </div>
                    </div>
                    <div className="flex items-center gap-2">
                      <CapacityChip bales={z.bales} variant="zone" />
                    </div>
                  </button>

                  {zoneOpen && (
                    <div className={isSticky ? 'border-t border-neutral-10' : 'border-t border-neutral-10 px-5 py-4 space-y-3'}>
                      {zone.bays.map(bay => {
                        const s = bayStats(bay);
                        const bayOpen = !!openBays[bay.id];
                        const bayLoadKeys = bay.loads.map(l => `${zone.id}|${bay.id}|${l.id}`);
                        const allSelected = isCreating && bay.accessible && bayLoadKeys.length > 0 && bayLoadKeys.every(k => selected.has(k));
                        const someSelected = isCreating && bayLoadKeys.some(k => selected.has(k));
                        const hasLoads = bay.loads.length > 0;

                        const toggleBay = (e) => {
                          e.stopPropagation();
                          if (!isCreating || !bay.accessible || !hasLoads) return;
                          setSelected(prev => {
                            const next = new Set(prev);
                            if (allSelected) {
                              bayLoadKeys.forEach(k => next.delete(k));
                            } else {
                              bayLoadKeys.forEach(k => next.add(k));
                            }
                            return next;
                          });
                        };

                        // -------------------- STICKY LAYOUT --------------------
                        if (isSticky) {
                          const showAll = !!bayShowAll[bay.id];
                          const visibleLoads = (hasLoads && !showAll && bay.loads.length > 3)
                            ? bay.loads.slice(0, 3)
                            : bay.loads;
                          const hiddenCount = bay.loads.length - visibleLoads.length;
                          return (
                            <Fragment key={bay.id}>
                              {/* Sticky bay header */}
                              <div
                                className={
                                  'sticky z-[5] flex items-center justify-between px-5 py-2.5 bg-neutral-5/95 backdrop-blur border-b border-neutral-10 ' +
                                  (someSelected ? 'ring-1 ring-inset ring-safi-200' : '')
                                }
                                style={{ top: 254 }}
                              >
                                <div className="flex items-center gap-3 min-w-0">
                                  <div className="font-semibold text-neutral-100 flex items-center gap-2 flex-wrap">
                                    {bay.esName}
                                    {zone.inventoryRule && zone.inventoryRule !== 'NONE' && (
                                      <span
                                        className="inline-flex items-center px-2 py-0.5 rounded-full bg-neutral-5 border border-neutral-10 text-[13px] font-semibold text-neutral-80"
                                        title={zone.inventoryRule === 'LIFO'
                                          ? 'Last in, first out - stacks picked top-down'
                                          : 'First in, first out - oldest load picked first'}
                                      >
                                        {zone.inventoryRule}
                                      </span>
                                    )}
                                    {isCreating && !bay.accessible && (
                                      <span
                                        title="Blocked bays can’t be picked until the bays in front are cleared."
                                        className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-neutral-10 text-neutral-80 text-[13px] font-medium cursor-help"
                                      >
                                        <Icon d={I.lock} className="w-3 h-3" /> Blocked by {bay.blockedBy}
                                      </span>
                                    )}
                                    {/* R37: bay-claim summary during create/edit. */}
                                    <BayClaimChip summary={bayClaimSummary(bay)} />
                                  </div>
                                  <div className="text-[13px] text-neutral-60 truncate">
                                    Load: {s.loads} · {fmtNum(s.bales)} bales · {fmtKg(s.weight)}
                                  </div>
                                </div>
                                <div className="flex items-center gap-3 shrink-0">
                                  <CapacityChip bales={s.bales} />
                                  {isCreating && hasLoads && (
                                    <label className={
                                      'flex items-center gap-1.5 text-[13px] font-medium cursor-pointer select-none ' +
                                      (bay.accessible ? 'text-neutral-80' : 'text-neutral-40 cursor-not-allowed')
                                    }>
                                      <input
                                        type="checkbox"
                                        className="rounded text-safi-600 focus:ring-safi-500 disabled:opacity-40"
                                        checked={allSelected}
                                        ref={el => { if (el) el.indeterminate = someSelected && !allSelected; }}
                                        onChange={toggleBay}
                                        disabled={!bay.accessible}
                                        aria-label={`Select all loads in ${bay.esName}`}
                                      />
                                      Select all
                                    </label>
                                  )}
                                </div>
                              </div>
                              {/* Loads list - flows below the sticky header, subtle dividers */}
                              {hasLoads ? (
                                <div className="bg-white">
                                  {visibleLoads.map(load => {
                                    const key = `${zone.id}|${bay.id}|${load.id}`;
                                    const access = accessibilityOf(zone, bay, load);
                                    const lifoOk = isLifoSelectable(zone, bay, load, selectionBales, pickerMode);
                                    const alreadySelected = selectionBales[key] != null;
                                    // R35: cross-line/shift claim check. Claim map now stores {productionLine, shift}.
                                    const claimOwner = loadClaimMap[load.id] || null;
                                    const isOwnedByThisDraft = claimOwner && claimOwner.productionLine === creationLine && claimOwner.shift === creationShift;
                                    const lockedByOtherLine = isCreating && claimOwner && !isOwnedByThisDraft
                                      ? `${claimOwner.productionLine} · ${claimOwner.shift}` : false;
                                    const selectableThis = !isCreating || ((bay.accessible && (lifoOk || alreadySelected)) && !lockedByOtherLine);
                                    let onPickingListChip = false;
                                    let claimedByLine = null;
                                    // Only show claim chip when on the line the warehouse is filtered to.
                                    if (!isCreating && claimOwner) {
                                      claimedByLine = `${claimOwner.productionLine} · ${claimOwner.shift}`;
                                      const owningList = pickingLists.find(pl => pl.productionLine === claimOwner.productionLine && pl.shift === claimOwner.shift);
                                      const entry = owningList?.loads.find(l => l.loadId === load.id);
                                      if (entry) onPickingListChip = entry.bales != null && entry.bales < load.bales
                                        ? { partial: true, bales: entry.bales, label: claimedByLine }
                                        : { partial: false, label: claimedByLine };
                                    }
                                    return (
                                      <div key={load.id} className="border-b border-neutral-10/60 last:border-b-0">
                                        <LoadRow
                                          load={load}
                                          isCreating={isCreating}
                                          accessible={selectableThis}
                                          isAccessibleLoad={access.status === 'accessible'}
                                          isSelected={selected.has(key)}
                                          onToggle={() => toggleLoad(key, bay.accessible)}
                                          onPickingList={onPickingListChip}
                                          claimedByLine={claimedByLine}
                                          lockedByOtherLine={lockedByOtherLine}
                                        />
                                      </div>
                                    );
                                  })}
                                  {hiddenCount > 0 && (
                                    <button
                                      onClick={() => setBayShowAll(s => ({ ...s, [bay.id]: true }))}
                                      className="w-full px-5 py-2.5 text-[13px] font-medium text-safi-700 hover:bg-neutral-5 border-t border-neutral-10/60"
                                    >
                                      Show all loads ({hiddenCount} more)
                                    </button>
                                  )}
                                  {showAll && bay.loads.length > 3 && (
                                    <button
                                      onClick={() => setBayShowAll(s => ({ ...s, [bay.id]: false }))}
                                      className="w-full px-5 py-2.5 text-[13px] font-medium text-neutral-60 hover:bg-neutral-5 border-t border-neutral-10/60"
                                    >
                                      Show fewer
                                    </button>
                                  )}
                                </div>
                              ) : (
                                <div className="px-5 py-6 text-sm text-neutral-60 bg-white border-b border-neutral-10/60 text-center">
                                  No loads have been stored in this bay yet
                                </div>
                              )}
                            </Fragment>
                          );
                        }

                        // -------------------- ACCORDION LAYOUT (original) --------------------
                        return (
                          <div key={bay.id} className={
                            'rounded-lg border ' +
                            ((isCreating && !bay.accessible)
                              ? 'border-neutral-10 bg-neutral-5'
                              : (someSelected ? 'border-safi-300 ring-1 ring-safi-200 bg-safi-50/40' : 'border-neutral-10'))
                          }>
                            <div className="flex items-center justify-between px-4 py-3">
                              <button
                                onClick={() => hasLoads && setOpenBays(s => ({ ...s, [bay.id]: !s[bay.id] }))}
                                className="flex items-center gap-3 text-left flex-1 min-w-0"
                                aria-expanded={bayOpen}
                                disabled={!hasLoads}
                              >
                                <Icon d={bayOpen ? I.chevron : I.chevronR} className={'w-4 h-4 shrink-0 ' + (hasLoads ? 'text-neutral-60' : 'text-neutral-10')} />
                                <div className="min-w-0">
                                  <div className="font-medium text-neutral-100 flex items-center gap-2 flex-wrap">
                                    {bay.esName}
                                    {zone.inventoryRule && zone.inventoryRule !== 'NONE' && (
                                      <span
                                        className="inline-flex items-center px-2 py-0.5 rounded-full bg-neutral-5 border border-neutral-10 text-[13px] font-semibold text-neutral-80"
                                        title={zone.inventoryRule === 'LIFO'
                                          ? 'Last in, first out - stacks picked top-down'
                                          : 'First in, first out - oldest load picked first'}
                                      >
                                        {zone.inventoryRule}
                                      </span>
                                    )}
                                    {isCreating && !bay.accessible && (
                                      <span
                                        title="Blocked bays can’t be picked until the bays in front are cleared."
                                        className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-neutral-10 text-neutral-80 text-[13px] font-medium cursor-help"
                                      >
                                        <Icon d={I.lock} className="w-3 h-3" /> Blocked by {bay.blockedBy}
                                      </span>
                                    )}
                                  </div>
                                  <div className="text-[13px] text-neutral-60 mt-0.5 truncate">
                                    Load: {s.loads} · Bales: {fmtNum(s.bales)} · {fmtKg(s.weight)}
                                  </div>
                                </div>
                              </button>
                              <div className="flex items-center gap-3 shrink-0">
                                <CapacityChip bales={s.bales} />
                                {isCreating && hasLoads && (
                                  <label className={
                                    'flex items-center gap-2 text-[13px] font-medium cursor-pointer select-none ' +
                                    (bay.accessible ? 'text-neutral-80' : 'text-neutral-40 cursor-not-allowed')
                                  }>
                                    <input
                                      type="checkbox"
                                      className="rounded text-safi-600 focus:ring-safi-500 disabled:opacity-40"
                                      checked={allSelected}
                                      ref={el => { if (el) el.indeterminate = someSelected && !allSelected; }}
                                      onChange={toggleBay}
                                      disabled={!bay.accessible}
                                      aria-label={`Select all loads in ${bay.esName}`}
                                    />
                                    Select all
                                  </label>
                                )}
                              </div>
                            </div>

                            {bayOpen && hasLoads && (
                              <div className="border-t border-neutral-10 divide-y divide-neutral-10">
                                {bay.loads.map(load => {
                                  const key = `${zone.id}|${bay.id}|${load.id}`;
                                  const access = accessibilityOf(zone, bay, load);
                                  const lifoOk = isLifoSelectable(zone, bay, load, selectionBales, pickerMode);
                                  const alreadySelected = selectionBales[key] != null;
                                  // R35: cross-line/shift claim check using { productionLine, shift } owner.
                                  const claimOwner = loadClaimMap[load.id] || null;
                                  const isOwnedByThisDraft = claimOwner && claimOwner.productionLine === creationLine && claimOwner.shift === creationShift;
                                  const lockedByOtherLine = isCreating && claimOwner && !isOwnedByThisDraft
                                    ? `${claimOwner.productionLine} · ${claimOwner.shift}` : false;
                                  const selectableThis = !isCreating || ((bay.accessible && (lifoOk || alreadySelected)) && !lockedByOtherLine);
                                  let onPickingListChip = false;
                                  let claimedByLine = null;
                                  // Only chip loads that belong to the currently-viewed line.
                                  if (!isCreating && claimOwner) {
                                    claimedByLine = `${claimOwner.productionLine} · ${claimOwner.shift}`;
                                    const owningList = pickingLists.find(pl => pl.productionLine === claimOwner.productionLine && pl.shift === claimOwner.shift);
                                    const entry = owningList?.loads.find(l => l.loadId === load.id);
                                    if (entry) onPickingListChip = entry.bales != null && entry.bales < load.bales
                                      ? { partial: true, bales: entry.bales, label: claimedByLine }
                                      : { partial: false, label: claimedByLine };
                                  }
                                  return (
                                    <LoadRow
                                      key={load.id}
                                      load={load}
                                      isCreating={isCreating}
                                      accessible={selectableThis}
                                      isAccessibleLoad={access.status === 'accessible'}
                                      isSelected={selected.has(key)}
                                      onToggle={() => toggleLoad(key, bay.accessible)}
                                      onPickingList={onPickingListChip}
                                      claimedByLine={claimedByLine}
                                      lockedByOtherLine={lockedByOtherLine}
                                    />
                                  );
                                })}
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          )}{/* /isSpatial conditional */}
        </div>

        {/* Side panel - only visible in Create picking list mode. Aligns with the first zone card.
            The card itself is bounded by viewport height so the footer buttons (Send to picker / Cancel / Schedule)
            are always visible - only the middle section scrolls when many loads are selected. */}
        {isCreating && (
          <aside className="col-span-12 lg:col-span-4">
            <div className="sticky top-[72px] bg-white border border-neutral-10 rounded-xl shadow-sm flex flex-col max-h-[calc(100vh-96px)]">
              <div className="p-5 border-b border-neutral-10 flex items-start justify-between shrink-0">
                <h2 className="font-bold text-neutral-100 text-lg">
                  {lang === 'es' ? 'Lista de recolección' : 'Picking list'}
                </h2>
                <button
                  aria-label={lang === 'es' ? 'Imprimir lista' : 'Print picking list'}
                  title={lang === 'es' ? 'Imprimir lista' : 'Print picking list'}
                  className="p-2 rounded-full hover:bg-neutral-5 text-neutral-60 hover:text-neutral-100 min-w-[44px] min-h-[44px]"
                >
                  <Icon d={I.print} className="w-5 h-5" />
                </button>
              </div>

              {/* Production window snapshot - gives the SL a target to aim at while picking */}
              {windowActive && (
                <div className="px-5 py-3 border-b border-neutral-10 bg-neutral-5/60 shrink-0">
                  <div className="text-[13px] font-semibold uppercase tracking-wide text-neutral-60">
                    {lang === 'es' ? 'Ventana de producción activa' : 'Active production window'}
                  </div>
                  <div className="mt-1 flex items-center gap-4 flex-wrap text-[13px]">
                    <div>
                      <span className="text-neutral-60">{lang === 'es' ? 'Material:' : 'Material:'} </span>
                      <span className="font-bold text-neutral-100">Clear PET Bottles</span>
                    </div>
                    <div>
                      <span className="text-neutral-60">{lang === 'es' ? 'Objetivo de entrada:' : 'Target input:'} </span>
                      <span className="font-bold text-neutral-100">{ACTIVE_WINDOW.targetInput.toFixed(1)}%</span>
                    </div>
                  </div>
                </div>
              )}

              <div className="p-5 space-y-4 flex-1 overflow-y-auto scrollbar-thin min-h-0">
                {/* R35: Production line + Shift selectors. Picking list keyed on both. */}
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="block text-[13px] font-semibold text-neutral-80 mb-1.5">
                      {lang === 'es' ? 'Línea de producción' : 'Production line'}
                    </label>
                    <select
                      value={creationLine}
                      onChange={e => setCreationLine?.(e.target.value)}
                      className="w-full h-11 px-3 border border-neutral-10 rounded-lg text-sm text-neutral-100 bg-white focus:outline-none focus:ring-2 focus:ring-safi-600"
                    >
                      {['Apan 1', 'Apan 2'].map(line => (
                        <option key={line} value={line}>{line}</option>
                      ))}
                    </select>
                  </div>
                  <div>
                    <label className="block text-[13px] font-semibold text-neutral-80 mb-1.5">
                      {lang === 'es' ? 'Turno' : 'Shift'}
                    </label>
                    <select
                      value={creationShift}
                      onChange={e => setCreationShift?.(e.target.value)}
                      className="w-full h-11 px-3 border border-neutral-10 rounded-lg text-sm text-neutral-100 bg-white focus:outline-none focus:ring-2 focus:ring-safi-600"
                    >
                      {['Shift 1', 'Shift 2', 'Shift 3'].map(shift => (
                        <option key={shift} value={shift}>{shift}</option>
                      ))}
                    </select>
                  </div>
                </div>

                {/* R67: Auto-generate picking list from quality data. Safi picks
                    a set of loads whose aggregated material breakdown satisfies
                    every threshold. Toggle collapses the settings when off. */}
                <div className={
                  'rounded-lg border transition-colors ' +
                  (autoGenEnabled ? 'border-safi-300 bg-safi-50/40' : 'border-neutral-10 bg-white')
                }>
                  <label className="flex items-start gap-3 px-4 py-3 cursor-pointer">
                    <input
                      type="checkbox"
                      checked={autoGenEnabled}
                      onChange={e => setAutoGenEnabled(e.target.checked)}
                      className="mt-0.5 rounded text-safi-600 focus:ring-safi-500 h-4 w-4"
                    />
                    <span className="flex-1 min-w-0">
                      <span className="block text-[14px] font-semibold text-neutral-100">
                        {lang === 'es'
                          ? 'Generar automáticamente desde datos de calidad'
                          : 'Auto-generate from quality data'}
                      </span>
                      <span className="mt-0.5 block text-[12px] text-neutral-60">
                        {lang === 'es'
                          ? 'Safi seleccionará lotes cuya calidad combinada cumpla los umbrales que definas.'
                          : 'Safi picks loads whose aggregated quality meets the thresholds you define.'}
                      </span>
                    </span>
                  </label>

                  {autoGenEnabled && (
                    <div className="px-4 pb-4 pl-11 space-y-4">
                      {/* Loads-in-list count */}
                      <div>
                        <label className="block text-[13px] font-semibold text-neutral-80 mb-1.5">
                          {lang === 'es' ? 'Lotes en la lista' : 'Loads in list'}
                        </label>
                        <div className="flex items-center gap-2">
                          <input
                            type="number"
                            min="1"
                            value={autoGenLoadCount}
                            onChange={e => setAutoGenLoadCount(Math.max(1, Number(e.target.value) || 1))}
                            className="w-24 h-9 px-2 border border-neutral-10 rounded-md text-[13px] text-center bg-white focus:outline-none focus:ring-2 focus:ring-safi-600"
                          />
                          <span className="text-[12px] text-neutral-60">
                            {lang === 'es' ? 'lotes' : 'loads'}
                          </span>
                        </div>
                      </div>

                      {/* Material thresholds */}
                      <div>
                        <div className="flex items-center justify-between mb-1.5">
                          <label className="text-[13px] font-semibold text-neutral-80">
                            {lang === 'es' ? 'Umbrales de material' : 'Material thresholds'}
                          </label>
                        </div>
                        <p className="text-[12px] text-neutral-60 mb-2">
                          {lang === 'es'
                            ? 'El total agregado de los lotes elegidos debe cumplir cada umbral (p. ej. Termoformas ≤ 20 %).'
                            : 'The aggregated content across the picked loads must meet each threshold (e.g. Thermoforms ≤ 20%).'}
                        </p>

                        <div className="space-y-2">
                          {autoGenThresholds.length === 0 && (
                            <div className="text-[13px] text-neutral-60 border border-dashed border-neutral-10 rounded-md px-3 py-3 text-center">
                              {lang === 'es' ? 'Aún no hay umbrales.' : 'No thresholds yet.'}
                            </div>
                          )}
                          {autoGenThresholds.map(t => (
                            <div key={t.id} className="flex items-center gap-2 flex-wrap">
                              <select
                                value={t.material}
                                onChange={e => updateAutoGenThreshold(t.id, { material: e.target.value })}
                                className="h-9 px-2 border border-neutral-10 rounded-md text-[13px] bg-white min-w-[160px] focus:outline-none focus:ring-2 focus:ring-safi-600"
                                aria-label={lang === 'es' ? 'Material' : 'Material'}
                              >
                                {AUTO_GEN_MATERIALS.map(m => (
                                  <option key={m} value={m}>{m}</option>
                                ))}
                              </select>
                              <select
                                value={t.operator}
                                onChange={e => updateAutoGenThreshold(t.id, { operator: e.target.value })}
                                className="h-9 px-2 border border-neutral-10 rounded-md text-[13px] bg-white focus:outline-none focus:ring-2 focus:ring-safi-600"
                                aria-label={lang === 'es' ? 'Comparador' : 'Operator'}
                              >
                                <option value="<=">{'≤'}</option>
                                <option value=">=">{'≥'}</option>
                              </select>
                              <div className="relative">
                                <input
                                  type="number"
                                  min="0"
                                  max="100"
                                  step="0.1"
                                  value={t.pct}
                                  onChange={e => updateAutoGenThreshold(t.id, { pct: Math.max(0, Math.min(100, Number(e.target.value) || 0)) })}
                                  className="h-9 w-24 pl-2 pr-7 border border-neutral-10 rounded-md text-[13px] text-right bg-white focus:outline-none focus:ring-2 focus:ring-safi-600"
                                  aria-label={lang === 'es' ? 'Porcentaje' : 'Percentage'}
                                />
                                <span className="absolute right-2 top-1/2 -translate-y-1/2 text-[13px] text-neutral-60 pointer-events-none">%</span>
                              </div>
                              <button
                                type="button"
                                onClick={() => removeAutoGenThreshold(t.id)}
                                className="p-1.5 rounded text-neutral-60 hover:bg-white hover:text-rose-700 shrink-0"
                                aria-label={lang === 'es' ? 'Eliminar umbral' : 'Remove threshold'}
                                title={lang === 'es' ? 'Eliminar umbral' : 'Remove threshold'}
                              >
                                <Icon d={I.close} className="w-4 h-4" />
                              </button>
                            </div>
                          ))}
                        </div>

                        <button
                          type="button"
                          onClick={addAutoGenThreshold}
                          disabled={autoGenThresholds.length >= AUTO_GEN_MATERIALS.length}
                          className={
                            'mt-3 inline-flex items-center gap-1.5 text-[13px] font-medium ' +
                            (autoGenThresholds.length >= AUTO_GEN_MATERIALS.length
                              ? 'text-neutral-40 cursor-not-allowed'
                              : 'text-safi-600 hover:underline')
                          }
                          title={autoGenThresholds.length >= AUTO_GEN_MATERIALS.length
                            ? (lang === 'es' ? 'Todos los materiales ya tienen un umbral.' : 'All materials already have a threshold.')
                            : undefined}
                        >
                          <Icon d={I.plus} className="w-4 h-4" />
                          {lang === 'es' ? 'Añadir umbral' : 'Add threshold'}
                        </button>
                      </div>
                    </div>
                  )}
                </div>
                <div className="grid grid-cols-3 gap-3">
                  <Metric label="Loads"  value={fmtNum(summary.loadCount)} />
                  <Metric label="Bales"  value={fmtNum(summary.totalBales)} />
                  <Metric label="Weight" value={fmtKg(summary.totalWeight)} />
                </div>

                {summary.loadCount === 0 ? (
                  <div className="text-sm text-neutral-60 bg-neutral-5 border border-neutral-10 rounded-lg p-4">
                    No loads selected yet. Tick loads in the yard to add them to the picking list.
                  </div>
                ) : (
                  <>
                    <div className="border border-neutral-10 rounded-lg p-4">
                      <div className="text-[13px] font-semibold uppercase tracking-wide text-neutral-60 mb-3">
                        Average quality <span className="font-normal normal-case">· weighted avg of {summary.analysedCount} analysed load{summary.analysedCount === 1 ? '' : 's'}</span>
                      </div>
                      {summary.analysedCount === 0 ? (
                        <div className="text-sm text-neutral-60">No analysed loads selected yet.</div>
                      ) : (
                        <div className="flex flex-col gap-1.5">
                          {Object.entries(SPEC).map(([key, spec]) => {
                            const value = summary.components[key];
                            const good = inSpec(spec, value);
                            const cls = good ? 'bg-success-100 text-success-300' : 'bg-rose-100 text-rose-900';
                            const icon = good ? I.checkCircle : I.errorCircle;
                            return (
                              <span key={key} className={`self-start inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[13px] font-medium ${cls}`}>
                                <Icon d={icon} className="w-3.5 h-3.5" />
                                {spec.label} {value.toFixed(1)}%
                              </span>
                            );
                          })}
                        </div>
                      )}
                    </div>

                    <div className="border border-neutral-10 rounded-lg divide-y divide-neutral-10">
                      {selectedLoads.map(({ key, zone, bay, load, bales, weight, partial }) => (
                        <div key={key} className="flex items-center gap-3 px-3 py-2.5">
                          <div className="flex-1 min-w-0">
                            <div className="text-sm text-neutral-100 truncate flex items-center gap-2">
                              <span>{load.supplier}</span>
                              <span className="text-neutral-40">#{load.lot}</span>
                              {partial && (
                                <span className="inline-flex items-center px-1.5 py-0.5 rounded text-[13px] font-semibold bg-amber-100 text-amber-900">
                                  PARTIAL
                                </span>
                              )}
                            </div>
                            <div className="text-[13px] text-neutral-60 flex items-center gap-2 flex-wrap mt-1">
                              <button
                                onClick={() => scrollToLoad(load.id)}
                                className="text-safi-600 hover:underline focus:underline"
                                title={`Jump to ${zone.esName}: ${bay.esName} in the yard`}
                              >
                                {zone.esName}: {bay.esName}
                              </button>
                              <span>·</span>
                              <span className="inline-flex items-center gap-1">
                                <input
                                  type="number"
                                  min={1}
                                  max={load.bales}
                                  value={bales}
                                  onChange={(e) => {
                                    const next = Math.max(1, Math.min(load.bales, Number(e.target.value) || 1));
                                    setSelectionBales(prev => ({ ...prev, [key]: next }));
                                  }}
                                  className="w-16 px-2 py-1.5 rounded border border-neutral-10 text-center text-[13px] font-medium text-neutral-100 focus:border-safi-600 focus:ring-2 focus:ring-safi-200 min-h-[36px]"
                                  aria-label="Bales to pick"
                                />
                                <span>/ {fmtNum(load.bales)} bales</span>
                              </span>
                              <span>· {fmtKg(weight)}</span>
                            </div>
                          </div>
                          <button
                            onClick={() => setSelectionBales(prev => { const n = { ...prev }; delete n[key]; return n; })}
                            className="p-1.5 text-neutral-60 hover:text-neutral-100 hover:bg-neutral-5 rounded shrink-0"
                            aria-label={`Remove ${load.lot} from picking list`}
                            title="Remove from list"
                          >
                            <Icon d={I.close} className="w-4 h-4" />
                          </button>
                        </div>
                      ))}
                    </div>

                  </>
                )}
              </div>

              <div className="p-5 border-t border-neutral-10 flex flex-col gap-2 shrink-0">
                <button
                  onClick={() => confirmList(false)}
                  disabled={summary.loadCount === 0}
                  className="w-full py-2.5 rounded bg-safi-600 text-white font-medium hover:bg-safi-700 disabled:bg-neutral-10 disabled:text-neutral-40 disabled:cursor-not-allowed flex items-center justify-center gap-2"
                >
                  Send to picker
                  <Icon d={I.arrowR} className="w-4 h-4" />
                </button>
                <div className="flex items-center gap-2">
                  <button
                    onClick={cancelCreate}
                    className="flex-1 py-2 rounded border border-neutral-10 text-neutral-80 font-medium hover:bg-neutral-5"
                  >
                    Cancel
                  </button>
                  <button
                    disabled={summary.loadCount === 0}
                    className="flex-1 py-2 rounded border border-neutral-10 text-neutral-80 font-medium hover:bg-neutral-5 disabled:opacity-40 disabled:cursor-not-allowed inline-flex items-center justify-center gap-1.5"
                  >
                    <Icon d={I.calendar} className="w-4 h-4" />
                    Schedule
                  </button>
                </div>
              </div>
            </div>
          </aside>
        )}
      </div>{/* /grid */}
      </Fragment>
    );
  }

  // Quieter "N selected" - inline subtle text, not a pill.
  function ZoneSelectionBadge({ zoneId, selected }) {
    const count = Array.from(selected).filter(k => k.startsWith(zoneId + '|')).length;
    if (count === 0) return null;
    return (
      <span className="text-[13px] font-medium text-safi-700">· {count} selected</span>
    );
  }

  const Metric = ({ label, value }) => (
    <div className="bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5">
      <div className="text-[13px] uppercase tracking-wide text-slate-500">{label}</div>
      <div className="text-base font-bold text-slate-900 mt-0.5">{value}</div>
    </div>
  );

  // R36: Active picking lists accordion. Header "Active picking lists (N)" + chevron.
  // Expanded body shows each picking list as a row with line + shift identity, total
  // loads sent to the picker team, who created + when, and per-row Edit / Clear actions.
  function ActivePickingListAlert({ pickingLists, onEdit, onClear, lang = 'en' }) {
    const tEN = (en, es) => lang === 'es' ? es : en;
    const [open, setOpen] = useState(true);
    const [confirmingClear, setConfirmingClear] = useState(null); // { line, shift } | null
    return (
      <>
        <div className="mt-6 bg-white border border-neutral-10 rounded-xl overflow-hidden">
          <button
            type="button"
            onClick={() => setOpen(v => !v)}
            aria-expanded={open}
            className="w-full px-5 py-4 flex items-center justify-between gap-3 hover:bg-neutral-5/50 transition-colors"
          >
            <div className="flex items-center gap-2.5">
              <Icon d={I.list} className="w-5 h-5 text-safi-700" />
              <span className="font-bold text-neutral-100 text-base">
                {tEN(`Active picking lists (${pickingLists.length})`, `Listas de recolección activas (${pickingLists.length})`)}
              </span>
            </div>
            <Icon d={open ? I.chevron : I.chevronR} className="w-5 h-5 text-neutral-60" />
          </button>
          {open && (
            <div className="divide-y divide-neutral-10">
              {pickingLists.map((pl) => {
                const createdDate = pl.createdAt ? new Date(pl.createdAt) : null;
                const dateStr = createdDate
                  ? createdDate.toLocaleString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false })
                  : null;
                return (
                  <div
                    key={`${pl.productionLine}-${pl.shift}`}
                    className="px-5 py-3 flex items-center justify-between gap-4 flex-wrap"
                  >
                    {/* R36b: single-line layout - identity / counts / metadata all inline,
                        wraps on narrow widths. */}
                    <div className="flex-1 min-w-[280px] flex items-center gap-2 flex-wrap text-[13px]">
                      <Icon d={I.factory} className="w-4 h-4 text-safi-700 shrink-0" />
                      <span className="font-bold text-neutral-100">{pl.productionLine}</span>
                      <span className="inline-flex items-center px-2 py-0.5 rounded-full bg-safi-50 border border-safi-200 font-semibold text-safi-700">
                        {pl.shift}
                      </span>
                      <span className="text-neutral-40">·</span>
                      <span className="text-neutral-80">
                        {tEN(
                          `${pl.loads.length} loads sent to the picker team`,
                          `${pl.loads.length} lotes enviados al equipo de recolección`)}
                      </span>
                      {(pl.createdBy || dateStr) && <span className="text-neutral-40">·</span>}
                      <span className="text-neutral-60">
                        {[
                          pl.createdBy && tEN(`Created by ${pl.createdBy}`, `Creada por ${pl.createdBy}`),
                          dateStr,
                        ].filter(Boolean).join(' · ')}

  function ForkliftPickerView({ pickingList, processed, setProcessed, setPickingList, setRole }) {
    const [openZones, setOpenZones] = useState({});
    const [confirmLoad, setConfirmLoad] = useState(null); // { zone, bay, load, partial }

    // When list arrives, default to all zones expanded so FO sees everything
    useEffect(() => {
      if (pickingList) {
        const expanded = {};
        pickingList.loads.forEach(l => { expanded[l.zoneId] = true; });
        setOpenZones(expanded);
      }
    }, [pickingList]);

    if (!pickingList) {
      return (
        <div className="bg-white border border-slate-200 rounded-xl p-10 text-center">
          <div className="mx-auto w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 mb-3">
            <Icon d={I.list} className="w-6 h-6" />
          </div>
          <h3 className="font-semibold text-slate-900 text-lg">No picking list yet</h3>
          <p className="text-sm text-slate-500 mt-1 max-w-md mx-auto">
            The shift leader hasn't sent a picking list. When they do, the loads you need to move will appear here, grouped by zone.
          </p>
          <button
            onClick={() => setRole('SL')}
            className="mt-5 inline-flex items-center gap-2 px-4 py-2 rounded-lg border border-slate-300 text-sm font-medium hover:bg-slate-50"
          >
            Switch to Shift Leader view to create one
            <Icon d={I.arrowR} className="w-4 h-4" />
          </button>
        </div>
      );
    }

    // Resolve picking-list entries against the yard structure
    const resolved = pickingList.loads.map(({ zoneId, bayId, loadId }) => {
      const zone = YARD.find(z => z.id === zoneId);
      const bay  = zone?.bays.find(b => b.id === bayId);
      const load = bay?.loads.find(l => l.id === loadId);
      return { zone, bay, load };
    }).filter(x => x.zone && x.bay && x.load);

    // Group by zone -> bay
    const grouped = {};
    resolved.forEach(({ zone, bay, load }) => {
      if (!grouped[zone.id]) grouped[zone.id] = { zone, bays: {} };
      if (!grouped[zone.id].bays[bay.id]) grouped[zone.id].bays[bay.id] = { bay, loads: [] };
      grouped[zone.id].bays[bay.id].loads.push(load);
    });

    const totalLoads = resolved.length;
    const doneLoads = resolved.filter(({ load }) => processed[load.id]).length;
    const allDone = doneLoads === totalLoads;

    const markProcessed = (load, balesProcessed) => {
      const baleCount = balesProcessed ?? load.bales;
      const perBaleKg = load.weight / load.bales;
      const weight = Math.round(baleCount * perBaleKg);
      setProcessed(prev => ({
        ...prev,
        [load.id]: { bales: baleCount, weight, at: new Date().toISOString(), partial: baleCount < load.bales }
      }));
      setConfirmLoad(null);
    };

    return (
      <div className="space-y-4">
        {/* Banner */}
        <div className={
          'rounded-xl p-5 flex items-start gap-4 ' +
          (allDone ? 'bg-emerald-50 border border-emerald-200' : 'bg-safi-50 border border-safi-200')
        }>
          <Icon d={allDone ? I.check : I.bell} className={'w-6 h-6 mt-0.5 ' + (allDone ? 'text-emerald-700' : 'text-safi-700')} />
          <div className="flex-1">
            <div className="font-semibold text-slate-900">{pickingList.name}</div>
            <p className="text-sm text-slate-700 mt-0.5">
              {allDone
                ? 'All loads on this picking list have been processed. Confirm with the Shift Leader to close out the shift.'
                : `${doneLoads} of ${totalLoads} loads processed. Pick from the bays below in any order - full load by default, or specify bales if the load is split.`}
            </p>
          </div>
          {allDone && (
            <button
              onClick={() => setPickingList(null)}
              className="px-4 py-2 rounded-lg bg-emerald-600 text-white text-sm font-medium hover:bg-emerald-700"
            >
              Close picking list
            </button>
          )}
        </div>

        {/* Progress bar */}
        <div className="flex items-center gap-3 text-[13px] text-slate-600">
          <div className="flex-1 h-1.5 bg-slate-200 rounded-full overflow-hidden">
            <div
              className="h-full bg-safi-600 transition-all"
              style={{ width: `${totalLoads ? (doneLoads/totalLoads)*100 : 0}%` }}
            />
          </div>
          <span className="font-medium">{doneLoads}/{totalLoads}</span>
        </div>

        {/* Zone accordions */}
        <div className="space-y-3">
          {Object.values(grouped).map(({ zone, bays }) => {
            const open = !!openZones[zone.id];
            const zoneLoads = Object.values(bays).flatMap(b => b.loads);
            const zoneDone = zoneLoads.filter(l => processed[l.id]).length;
            return (
              <div key={zone.id} className="bg-white border border-slate-200 rounded-xl">
                <button
                  onClick={() => setOpenZones(s => ({ ...s, [zone.id]: !s[zone.id] }))}
                  className="w-full flex items-center justify-between px-5 py-4 hover:bg-slate-50 rounded-xl"
                  aria-expanded={open}
                >
                  <div className="flex items-center gap-3">
                    <Icon d={open ? I.chevron : I.chevronR} className="w-4 h-4 text-slate-500" />
                    <div className="text-left">
                      <div className="font-semibold text-slate-900">{zone.esName}</div>
                      <div className="text-[13px] text-slate-500 mt-0.5">{Object.keys(bays).length} bays · {zoneLoads.length} loads to pick</div>
                    </div>
                  </div>
                  <span className={
                    'inline-flex items-center px-2.5 py-1 rounded-full text-[13px] font-semibold ' +
                    (zoneDone === zoneLoads.length ? 'bg-emerald-50 text-emerald-700 ring-1 ring-emerald-200' : 'bg-safi-100 text-safi-700')
                  }>
                    {zoneDone}/{zoneLoads.length} processed
                  </span>
                </button>

                {open && (
                  <div className="border-t border-slate-100 px-5 py-4 space-y-3">
                    {Object.values(bays).map(({ bay, loads }) => {
                      const bayDone = loads.every(l => processed[l.id]);
                      return (
                        <div key={bay.id} className={
                          'rounded-lg border ' + (bayDone ? 'border-emerald-200 bg-emerald-50/30' : 'border-slate-200')
                        }>
                          <div className="flex items-center justify-between px-4 py-3 border-b border-slate-100">
                            <div>
                              <div className="font-medium text-slate-900">{bay.esName}</div>
                              <div className="text-[13px] text-slate-500 mt-0.5">{loads.length} loads to pick from this bay</div>
                            </div>
                            <button
                              disabled={bayDone}
                              onClick={() => {
                                loads.forEach(l => { if (!processed[l.id]) markProcessed(l, l.bales); });
                              }}
                              className={
                                'inline-flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-medium ' +
                                (bayDone
                                  ? 'bg-emerald-100 text-emerald-700 cursor-default'
                                  : 'bg-slate-900 text-white hover:bg-slate-800')
                              }
                            >
                              {bayDone ? (<><Icon d={I.check} className="w-4 h-4" /> Bay processed</>) : 'Process all in bay'}
                            </button>
                          </div>
                          <div className="divide-y divide-slate-100">
                            {loads.map(load => {
                              const p = processed[load.id];
                              return (
                                <div key={load.id} className="px-4 py-3 flex items-center gap-3">
                                  <div className="flex-1 min-w-0">
                                    <div className="flex items-center gap-2 flex-wrap">
                                      <span className="font-semibold text-slate-900">{load.supplier}</span>
                                      <span className="text-slate-500 text-sm">Order ref <span className="font-mono">#{load.lot}</span></span>
                                      <span className="inline-flex items-center px-2 py-0.5 rounded-full bg-white border border-neutral-10 text-[13px] font-medium text-neutral-80">
                                        {load.material}
                                      </span>
                                    </div>
                                    <div className="text-[13px] text-slate-500 mt-0.5">
                                      {fmtNum(load.bales)} bales · {fmtKg(load.weight)}
                                      {p && (
                                        <span className="ml-2 text-emerald-700 font-medium">
                                          · Processed {fmtNum(p.bales)} bales{p.partial ? ' (partial)' : ''}
                                        </span>
                                      )}
                                    </div>
                                  </div>
                                  {p ? (
                                    <span className="inline-flex items-center gap-1 px-2.5 py-1 rounded-full bg-emerald-50 text-emerald-700 ring-1 ring-emerald-200 text-[13px] font-semibold">
                                      <Icon d={I.check} className="w-3.5 h-3.5" /> Done
                                    </span>
                                  ) : (
                                    <div className="flex items-center gap-2 shrink-0">
                                      <button
                                        onClick={() => setConfirmLoad({ load, bay, zone, partial: true })}
                                        className="px-3 py-1.5 rounded-lg border border-slate-300 text-sm font-medium hover:bg-slate-50"
                                      >
                                        Partial…
                                      </button>
                                      <button
                                        onClick={() => markProcessed(load, load.bales)}
                                        className="px-3 py-1.5 rounded-lg bg-safi-600 text-white text-sm font-medium hover:bg-safi-700"
                                      >
                                        Process full load
                                      </button>
                                    </div>
                                  )}
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* Partial-load modal */}
        {confirmLoad && (
          <PartialProcessModal
            entry={confirmLoad}
            onCancel={() => setConfirmLoad(null)}
            onConfirm={(bales) => markProcessed(confirmLoad.load, bales)}
          />
        )}
      </div>
    );
  }

    const perBale = load.weight / load.bales;

              type="number"

  // Demo metadata: which lots are split across multiple bays.

  const SPLIT_LOAD_DEMO = {

  // ----------------------------------------------------------------------------
  // FO-tuned filter dropdowns (bigger touch targets - designed for fat fingers
  // on iPad. Inspired by the existing ZoneBayFilter but with larger spacing,
  // bigger checkboxes, and 56px+ option rows.)
  // ----------------------------------------------------------------------------
  function PickerFilterDropdown({ label, value, onChange, options, placeholder, lang }) {
    const [open, setOpen] = useState(false);
    const wrapRef = useRef(null);
    useEffect(() => {
      if (!open) return;
      const onDoc = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
      document.addEventListener('mousedown', onDoc);
      return () => document.removeEventListener('mousedown', onDoc);
    }, [open]);
    const count = value.size;
    const toggle = (k) => {
      const next = new Set(value);
      next.has(k) ? next.delete(k) : next.add(k);
      onChange(next);
    };
    const clear = () => onChange(new Set());
    return (
      <div className="relative flex-1 min-w-[200px]" ref={wrapRef}>
        <button
          type="button"
          onClick={() => setOpen(v => !v)}
          className={
            'w-full text-left pl-4 pr-10 py-3 text-[15px] rounded-lg bg-white border min-h-[52px] truncate ' +
            (open ? 'border-safi-600' : 'border-neutral-10')
          }
          aria-haspopup="listbox"
          aria-expanded={open}
        >
          <span className={'block truncate whitespace-nowrap ' + (count > 0 ? 'text-neutral-100 font-medium' : 'text-neutral-40')}>
            {count > 0 ? `${count} ${lang === 'es' ? 'seleccionado(s)' : 'selected'}` : placeholder}
          </span>
        </button>
        <label className={
          'absolute -top-2 left-3 px-1.5 bg-[#fafafa] text-[13px] font-medium ' +
          (open ? 'text-safi-600' : 'text-neutral-60')
        }>{label}</label>
        <Icon d={I.chevron} className={
          'w-5 h-5 absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none ' +
          (open ? 'text-safi-600 rotate-180' : 'text-neutral-60')
        } />
        {open && (
          <div className="absolute z-30 mt-1 w-full min-w-[280px] left-0 bg-white border border-neutral-10 rounded-lg shadow-lg max-h-[400px] overflow-y-auto scrollbar-thin py-1">
            {count > 0 && (
              <div className="px-4 py-3 border-b border-neutral-10 flex justify-between items-center">
                <span className="text-[13px] text-neutral-60">{count} {lang === 'es' ? 'seleccionado(s)' : 'selected'}</span>
                <button onClick={clear} className="text-[15px] font-medium text-safi-700 hover:underline min-h-[32px]">
                  {lang === 'es' ? 'Borrar' : 'Clear'}
                </button>
              </div>
            )}
            {options.map(opt => {
              const checked = value.has(opt.key);
              return (
                <label
                  key={opt.key}
                  className="flex items-center gap-3 px-4 py-3.5 text-[15px] cursor-pointer hover:bg-neutral-5 min-h-[56px]"
                >
                  <input
                    type="checkbox"
                    checked={checked}
                    onChange={() => toggle(opt.key)}
                    className="w-5 h-5 rounded text-safi-600 focus:ring-safi-500"
                  />
                  <span className="text-neutral-100">{opt.label}</span>
                  {opt.hint && (
                    <span className="ml-auto text-[13px] text-neutral-40">{opt.hint}</span>
                  )}
                </label>
              );
            })}
          </div>
        )}
      </div>
    );
  }

  // R35: Open a printable picking-list page in a new window. Matches the reference

  function printPickingList(pl) {

      const bay = zone?.bays.find(b => b.id === bayId);
      const load = bay?.loads.find(l => l.id === loadId);
      if (!load) return null;
      const bales = scheduledBales != null ? scheduledBales : load.bales;
      const weightKg = scheduledBales != null
        ? Math.round((scheduledBales / load.bales) * load.weight)
        : load.weight;
      return {
        zoneName: zone.name, bayId: bay.id,
        supplier: load.supplier, lot: load.lot, material: load.material,
        bales, weightT: (weightKg / 1000).toFixed(1)

    }).filter(Boolean);

    const totalWeightT = (rows.reduce((a, r) => a + Number(r.weightT), 0)).toFixed(1);
    const materials = Array.from(new Set(rows.map(r => r.material))).join(', ');
    const now = new Date();

    const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
    const html = `<!doctype html><html><head><meta charset="utf-8"><title>Picking List</title>
<style>

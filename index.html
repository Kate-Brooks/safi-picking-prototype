<body>
  <div class="doc-header">
    <div>
      <p class="brand">Safi</p>
      <h1 class="title">Picking List</h1>
    </div>
    <div class="meta">

  <div class="info-bar">

    </tbody>
  </table>
  <script>
    window.onload = () => { setTimeout(() => { window.print(); }, 100); };
  <\/script>
</body></html>`;
    const w = window.open('', '_blank', 'width=900,height=1100');
    if (!w) return;
    w.document.open();
    w.document.write(html);
    w.document.close();
  }

  function ForkliftPickerMergedView({ pickingLists = [], processed, setProcessed, lang, setToast, bufferEnabled = true, pickerMode = 'load', yard = [], buffer = [], setBuffer = () => {} }) {
    // R57: Production line switch — Apan 1 / Apan 2. Independent of whether
    // picking lists exist (load-based mode often has none). The chosen line
    // is reflected on processing toasts so it's always clear which line the
    // material is being fed to.
    const [activeLine, setActiveLine] = useState('Apan 1');
    const PRODUCTION_LINES = ['Apan 1', 'Apan 2'];

    // Picking lists for the currently-selected production line.
    const linePickingLists = useMemo(
      () => pickingLists.filter(pl => pl.productionLine === activeLine),
      [pickingLists, activeLine]
    );

    // R36/R57: FO selects a picking list via the (now optional) shift dropdown.
    // When the line switch changes, snap to the first list on that line.
    const [pickingListId, setPickingListId] = useState(() => linePickingLists[0]?.id || null);
    useEffect(() => {
      if (linePickingLists.length === 0) {
        if (pickingListId !== null) setPickingListId(null);
        return;
      }
      if (!linePickingLists.some(pl => pl.id === pickingListId)) {
        setPickingListId(linePickingLists[0].id);
      }
    }, [linePickingLists]);
    // Derive the single active list for the legacy logic below.
    const pickingList = pickingLists.find(pl => pl.id === pickingListId) || null;
    // All zones open by default so FO sees everything on landing.
    const initialOpen = useMemo(() => {
      const o = {}; YARD.forEach(z => { o[z.id] = true; }); return o;
    }, []);
    const [openZones, setOpenZones] = useState(initialOpen);
    // R26: per-session Hide/Show toggle removed. The header Load-based / Bale-based
    // setting alone drives buffer visibility - bufferEnabled comes in as a prop.
    const bufferVisible = bufferEnabled;
    // R42: buffer + setBuffer now come from props (lifted to ProductionManagementPage)
    // so the Warehouse tab can render it side-by-side with the picker actions.
    const [modal, setModal] = useState(null);     // { type: 'move'|'process'|'reject', source: 'bay'|'buffer', zone?, bay?, bufferItems? }
    // Lifted so the Process modal defaults to the FO's last choice ('auto' | 'manual')
    const [weightMode, setWeightMode] = useState('auto');
    // FO filters - "Bays" (zoneId|bayId keys) and "Material" (material name keys)
    const [bayFilter, setBayFilter] = useState(new Set());
    const [materialFilter, setMaterialFilter] = useState(new Set());
    // Show only picking-list bays (off by default = whole warehouse)
    const [pickingListOnly, setPickingListOnly] = useState(false);
    // Summary card collapsed by default to save screen real estate
    const [summaryOpen, setSummaryOpen] = useState(true);
    // Bays for which the FO has chosen to show blocked loads ("Show N more loads")
    const [expandedBlocked, setExpandedBlocked] = useState(new Set());
    const toggleBlockedExpander = (key) => {
      setExpandedBlocked(prev => {
        const next = new Set(prev);
        next.has(key) ? next.delete(key) : next.add(key);
        return next;
      });
    };

    const tEN = (en, es) => lang === 'es' ? es : en;

    // Picking-list recommended lookup - load IDs the SL put on the active picking list
    const recommendedLoads = useMemo(() => {
      const s = new Set();
      pickingList?.loads.forEach(l => s.add(l.loadId));
      return s;
    }, [pickingList]);

    // R34: per-loadId, the bale count the SL actually scheduled. When the SL picks
    // a partial load (e.g. 5 of 25 bales), this carries the 5 so the FO processes
    // only the partial portion instead of the full load.
    const scheduledBalesByLoad = useMemo(() => {
      const m = {};
      pickingList?.loads.forEach(l => {
        if (l.bales != null) m[l.loadId] = l.bales;
      });
      return m;
    }, [pickingList]);

    // Picking-list bay lookup - set of "zoneId|bayId" keys that contain at least one
    // picking-list item. Used for the "Show only picking list" filter and the badge.
    const pickingListBays = useMemo(() => {
      const s = new Set();
      pickingList?.loads.forEach(l => s.add(`${l.zoneId}|${l.bayId}`));
      return s;
    }, [pickingList]);

    // Picking-list summary - grouped by zone/bay with bale + load counts.
    // R34: respects the SL's partial-pick choice. If an entry has bales:5 against a
    // 25-bale load, the summary counts 5 bales and the pro-rated weight.
    const pickingListSummary = useMemo(() => {
      if (!pickingList) return null;
      const byBay = {};
      pickingList.loads.forEach(({ zoneId, bayId, loadId, bales: scheduledBales }) => {
        const zone = YARD.find(z => z.id === zoneId);
        const bay = zone?.bays.find(b => b.id === bayId);
        const load = bay?.loads.find(l => l.id === loadId);
        if (!load) return;
        const effectiveBales = scheduledBales != null ? scheduledBales : load.bales;
        const effectiveWeight = scheduledBales != null
          ? Math.round((scheduledBales / load.bales) * load.weight)
          : load.weight;
        const key = `${zoneId}|${bayId}`;
        if (!byBay[key]) byBay[key] = { zoneId, bayId, loads: [], bales: 0, weight: 0 };
        byBay[key].loads.push({ ...load, bales: effectiveBales, weight: effectiveWeight, fullBales: load.bales });
        byBay[key].bales += effectiveBales;
        byBay[key].weight += effectiveWeight;
      });
      const items = Object.values(byBay);
      const totalLoads = items.reduce((a, b) => a + b.loads.length, 0);
      const totalBales = items.reduce((a, b) => a + b.bales, 0);
      const totalWeight = items.reduce((a, b) => a + b.weight, 0);
      const materials = new Set();
      items.forEach(it => it.loads.forEach(l => materials.add(l.material)));
      return { items, totalLoads, totalBales, totalWeight, materials: Array.from(materials) };
    }, [pickingList]);

    // Build the filter option list once
    const bayOptions = useMemo(() => {
      const out = [];
      YARD.forEach(zone => {
        zone.bays.forEach(bay => {
          if (bay.loads.length === 0) return;
          out.push({
            key: `${zone.id}|${bay.id}`,
            label: tEN(`Zone ${zone.id} · Bay ${bay.id}`, `Zona ${zone.id} · Fila ${bay.id}`),
            hint: `${bay.loads.reduce((a, l) => a + l.bales, 0)} ${tEN('bales', 'pacas')}`
          });
        });
      });
      return out;
    }, [lang]);

    const materialOptions = MATERIALS.map(m => ({ key: m, label: m }));

    // Aggregate buffer totals
    const bufferBales = buffer.reduce((a, b) => a + b.bales, 0);
    const bufferWeight = buffer.reduce((a, b) => a + Math.round(b.bales * b.weightPerBale), 0);

    // Visible bays after applying all three filters: picking-list-only, bay filter, material filter.
    // R58: zones not serving the active line are HIDDEN from the FO picker —
    // per UX call, the FO persona wants radical simplicity ("what can I feed
    // Apan 1 right now?"), not a list of zones they can't act on. The hidden
    // count is surfaced as a small caption below so system status stays visible.
    const lineHiddenZoneCount = useMemo(
      () => YARD.filter(z => !zoneServesLine(z, activeLine)).length,
      [activeLine]
    );
    const visibleZones = useMemo(() => {
      return YARD
        .filter(zone => zoneServesLine(zone, activeLine))
        .map(zone => {
          const bays = zone.bays.filter(bay => {
            if (pickingListOnly && !pickingListBays.has(`${zone.id}|${bay.id}`)) return false;
            if (bayFilter.size > 0 && !bayFilter.has(`${zone.id}|${bay.id}`)) return false;
            if (materialFilter.size > 0 && !bay.loads.some(l => materialFilter.has(l.material))) return false;
            return true;
          });
          return { zone, bays };
        })
        .filter(z => z.bays.length > 0);
    }, [pickingListOnly, pickingListBays, bayFilter, materialFilter, activeLine]);

    const anyFilterActive = pickingListOnly || bayFilter.size > 0 || materialFilter.size > 0;
    const clearAllFilters = () => {
      setPickingListOnly(false);
      setBayFilter(new Set());
      setMaterialFilter(new Set());
    };

    // Bay-level "remaining accessible bales", taking into account anything already
    // moved to the buffer from this bay during the session.
    const bufferConsumedByBay = useMemo(() => {
      const map = {};
      buffer.forEach(b => {
        const key = `${b.sourceZoneId}:${b.sourceBayId}`;
        map[key] = (map[key] || 0) + b.bales;
      });
      return map;
    }, [buffer]);

    const bayRemaining = (zone, bay) => {
      if (!bay.accessible) return { bales: 0, weight: 0, loads: bay.loads.length };
      const consumed = bufferConsumedByBay[`${zone.id}:${bay.id}`] || 0;
      const totalBales = bay.loads.reduce((a, l) => a + l.bales, 0);
      const totalWeight = bay.loads.reduce((a, l) => a + l.weight, 0);
      const remBales = Math.max(0, totalBales - consumed);
      // Approximate remaining weight by the consumed ratio
      const remWeight = totalBales === 0 ? 0 : Math.round(totalWeight * (remBales / totalBales));
      return { bales: remBales, weight: remWeight, loads: bay.loads.length };
    };

    // Average bale weight in a bay (used for assumed weight when not entered manually)
    const avgBaleWeight = (bay) => {
      const tb = bay.loads.reduce((a, l) => a + l.bales, 0);
      const tw = bay.loads.reduce((a, l) => a + l.weight, 0);
      return tb === 0 ? 0 : tw / tb;
    };

    // Split-load detection for a bay → array of { load, locations[] }
    const splitForBay = (bay) =>
      bay.loads.filter(l => SPLIT_LOAD_DEMO[l.lot]).map(l => ({ load: l, locations: SPLIT_LOAD_DEMO[l.lot] }));

    // Move material from a bay into the buffer
    const moveToBuffer = ({ zone, bay, bales, weightPerBale }) => {
      const uid = `${zone.id}:${bay.id}:${Date.now()}`;
      // Pick the "primary" load just for display (use the first non-processed load)
      const primaryLoad = bay.loads[0];
      setBuffer(prev => [...prev, {
        uid,
        loadId: primaryLoad?.id || `${bay.id}-mixed`,
        supplier: primaryLoad?.supplier || tEN('Mixed material', 'Material mixto'),
        lot: primaryLoad?.lot || '-',
        bales,
        // R42: store the load's original bale count so the Warehouse buffer detail
        // view can show partial-vs-full clearly (e.g. "10 of 25 bales in buffer").
        loadBales: primaryLoad?.bales || bales,
        weightPerBale,
        sourceZoneId: zone.id,
        sourceBayId: bay.id
      }]);
      setModal(null);
      setToast?.({ message: tEN(`${bales} bales moved to buffer from ${bay.esName}`, `${bales} pacas movidas al búfer desde ${bay.esName}`), kind: 'success' });
    };

    // Return a single buffer item back to its source bay
    const returnFromBuffer = (uid) => {
      const item = buffer.find(b => b.uid === uid);
      if (!item) return;
      setBuffer(prev => prev.filter(b => b.uid !== uid));
      setToast?.({ message: tEN(`Returned ${item.bales} bales to ${item.sourceBayId}`, `${item.bales} pacas devueltas a ${item.sourceBayId}`), kind: 'success' });
    };

    // Process material - used from both Bay and Buffer flows.
    // `source` shape depends on origin; we just record bales + weight and clear.
    const doProcess = ({ source, zone, bay, bufferItem, bales, weight }) => {
      // Synthetic processed entry per action (id keys avoid clobbering real load history)
      const pid = `merged-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`;
      setProcessed(prev => ({
        ...prev,
        [pid]: {
          bales, weight, at: new Date().toISOString(), partial: true,
          source: source === 'buffer' ? 'Buffer' : `${zone.esName} · ${bay.esName}`
        }
      }));
      if (source === 'buffer' && bufferItem) {
        // Decrement / remove buffer item
        setBuffer(prev => {
          return prev
            .map(b => b.uid === bufferItem.uid ? { ...b, bales: b.bales - bales } : b)
            .filter(b => b.bales > 0);
        });
      }
      setModal(null);
      // R57: include the active production line in the confirmation toast so
      // the FO can verify the material went to the right line at a glance.
      setToast?.({
        message: tEN(
          `Processed ${bales} bales (${fmtKg(weight)}) on ${activeLine}`,
          `Procesadas ${bales} pacas (${fmtKg(weight)}) en ${activeLine}`
        ),
        kind: 'success'
      });
    };

    return (
      <div className="space-y-4">
        {/* R26/R31: Picking list summary - rendered ABOVE the buffer in bale-based mode.
            In load-based mode the FO works whole loads, so the summary card is hidden -
            picking-list bays are still highlighted in the main list below for context. */}
        {pickerMode === 'bale' && pickingList && pickingListSummary && (
          <div className="rounded-xl bg-white border border-safi-200 overflow-hidden">
            <button
              onClick={() => setSummaryOpen(v => !v)}
              className="w-full px-5 py-4 flex items-center gap-3 hover:bg-safi-50/40"
              aria-expanded={summaryOpen}
            >
              <div className="w-9 h-9 rounded-lg bg-safi-100 flex items-center justify-center shrink-0">
                <Icon d={I.list} className="w-5 h-5 text-safi-700" />
              </div>
              <div className="flex-1 min-w-0 text-left">
                <div className="font-semibold text-neutral-100 text-base">
                  {tEN('Picking list', 'Lista de recolección')}
                  <span className="text-neutral-60 font-normal"> · {pickingList.name}</span>
                </div>
                <div className="text-[13px] text-neutral-60 mt-0.5">
                  {tEN(
                    `${pickingListSummary.totalLoads} loads · ${fmtNum(pickingListSummary.totalBales)} bales · ${fmtKg(pickingListSummary.totalWeight)} · ${pickingListSummary.items.length} bays · ${pickingListSummary.materials.join(', ')}`,
                    `${pickingListSummary.totalLoads} lotes · ${fmtNum(pickingListSummary.totalBales)} pacas · ${fmtKg(pickingListSummary.totalWeight)} · ${pickingListSummary.items.length} filas · ${pickingListSummary.materials.join(', ')}`
                  )}
                </div>
              </div>
              <Icon d={summaryOpen ? I.chevron : I.chevronR} className="w-5 h-5 text-neutral-60 shrink-0" />
            </button>
            {summaryOpen && (
              <ul className="border-t border-neutral-10 divide-y divide-neutral-10">
                {pickingListSummary.items.map(item => (
                  <li key={`${item.zoneId}|${item.bayId}`} className="min-h-[56px]">
                    {/* Whole row is now a single button - clickable + hover */}
                    <button
                      type="button"
                      onClick={() => {
                        setOpenZones(s => ({ ...s, [item.zoneId]: true }));
                        setBayFilter(new Set([`${item.zoneId}|${item.bayId}`]));
                        setTimeout(() => {
                          const el = document.getElementById(`merged-bay-${item.zoneId}-${item.bayId}`);
                          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }, 50);
                      }}
                      className="w-full px-5 py-3 flex items-center gap-3 text-left transition hover:bg-safi-50/50 focus:outline-none focus:bg-safi-50 focus:ring-2 focus:ring-inset focus:ring-safi-600"
                    >
                      <div className="flex-1 min-w-0">
                        <div className="text-[15px] font-medium text-neutral-100">
                          {tEN(`Zone ${item.zoneId} · Bay ${item.bayId}`, `Zona ${item.zoneId} · Fila ${item.bayId}`)}
                        </div>
                        <div className="text-[13px] text-neutral-60 mt-0.5">
                          {item.loads.length} {item.loads.length === 1 ? tEN('load', 'lote') : tEN('loads', 'lotes')} · {fmtNum(item.bales)} {tEN('bales', 'pacas')} · {fmtKg(item.weight)}
                          {' · '}
                          {Array.from(new Set(item.loads.map(l => l.material))).join(', ')}
                        </div>
                      </div>
                      <span className="text-[13px] text-safi-700 font-medium shrink-0">
                        {tEN('Go to bay', 'Ir a fila')} →
                      </span>
                    </button>
                  </li>
                ))}
              </ul>
            )}
          </div>
        )}

        {/* R26: Buffer card - bale-based only. No Hide/Show toggle. Empty state is a
            compact one-row layout (Buffer | No bales in buffer | disabled Reject + Process).
            Non-empty: list of staged items with per-item Return to bay. */}
        {bufferEnabled && (buffer.length === 0 ? (
          <div className="rounded-xl bg-white border border-neutral-10 px-5 py-4 flex items-center justify-between gap-3 flex-wrap">
            <div className="flex items-center gap-3 min-w-0">
              <div className="w-9 h-9 rounded-lg bg-neutral-5 flex items-center justify-center shrink-0">
                <Icon d={I.box} className="w-5 h-5 text-neutral-60" />
              </div>
              <div className="flex items-baseline gap-3 min-w-0">
                <span className="font-bold text-neutral-100 text-base">{tEN('Buffer', 'Búfer')}</span>
                <span className="text-[13px] text-neutral-60">{tEN('No bales in buffer', 'Sin pacas en el búfer')}</span>
              </div>
            </div>
            <div className="flex items-center gap-2 shrink-0">
              <button
                disabled
                className="inline-flex items-center gap-2 px-4 py-2.5 rounded-lg border border-neutral-10 text-neutral-40 text-[13px] font-medium cursor-not-allowed min-h-[44px]"
              >
                <Icon d={I.trash} className="w-4 h-4" />
                {tEN('Reject bale', 'Rechazar paca')}
              </button>
              <button
                disabled
                className="inline-flex items-center gap-2 px-4 py-2.5 rounded-lg bg-neutral-10 text-neutral-40 text-[13px] font-medium cursor-not-allowed min-h-[44px]"
              >
                {tEN('Process bale', 'Procesar paca')}
                <Icon d={I.arrowR} className="w-4 h-4" />
              </button>
            </div>
          </div>
        ) : (
          <div className="rounded-xl bg-white border border-neutral-10 overflow-hidden">
            <div className="px-5 py-4 flex items-center justify-between border-b border-neutral-10 gap-3">
              <div className="flex items-center gap-3 min-w-0">
                <div className="w-9 h-9 rounded-lg bg-safi-100 flex items-center justify-center shrink-0">
                  <Icon d={I.box} className="w-5 h-5 text-safi-700" />
                </div>
                <div className="min-w-0">
                  <div className="font-semibold text-neutral-100 text-base">
                    {tEN('Buffer', 'Búfer')}
                  </div>
                  <div className="text-[13px] text-neutral-60">
                    {`${fmtNum(bufferBales)} ${tEN('bales', 'pacas')} · ${fmtKg(bufferWeight)} · ${buffer.length} ${buffer.length === 1 ? tEN('item', 'elemento') : tEN('items', 'elementos')}`}
                  </div>
                </div>
              </div>
              <div className="flex items-center gap-2 shrink-0 flex-wrap justify-end">
                <button
                  onClick={() => setModal({ type: 'reject', source: 'buffer', bufferItems: buffer })}
                  className="inline-flex items-center gap-2 px-4 py-2.5 rounded-lg border border-red-300 text-red-700 text-[13px] font-medium hover:bg-red-50 min-h-[44px]"
                >
                  <Icon d={I.trash} className="w-4 h-4" />
                  {tEN('Reject bale', 'Rechazar paca')}
                </button>
                <button
                  onClick={() => setModal({ type: 'process', source: 'buffer', bufferItems: buffer })}
                  className="inline-flex items-center gap-2 px-4 py-2.5 rounded-lg bg-safi-600 text-white text-[13px] font-medium hover:bg-safi-700 min-h-[44px]"
                >
                  {tEN('Process bale', 'Procesar paca')}
                  <Icon d={I.arrowR} className="w-4 h-4" />
                </button>
              </div>
            </div>
            <ul className="divide-y divide-neutral-10">
              {buffer.map(item => (
                <li key={item.uid} className="px-5 py-3 flex items-center gap-3 hover:bg-neutral-5">
                  <div className="flex-1 min-w-0">
                    <div className="text-[13px] text-neutral-100">
                      <span className="font-semibold">{item.bales} {tEN('bales', 'pacas')}</span>
                      <span className="text-neutral-60"> · {fmtKg(Math.round(item.bales * item.weightPerBale))} · </span>
                      <span className="text-neutral-60">{tEN('from', 'desde')} </span>
                      <span className="font-medium">{tEN(`Zone ${item.sourceZoneId} · Bay ${item.sourceBayId}`, `Zona ${item.sourceZoneId} · Fila ${item.sourceBayId}`)}</span>
                    </div>
                    <div className="text-[13px] text-neutral-60 mt-0.5">
                      {item.supplier} · <span className="font-mono">#{item.lot}</span>
                    </div>
                  </div>
                  <button
                    onClick={() => returnFromBuffer(item.uid)}
                    className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-neutral-10 text-neutral-80 text-[13px] font-medium hover:bg-white"
                    title={tEN('Return to source bay', 'Devolver a la fila origen')}
                  >
                    <Icon d={I.arrowL} className="w-4 h-4" />
                    {tEN('Return to bay', 'Devolver a fila')}
                  </button>
                </li>
              ))}
            </ul>
          </div>
        ))}

        {/* Filter row — R57b: Production line toggle (MUI ToggleButtonGroup
            pattern) sits LEFT of all filters. Always visible (both bale-based
            and load-based modes). The chosen line drives which zones are shown
            and what gets stamped on each process toast. */}
        <div className="flex flex-wrap items-center gap-3">
          <div>
            <div className="text-[11px] uppercase tracking-wider text-neutral-60 font-bold leading-none mb-1.5">
              {tEN('Production line', 'Línea de producción')}
            </div>
            {/* Joined segmented control — borders shared, active button tinted
                with safi primary (the MUI default outlined-toggle treatment). */}
            <div className="inline-flex" role="group" aria-label={tEN('Production line', 'Línea de producción')}>
              {PRODUCTION_LINES.map((line, i) => {
                const isActive = activeLine === line;
                const isFirst = i === 0;
                const isLast  = i === PRODUCTION_LINES.length - 1;
                return (
                  <button
                    key={line}
                    type="button"
                    onClick={() => setActiveLine(line)}
                    aria-pressed={isActive}
                    aria-label={
                      isActive
                        ? tEN(`${line} selected`, `${line} seleccionada`)
                        : tEN(`Switch to ${line}`, `Cambiar a ${line}`)
                    }
                    className={[
                      'px-5 py-2 text-[14px] font-bold uppercase tracking-wide border transition min-h-[44px] min-w-[100px]',
                      isActive
                        ? 'bg-safi-50 text-safi-700 border-safi-600 relative z-10'
                        : 'bg-white text-neutral-60 hover:bg-neutral-5 border-neutral-20',
                      isFirst ? 'rounded-l-md' : '-ml-px',
                      isLast  ? 'rounded-r-md' : '',
                    ].join(' ')}
                  >
                    {line}
                  </button>
                );
              })}
            </div>
          </div>
          {/* R57: Shift dropdown — only shown when this line has more than one
              picking list (e.g. multiple shifts). Sits next to the line switch
              so the FO can drill into a specific shift if needed. */}
          {linePickingLists.length > 1 && (
            <div className="bg-white border border-neutral-10 rounded-lg px-3 py-2 min-h-[60px] flex items-center gap-2 min-w-[180px]">
              <Icon d={I.list} className="w-4 h-4 text-neutral-60 shrink-0" />
              <div className="flex-1 min-w-0">
                <div className="text-[11px] uppercase tracking-wider text-neutral-60 font-semibold leading-none">
                  {tEN('Picking list / shift', 'Turno / lista')}
                </div>
                <select
                  value={pickingListId || ''}
                  onChange={e => setPickingListId(e.target.value)}
                  className="text-[15px] font-medium text-neutral-100 bg-transparent border-0 focus:outline-none focus:ring-0 cursor-pointer pr-1 mt-1 w-full"
                >
                  {linePickingLists.map(pl => (
                    <option key={pl.id} value={pl.id}>
                      {pl.shift} ({pl.loads.filter(l => !processed[l.loadId]).length})
                    </option>
                  ))}
                </select>
              </div>
            </div>
          )}
          <PickerFilterDropdown
            label={tEN('Bays', 'Filas')}
            value={bayFilter}
            onChange={setBayFilter}
            options={bayOptions}
            placeholder={tEN('All bays', 'Todas las filas')}
            lang={lang}
          />
          <PickerFilterDropdown
            label={tEN('Material', 'Material')}
            value={materialFilter}
            onChange={setMaterialFilter}
            options={materialOptions}
            placeholder={tEN('All materials', 'Todos los materiales')}
            lang={lang}
          />
          {pickingList && (
            <button
              onClick={() => setPickingListOnly(v => !v)}
              className={
                'inline-flex items-center gap-2 px-4 py-3 rounded-lg border min-h-[52px] text-[15px] font-medium ' +
                (pickingListOnly
                  ? 'border-safi-600 bg-safi-50 text-safi-700'
                  : 'border-neutral-10 bg-white text-neutral-80 hover:bg-neutral-5')
              }
              aria-pressed={pickingListOnly}
            >
              <Icon d={pickingListOnly ? I.check : I.list} className="w-5 h-5" />
              {pickingListOnly
                ? tEN('Showing picking list only', 'Mostrando solo lista')
                : tEN('Show picking list only', 'Mostrar solo lista')}
            </button>
          )}
          {/* R35: Print picking list - opens a printable view in a new window.
              Visible whenever the active list has at least one load. */}
          {pickingList && pickingList.loads.length > 0 && (
            <button
              onClick={() => printPickingList(pickingList)}
              className="inline-flex items-center gap-2 px-4 py-3 rounded-lg border border-neutral-10 bg-white text-neutral-80 text-[15px] font-medium hover:bg-neutral-5 min-h-[52px]"
            >
              <Icon d={I.print} className="w-5 h-5" />
              {tEN('Print list', 'Imprimir lista')}
            </button>
          )}
          {anyFilterActive && (
            <button
              onClick={clearAllFilters}
              className="inline-flex items-center px-4 py-3 rounded-lg text-safi-700 text-[15px] font-medium hover:underline min-h-[52px]"
            >
              {tEN('Clear filters', 'Borrar filtros')}
            </button>
          )}
        </div>

        {/* R58: hidden-zones caption. Keeps NN/g #1 (visibility of system status)
            satisfied: the FO sees, in plain text, that some zones aren't shown
            because they belong to a different line. */}
        {lineHiddenZoneCount > 0 && (
          <div className="text-[12px] text-neutral-60 -mt-1.5 flex items-center gap-1.5">
            <Icon d={I.info} className="w-3.5 h-3.5 text-neutral-40" />
            {tEN(
              `${lineHiddenZoneCount} ${lineHiddenZoneCount === 1 ? 'zone' : 'zones'} hidden — only showing zones that feed ${activeLine}.`,
              `${lineHiddenZoneCount} ${lineHiddenZoneCount === 1 ? 'zona oculta' : 'zonas ocultas'} — solo se muestran zonas que alimentan ${activeLine}.`
            )}
          </div>
        )}

        {/* Zones / bays */}
        <div className="space-y-3">
          {visibleZones.length === 0 && (
            <div className="rounded-xl bg-white border border-neutral-10 px-5 py-10 text-center">
              <div className="text-[15px] font-medium text-neutral-100">
                {tEN('No bays match the current filters.', 'Ninguna fila coincide con los filtros actuales.')}
              </div>
              <button onClick={clearAllFilters} className="mt-2 text-[15px] text-safi-700 font-medium hover:underline">
                {tEN('Clear filters', 'Borrar filtros')}
              </button>
            </div>
          )}
          {visibleZones.map(({ zone, bays: filteredBays }) => {
            const open = !!openZones[zone.id];
            const accessibleBays = zone.bays.filter(b => b.accessible);
            const zoneBales = accessibleBays.reduce((a, b) => a + bayRemaining(zone, b).bales, 0);
            const zoneLoads = accessibleBays.reduce((a, b) => a + b.loads.length, 0);
            return (
              <div key={zone.id} className="bg-white border border-neutral-10 rounded-xl">
                {/* Sticky zone header - stays at top of viewport while scrolling so FOs always know which zone they're in */}
                <button
                  onClick={() => setOpenZones(s => ({ ...s, [zone.id]: !s[zone.id] }))}
                  className="w-full flex items-center justify-between px-5 py-4 hover:bg-neutral-5 rounded-t-xl bg-white sticky top-0 z-20 border-b border-neutral-10"
                  aria-expanded={open}
                >
                  <div className="flex items-center gap-3">
                    <Icon d={open ? I.chevron : I.chevronR} className="w-4 h-4 text-neutral-60" />
                    <div className="text-left">
                      <div className="flex items-center gap-2 flex-wrap">
                        <span className="font-semibold text-neutral-100">{tEN(`Zone ${zone.id}`, `Zona ${zone.id}`)}</span>
                        {/* R25: Zone-level inventory rule chip removed from Picker. The rule still drives accessibility but is no longer surfaced here. */}
                      </div>
                      <div className="text-[13px] text-neutral-60 mt-0.5">
                        {tEN(`${accessibleBays.length} bays · ${fmtNum(zoneLoads)} loads · ${fmtNum(zoneBales)} bales accessible`,
                             `${accessibleBays.length} filas · ${fmtNum(zoneLoads)} lotes · ${fmtNum(zoneBales)} pacas accesibles`)}
                      </div>
                    </div>
                  </div>
                </button>

                {open && (
                  <div className="border-t border-neutral-10 px-5 py-4 space-y-3">
                    {/* LIFO pick-recommendation strip - explains the model + counts open picking points */}
                    {zone.inventoryRule === 'LIFO' && (() => {
                      const openBays = filteredBays.filter(b => b.accessible && b.loads.length > 0);
                      if (openBays.length === 0) return null;
                      const pickPoints = openBays.length;
                      const sampleBales = openBays.reduce((min, b) => {
                        const front = b.loads[0];
                        return Math.min(min, front?.bales || 0);
                      }, Infinity);
                      return (
                        <div className="rounded-lg bg-safi-50 border border-safi-200 px-3 py-2.5 flex items-start gap-2 text-[13px]">
                          <Icon d={I.info} className="w-4 h-4 mt-0.5 shrink-0 text-safi-700" />
                          <div className="text-neutral-80">
                            <span className="font-semibold text-neutral-100">
                              {tEN(`${pickPoints} picking ${pickPoints === 1 ? 'point' : 'points'} ready`, `${pickPoints} ${pickPoints === 1 ? 'punto de recogida listo' : 'puntos de recogida listos'}`)}
                            </span>{' '}
                            {tEN(
                              `Last-in-first-out. Pick from the top load of any bay below - any of ${pickPoints} options is ready to go.`,
                              `Último en entrar, primero en salir. Recoge del lote superior de cualquier fila - cualquiera de las ${pickPoints} opciones está lista.`
                            )}
                          </div>
                        </div>
                      );
                    })()}
                    {filteredBays.filter(b => b.loads.length > 0).map(bay => {
                      const rem = bayRemaining(zone, bay);
                      const isRecommended = bay.loads.some(l => recommendedLoads.has(l.id));
                      const splits = splitForBay(bay);
                      return (
                        <div
                          key={bay.id}
                          id={`merged-bay-${zone.id}-${bay.id}`}
                          className={
                            'rounded-lg border ' +
                            (isRecommended ? 'border-safi-300 bg-safi-50/30' : (bay.accessible ? 'border-neutral-10' : 'border-neutral-10 bg-neutral-5'))
                          }
                        >
                          {/* Bay header - identity + status chips ONLY. Actions live on each load row below. */}
                          <div className="px-4 py-3 sm:px-5 sm:py-4 flex flex-wrap items-center gap-x-4 gap-y-2">
                            <div className="min-w-0 flex-1">
                              <div className="flex items-center gap-2 flex-wrap">
                                <span className="font-semibold text-neutral-100 text-base whitespace-nowrap">{tEN(`Bay ${bay.id}`, `Fila ${bay.id}`)}</span>
                                {/* R25: LIFO chip removed from picker bay headers. Inventory rule still drives behaviour but is no longer surfaced as a chip here. */}
                                <span className="inline-flex items-center px-2 py-0.5 rounded-full bg-safi-50 text-safi-700 text-[13px] font-medium whitespace-nowrap">
                                  {fmtNum(rem.bales)} {tEN('bales', 'pacas')}
                                </span>
                                {!bay.accessible && (
                                  <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-neutral-10 text-neutral-80 text-[13px] font-medium whitespace-nowrap">
                                    <Icon d={I.lock} className="w-3.5 h-3.5" />
                                    {tEN(`Blocked by Bay ${bay.blockedBy}`, `Bloqueada por Fila ${bay.blockedBy}`)}
                                  </span>
                                )}
                              </div>
                              {bay.accessible && bay.loads.length > 0 && (
                                <div className="text-[13px] text-neutral-60 mt-1">
                                  {tEN(`${rem.loads} ${rem.loads === 1 ? 'load' : 'loads'} · ${fmtKg(rem.weight)} total`,
                                       `${rem.loads} ${rem.loads === 1 ? 'lote' : 'lotes'} · ${fmtKg(rem.weight)} total`)}
                                </div>
                              )}
                            </div>
                          </div>

                          {/* Per-load detail panel - accessible loads visible, blocked under expander */}
                          {bay.accessible && bay.loads.length > 0 && (() => {
                            const bayKey = `${zone.id}:${bay.id}`;
                            const expanded = expandedBlocked.has(bayKey);
                            // Loads with accessibility info, in pick order
                            const annotated = bay.loads.map(load => ({
                              load,
                              access: accessibilityOf(zone, bay, load, recommendedLoads)
                            }));
                            const accessibleRows = annotated.filter(a => a.access.status === 'accessible');
                            const blockedRows = annotated.filter(a => a.access.status !== 'accessible');
                            const visibleRows = expanded ? annotated : accessibleRows;

                            const renderRow = ({ load, access }) => {
                              const onList = recommendedLoads.has(load.id);
                              // R34: when the SL sent a partial pick (e.g. 5 of 25 bales) the FO should
                              // process only that portion, not the full load. Clamp to accessibleBales
                              // because the bay's inventory rule may further restrict reachable bales.
                              const scheduledBales = scheduledBalesByLoad[load.id];
                              const actBales = onList && scheduledBales != null
                                ? Math.min(scheduledBales, access.accessibleBales)
                                : access.accessibleBales;
                              const partialPick = onList && scheduledBales != null && scheduledBales < load.bales;
                              const canAct = access.status === 'accessible' && actBales > 0;
                              const bgCls = canAct ? 'bg-white' : 'bg-neutral-5/60';
                              return (
                                <li key={load.id} className={'px-3 sm:px-4 py-3 flex flex-wrap items-center gap-x-3 gap-y-2 ' + bgCls}>
                                  <div className="flex-1 min-w-0">
                                    <div className="flex items-center gap-2 flex-wrap">
                                      <span className="text-[13px] font-medium text-neutral-100">{load.supplier}</span>
                                      <span className="text-[13px] text-neutral-60">{tEN('Order ref', 'Lote')} <span className="font-mono">#{load.lot}</span></span>
                                      {onList && (
                                        <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-safi-100 text-safi-700 text-[13px] font-medium whitespace-nowrap">
                                          <Icon d={I.list} className="w-3.5 h-3.5" />
                                          {partialPick
                                            ? tEN(`On picking list (${scheduledBales}/${load.bales} bales)`, `En lista (${scheduledBales}/${load.bales} pacas)`)
                                            : tEN('On picking list', 'En lista de recolección')}
                                        </span>
                                      )}
                                      {/* R25: "Accessible (N bales)" chip removed. Accessibility is now implicit -
                                          a load row sits in the accessible list because it's actionable. Split-load loads
                                          (where access.accessibleBales < load.bales) still flag this in the Process modal. */}
                                      {access.status === 'blocked' && (
                                        <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-neutral-10 text-neutral-80 text-[13px] font-medium whitespace-nowrap">
                                          <Icon d={I.lock} className="w-3.5 h-3.5" />
                                          {tEN(`Blocked by #${access.blockedBy?.lot}`, `Bloqueada por #${access.blockedBy?.lot}`)}
                                        </span>
                                      )}
                                      {access.status === 'blocked-clearable-via-list' && (
                                        <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-amber-50 text-amber-800 text-[13px] font-medium whitespace-nowrap">
                                          <Icon d={I.info} className="w-3.5 h-3.5" />
                                          {tEN('Unblocks after list', 'Se desbloquea con lista')}
                                        </span>
                                      )}
                                    </div>
                                    <div className="text-[13px] text-neutral-60 mt-0.5">
                                      {fmtNum(load.bales)} {tEN('bales', 'pacas')} · {fmtKg(load.weight)}
                                    </div>
                                  </div>
                                  <div className="flex gap-1.5 flex-wrap shrink-0 w-full sm:w-auto">
                                    <button
                                      disabled={!canAct}
                                      onClick={() => setModal({ type: 'reject', source: 'load', zone, bay, load, accessibleBales: actBales })}
                                      className={
                                        'inline-flex items-center gap-1.5 px-3 py-2 rounded-lg border text-[13px] font-medium min-h-[40px] whitespace-nowrap ' +
                                        (canAct
                                          ? 'border-red-300 text-red-700 hover:bg-red-50'
                                          : 'border-neutral-10 text-neutral-40 cursor-not-allowed')
                                      }
                                    >
                                      <Icon d={I.trash} className="w-4 h-4" />
                                      {tEN('Reject', 'Rechazar')}
                                    </button>
                                    {bufferVisible && (
                                      <button
                                        disabled={!canAct}
                                        onClick={() => setModal({ type: 'move', source: 'load', zone, bay, load, accessibleBales: actBales })}
                                        className={
                                          'inline-flex items-center gap-1.5 px-3 py-2 rounded-lg border text-[13px] font-medium min-h-[40px] whitespace-nowrap ' +
                                          (canAct
                                            ? 'border-neutral-10 text-neutral-100 hover:bg-neutral-5'
                                            : 'border-neutral-10 text-neutral-40 cursor-not-allowed')
                                        }
                                      >
                                        <Icon d={I.arrowR} className="w-4 h-4" />
                                        {tEN('Buffer', 'Búfer')}
                                      </button>
                                    )}
                                    {/* R34: Remove-from-picking-list - only available when load is on the list. */}
                                    {onList && (
                                      <button
                                        onClick={() => setModal({ type: 'remove-from-list', source: 'load', zone, bay, load })}
                                        className="inline-flex items-center gap-1.5 px-3 py-2 rounded-lg border border-neutral-10 text-neutral-100 text-[13px] font-medium min-h-[40px] whitespace-nowrap hover:bg-neutral-5"
                                      >
                                        <Icon d={I.close} className="w-4 h-4" />
                                        {tEN('Remove from list', 'Quitar de la lista')}
                                      </button>
                                    )}
                                    <button
                                      disabled={!canAct}
                                      onClick={() => setModal({ type: 'process', source: 'load', zone, bay, load, accessibleBales: actBales })}
                                      className={
                                        'inline-flex items-center gap-1.5 px-3 py-2 rounded-lg text-[13px] font-medium min-h-[40px] whitespace-nowrap ' +
                                        (canAct
                                          ? 'bg-safi-600 text-white hover:bg-safi-700'
                                          : 'bg-neutral-10 text-neutral-40 cursor-not-allowed')
                                      }
                                    >
                                      {tEN('Process', 'Procesar')}
                                      <Icon d={I.arrowR} className="w-4 h-4" />
                                    </button>
                                  </div>
                                </li>
                              );
                            };

                            return (
                              <div className="px-4 sm:px-5 pb-3 pt-1 -mt-1">
                                <ul className="rounded-lg border border-neutral-10 bg-white divide-y divide-neutral-10 overflow-hidden">
                                  {visibleRows.map(renderRow)}
                                  {blockedRows.length > 0 && (
                                    <li className="px-3 sm:px-4">
                                      <button
                                        onClick={() => toggleBlockedExpander(bayKey)}
                                        className="w-full py-2.5 text-[13px] font-medium text-safi-700 hover:underline flex items-center justify-center gap-1.5 min-h-[40px]"
                                        aria-expanded={expanded}
                                      >
                                        <Icon d={expanded ? I.chevron : I.chevronR} className="w-4 h-4" />
                                        {expanded
                                          ? tEN(`Hide ${blockedRows.length} blocked ${blockedRows.length === 1 ? 'load' : 'loads'}`,
                                                `Ocultar ${blockedRows.length} ${blockedRows.length === 1 ? 'lote bloqueado' : 'lotes bloqueados'}`)
                                          : tEN(`Show ${blockedRows.length} more ${blockedRows.length === 1 ? 'load' : 'loads'}`,
                                                `Mostrar ${blockedRows.length} ${blockedRows.length === 1 ? 'lote más' : 'lotes más'}`)}
                                      </button>
                                    </li>
                                  )}
                                </ul>
                              </div>
                            );
                          })()}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* Modals */}
        {modal?.type === 'move' && modal.source === 'load' && (
          <MoveToBufferModal
            zone={modal.zone}
            bay={modal.bay}
            load={modal.load}
            remaining={{
              bales: modal.accessibleBales,
              weight: Math.round(modal.accessibleBales * (modal.load.weight / modal.load.bales)),
              loads: 1
            }}
            avgWeight={modal.load.weight / modal.load.bales}
            splits={SPLIT_LOAD_DEMO[modal.load.lot] ? [{ load: modal.load, locations: SPLIT_LOAD_DEMO[modal.load.lot] }] : []}
            lang={lang}
            onCancel={() => setModal(null)}
            onConfirm={({ bales }) => {
              const weightPerBale = modal.load.weight / modal.load.bales;
              const uid = `${modal.zone.id}:${modal.bay.id}:${modal.load.id}:${Date.now()}`;
              setBuffer(prev => [...prev, {
                uid,
                loadId: modal.load.id,
                supplier: modal.load.supplier,
                lot: modal.load.lot,
                material: modal.load.material,
                bales,
                weightPerBale,
                sourceZoneId: modal.zone.id,
                sourceBayId: modal.bay.id
              }]);
              setModal(null);
              setToast?.({
                message: tEN(`${bales} bales moved to buffer (#${modal.load.lot})`, `${bales} pacas movidas al búfer (#${modal.load.lot})`),
                kind: 'success'
              });
            }}
          />
        )}

        {modal?.type === 'process' && (
          <ProcessMaterialModal
            source={modal.source}
            zone={modal.zone}
            bay={modal.bay}
            load={modal.load}
            bufferItems={modal.bufferItems}
            remaining={modal.source === 'load' ? {
              bales: modal.accessibleBales,
              weight: Math.round(modal.accessibleBales * (modal.load.weight / modal.load.bales)),
              loads: 1
            } : null}
            avgWeight={modal.source === 'load'
              ? (modal.load.weight / modal.load.bales)
              : (modal.bufferItems?.reduce((a, b) => a + b.weightPerBale * b.bales, 0) / Math.max(1, modal.bufferItems?.reduce((a, b) => a + b.bales, 0)))}
            splits={modal.source === 'load' && SPLIT_LOAD_DEMO[modal.load.lot]
              ? [{ load: modal.load, locations: SPLIT_LOAD_DEMO[modal.load.lot] }] : []}
            lang={lang}
            pickerMode={pickerMode}
            onPickingList={modal.source === 'load' && modal.load ? recommendedLoads.has(modal.load.id) : false}
            onCancel={() => setModal(null)}
            onConfirm={({ bales, weight }) => {
              if (modal.source === 'buffer') {
                setBuffer(prev => {
                  let toTake = bales;
                  return prev.map(it => {
                    if (toTake <= 0) return it;
                    const take = Math.min(it.bales, toTake);
                    toTake -= take;
                    return { ...it, bales: it.bales - take };
                  }).filter(it => it.bales > 0);
                });
                const pid = `merged-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`;
                setProcessed(prev => ({
                  ...prev,
                  [pid]: { bales, weight, at: new Date().toISOString(), partial: true, source: 'Buffer' }
                }));
                setModal(null);
                setToast?.({ message: tEN(`Processed ${bales} bales (${fmtKg(weight)})`, `Procesadas ${bales} pacas (${fmtKg(weight)})`), kind: 'success' });
              } else {
                // Load source - record processed entry tied to the specific load
                const pid = `merged-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`;
                setProcessed(prev => ({
                  ...prev,
                  [pid]: {
                    bales, weight, at: new Date().toISOString(), partial: true,
                    source: `${modal.zone.esName} · ${modal.bay.esName} · #${modal.load.lot}`,
                    loadId: modal.load.id
                  }
                }));
                setModal(null);
                setToast?.({
                  message: tEN(`Processed ${bales} bales from #${modal.load.lot} (${fmtKg(weight)})`, `Procesadas ${bales} pacas de #${modal.load.lot} (${fmtKg(weight)})`),
                  kind: 'success'
                });
              }
            }}
          />
        )}

        {modal?.type === 'reject' && (
          <RejectMaterialModal
            source={modal.source}
            zone={modal.zone}
            bay={modal.bay}
            load={modal.load}
            remaining={modal.source === 'load'
              ? { bales: modal.accessibleBales, weight: Math.round(modal.accessibleBales * (modal.load.weight / modal.load.bales)), loads: 1 }
              : { bales: bufferBales, weight: bufferWeight, loads: 1 }}
            avgWeight={modal.source === 'load'
              ? (modal.load.weight / modal.load.bales)
              : (bufferBales === 0 ? 0 : bufferWeight / bufferBales)}
            lang={lang}
            pickerMode={pickerMode}
            onCancel={() => setModal(null)}
            onConfirm={({ bales, reason, weight }) => {
              setModal(null);
              setToast?.({
                message: tEN(`Rejected ${bales} bales (${reason})`, `Rechazadas ${bales} pacas (${reason})`),
                kind: 'success'
              });
              if (modal.source === 'buffer') {
                setBuffer(prev => {
                  let toTake = bales;
                  return prev.map(it => {
                    if (toTake <= 0) return it;
                    const take = Math.min(it.bales, toTake);
                    toTake -= take;
                    return { ...it, bales: it.bales - take };
                  }).filter(it => it.bales > 0);
                });
              }
            }}
          />
        )}

        {modal?.type === 'remove-from-list' && (
          <RemoveFromListModal
            zone={modal.zone}
            bay={modal.bay}
            load={modal.load}
            lang={lang}
            onCancel={() => setModal(null)}
            onConfirm={({ reason }) => {
              setModal(null);
              setToast?.({
                message: tEN(
                  `Removed #${modal.load.lot} from the picking list (${reason}).`,
                  `Quitada #${modal.load.lot} de la lista (${reason}).`),
                kind: 'success'
              });
              // NOTE prototype: in production this would call an API to remove
              // the load from the picking list. State here is owned by the page.
            }}
          />
        )}
      </div>
    );
  }

  // Reusable numeric stepper with +1/+2/+3/+10 quick-add chips

            min={0}

    return (
      <div className="rounded-md bg-amber-50 border border-amber-200 px-3 py-2.5 text-[13px] text-amber-900 flex items-start gap-2">

        <div>
          <div className="font-semibold mb-0.5">

          </div>

            <div key={load.id}>

                <span key={i}>

                    <span> ({tEN('blocked by Bay', 'bloqueada por Fila')} {loc.blockedBy} - {tEN('not accessible', 'no accesible')})</span>

  // -------------------------------------------------------------------------
  // FieldsetInput - notched-fieldset input. The label rides on top of the
  // border (white bg punches through the stroke). Used by all picker modals.
  // -------------------------------------------------------------------------
  function FieldsetInput({ label, suffix, value, onChange, type = 'number', placeholder, min = 0, step = '1', max, required = false, focused = false, readOnly = false, children }) {
    const borderCls = focused ? 'border-safi-600 ring-2 ring-safi-600/30' : 'border-neutral-10';
    const labelCls = focused ? 'text-safi-700' : 'text-neutral-60';
    return (
      <div className={'relative bg-white border rounded-md ' + borderCls}>
        <div className={'absolute -top-2 left-3 bg-white px-1.5 flex items-center text-[13px] font-medium leading-none ' + labelCls}>
          {label}{required && <span className="ml-0.5">*</span>}
        </div>
        {children ? (
          children
        ) : (
          <input
            type={type}
            min={min}
            max={max}
            step={step}
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            readOnly={readOnly}
            className={'w-full h-14 px-4 pr-12 bg-transparent text-2xl font-medium text-neutral-100 focus:outline-none ' + (readOnly ? 'cursor-default' : '')}
          />
        )}
        {suffix && (
          <div className="absolute right-3 top-1/2 -translate-y-1/2 text-[13px] text-neutral-60 pointer-events-none">
            {suffix}
          </div>
        )}
      </div>
    );
  }

            <div className="flex-1 min-w-[160px]">

                 `Hasta ${remaining.bales} pacas disponibles · ~${fmtKg(estimatedWeight)} a ${Math.round(avgWeight)} kg/paca`)}

            <SplitLoadBanner splits={splits} lang={lang} />

  // -------------------------------------------------------------------------
  // R25: ProcessMaterialModal - branches on pickerMode.
  //
  // load-based: FO picks N bales (default = all accessible bales). Layout per
  //   screenshot 1 - [-] [Number of bales input] [+], helper text, and the
  //   weight field is gone (system already knows the per-bale weight). Shows
  //   split-load indicator + "on picking list" chip when relevant.
  //
  // bale-based: implicit 1 bale at a time. Single notched "Processed weight"
  //   input is REQUIRED. Per screenshot 3. Buffer-sourced processing uses the
  //   same flow (1 bale at a time, weight required).
  // -------------------------------------------------------------------------
  function ProcessMaterialModal({ source, zone, bay, load, bufferItems, remaining, avgWeight, splits, lang, pickerMode = 'load', onPickingList = false, onCancel, onConfirm }) {
    const tEN = (en, es) => lang === 'es' ? es : en;
    const isBale = pickerMode === 'bale';
    const max = source === 'buffer'
      ? bufferItems.reduce((a, b) => a + b.bales, 0)
      : remaining.bales;
    const accessibleWeight = source === 'buffer'
      ? bufferItems.reduce((a, b) => a + Math.round(b.bales * b.weightPerBale), 0)
      : remaining.weight;

    // Load-based: bale count selector, default = all accessible bales.
    const [bales, setBales] = useState(isBale ? 1 : Math.max(1, max));
    const clamp = (n) => Math.max(0, Math.min(max, n));
    // Bale-based: required processed weight input.
    const [processedWeight, setProcessedWeight] = useState('');
    const pwNum = Number(processedWeight) || 0;

    const titleEN = source === 'buffer'
      ? 'Process bales from buffer'
      : `Process bales from Bay ${bay?.id}`;
    const titleES = source === 'buffer'
      ? 'Procesar pacas del búfer'
      : `Procesar pacas de Fila ${bay?.id}`;

    const isSplit = splits && splits.length > 0;
    const loadTotalWeight = load?.weight;
    const loadTotalBales = load?.bales;

    const canSubmit = isBale ? pwNum > 0 : (bales > 0);

    return (
      <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4" onClick={onCancel}>
        <div className="bg-white rounded-xl shadow-xl w-full max-w-xl p-6" onClick={e => e.stopPropagation()}>
          <h3 className="font-bold text-lg text-neutral-100">{tEN(titleEN, titleES)}</h3>

          {/* Context strip - load total weight + on-picking-list indicator (load-based, bay source only) */}
          {!isBale && load && (
            <div className="mt-1 flex items-center gap-2 flex-wrap text-[13px] text-neutral-60">
              <span>
                {tEN(`Load #${load.lot} · ${fmtNum(loadTotalBales)} bales total · ${fmtKg(loadTotalWeight)}`,
                     `Lote #${load.lot} · ${fmtNum(loadTotalBales)} pacas totales · ${fmtKg(loadTotalWeight)}`)}
              </span>
              {onPickingList && (
                <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-safi-100 text-safi-700 text-[13px] font-medium">
                  <Icon d={I.list} className="w-3.5 h-3.5" />
                  {tEN('On picking list', 'En lista de recolección')}
                </span>
              )}
              {isSplit && (
                <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-amber-50 text-amber-900 text-[13px] font-medium">
                  <Icon d={I.info} className="w-3.5 h-3.5" />
                  {tEN(`${max} of ${loadTotalBales} bales here`, `${max} de ${loadTotalBales} pacas aquí`)}
                </span>
              )}
            </div>
          )}

          {/* Load-based: bale count picker [-] [input] [+] */}
          {!isBale && (
            <>
              <div className="mt-5 flex items-stretch gap-3">
                <button
                  type="button"
                  onClick={() => setBales(clamp(bales - 1))}
                  className="w-20 h-20 rounded-lg border border-neutral-10 text-3xl font-semibold text-neutral-100 hover:bg-neutral-5"
                  aria-label="Decrease"
                >−</button>
                <div className="flex-1 min-w-[160px]">
                  <FieldsetInput
                    label={tEN('Number of bales', 'Número de pacas')}
                    required
                    focused
                  >
                    <input
                      type="number"
                      min={0}
                      max={max}
                      value={bales}
                      onChange={e => setBales(clamp(Number(e.target.value) || 0))}
                      className="w-full h-20 px-4 bg-transparent text-3xl font-medium text-neutral-100 text-center focus:outline-none"
                    />
                  </FieldsetInput>
                </div>
                <button
                  type="button"
                  onClick={() => setBales(clamp(bales + 1))}
                  className="w-20 h-20 rounded-lg border border-neutral-10 text-3xl font-semibold text-neutral-100 hover:bg-neutral-5"
                  aria-label="Increase"
                >+</button>
              </div>
              <p className="text-[13px] text-neutral-60 text-center mt-2">
                {tEN(`Pick up to ${max} bales from the top batch.`,
                     `Recoge hasta ${max} pacas del lote superior.`)}
              </p>
              <div className="mt-4">
                <SplitLoadBanner splits={splits} lang={lang} />
              </div>
            </>
          )}

          {/* Bale-based: required processed weight input */}
          {isBale && (
            <>
              <p className="text-[13px] text-neutral-60 mt-1">
                {source === 'buffer'
                  ? tEN(`From buffer · 1 bale at a time`, `Desde búfer · 1 paca a la vez`)
                  : tEN(`From Zone ${zone?.id} · Bay ${bay?.id} · 1 bale at a time`,
                        `Desde Zona ${zone?.id} · Fila ${bay?.id} · 1 paca a la vez`)}
              </p>
              <div className="mt-5">
                <FieldsetInput
                  label={tEN('Processed weight', 'Peso procesado')}
                  suffix="kg"
                  value={processedWeight}
                  onChange={e => setProcessedWeight(e.target.value)}
                  type="number"
                  step="0.1"
                  min={0}
                  required
                  focused
                />
              </div>
            </>
          )}

          <div className="mt-6 flex gap-2 justify-end">
            <button onClick={onCancel} className="px-4 py-2.5 rounded-lg border border-neutral-10 text-[13px] font-medium hover:bg-neutral-5 min-h-[44px]">
              {tEN('Cancel', 'Cancelar')}
            </button>
            <button
              disabled={!canSubmit}
              onClick={() => {
                if (isBale) {
                  onConfirm({ bales: 1, weight: pwNum });
                } else {
                  const weight = Math.round(bales * avgWeight);
                  onConfirm({ bales, weight });
                }
              }}
              className={
                'px-4 py-2.5 rounded-lg text-[13px] font-medium min-h-[44px] ' +
                (!canSubmit
                  ? 'bg-neutral-10 text-neutral-40 cursor-not-allowed'
                  : 'bg-safi-600 text-white hover:bg-safi-700')
              }
            >
              {tEN('Process bales', 'Procesar pacas')}
            </button>
          </div>
        </div>
      </div>
    );
  }

  // -------------------------------------------------------------------------
  // R25: RejectMaterialModal - branches on pickerMode.
  //
  // load-based: FO chooses N bales (whole load or partial). Reason required.
  //   Weight is auto pro-rated (load.weight / load.bales) × bales — no input.
  //
  // bale-based: 1 bale only (max enforced). Reason required. Bale weight is
  //   REQUIRED (no longer optional, per R25 spec).
  // -------------------------------------------------------------------------
  function RejectMaterialModal({ source, zone, bay, load, remaining, avgWeight, lang, pickerMode = 'load', onCancel, onConfirm }) {
    const tEN = (en, es) => lang === 'es' ? es : en;
    const isBale = pickerMode === 'bale';
    const maxAccessible = remaining.bales;
    const max = isBale ? 1 : maxAccessible;
    // R28: defaults - load-based starts at the full load (max), bale-based starts at 0
    // and the FO must explicitly set it to 1 before they can reject.
    const [bales, setBales] = useState(isBale ? 0 : maxAccessible);
    const [reason, setReason] = useState('');
    const [bWeight, setBWeight] = useState('');
    const clamp = (n) => Math.max(0, Math.min(max, n));
    const reasons = lang === 'es'
      ? ['Contaminación', 'Material incorrecto', 'Daño por humedad', 'Otro']
      : ['Contamination', 'Wrong material', 'Moisture damage', 'Other'];

    const bWeightNum = Number(bWeight) || 0;
    const proRatedWeight = Math.round(bales * avgWeight);
    const finalWeight = isBale ? bWeightNum : proRatedWeight;

    // R28: title copy - "Reject material from Bay X" (was "bales") in both modes.
    const titleEN = source === 'buffer'
      ? 'Reject material from buffer'
      : `Reject material from Bay ${bay?.id}`;
    const titleES = source === 'buffer'
      ? 'Rechazar material del búfer'
      : `Rechazar material de Fila ${bay?.id}`;

    const canSubmit = bales > 0 && !!reason && (!isBale || bWeightNum > 0);

    return (
      <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4" onClick={onCancel}>
        <div className="bg-white rounded-xl shadow-xl w-full max-w-lg p-6" onClick={e => e.stopPropagation()}>
          <h3 className="font-bold text-lg text-neutral-100">{tEN(titleEN, titleES)}</h3>
          {load && (
            <p className="text-[13px] text-neutral-60 mt-1">
              {tEN(`Load #${load.lot} · ${fmtNum(load.bales)} bales total · ${fmtKg(load.weight)}`,
                   `Lote #${load.lot} · ${fmtNum(load.bales)} pacas totales · ${fmtKg(load.weight)}`)}
            </p>
          )}

          <div className="mt-5 space-y-4">
            {/* Number of bales - load-based gets a stepper, bale-based is read-only at 1 */}
            <div>
              <FieldsetInput
                label={tEN('Number of bales', 'Número de pacas')}
                required
                focused
              >
                <input
                  type="number"
                  min={0}
                  max={max}
                  value={bales}
                  onChange={e => setBales(clamp(Number(e.target.value) || 0))}
                  className="w-full h-14 px-4 bg-transparent text-2xl font-medium text-neutral-100 focus:outline-none"
                />
              </FieldsetInput>
              <p className="text-[13px] text-neutral-60 mt-1.5">
                {isBale
                  ? tEN('Max 1 (taken from the top batch).', 'Máximo 1 (tomada del lote superior).')
                  : tEN(`Max ${maxAccessible} (taken from the top batch).`,
                        `Máximo ${maxAccessible} (tomadas del lote superior).`)}
              </p>
            </div>

            <div>
              <FieldsetInput label={tEN('Reason', 'Motivo')} required focused={!!reason}>
                <select
                  value={reason}
                  onChange={e => setReason(e.target.value)}
                  className="w-full h-14 px-4 bg-transparent text-base text-neutral-100 focus:outline-none appearance-none"
                >
                  <option value="">{tEN('Select a reason…', 'Selecciona un motivo…')}</option>
                  {reasons.map(r => <option key={r} value={r}>{r}</option>)}
                </select>
              </FieldsetInput>
            </div>

            {isBale ? (
              <div>
                <FieldsetInput
                  label={tEN('Bale weight', 'Peso de la paca')}
                  suffix="kg"
                  required
                  value={bWeight}
                  onChange={e => setBWeight(e.target.value)}
                  type="number"
                  step="0.1"
                  min={0}
                  focused={bWeightNum > 0}
                />
              </div>
            ) : (
              <div className="text-[13px] text-neutral-60">
                {tEN(`Estimated weight: ${fmtKg(proRatedWeight)} (auto pro-rated from load total).`,
                     `Peso estimado: ${fmtKg(proRatedWeight)} (calculado automáticamente).`)}
              </div>
            )}
          </div>

          <div className="mt-6 flex gap-2 justify-end">
            <button onClick={onCancel} className="px-4 py-2.5 rounded-lg border border-neutral-10 text-[13px] font-medium hover:bg-neutral-5 min-h-[44px]">
              {tEN('Cancel', 'Cancelar')}
            </button>
            <button
              disabled={!canSubmit}
              onClick={() => onConfirm({ bales, reason, weight: finalWeight })}
              className={
                'px-4 py-2.5 rounded-lg text-[13px] font-medium min-h-[44px] ' +
                (!canSubmit
                  ? 'bg-neutral-10 text-neutral-40 cursor-not-allowed'
                  : 'bg-red-600 text-white hover:bg-red-700')
              }
            >
              {tEN('Reject', 'Rechazar')}
            </button>
          </div>
        </div>
      </div>
    );
  }

  // -------------------------------------------------------------------------
  // R34: RemoveFromListModal - SL/FO removes a load from the active picking
  // list with a reason. Reason dropdown is required. The actual list mutation
  // happens in the parent's onConfirm.

    const tEN = (en, es) => lang === 'es' ? es : en;
    const [reason, setReason] = useState('');
    const reasons = lang === 'es'
      ? ['Avería del montacargas - no se pudo recoger',
         'Fila inaccesible',
         'Material no necesario en este turno',
         'Sustituido por otro lote',
         'Otro']
      : ['Forklift breakdown - couldn\'t finish picking',
         'Bay inaccessible',
         'Material not needed this shift',
         'Replaced with another load',
         'Other'];
    const canSubmit = !!reason;
    return (
      <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4" onClick={onCancel}>
        <div className="bg-white rounded-xl shadow-xl w-full max-w-lg p-6" onClick={e => e.stopPropagation()}>
          <h3 className="font-bold text-lg text-neutral-100">
            {tEN('Remove from picking list', 'Quitar de la lista de recolección')}
          </h3>
          <p className="text-[13px] text-neutral-60 mt-1">
            {load && tEN(
              `Load #${load.lot} · ${load.supplier} · Bay ${bay?.id}`,
              `Lote #${load.lot} · ${load.supplier} · Fila ${bay?.id}`)}
          </p>
          <div className="mt-5">
            <FieldsetInput label={tEN('Reason', 'Motivo')} required focused={!!reason}>
              <select
                value={reason}
                onChange={e => setReason(e.target.value)}
                className="w-full h-14 px-4 bg-transparent text-base text-neutral-100 focus:outline-none appearance-none"
              >
                <option value="">{tEN('Select a reason…', 'Selecciona un motivo…')}</option>
                {reasons.map(r => <option key={r} value={r}>{r}</option>)}
              </select>
            </FieldsetInput>
            <p className="text-[13px] text-neutral-60 mt-2">
              {tEN('The load stays in the yard - it is just dropped from this picking list.',
                   'El lote permanece en el patio - solo se quita de esta lista de recolección.')}
            </p>
          </div>
          <div className="mt-6 flex gap-2 justify-end">
            <button onClick={onCancel} className="px-4 py-2.5 rounded-lg border border-neutral-10 text-[13px] font-medium hover:bg-neutral-5 min-h-[44px]">
              {tEN('Cancel', 'Cancelar')}
            </button>
            <button
              disabled={!canSubmit}
              onClick={() => onConfirm({ reason })}
              className={
                'px-4 py-2.5 rounded-lg text-[13px] font-medium min-h-[44px] ' +
                (!canSubmit
                  ? 'bg-neutral-10 text-neutral-40 cursor-not-allowed'
                  : 'bg-safi-600 text-white hover:bg-safi-700')
              }
            >
              {tEN('Remove from list', 'Quitar de la lista')}
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ----------------------------------------------------------------------------
  // MOUNT
  // ----------------------------------------------------------------------------
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<ProductionManagementPage />);
  </script>
</body>
</html>

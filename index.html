  function ShiftLeaderView({ layout = 'accordion', pickingList, setPickingList, setTab, setRole, slMode, setSlMode, windowActive, setWindowActive, setToast, processed = {} }) {
    const isCreating = slMode === 'create';
    const isSticky = layout === 'sticky';
    const isSpatial = layout === 'spatial';
    // Filter out fully processed loads — they live in History now.
    const visibleYard = useMemo(() => YARD.map(zone => ({
      ...zone,
      bays: zone.bays.map(bay => ({
        ...bay,
        loads: bay.loads.filter(l => !processed[l.id] || processed[l.id].partial)
      }))
    })), [processed]);

    // Zone & bay filter — when active, only show selected bays and force-expand their zones.
    const [bayFilter, setBayFilter] = useState(new Set());

    const filteredYard = useMemo(() => {
      if (bayFilter.size === 0) return visibleYard;
      return visibleYard.map(zone => ({
        ...zone,
        bays: zone.bays.filter(b => bayFilter.has(`${zone.id}|${b.id}`))
      })).filter(zone => zone.bays.length > 0);
    }, [visibleYard, bayFilter]);

    // Selection state — keyed by "zoneId|bayId|loadId", value = number of bales the SL wants picked.
    // Defaults to the full bale count when a load is ticked; can be lowered in the picking list card.
    const [selectionBales, setSelectionBales] = useState({}); // { [key]: bales }
    // Helper view that looks/feels like a Set membership check
    const selected = useMemo(() => new Set(Object.keys(selectionBales)), [selectionBales]);
    const setSelected = (updater) => {
      setSelectionBales(prev => {
        const prevSet = new Set(Object.keys(prev));
        const nextSet = typeof updater === 'function' ? updater(prevSet) : updater;
        const out = {};
        for (const key of nextSet) {
          out[key] = prev[key] != null ? prev[key] : findLoadByKey(key)?.bales ?? 0;
        }
        return out;
      });
    };
    const findLoadByKey = (key) => {
      const [zid, bid, lid] = key.split('|');
      const z = YARD.find(z => z.id === zid);
      const b = z?.bays.find(b => b.id === bid);
      return b?.loads.find(l => l.id === lid);
    };
    // Expansion state for progressive disclosure (accordion layout only)
    const [openZones, setOpenZones] = useState(() => ({ A: true })); // first zone open by default
    const [openBays, setOpenBays] = useState(() => ({ A1: true }));
    // Sticky layout: per-bay "Show all loads" expansion
    const [bayShowAll, setBayShowAll] = useState({});

    // Zones expand and collapse freely — including all closed at once.
    const toggleZone = (id) => {
      setOpenZones(prev => ({ ...prev, [id]: !prev[id] }));
    };

    const toggleLoad = (key, accessible) => {
      if (!isCreating || !accessible) return;
      setSelected(prev => {
        const next = new Set(prev);
        if (next.has(key)) next.delete(key); else next.add(key);
        return next;
      });
    };

    const selectedLoads = useMemo(() => {
      const result = [];
      for (const zone of YARD) {
        for (const bay of zone.bays) {
          for (const load of bay.loads) {
            const key = `${zone.id}|${bay.id}|${load.id}`;
            if (selectionBales[key] != null) {
              const bales = selectionBales[key];
              const ratio = load.bales > 0 ? bales / load.bales : 0;
              const weight = Math.round(load.weight * ratio);
              const partial = bales < load.bales;
              result.push({ key, zone, bay, load, bales, weight, partial });
            }
          }
        }
      }
      return result;
    }, [selectionBales]);

    const summary = useMemo(() => {
      const analysedLoads = selectedLoads.filter(x => x.load.results);
      const totalWeight = sum(selectedLoads, x => x.weight);
      const totalBales  = sum(selectedLoads, x => x.bales);
      const analysedWeight = sum(analysedLoads, x => x.weight);
      const components = { transparentPET: 0, colouredPET: 0, contaminants: 0 };
      analysedLoads.forEach(({ load, weight }) => {
        components.transparentPET += load.results.transparentPET * weight;
        components.colouredPET    += load.results.colouredPET    * weight;
        components.contaminants   += load.results.contaminants   * weight;
      });
      Object.keys(components).forEach(k => {
        components[k] = analysedWeight > 0 ? components[k] / analysedWeight : 0;
      });
      return {
        totalWeight, totalBales,
        loadCount: selectedLoads.length,
        analysedCount: analysedLoads.length,
        components
      };
    }, [selectedLoads]);

    const cancelCreate = () => {
      setSelectionBales({});
      setSlMode('default');
    };

    // Scroll the LHS to a particular load row and briefly highlight it.
    // Used by the clickable zone:bay link in the picking-list card.
    const scrollToLoad = (loadId) => {
      // Find the zone for this load and make sure its bay (in accordion mode) is open
      for (const zone of YARD) {
        for (const bay of zone.bays) {
          if (bay.loads.some(l => l.id === loadId)) {
            setOpenZones(prev => ({ ...prev, [zone.id]: true }));
            setOpenBays(prev => ({ ...prev, [bay.id]: true }));
            break;
          }
        }
      }
      // Give React a tick to render the open accordion, then scroll
      setTimeout(() => {
        const el = document.getElementById('load-' + loadId);
        if (!el) return;
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        el.classList.add('flash-highlight');
        setTimeout(() => el.classList.remove('flash-highlight'), 1600);
      }, 80);
    };

    const confirmList = () => {
      const previousSelection = { ...selectionBales };
      const list = {
        id: 'pl-' + Date.now(),
        name: `Shift picking list — ${new Date().toLocaleDateString()} ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`,
        createdAt: new Date().toISOString(),
        loads: Object.entries(selectionBales).map(([k, bales]) => {
          const [zoneId, bayId, loadId] = k.split('|');
          return { zoneId, bayId, loadId, bales };
        })
      };
      setPickingList(list);
      setSelectionBales({});
      setSlMode('default');
      // Scroll to top so the user sees the tabs + Picker tab badge
      window.scrollTo({ top: 0, behavior: 'smooth' });
      setToast({
        message: `Picking list sent to the forklift team. ${list.loads.length} load${list.loads.length === 1 ? '' : 's'} ready to pick.`,
        kind: 'success',
        onUndo: () => {
          setPickingList(null);
          setSelectionBales(previousSelection);
          setSlMode('create');
        }
      });
    };

    return (
      <Fragment>
        {/* Active production window — hidden during Create picking list */}
        {!isCreating && <ActiveProductionWindow active={windowActive} />}

        {/* Existing-list banner — blue info style with Edit / destructive Clear */}
        {!isCreating && pickingList && (
          <ActivePickingListAlert
            pickingList={pickingList}
            onEdit={() => {
              // Pre-populate the create workflow with the active list but DO NOT
              // clear pickingList yet — so if the SL cancels mid-edit, the existing
              // active picking list is still in place.
              const next = {};
              pickingList.loads.forEach(l => {
                next[`${l.zoneId}|${l.bayId}|${l.loadId}`] = l.bales != null ? l.bales : findLoadByKey(`${l.zoneId}|${l.bayId}|${l.loadId}`)?.bales ?? 0;
              });
              setSelectionBales(next);
              setSlMode('create');
            }}
            onClear={() => {
              const previous = pickingList;
              setPickingList(null);
              setToast({
                message: 'Picking list cleared.',
                kind: 'success',
                onUndo: () => setPickingList(previous)
              });
            }}
          />
        )}

        {/* Warehouse header — outside the grid so both columns align with the first zone card. */}
        <div className="sticky top-14 z-20 bg-[#fafafa] pt-6 pb-3 -mx-8 px-8">
          <h2 className="text-lg font-bold text-neutral-100">Warehouse</h2>
          <div className="mt-3 flex flex-wrap items-center gap-3">
            {/* Material — the most important filter, first in order */}
            <div className="relative w-[180px]">
              <select
                aria-label="Filter by material"
                className="appearance-none w-full pl-3 pr-9 py-2 text-sm border border-neutral-10 rounded-md bg-white text-neutral-100 focus:border-safi-600"
                defaultValue="Clear PET Bottles"
              >
                <option>Clear PET Bottles</option>
                <option>Coloured PET Bottles</option>
                <option>PET Trays</option>
                <option>All materials</option>
              </select>
              <label className="absolute -top-2 left-3 px-1 bg-white text-[11px] font-medium text-neutral-60">Material</label>
              <Icon d={I.chevron} className="w-4 h-4 absolute right-3 top-1/2 -translate-y-1/2 text-neutral-60 pointer-events-none" />
            </div>
            <div className="relative w-[180px]">
              <Icon d={I.search} className="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-neutral-40" />
              <input
                type="search"
                placeholder="Enter…"
                aria-label="Search loads"
                className="pl-9 pr-3 py-2 w-full text-sm border border-neutral-10 rounded-md bg-white placeholder:text-neutral-40 focus:border-safi-600"
              />
              <label className="absolute -top-2 left-3 px-1 bg-white text-[11px] font-medium text-neutral-60">Search loads</label>
            </div>
            <div className="relative w-[160px]">
              <select
                aria-label="Filter by supplier"
                className="appearance-none w-full pl-3 pr-9 py-2 text-sm border border-neutral-10 rounded-md bg-white text-neutral-100 focus:border-safi-600"
                defaultValue=""
              >
                <option value="">All suppliers</option>
                <option>Supplier A</option><option>Supplier B</option><option>Supplier C</option>
                <option>Supplier D</option><option>Supplier E</option><option>Supplier F</option>
                <option>Supplier G</option><option>Supplier H</option><option>Supplier I</option>
                <option>Supplier J</option><option>Supplier K</option><option>Supplier L</option>
                <option>Supplier M</option><option>Supplier N</option><option>Supplier O</option>
                <option>Supplier P</option>
              </select>
              <label className="absolute -top-2 left-3 px-1 bg-white text-[11px] font-medium text-neutral-60">Supplier</label>
              <Icon d={I.chevron} className="w-4 h-4 absolute right-3 top-1/2 -translate-y-1/2 text-neutral-60 pointer-events-none" />
            </div>
            <ZoneBayFilter value={bayFilter} onChange={setBayFilter} yard={visibleYard} />
            <div className="flex-1" />
            {!isCreating && !pickingList && (
              <button
                onClick={() => setSlMode('create')}
                className="inline-flex items-center gap-2 px-4 py-2 rounded bg-safi-600 text-white text-sm font-medium hover:bg-safi-700 shadow-sm"
              >
                <Icon d={I.plus} className="w-4 h-4" />
                Create picking list
              </button>
            )}
          </div>
        </div>{/* /sticky warehouse header */}

      <div className="grid grid-cols-12 gap-6">
        {/* Main column — zone list or spatial layout */}
        <div className={isCreating ? 'col-span-12 lg:col-span-8' : 'col-span-12'}>
          {isSpatial ? (
            <SpatialLayoutView
              yard={filteredYard}
              isCreating={isCreating}
              selectionBales={selectionBales}
              setSelectionBales={setSelectionBales}
              pickingList={pickingList}
            />
          ) : (
          /* Yard — Zones / Bays / Loads */
          <div className="space-y-3">
            {filteredYard.map(zone => {
              const z = zoneStats(zone);
              // Force-expand zones when the bay filter is active so the user can immediately see their selection.
              const zoneOpen = bayFilter.size > 0 ? true : !!openZones[zone.id];
              return (
                <div key={zone.id} className="bg-white border border-neutral-10 rounded-xl">
                  <button
                    onClick={() => toggleZone(zone.id)}
                    style={{ top: 176 }}
                    className={
                      'w-full flex items-center justify-between pl-5 py-4 sticky z-10 bg-white hover:bg-neutral-5 ' +
                      // Top corners rounded only when not the only visible part of the container;
                      // bottom border separates header from content while sticky.
                      'rounded-t-xl border-b border-neutral-10 ' +
                      // When the zone is closed, also round the bottom so it doesn't look weird
                      (zoneOpen ? '' : 'rounded-b-xl ') +
                      (isSticky ? 'pr-5' : 'pr-9') // align zone chip with bay chips
                    }
                    aria-expanded={zoneOpen}
                  >
                    <div className="flex items-center gap-3 text-left">
                      <Icon d={zoneOpen ? I.chevron : I.chevronR} className="w-4 h-4 text-neutral-60" />
                      <div>
                        <div className="font-semibold text-neutral-100">
                          {zone.esName}
                        </div>
                        <div className="text-xs text-neutral-60 mt-0.5 flex items-center gap-1.5">
                          <span>Bays: {z.bays} · Loads: {z.loads} · Bales: {fmtNum(z.bales)} · Weight: {fmtKg(z.weight)}</span>
                          {isCreating && <ZoneSelectionBadge zoneId={zone.id} selected={selected} />}
                        </div>
                      </div>
                    </div>
                    <div className="flex items-center gap-2">
                      <CapacityChip bales={z.bales} variant="zone" />
                    </div>
                  </button>

                  {zoneOpen && (
                    <div className={isSticky ? 'border-t border-neutral-10' : 'border-t border-neutral-10 px-5 py-4 space-y-3'}>
                      {zone.bays.map(bay => {
                        const s = bayStats(bay);
                        const bayOpen = !!openBays[bay.id];
                        const bayLoadKeys = bay.loads.map(l => `${zone.id}|${bay.id}|${l.id}`);
                        const allSelected = isCreating && bay.accessible && bayLoadKeys.length > 0 && bayLoadKeys.every(k => selected.has(k));
                        const someSelected = isCreating && bayLoadKeys.some(k => selected.has(k));
                        const hasLoads = bay.loads.length > 0;

                        const toggleBay = (e) => {
                          e.stopPropagation();
                          if (!isCreating || !bay.accessible || !hasLoads) return;
                          setSelected(prev => {
                            const next = new Set(prev);
                            if (allSelected) {
                              bayLoadKeys.forEach(k => next.delete(k));
                            } else {
                              bayLoadKeys.forEach(k => next.add(k));
                            }
                            return next;
                          });
                        };

                        // -------------------- STICKY LAYOUT --------------------
                        if (isSticky) {
                          const showAll = !!bayShowAll[bay.id];
                          const visibleLoads = (hasLoads && !showAll && bay.loads.length > 3)
                            ? bay.loads.slice(0, 3)
                            : bay.loads;
                          const hiddenCount = bay.loads.length - visibleLoads.length;
                          return (
                            <Fragment key={bay.id}>
                              {/* Sticky bay header */}
                              <div
                                className={
                                  'sticky z-[5] flex items-center justify-between px-5 py-2.5 bg-neutral-5/95 backdrop-blur border-b border-neutral-10 ' +
                                  (someSelected ? 'ring-1 ring-inset ring-safi-200' : '')
                                }
                                style={{ top: 254 }}
                              >
                                <div className="flex items-center gap-3 min-w-0">
                                  <div className="font-semibold text-neutral-100 flex items-center gap-2 flex-wrap">
                                    {bay.esName}
                                    {isCreating && !bay.accessible && (
                                      <span
                                        title="Blocked bays can’t be picked until the bays in front are cleared."
                                        className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-neutral-10 text-neutral-80 text-[11px] font-medium cursor-help"
                                      >
                                        <Icon d={I.lock} className="w-3 h-3" /> Blocked by {bay.blockedBy}
                                      </span>
                                    )}
                                  </div>
                                  <div className="text-xs text-neutral-60 truncate">
                                    Load: {s.loads} · {fmtNum(s.bales)} bales · {fmtKg(s.weight)}
                                  </div>
                                </div>
                                <div className="flex items-center gap-3 shrink-0">
                                  <CapacityChip bales={s.bales} />
                                  {isCreating && hasLoads && (
                                    <label className={
                                      'flex items-center gap-1.5 text-xs font-medium cursor-pointer select-none ' +
                                      (bay.accessible ? 'text-neutral-80' : 'text-neutral-40 cursor-not-allowed')
                                    }>
                                      <input
                                        type="checkbox"
                                        className="rounded text-safi-600 focus:ring-safi-500 disabled:opacity-40"
                                        checked={allSelected}
                                        ref={el => { if (el) el.indeterminate = someSelected && !allSelected; }}
                                        onChange={toggleBay}
                                        disabled={!bay.accessible}
                                        aria-label={`Select all loads in ${bay.esName}`}
                                      />
                                      Select all
                                    </label>
                                  )}
                                </div>
                              </div>
                              {/* Loads list — flows below the sticky header, subtle dividers */}
                              {hasLoads ? (
                                <div className="bg-white">
                                  {visibleLoads.map(load => {
                                    const key = `${zone.id}|${bay.id}|${load.id}`;
                                    return (
                                      <div key={load.id} className="border-b border-neutral-10/60 last:border-b-0">
                                        <LoadRow
                                          load={load}
                                          isCreating={isCreating}
                                          accessible={!isCreating || bay.accessible}
                                          isSelected={selected.has(key)}
                                          onToggle={() => toggleLoad(key, bay.accessible)}
                                          onPickingList={(() => {
                                            if (isCreating || !pickingList) return false;
                                            const entry = pickingList.loads.find(l => l.loadId === load.id);
                                            if (!entry) return false;
                                            return entry.bales != null && entry.bales < load.bales
                                              ? { partial: true, bales: entry.bales }
                                              : true;
                                          })()}
                                        />
                                      </div>
                                    );
                                  })}
                                  {hiddenCount > 0 && (
                                    <button
                                      onClick={() => setBayShowAll(s => ({ ...s, [bay.id]: true }))}
                                      className="w-full px-5 py-2.5 text-xs font-medium text-safi-700 hover:bg-neutral-5 border-t border-neutral-10/60"
                                    >
                                      Show all loads ({hiddenCount} more)
                                    </button>
                                  )}
                                  {showAll && bay.loads.length > 3 && (
                                    <button
                                      onClick={() => setBayShowAll(s => ({ ...s, [bay.id]: false }))}
                                      className="w-full px-5 py-2.5 text-xs font-medium text-neutral-60 hover:bg-neutral-5 border-t border-neutral-10/60"
                                    >
                                      Show fewer
                                    </button>
                                  )}
                                </div>
                              ) : (
                                <div className="px-5 py-6 text-sm text-neutral-60 bg-white border-b border-neutral-10/60 text-center">
                                  No loads have been stored in this bay yet
                                </div>
                              )}
                            </Fragment>
                          );
                        }

                        // -------------------- ACCORDION LAYOUT (original) --------------------
                        return (
                          <div key={bay.id} className={
                            'rounded-lg border ' +
                            ((isCreating && !bay.accessible)
                              ? 'border-neutral-10 bg-neutral-5'
                              : (someSelected ? 'border-safi-300 ring-1 ring-safi-200 bg-safi-50/40' : 'border-neutral-10'))
                          }>
                            <div className="flex items-center justify-between px-4 py-3">
                              <button
                                onClick={() => hasLoads && setOpenBays(s => ({ ...s, [bay.id]: !s[bay.id] }))}
                                className="flex items-center gap-3 text-left flex-1 min-w-0"
                                aria-expanded={bayOpen}
                                disabled={!hasLoads}
                              >
                                <Icon d={bayOpen ? I.chevron : I.chevronR} className={'w-4 h-4 shrink-0 ' + (hasLoads ? 'text-neutral-60' : 'text-neutral-10')} />
                                <div className="min-w-0">
                                  <div className="font-medium text-neutral-100 flex items-center gap-2 flex-wrap">
                                    {bay.esName}
                                    {isCreating && !bay.accessible && (
                                      <span
                                        title="Blocked bays can’t be picked until the bays in front are cleared."
                                        className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-neutral-10 text-neutral-80 text-[11px] font-medium cursor-help"
                                      >
                                        <Icon d={I.lock} className="w-3 h-3" /> Blocked by {bay.blockedBy}
                                      </span>
                                    )}
                                  </div>
                                  <div className="text-xs text-neutral-60 mt-0.5 truncate">
                                    Load: {s.loads} · Bales: {fmtNum(s.bales)} · {fmtKg(s.weight)}
                                  </div>
                                </div>
                              </button>
                              <div className="flex items-center gap-3 shrink-0">
                                <CapacityChip bales={s.bales} />
                                {isCreating && hasLoads && (
                                  <label className={
                                    'flex items-center gap-2 text-xs font-medium cursor-pointer select-none ' +
                                    (bay.accessible ? 'text-neutral-80' : 'text-neutral-40 cursor-not-allowed')
                                  }>
                                    <input
                                      type="checkbox"
                                      className="rounded text-safi-600 focus:ring-safi-500 disabled:opacity-40"
                                      checked={allSelected}
                                      ref={el => { if (el) el.indeterminate = someSelected && !allSelected; }}
                                      onChange={toggleBay}
                                      disabled={!bay.accessible}
                                      aria-label={`Select all loads in ${bay.esName}`}
                                    />
                                    Select all
                                  </label>
                                )}
                              </div>
                            </div>

                            {bayOpen && hasLoads && (
                              <div className="border-t border-neutral-10 divide-y divide-neutral-10">
                                {bay.loads.map(load => {
                                  const key = `${zone.id}|${bay.id}|${load.id}`;
                                  return (
                                    <LoadRow
                                      key={load.id}
                                      load={load}
                                      isCreating={isCreating}
                                      accessible={!isCreating || bay.accessible}
                                      isSelected={selected.has(key)}
                                      onToggle={() => toggleLoad(key, bay.accessible)}
                                      onPickingList={!isCreating && pickingList && pickingList.loads.some(l => l.loadId === load.id)}
                                    />
                                  );
                                })}
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          )}{/* /isSpatial conditional */}
        </div>

        {/* Side panel — only visible in Create picking list mode. Aligns with the first zone card.
            The card itself is bounded by viewport height so the footer buttons (Send to picker / Cancel / Schedule)
            are always visible — only the middle section scrolls when many loads are selected. */}
        {isCreating && (
          <aside className="col-span-12 lg:col-span-4">
            <div className="sticky top-[230px] bg-white border border-neutral-10 rounded-xl shadow-sm flex flex-col max-h-[calc(100vh-260px)]">
              <div className="p-5 border-b border-neutral-10 flex items-start justify-between shrink-0">
                <h2 className="font-bold text-neutral-100 text-lg">Picking list</h2>
                <button
                  aria-label="Print picking list"
                  title="Print picking list"
                  className="p-2 rounded-full hover:bg-neutral-5 text-neutral-60 hover:text-neutral-100"
                >
                  <Icon d={I.print} className="w-5 h-5" />
                </button>
              </div>

              <div className="p-5 space-y-4 flex-1 overflow-y-auto scrollbar-thin min-h-0">
                <div className="grid grid-cols-3 gap-3">
                  <Metric label="Loads"  value={fmtNum(summary.loadCount)} />
                  <Metric label="Bales"  value={fmtNum(summary.totalBales)} />
                  <Metric label="Weight" value={fmtKg(summary.totalWeight)} />
                </div>

                {summary.loadCount === 0 ? (
                  <div className="text-sm text-neutral-60 bg-neutral-5 border border-neutral-10 rounded-lg p-4">
                    No loads selected yet. Tick loads in the yard to add them to the picking list.
                  </div>
                ) : (
                  <>
                    <div className="border border-neutral-10 rounded-lg p-4">
                      <div className="text-xs font-semibold uppercase tracking-wide text-neutral-60 mb-3">
                        Average quality <span className="font-normal normal-case">· weighted avg of {summary.analysedCount} analysed load{summary.analysedCount === 1 ? '' : 's'}</span>
                      </div>
                      {summary.analysedCount === 0 ? (
                        <div className="text-sm text-neutral-60">No analysed loads selected yet.</div>
                      ) : (
                        <div className="flex flex-col gap-1.5">
                          {Object.entries(SPEC).map(([key, spec]) => {
                            const value = summary.components[key];
                            const good = inSpec(spec, value);
                            const cls = good ? 'bg-success-100 text-success-300' : 'bg-rose-100 text-rose-900';
                            const icon = good ? I.checkCircle : I.errorCircle;
                            return (
                              <span key={key} className={`self-start inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[12px] font-medium ${cls}`}>
                                <Icon d={icon} className="w-3.5 h-3.5" />
                                {spec.label} {value.toFixed(1)}%
                              </span>
                            );
                          })}
                        </div>
                      )}
                    </div>

                    <div className="border border-neutral-10 rounded-lg divide-y divide-neutral-10">
                      {selectedLoads.map(({ key, zone, bay, load, bales, weight, partial }) => (
                        <div key={key} className="flex items-center gap-3 px-3 py-2.5">
                          <div className="flex-1 min-w-0">
                            <div className="text-sm text-neutral-100 truncate flex items-center gap-2">
                              <span>{load.supplier}</span>
                              <span className="text-neutral-40">#{load.lot}</span>
                              {partial && (
                                <span className="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-semibold bg-amber-100 text-amber-900">
                                  PARTIAL
                                </span>
                              )}
                            </div>
                            <div className="text-[11px] text-neutral-60 flex items-center gap-2 flex-wrap mt-1">
                              <button
                                onClick={() => scrollToLoad(load.id)}
                                className="text-safi-600 hover:underline focus:underline"
                                title={`Jump to ${zone.esName}: ${bay.esName} in the yard`}
                              >
                                {zone.esName}: {bay.esName}
                              </button>
                              <span>·</span>
                              <span className="inline-flex items-center gap-1">
                                <input
                                  type="number"
                                  min={1}
                                  max={load.bales}
                                  value={bales}
                                  onChange={(e) => {
                                    const next = Math.max(1, Math.min(load.bales, Number(e.target.value) || 1));
                                    setSelectionBales(prev => ({ ...prev, [key]: next }));
                                  }}
                                  className="w-12 px-1 py-0.5 rounded border border-neutral-10 text-center text-[11px] text-neutral-100"
                                  aria-label="Bales to pick"
                                />
                                <span>/ {fmtNum(load.bales)} bales</span>
                              </span>
                              <span>· {fmtKg(weight)}</span>
                            </div>
                          </div>
                          <button
                            onClick={() => setSelectionBales(prev => { const n = { ...prev }; delete n[key]; return n; })}
                            className="p-1.5 text-neutral-60 hover:text-neutral-100 hover:bg-neutral-5 rounded shrink-0"
                            aria-label={`Remove ${load.lot} from picking list`}
                            title="Remove from list"
                          >
                            <Icon d={I.close} className="w-4 h-4" />
                          </button>
                        </div>
                      ))}
                    </div>

                  </>
                )}
              </div>

              <div className="p-5 border-t border-neutral-10 flex flex-col gap-2 shrink-0">
                <button
                  onClick={() => confirmList(false)}
                  disabled={summary.loadCount === 0}
                  className="w-full py-2.5 rounded bg-safi-600 text-white font-medium hover:bg-safi-700 disabled:bg-neutral-10 disabled:text-neutral-40 disabled:cursor-not-allowed flex items-center justify-center gap-2"
                >
                  Send to picker
                  <Icon d={I.arrowR} className="w-4 h-4" />
                </button>
                <div className="flex items-center gap-2">
                  <button
                    onClick={cancelCreate}
                    className="flex-1 py-2 rounded border border-neutral-10 text-neutral-80 font-medium hover:bg-neutral-5"
                  >
                    Cancel
                  </button>
                  <button
                    disabled={summary.loadCount === 0}
                    className="flex-1 py-2 rounded border border-neutral-10 text-neutral-80 font-medium hover:bg-neutral-5 disabled:opacity-40 disabled:cursor-not-allowed inline-flex items-center justify-center gap-1.5"
                  >
                    <Icon d={I.calendar} className="w-4 h-4" />
                    Schedule
                  </button>
                </div>
              </div>
            </div>
          </aside>
        )}
      </div>{/* /grid */}
      </Fragment>
    );
  }

  // Quieter "N selected" — inline subtle text, not a pill.
  function ZoneSelectionBadge({ zoneId, selected }) {
    const count = Array.from(selected).filter(k => k.startsWith(zoneId + '|')).length;
    if (count === 0) return null;
    return (
      <span className="text-xs font-medium text-safi-700">· {count} selected</span>
    );
  }

  const Metric = ({ label, value }) => (
    <div className="bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5">
      <div className="text-[10px] uppercase tracking-wide text-slate-500">{label}</div>
      <div className="text-base font-bold text-slate-900 mt-0.5">{value}</div>
    </div>
  );

  // Blue info alert shown when a picking list has been sent.
  function ActivePickingListAlert({ pickingList, onEdit, onClear }) {
    const [confirmingClear, setConfirmingClear] = useState(false);
    return (
      <>
        <div className="mt-6 bg-sky-50 border border-sky-200 rounded-xl px-5 py-4 flex items-center justify-between gap-4">
          <div className="flex items-start gap-3">
            <Icon d={I.info} className="w-5 h-5 text-sky-700 mt-0.5" />
            <div>
              <div className="font-bold text-sky-900">Picking list is active</div>
              <p className="text-sm text-sky-800 mt-0.5">
                {pickingList.loads.length} loads sent to the forklift team. Edit the list to change it, or clear it to start a new one.
              </p>
            </div>
          </div>
          <div className="flex items-center gap-2">
            <button
              onClick={onEdit}
              className="inline-flex items-center gap-1.5 px-3 py-2 rounded border border-sky-300 bg-white text-sm font-medium text-sky-900 hover:bg-sky-50"
            >
              <Icon d={I.edit} className="w-4 h-4" />
              Edit list
            </button>
            <button
              onClick={() => setConfirmingClear(true)}
              className="inline-flex items-center gap-1.5 px-3 py-2 rounded border border-rose-300 bg-white text-sm font-medium text-rose-700 hover:bg-rose-50"
            >
              Clear current list
            </button>
          </div>
        </div>

        {confirmingClear && (
          <div
            className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4"
            onClick={() => setConfirmingClear(false)}
          >
            <div className="bg-white rounded-xl shadow-xl w-full max-w-md p-6" onClick={e => e.stopPropagation()}>
              <h3 className="font-bold text-lg text-neutral-100">Clear current list</h3>
              <p className="text-sm text-neutral-60 mt-2">
                Are you sure? This action cannot be undone.
              </p>
              <div className="mt-6 flex items-center gap-2 justify-end">
                <button
                  onClick={() => setConfirmingClear(false)}
                  className="px-4 py-2 rounded border border-neutral-10 text-neutral-80 font-medium hover:bg-neutral-5"
                >
                  Cancel
                </button>
                <button
                  onClick={() => { setConfirmingClear(false); onClear(); }}
                  className="px-4 py-2 rounded bg-rose-600 text-white font-medium hover:bg-rose-700"
                >
                  Clear
                </button>
              </div>
            </div>
          </div>
        )}
      </>
    );
  }

  function ActiveProductionWindow({ active }) {
    if (!active) {
      return (
        <div className="bg-white border border-neutral-10 rounded-xl px-5 py-4 flex items-center justify-between">
          <div className="flex items-start gap-3">
            <Icon d={I.factory} className="w-5 h-5 text-neutral-60 mt-0.5" />
            <div>
              <div className="font-semibold text-neutral-100">No active production window</div>
              <p className="text-sm text-neutral-60 mt-0.5">Start a window to begin tracking what gets processed.</p>
            </div>
          </div>
          <button className="px-3 py-2 rounded border border-neutral-10 text-sm font-medium text-neutral-80 hover:bg-neutral-5">
            Start production window
          </button>
        </div>
      );
    }
    return (
      <div className="bg-white border border-neutral-10 rounded-xl">
        <div className="px-5 py-4 flex items-center justify-between border-b border-neutral-10">
          <h3 className="font-semibold text-neutral-100">Active production window</h3>
          <button className="text-sm font-medium text-neutral-80 hover:text-neutral-100">Finish window</button>
        </div>
        <div className="px-5 py-4 grid grid-cols-2 md:grid-cols-6 gap-6 text-sm">
          <div><div className="text-xs text-neutral-60">Material</div><div className="font-semibold text-neutral-100 mt-1">Clear PET Bottles</div></div>
          <div><div className="text-xs text-neutral-60">Target input</div><div className="font-semibold text-neutral-100 mt-1">{ACTIVE_WINDOW.targetInput.toFixed(1)}%</div></div>
          <div><div className="text-xs text-neutral-60">Elapsed</div><div className="font-semibold text-neutral-100 mt-1">{ACTIVE_WINDOW.elapsed}</div></div>
          <div><div className="text-xs text-neutral-60">Bales processed</div><div className="font-semibold text-neutral-100 mt-1">{ACTIVE_WINDOW.balesProcessed}</div></div>
          <div><div className="text-xs text-neutral-60">Weight processed</div><div className="font-semibold text-neutral-100 mt-1">{fmtKg(ACTIVE_WINDOW.weightProcessed)}</div></div>
          <div><div className="text-xs text-neutral-60">Actual input</div><div className="font-semibold text-emerald-700 mt-1">{ACTIVE_WINDOW.actualInput.toFixed(1)}%</div></div>
        </div>
      </div>
    );
  }

  // ============================================================================
  // FORKLIFT OPERATOR VIEW — Picker tab
  // ============================================================================

  function ForkliftPickerView({ pickingList, processed, setProcessed, setPickingList, setRole }) {
    const [openZones, setOpenZones] = useState({});
    const [confirmLoad, setConfirmLoad] = useState(null); // { zone, bay, load, partial }

    // When list arrives, default to all zones expanded so FO sees everything
    useEffect(() => {
      if (pickingList) {
        const expanded = {};
        pickingList.loads.forEach(l => { expanded[l.zoneId] = true; });
        setOpenZones(expanded);
      }
    }, [pickingList]);

    if (!pickingList) {
      return (
        <div className="bg-white border border-slate-200 rounded-xl p-10 text-center">
          <div className="mx-auto w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 mb-3">
            <Icon d={I.list} className="w-6 h-6" />
          </div>
          <h3 className="font-semibold text-slate-900 text-lg">No picking list yet</h3>
          <p className="text-sm text-slate-500 mt-1 max-w-md mx-auto">
            The shift leader hasn't sent a picking list. When they do, the loads you need to move will appear here, grouped by zone.
          </p>
          <button
            onClick={() => setRole('SL')}
            className="mt-5 inline-flex items-center gap-2 px-4 py-2 rounded-lg border border-slate-300 text-sm font-medium hover:bg-slate-50"
          >
            Switch to Shift Leader view to create one
            <Icon d={I.arrowR} className="w-4 h-4" />
          </button>
        </div>
      );
    }

    // Resolve picking-list entries against the yard structure
    const resolved = pickingList.loads.map(({ zoneId, bayId, loadId }) => {
      const zone = YARD.find(z => z.id === zoneId);
      const bay  = zone?.bays.find(b => b.id === bayId);
      const load = bay?.loads.find(l => l.id === loadId);
      return { zone, bay, load };
    }).filter(x => x.zone && x.bay && x.load);

    // Group by zone -> bay
    const grouped = {};
    resolved.forEach(({ zone, bay, load }) => {
      if (!grouped[zone.id]) grouped[zone.id] = { zone, bays: {} };
      if (!grouped[zone.id].bays[bay.id]) grouped[zone.id].bays[bay.id] = { bay, loads: [] };
      grouped[zone.id].bays[bay.id].loads.push(load);
    });

    const totalLoads = resolved.length;
    const doneLoads = resolved.filter(({ load }) => processed[load.id]).length;
    const allDone = doneLoads === totalLoads;

    const markProcessed = (load, balesProcessed) => {
      const baleCount = balesProcessed ?? load.bales;
      const perBaleKg = load.weight / load.bales;
      const weight = Math.round(baleCount * perBaleKg);
      setProcessed(prev => ({
        ...prev,
        [load.id]: { bales: baleCount, weight, at: new Date().toISOString(), partial: baleCount < load.bales }
      }));
      setConfirmLoad(null);
    };

    return (
      <div className="space-y-4">
        {/* Banner */}
        <div className={
          'rounded-xl p-5 flex items-start gap-4 ' +
          (allDone ? 'bg-emerald-50 border border-emerald-200' : 'bg-safi-50 border border-safi-200')
        }>
          <Icon d={allDone ? I.check : I.bell} className={'w-6 h-6 mt-0.5 ' + (allDone ? 'text-emerald-700' : 'text-safi-700')} />
          <div className="flex-1">
            <div className="font-semibold text-slate-900">{pickingList.name}</div>
            <p className="text-sm text-slate-700 mt-0.5">
              {allDone
                ? 'All loads on this picking list have been processed. Confirm with the Shift Leader to close out the shift.'
                : `${doneLoads} of ${totalLoads} loads processed. Pick from the bays below in any order — full load by default, or specify bales if the load is split.`}
            </p>
          </div>
          {allDone && (
            <button
              onClick={() => setPickingList(null)}
              className="px-4 py-2 rounded-lg bg-emerald-600 text-white text-sm font-medium hover:bg-emerald-700"
            >
              Close picking list
            </button>
          )}
        </div>

        {/* Progress bar */}
        <div className="flex items-center gap-3 text-xs text-slate-600">
          <div className="flex-1 h-1.5 bg-slate-200 rounded-full overflow-hidden">
            <div
              className="h-full bg-safi-600 transition-all"
              style={{ width: `${totalLoads ? (doneLoads/totalLoads)*100 : 0}%` }}
            />
          </div>
          <span className="font-medium">{doneLoads}/{totalLoads}</span>
        </div>

        {/* Zone accordions */}
        <div className="space-y-3">
          {Object.values(grouped).map(({ zone, bays }) => {
            const open = !!openZones[zone.id];
            const zoneLoads = Object.values(bays).flatMap(b => b.loads);
            const zoneDone = zoneLoads.filter(l => processed[l.id]).length;
            return (
              <div key={zone.id} className="bg-white border border-slate-200 rounded-xl">
                <button
                  onClick={() => setOpenZones(s => ({ ...s, [zone.id]: !s[zone.id] }))}
                  className="w-full flex items-center justify-between px-5 py-4 hover:bg-slate-50 rounded-xl"
                  aria-expanded={open}
                >
                  <div className="flex items-center gap-3">
                    <Icon d={open ? I.chevron : I.chevronR} className="w-4 h-4 text-slate-500" />
                    <div className="text-left">
                      <div className="font-semibold text-slate-900">{zone.esName}</div>
                      <div className="text-xs text-slate-500 mt-0.5">{Object.keys(bays).length} bays · {zoneLoads.length} loads to pick</div>
                    </div>
                  </div>
                  <span className={
                    'inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold ' +
                    (zoneDone === zoneLoads.length ? 'bg-emerald-50 text-emerald-700 ring-1 ring-emerald-200' : 'bg-safi-100 text-safi-700')
                  }>
                    {zoneDone}/{zoneLoads.length} processed
                  </span>
                </button>

                {open && (
                  <div className="border-t border-slate-100 px-5 py-4 space-y-3">
                    {Object.values(bays).map(({ bay, loads }) => {
                      const bayDone = loads.every(l => processed[l.id]);
                      return (
                        <div key={bay.id} className={
                          'rounded-lg border ' + (bayDone ? 'border-emerald-200 bg-emerald-50/30' : 'border-slate-200')
                        }>
                          <div className="flex items-center justify-between px-4 py-3 border-b border-slate-100">
                            <div>
                              <div className="font-medium text-slate-900">{bay.esName}</div>
                              <div className="text-xs text-slate-500 mt-0.5">{loads.length} loads to pick from this bay</div>
                            </div>
                            <button
                              disabled={bayDone}
                              onClick={() => {
                                loads.forEach(l => { if (!processed[l.id]) markProcessed(l, l.bales); });
                              }}
                              className={
                                'inline-flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-medium ' +
                                (bayDone
                                  ? 'bg-emerald-100 text-emerald-700 cursor-default'
                                  : 'bg-slate-900 text-white hover:bg-slate-800')
                              }
                            >
                              {bayDone ? (<><Icon d={I.check} className="w-4 h-4" /> Bay processed</>) : 'Process all in bay'}
                            </button>
                          </div>
                          <div className="divide-y divide-slate-100">
                            {loads.map(load => {
                              const p = processed[load.id];
                              return (
                                <div key={load.id} className="px-4 py-3 flex items-center gap-3">
                                  <div className="flex-1 min-w-0">
                                    <div className="flex items-center gap-2 flex-wrap">
                                      <span className="font-semibold text-slate-900">{load.supplier}</span>
                                      <span className="text-slate-500 text-sm">Order ref <span className="font-mono">#{load.lot}</span></span>
                                    </div>
                                    <div className="text-xs text-slate-500 mt-0.5">
                                      {fmtNum(load.bales)} bales · {fmtKg(load.weight)}
                                      {p && (
                                        <span className="ml-2 text-emerald-700 font-medium">
                                          · Processed {fmtNum(p.bales)} bales{p.partial ? ' (partial)' : ''}
                                        </span>
                                      )}
                                    </div>
                                  </div>
                                  {p ? (
                                    <span className="inline-flex items-center gap-1 px-2.5 py-1 rounded-full bg-emerald-50 text-emerald-700 ring-1 ring-emerald-200 text-xs font-semibold">
                                      <Icon d={I.check} className="w-3.5 h-3.5" /> Done
                                    </span>
                                  ) : (
                                    <div className="flex items-center gap-2 shrink-0">
                                      <button
                                        onClick={() => setConfirmLoad({ load, bay, zone, partial: true })}
                                        className="px-3 py-1.5 rounded-lg border border-slate-300 text-sm font-medium hover:bg-slate-50"
                                      >
                                        Partial…
                                      </button>
                                      <button
                                        onClick={() => markProcessed(load, load.bales)}
                                        className="px-3 py-1.5 rounded-lg bg-safi-600 text-white text-sm font-medium hover:bg-safi-700"
                                      >
                                        Process full load
                                      </button>
                                    </div>
                                  )}
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* Partial-load modal */}
        {confirmLoad && (
          <PartialProcessModal
            entry={confirmLoad}
            onCancel={() => setConfirmLoad(null)}
            onConfirm={(bales) => markProcessed(confirmLoad.load, bales)}
          />
        )}
      </div>
    );
  }

  function PartialProcessModal({ entry, onCancel, onConfirm }) {
    const { load, bay } = entry;
    const [bales, setBales] = useState(Math.max(1, Math.floor(load.bales / 2)));
    const perBale = load.weight / load.bales;
    return (
      <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4" onClick={onCancel}>
        <div className="bg-white rounded-xl shadow-xl w-full max-w-md p-6" onClick={e => e.stopPropagation()}>
          <h3 className="font-semibold text-lg text-slate-900">Record partial pick</h3>
          <p className="text-sm text-slate-600 mt-1">
            <span className="font-medium">{load.supplier}</span> · #{load.lot} · {bay.esName}
          </p>
          <p className="text-xs text-slate-500 mt-3">
            How many bales did you process? The rest of the load stays in the yard and remains trackable.
          </p>
          <div className="mt-4">
            <label className="block text-xs font-medium text-slate-600 mb-1" htmlFor="bales-input">
              Bales processed (max {load.bales})
            </label>
            <input
              id="bales-input"
              type="number"
              min={1}
              max={load.bales}
              value={bales}
              onChange={e => setBales(Math.max(1, Math.min(load.bales, Number(e.target.value) || 1)))}
              className="w-full border border-slate-300 rounded-lg px-3 py-2 text-lg font-semibold"
            />
            <div className="text-xs text-slate-500 mt-1">
              ≈ {fmtKg(Math.round(bales * perBale))} processed · {fmtKg(Math.round((load.bales - bales) * perBale))} remains in bay
            </div>
          </div>
          <div className="mt-6 flex gap-2 justify-end">
            <button onClick={onCancel} className="px-4 py-2 rounded-lg border border-slate-300 text-sm font-medium hover:bg-slate-50">Cancel</button>
            <button onClick={() => onConfirm(bales)} className="px-4 py-2 rounded-lg bg-safi-600 text-white text-sm font-medium hover:bg-safi-700">Confirm pick</button>
          </div>
        </div>
      </div>
    );
  }

  // ----------------------------------------------------------------------------
  // MOUNT
  // ----------------------------------------------------------------------------
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<ProductionManagementPage />);
  </script>
</body>
</html>

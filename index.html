                  else onMove({ kind: 'buffer', bufferId: destBufferId });
                  setShowPicker(false);
                }}
                className={
                  'px-3 py-1.5 rounded-md text-[12px] font-semibold min-h-[32px] ' +
                  (canMove ? 'bg-white text-neutral-100 hover:bg-neutral-10' : 'bg-white/30 text-white/60 cursor-not-allowed')
                }
              >Move</button>
              <button
                type="button"
                onClick={() => setShowPicker(false)}
                className="px-2 py-1 rounded text-white/90 text-[12px] hover:underline"
              >Cancel</button>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ─────────────────────────────────────────────────────────────────────────
  // Zone + bays body — the content rendered inside EditWarehouseOverlay when
  // a zone has been opened from the yard view.
  // ─────────────────────────────────────────────────────────────────────────
  function EditWarehouseZoneBody({ zone, yard, bufferZones, dispatch, onBack, pickingLists, onOpenBay }) {
    const s = zoneStats(zone);
    const [selectedLoadIds, setSelectedLoadIds] = useState(() => new Set());
    const [bulkStackInput, setBulkStackInput] = useState(zone.defaultStackHeight ?? 4);

    const onToggleSelect = (loadId) => {
      setSelectedLoadIds(prev => {
        const next = new Set(prev);
        next.has(loadId) ? next.delete(loadId) : next.add(loadId);
        return next;
      });
    };
    const onSelectAllInBay = (bay, on) => {
      setSelectedLoadIds(prev => {
        const next = new Set(prev);
        bay.loads.forEach(l => {
          if (on) next.add(l.id);
          else next.delete(l.id);
        });
        return next;
      });
    };

    // Resolve where the selected loads currently live (for the move action).
    const sourceMap = useMemo(() => {
      const m = {};
      zone.bays.forEach(b => b.loads.forEach(l => { m[l.id] = { zoneId: zone.id, bayId: b.id }; }));
      return m;
    }, [zone]);
    const firstSelectedSource = selectedLoadIds.size > 0
      ? sourceMap[Array.from(selectedLoadIds)[0]]
      : null;

    const onMoveLoads = (dest) => {
      const ids = Array.from(selectedLoadIds);
      if (ids.length === 0) return;
      dispatch({ type: 'moveLoads', loadIds: ids, dest });
      setSelectedLoadIds(new Set());
    };

    const hasActiveList = (pickingLists || []).some(pl => pl.loads && pl.loads.length > 0);

    // R63: empty check used by the zone-level delete button
    const zoneIsEmpty = (zone.bays || []).every(b => (b.loads || []).length === 0);
    // Max bales used for warehouse-style minimap scaling
    const maxBalesInZone = Math.max(1, ...zone.bays.map(b => bayStats(b).bales));
    // R64: bay-row ref + scroll-to-bay so the minimap can jump to a clicked bar
    const bayRowRef = useRef(null);
    const scrollToBay = (bayId) => {
      setTimeout(() => {
        const wrap = bayRowRef.current;
        if (!wrap) return;
        const child = wrap.querySelector(`[data-bay-id="${bayId}"]`);
        if (child) child.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }, 0);
    };

    return (
      <div className="max-w-[1400px] mx-auto px-8 py-6 pb-32">
        {/* Breadcrumb — matches warehouse pattern (purple links + slash) */}
        <nav aria-label="Breadcrumb" className="flex items-center gap-2 text-[13px] flex-wrap mb-3">
          <button onClick={onBack} className="text-safi-600 hover:underline">Yard overview</button>
          <span className="text-neutral-40">/</span>
          <span className="text-neutral-100 font-medium">{zone.name}</span>
        </nav>

        {/* Picking-list warning (only in zone view, not yard view, to avoid double-show) */}
        {hasActiveList && (
          <div className="mb-4 rounded-md border border-amber-300 bg-amber-50 px-4 py-3 flex items-start gap-3">
            <Icon d={I.errorCircle} className="w-5 h-5 text-amber-700 shrink-0 mt-0.5" />
            <div className="text-[13px] text-amber-900 leading-relaxed">
              <strong className="font-semibold">Active picking list:</strong>{' '}
              changes here may affect FOs currently picking from this zone.
            </div>
          </div>
        )}

        {/* R63: single warehouse-style outer card wrapping all zone content. */}
        <div className="bg-white border border-neutral-10 rounded-xl p-5">
          {/* Zone header — name, lines, lock + +Bay + Delete actions */}
          <div className="flex items-center gap-3 flex-wrap mb-3">
            <div className="relative">
              <label className="absolute -top-2 left-2 bg-white px-1 text-[11px] text-neutral-60 z-10">Zone name</label>
              <input
                type="text"
                value={zone.name}
                onChange={e => dispatch({ type: 'updateZone', id: zone.id, kind: 'zone', patch: { name: e.target.value } })}
                className="w-[220px] h-9 px-3 border border-neutral-10 rounded-md text-[14px] focus:outline-none focus:ring-2 focus:ring-safi-600 focus:border-safi-600"
              />
            </div>
            <ProductionLinesDropdown
              lines={zone.lines || []}
              onChange={lines => dispatch({ type: 'updateZone', id: zone.id, kind: 'zone', patch: { lines } })}
            />
            <SplitLock
              lockedStorage={!!zone.lockedStorage}
              lockedProcessing={!!zone.lockedProcessing}
              onChange={({ lockedStorage, lockedProcessing }) => dispatch({
                type: 'updateZone', id: zone.id, kind: 'zone',
                patch: { lockedStorage, lockedProcessing },
              })}
            />
            {/* R64: stack-heights toggle moved to the right of the lock so it
                sits in the primary control row (was previously below the
                minimap with a grey bg that made it visually disappear). */}
            <label className="inline-flex items-center gap-2 px-3 py-1.5 rounded-md border border-neutral-10 bg-white text-[13px] font-medium text-neutral-100 cursor-pointer hover:bg-neutral-5 min-h-[36px]">
              <input
                type="checkbox"
                checked={!!zone.stackHeightsEnabled}
                onChange={e => dispatch({ type: 'updateZone', id: zone.id, kind: 'zone', patch: { stackHeightsEnabled: e.target.checked } })}
                className="cursor-pointer"
              />
              Stack heights
            </label>
            <button
              type="button"
              onClick={() => dispatch({ type: 'addBay', zoneId: zone.id })}
              className="ml-auto inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md bg-safi-600 text-white text-[13px] font-semibold hover:bg-safi-700 min-h-[36px]"
            >
              <Icon d={I.plus} className="w-3.5 h-3.5" />
              Bay
            </button>
            {/* R64: zone-level delete — only renders when zone is empty */}
            {zoneIsEmpty && (
              <button
                type="button"
                onClick={() => dispatch({ type: 'deleteZone', id: zone.id })}
                title={`Delete ${zone.name} — no loads stored`}
                aria-label={`Delete ${zone.name}`}
                className="inline-flex items-center justify-center w-9 h-9 rounded-md border border-danger-200 text-danger-700 bg-white hover:bg-danger-50"
              >
                <Icon d={I.trash} className="w-3.5 h-3.5" />
              </button>
            )}
          </div>

          {/* Stats line (matches the warehouse zone-header stats line) */}
          <div className="text-[13px] text-neutral-60 mb-3">
            {fmtNum(s.bays)} bays · {fmtNum(s.loads)} loads · {fmtNum(s.bales)} bales · {fmtKg(s.weight)}
          </div>

          {/* R63: Quality minimap — now matches the warehouse minimap exactly:
              uses bayQuality() colours, hover tooltips, endpoint labels, and the
              full Quality legend (All specs met / Mostly in spec / Mixed / Below
              spec / Not analysed / Empty bay). */}
          {zone.bays.length > 6 && (
            <div className="mb-3 px-3 py-2 rounded-md bg-neutral-5 border border-neutral-10">
              <div className="flex items-end gap-0.5 h-12 w-full" role="navigation" aria-label="Bay minimap - heat-mapped by average load quality">
                {zone.bays.map((b) => {
                  const st = bayStats(b);
                  const isEmpty = st.bales === 0 || b.loads.length === 0;
                  const pct = isEmpty ? 24 : Math.max(8, (st.bales / maxBalesInZone) * 100);
                  const q = bayQuality(b);
                  const tipContent = (
                    <div>
                      <div className="font-bold text-neutral-100">{b.name}</div>
                      <ul className="mt-1.5 space-y-0.5 text-[13px] text-neutral-80">
                        {isEmpty ? (
                          <li className="text-neutral-80">Empty bay</li>
                        ) : (
                          <>
                            <li>Loads: <span className="font-semibold text-neutral-100">{st.loads}</span></li>
                            <li>Bales: <span className="font-semibold text-neutral-100">{fmtNum(st.bales)}</span></li>
                          </>
                        )}
                      </ul>
                    </div>
                  );
                  const tileStyle = isEmpty
                    ? {
                        height: `${pct}%`,
                        backgroundColor: '#ffffff',
                        border: '1px solid #d4d4d8',
                        backgroundImage: 'repeating-linear-gradient(135deg, transparent, transparent 3px, #d4d4d8 3px, #d4d4d8 4px)',
                      }
                    : { height: `${pct}%`, backgroundColor: q.color };
                  return (
                    <Tooltip key={b.id} content={tipContent} className="flex-1 flex items-end h-full">
                      <button
                        type="button"
                        onClick={() => scrollToBay(b.id)}
                        aria-label={`Jump to ${b.name} - ${isEmpty ? 'Empty bay' : q.label}`}
                        className="w-full rounded-t transition-opacity hover:opacity-80 cursor-pointer"
                        style={tileStyle}
                      />
                    </Tooltip>
                  );
                })}
              </div>
              <div className="mt-2 flex justify-between text-[13px] text-neutral-60">
                <span>{zone.bays[0]?.name}</span>
                <span className="text-neutral-40">{zone.bays.length} bays · height = bales · colour = avg quality</span>
                <span>{zone.bays[zone.bays.length - 1]?.name}</span>
              </div>
              <div className="mt-2 pt-2 border-t border-neutral-10 flex items-center gap-3 flex-wrap text-[13px] text-neutral-60">
                <span className="font-medium text-neutral-80">Quality:</span>
                <span className="inline-flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm" style={{ backgroundColor: '#16A34A' }} />All specs met</span>
                <span className="inline-flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm" style={{ backgroundColor: '#84CC16' }} />Mostly in spec</span>
                <span className="inline-flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm" style={{ backgroundColor: '#F59E0B' }} />Mixed</span>
                <span className="inline-flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm" style={{ backgroundColor: '#EF4444' }} />Below spec</span>
                <span className="inline-flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm" style={{ backgroundColor: '#D4D4D8' }} />Not analysed</span>
                <span className="inline-flex items-center gap-1.5">
                  <span
                    className="w-3 h-3 rounded-sm border border-neutral-40"
                    style={{ backgroundImage: 'repeating-linear-gradient(135deg, transparent, transparent 1.5px, #d4d4d8 1.5px, #d4d4d8 2.5px)' }}
                  />
                  Empty bay
                </span>
              </div>
            </div>
          )}

          {/* R64: stack-heights bulk-apply controls — only when enabled.
              No grey background; reads as a primary control row in the same
              visual weight as the header row. */}
          {zone.stackHeightsEnabled && (
            <div className="mb-3 flex items-center gap-2 flex-wrap text-[12px]">
              <span className="text-neutral-60">Stack height for all bays:</span>
              <input
                type="number"
                value={bulkStackInput}
                onChange={e => setBulkStackInput(e.target.value)}
                placeholder="—"
                min="1"
                className="w-16 h-8 px-2 border border-neutral-10 rounded text-[13px] text-center bg-white"
              />
              <span className="text-neutral-60">bales high</span>
              <button
                type="button"
                onClick={() => dispatch({
                  type: 'bulkStackLimit', zoneId: zone.id,
                  value: bulkStackInput === '' ? null : Math.max(1, Number(bulkStackInput) || 1),
                })}
                className="px-3 py-1.5 rounded-md bg-safi-600 text-white font-semibold hover:bg-safi-700"
              >Apply to all</button>
              <button
                type="button"
                onClick={() => dispatch({ type: 'bulkStackLimit', zoneId: zone.id, value: null })}
                className="px-3 py-1.5 rounded-md border border-neutral-10 text-neutral-100 font-medium hover:bg-neutral-5"
              >Clear all</button>
            </div>
          )}

          {/* Bay cards row (inside the same outer card) */}
          <div ref={bayRowRef} className="flex items-stretch gap-3 overflow-x-auto pb-3 -mx-1 px-1">
            {zone.bays.map(bay => (
              <BayEditCard
                key={bay.id}
                bay={bay}
                zone={zone}
                selectedLoadIds={selectedLoadIds}
                onToggleSelect={onToggleSelect}
                onSelectAllInBay={onSelectAllInBay}
                dispatch={dispatch}
                onOpen={onOpenBay}
              />
            ))}
            {/* + Add bay tile at end */}
            <button
              type="button"
              onClick={() => dispatch({ type: 'addBay', zoneId: zone.id })}
              className="shrink-0 w-[200px] min-h-[200px] border-2 border-dashed border-neutral-20 bg-neutral-5 text-neutral-60 rounded-lg hover:border-safi-300 hover:bg-safi-50 hover:text-safi-700 flex flex-col items-center justify-center gap-1.5"
            >
              <Icon d={I.plus} className="w-5 h-5" />
              <span className="text-[13px] font-semibold">Add bay</span>
            </button>
          </div>
        </div>

        {/* Floating action bar */}
        {selectedLoadIds.size > 0 && firstSelectedSource && (
          <MoveLoadsBar
            count={selectedLoadIds.size}
            sourceZoneId={firstSelectedSource.zoneId}
            sourceBayId={firstSelectedSource.bayId}
            yard={yard}
            bufferZones={bufferZones}
            onMove={onMoveLoads}
            onCancel={() => setSelectedLoadIds(new Set())}
          />
        )}
      </div>
    );
  }

  // ─────────────────────────────────────────────────────────────────────────
  // R61 Phase 3 — Bay / Buffer detail view (Figma 15987-13253)
  //
  // Same shape for both: a focused view of one container's loads. Drag-to-
  // reorder loads (the only place drag survives), multi-select checkboxes,
  // and the standard Move-to-Bay/Buffer action bar. Buffer detail re-uses
  // the same body — the only branches are the breadcrumb path and the
  // moveLoadsFromBuffer dispatch (since the source is a buffer).
  // ─────────────────────────────────────────────────────────────────────────

  // Compact multi-chip quality display — Figma 3 shows three chips per load
  // (Transparent PET / Coloured PET / Contaminants). 92% threshold for green.
  function LoadQualityChips({ load }) {
    const r = load.results;
    if (!r) {
      return <span className="text-[11px] text-neutral-60">Not analysed</span>;
    }
    const chip = (label, value, inSpec) => (
      <span className={
        'inline-flex items-center gap-1 px-1.5 py-0.5 rounded text-[10px] font-semibold border whitespace-nowrap ' +
        (inSpec ? 'bg-success-50 text-success-700 border-success-100' : 'bg-danger-50 text-danger-700 border-danger-200')
      }>
        <span aria-hidden="true">{inSpec ? '✓' : '⚠'}</span>
        {label} {value.toFixed(1)}%
      </span>
    );
    return (
      <div className="flex flex-wrap gap-1">
        {r.transparentPET != null && chip('Transparent PET', r.transparentPET, r.transparentPET >= 92)}
        {r.colouredPET   != null && chip('Coloured PET', r.colouredPET, r.colouredPET <= 6)}
        {r.contaminants  != null && chip('Contaminants', r.contaminants, r.contaminants <= 2)}
      </div>
    );
  }

  // EditWarehouseDetailBody — renders a bay or a buffer in detail.
  // - container.kind = 'bay' | 'buffer'
  // - container.entity = the bay or buffer
  // - container.parentZone (for bay only) = the parent zone
  function EditWarehouseDetailBody({ container, yard, bufferZones, dispatch, onBack, onBackToZone, pickingLists }) {
    const isBay = container.kind === 'bay';
    const entity = container.entity;
    const parentZone = container.parentZone || null;
    const loads = entity.loads || [];
    const [selectedLoadIds, setSelectedLoadIds] = useState(() => new Set());

    // Drag state for load reordering
    const [dragLoadId, setDragLoadId] = useState(null);
    const [dropTarget, setDropTarget] = useState(null); // { loadId, position }

    const onToggleSelect = (loadId) => {
      setSelectedLoadIds(prev => {
        const next = new Set(prev);
        next.has(loadId) ? next.delete(loadId) : next.add(loadId);
        return next;
      });
    };
    const allSelected = loads.length > 0 && loads.every(l => selectedLoadIds.has(l.id));
    const onSelectAll = () => {
      if (allSelected) setSelectedLoadIds(new Set());
      else setSelectedLoadIds(new Set(loads.map(l => l.id)));
    };

    // Drag handlers — uses native HTML5 dnd
    const onLoadDragStart = (loadId) => (e) => {
      setDragLoadId(loadId);
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', loadId);
    };
    const onLoadDragEnd = () => { setDragLoadId(null); setDropTarget(null); };
    const onLoadDragOver = (loadId) => (e) => {
      if (!dragLoadId || dragLoadId === loadId) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const r = e.currentTarget.getBoundingClientRect();
      const position = (e.clientY - r.top) < r.height / 2 ? 'before' : 'after';
      setDropTarget({ loadId, position });
    };
    const onLoadDrop = (loadId) => (e) => {
      if (!dragLoadId || !dropTarget) return;
      e.preventDefault();
      dispatch({
        type: 'reorderLoad',
        container: isBay
          ? { kind: 'bay', zoneId: parentZone.id, bayId: entity.id }
          : { kind: 'buffer', bufferId: entity.id },
        loadId: dragLoadId,
        targetLoadId: loadId,
        position: dropTarget.position,
      });
      setDragLoadId(null);
      setDropTarget(null);
    };

    const onMoveLoads = (dest) => {
      const ids = Array.from(selectedLoadIds);
      if (ids.length === 0) return;
      if (isBay) {
        dispatch({ type: 'moveLoads', loadIds: ids, dest });
      } else {
        dispatch({ type: 'moveLoadsFromBuffer', loadIds: ids, sourceBufferId: entity.id, dest });
      }
      setSelectedLoadIds(new Set());
    };

    // Field updaters
    const updateEntity = (patch) => {
      if (isBay) dispatch({ type: 'updateBay', zoneId: parentZone.id, bayId: entity.id, patch });
      else dispatch({ type: 'updateZone', id: entity.id, kind: 'buffer', patch });
    };

    const totalBales = loads.reduce((a, l) => a + (l.bales || 0), 0);
    const totalWeight = loads.reduce((a, l) => a + (l.weight || 0), 0);
    const accessPattern = entity.accessPattern || parentZone?.inventoryRule || 'NONE';
    const showStackHeight = isBay && parentZone?.stackHeightsEnabled;

    const hasActiveList = (pickingLists || []).some(pl => pl.loads && pl.loads.length > 0);

    return (
      <div className="max-w-[1100px] mx-auto px-8 py-6 pb-32">
        {/* Breadcrumb — warehouse pattern (purple links, slash separators) */}
        <nav aria-label="Breadcrumb" className="flex items-center gap-2 text-[13px] flex-wrap mb-3">
          <button onClick={onBack} className="text-safi-600 hover:underline">Yard overview</button>
          {isBay && parentZone && (
            <>
              <span className="text-neutral-40">/</span>
              <button onClick={onBackToZone} className="text-safi-600 hover:underline">{parentZone.name}</button>
            </>
          )}
          <span className="text-neutral-40">/</span>
          <span className="text-neutral-100 font-medium">{entity.name}</span>
        </nav>

        {hasActiveList && (
          <div className="mb-4 rounded-md border border-amber-300 bg-amber-50 px-4 py-3 flex items-start gap-3">
            <Icon d={I.errorCircle} className="w-5 h-5 text-amber-700 shrink-0 mt-0.5" />
            <div className="text-[13px] text-amber-900 leading-relaxed">
              <strong className="font-semibold">Active picking list:</strong>{' '}
              reordering loads may affect FOs currently picking from {isBay ? `this bay` : `this buffer`}.
            </div>
          </div>
        )}

        {/* R63: single warehouse-style outer card wrapping all detail content. */}
        <div className="bg-white border border-neutral-10 rounded-xl p-5">
          {/* Detail header — name + lines + lock + (bay-only) access/stack + delete */}
          <div className="flex items-center gap-3 flex-wrap mb-2">
            <div className="relative">
              <label className="absolute -top-2 left-2 bg-white px-1 text-[11px] text-neutral-60 z-10">
                {isBay ? 'Bay name' : 'Buffer name'}
              </label>
              <input
                type="text"
                value={entity.name}
                onChange={e => updateEntity({ name: e.target.value })}
                className="w-[220px] h-9 px-3 border border-neutral-10 rounded-md text-[14px] focus:outline-none focus:ring-2 focus:ring-safi-600 focus:border-safi-600"
              />
            </div>
            {/* For bays, production lines are inherited from the parent zone (read-only).
                For buffers, they're editable here. */}
            {isBay ? (
              <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-md bg-neutral-5 border border-neutral-10">
                <span className="text-[11px] text-neutral-60">Lines (from zone):</span>
                {(parentZone?.lines || []).map(l => (
                  <span key={l} className="px-2 py-0.5 bg-white rounded-full text-[12px] border border-neutral-10">{l}</span>
                ))}
              </div>
            ) : (
              <ProductionLinesDropdown
                lines={entity.lines || []}
                onChange={lines => updateEntity({ lines })}
              />
            )}
            <SplitLock
              lockedStorage={!!entity.lockedStorage}
              lockedProcessing={!!entity.lockedProcessing}
              onChange={({ lockedStorage, lockedProcessing }) => updateEntity({ lockedStorage, lockedProcessing })}
            />
            {/* R64: delete only when empty. Tooltip explains why it's available. */}
            {loads.length === 0 ? (
              <button
                type="button"
                onClick={() => {
                  if (isBay) dispatch({ type: 'deleteBay', zoneId: parentZone.id, bayId: entity.id });
                  else dispatch({ type: 'deleteBuffer', id: entity.id });
                }}
                title={`Delete ${entity.name} — no loads stored`}
                aria-label={`Delete ${entity.name}`}
                className="ml-auto inline-flex items-center justify-center w-9 h-9 rounded-md border border-danger-200 text-danger-700 bg-white hover:bg-danger-50"
              >
                <Icon d={I.trash} className="w-3.5 h-3.5" />
              </button>
            ) : (
              <span className="ml-auto" aria-hidden="true" />
            )}
          </div>
          {/* Bay-only: access pattern + stack height */}
          {isBay && (
            <div className="flex items-center gap-3 flex-wrap mb-2">
              <AccessPatternSelect
                value={accessPattern}
                onChange={v => updateEntity({ accessPattern: v })}
              />
              {showStackHeight && (
                <div className="flex items-center gap-1.5">
                  <span className="text-[12px] text-neutral-60">Stack height:</span>
                  <input
                    type="number"
                    value={entity.stackLimit ?? ''}
                    onChange={e => updateEntity({ stackLimit: e.target.value ? Math.max(1, Number(e.target.value)) : null })}
                    placeholder="—"
                    min="1"
                    className="w-14 h-7 px-1.5 border border-neutral-10 rounded text-[12px] text-center"
                  />
                  <span className="text-[11px] text-neutral-60">bales high</span>
                </div>
              )}
            </div>
          )}
          {/* Stats line + Select all */}
          <div className="flex items-center justify-between text-[13px] text-neutral-60 mb-3 mt-1 pb-3 border-b border-neutral-10">
            <span>{loads.length} {loads.length === 1 ? 'load' : 'loads'} · {fmtNum(totalBales)} bales · {fmtKg(totalWeight)}</span>
            {loads.length > 0 && (
              <button
                type="button"
                onClick={onSelectAll}
                className="text-[13px] text-safi-700 font-semibold hover:underline"
              >
                {allSelected ? 'Deselect all' : 'Select all'}
              </button>
            )}
          </div>

          {/* R63: Load list — uses warehouse-style AIResultChips. No Reject /
              external-open buttons (per spec). Drag-to-reorder + checkboxes. */}
          {loads.length === 0 ? (
            <div className="rounded-lg border-2 border-dashed border-neutral-20 bg-neutral-5 px-6 py-12 text-center text-[13px] text-neutral-60">
              {isBay ? 'No loads in this bay yet.' : 'No material in the buffer.'}
            </div>
          ) : (
            <ul className="divide-y divide-neutral-10">
              {loads.map((load, idx) => {
                const isSelected = selectedLoadIds.has(load.id);
                const isDragging = dragLoadId === load.id;
                const showBefore = dropTarget?.loadId === load.id && dropTarget.position === 'before';
                const showAfter  = dropTarget?.loadId === load.id && dropTarget.position === 'after' && idx === loads.length - 1;
                return (
                  <React.Fragment key={load.id}>
                    {showBefore && <li className="h-[2px] rounded-full bg-safi-600 list-none" aria-hidden="true" />}
                    <li
                      draggable
                      onDragStart={onLoadDragStart(load.id)}
                      onDragEnd={onLoadDragEnd}
                      onDragOver={onLoadDragOver(load.id)}
                      onDrop={onLoadDrop(load.id)}
                      onClick={() => onToggleSelect(load.id)}
                      className={
                        'group flex items-start gap-3 px-3 py-3 transition-colors cursor-pointer ' +
                        (isDragging ? 'opacity-40 ' : '') +
                        (isSelected ? 'bg-safi-50' : 'hover:bg-safi-100/40')
                      }
                    >
                      {/* Drag handle */}
                      <span className="text-neutral-40 cursor-grab active:cursor-grabbing shrink-0 mt-1" title="Drag to reorder" onClick={(e) => e.stopPropagation()}>
                        <Icon d={I.list} className="w-3.5 h-4" />
                      </span>
                      <input
                        type="checkbox"
                        checked={isSelected}
                        onChange={() => onToggleSelect(load.id)}
                        onClick={(e) => e.stopPropagation()}
                        className="mt-1 shrink-0 cursor-pointer rounded text-safi-600 focus:ring-safi-500"
                        aria-label={`Select load ${load.lot}`}
                      />
                      <div className="flex-1 min-w-0">
                        {/* R64: buffer rows lead with the bale-count from the load,
                            because the buffer is a partial holding area — knowing
                            how many bales of that load are staged here is the key
                            datum for bale-based processing. Bay rows keep the
                            existing supplier-first title since the bay holds the
                            full load (or what's left of it). */}
                        {isBay ? (
                          <>
                            <div className="flex items-center gap-2 flex-wrap">
                              <span className="text-neutral-100 group-hover:text-safi-600 transition-colors">{load.supplier}</span>
                              <span className="text-neutral-40 text-sm">#{load.lot}</span>
                              <AIResultChips load={load} />
                            </div>
                            {load.description && (
                              <div className="text-[13px] text-amber-900 bg-amber-50/50 border border-amber-200/60 rounded px-2 py-1 mt-1 inline-flex items-start gap-1.5 max-w-full">
                                <Icon d={I.info} className="w-3.5 h-3.5 mt-0.5 text-amber-700 shrink-0" />
                                <span className="break-words">{load.description}</span>
                              </div>
                            )}
                            <div className="text-[13px] text-neutral-60 mt-1">
                              {fmtNum(load.bales)} bales · {fmtKg(load.weight)}
                            </div>
                          </>
                        ) : (
                          // Buffer context — emphasise the partial-from-load semantics
                          <>
                            <div className="flex items-center gap-2 flex-wrap">
                              <span className="text-neutral-100 font-medium group-hover:text-safi-600 transition-colors">
                                {fmtNum(load.bales)} bales ({fmtKg(load.weight)}) from load {load.supplier}
                              </span>
                              <span className="text-neutral-40 text-sm">#{load.lot}</span>
                            </div>
                            <div className="mt-1">
                              <AIResultChips load={load} />
                            </div>
                            {load.description && (
                              <div className="text-[13px] text-amber-900 bg-amber-50/50 border border-amber-200/60 rounded px-2 py-1 mt-1 inline-flex items-start gap-1.5 max-w-full">
                                <Icon d={I.info} className="w-3.5 h-3.5 mt-0.5 text-amber-700 shrink-0" />
                                <span className="break-words">{load.description}</span>
                              </div>
                            )}
                          </>
                        )}
                      </div>
                    </li>
                    {showAfter && <li className="h-[2px] rounded-full bg-safi-600 list-none" aria-hidden="true" />}
                  </React.Fragment>
                );
              })}
            </ul>
          )}
        </div>

        {/* Floating action bar — move selected loads out */}
        {selectedLoadIds.size > 0 && (
          <MoveLoadsBar
            count={selectedLoadIds.size}
            sourceZoneId={isBay ? parentZone.id : null}
            sourceBayId={isBay ? entity.id : null}
            yard={yard}
            bufferZones={bufferZones}
            onMove={onMoveLoads}
            onCancel={() => setSelectedLoadIds(new Set())}
          />
        )}
      </div>
    );
  }

  // Single row in the Edit Warehouse list. Handles both zones and buffer zones.
  // R63: whole row is a clickable card with a purple hover border (matches
  // the warehouse zone cards). Inner controls stopPropagation so they're not
  // mistaken for navigation clicks.
  function EditWarehouseRow({ entity, kind, dispatch, onOpen, dragHandlers = {} }) {
    const stats = kind === 'zone'
      ? zoneStats(entity)
      // Buffer aggregates are derived from its loads array (R61 Phase 3)
      : {
          loads: (entity.loads || []).length,
          bales: (entity.loads || []).reduce((a, l) => a + (l.bales || 0), 0),
          weight: (entity.loads || []).reduce((a, l) => a + (l.weight || 0), 0),
        };
    // R63: can delete only when nothing is stored.
    const canDelete = stats.loads === 0;
    // R63: whole row is a clickable card. Click anywhere outside the inner
    // controls drills into the zone/buffer detail. Hover shows a purple border
    // to match the warehouse zone cards (familiar interaction pattern).
    const onCardClick = () => onOpen && onOpen(entity.id);
    const stop = (e) => e.stopPropagation();
    return (
      <div
        role="button"
        tabIndex={0}
        onClick={onCardClick}
        onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onCardClick(); } }}
        className="border border-neutral-10 rounded-xl bg-white p-4 flex items-start gap-3 cursor-pointer transition hover:border-safi-300 hover:shadow-sm focus:outline-none focus:ring-2 focus:ring-safi-600"
        {...dragHandlers}
      >
        <span
          className="text-neutral-40 cursor-grab mt-3 shrink-0 select-none active:cursor-grabbing"
          title="Drag to reorder"
          draggable={dragHandlers.draggable !== false}
          onClick={stop}
        >
          <Icon d={I.list} className="w-4 h-4" />
        </span>
        <div className="flex-1 min-w-0 space-y-3">
          <div className="flex items-center gap-3 flex-wrap" onClick={stop}>
            {/* Name input with floating label */}
            <div className="relative">
              <label className="absolute -top-2 left-2 bg-white px-1 text-[11px] text-neutral-60 z-10">
                {kind === 'zone' ? 'Zone name' : 'Buffer name'}
              </label>
              <input
                type="text"
                value={entity.name}
                onChange={e => dispatch({ type: 'updateZone', id: entity.id, kind, patch: { name: e.target.value } })}
                className="w-[220px] h-9 px-3 border border-neutral-10 rounded-md text-[14px] text-neutral-100 bg-white focus:outline-none focus:ring-2 focus:ring-safi-600 focus:border-safi-600"
              />
            </div>
            <ProductionLinesDropdown
              lines={entity.lines || []}
              onChange={lines => dispatch({ type: 'updateZone', id: entity.id, kind, patch: { lines } })}
            />
            <SplitLock
              lockedStorage={!!entity.lockedStorage}
              lockedProcessing={!!entity.lockedProcessing}
              onChange={({ lockedStorage, lockedProcessing }) => dispatch({
                type: 'updateZone', id: entity.id, kind,
                patch: { lockedStorage, lockedProcessing }
              })}
            />
            {/* R64: delete only renders when empty. The presence of the button
                IS the affordance — no need for a disabled state with conflicting
                tooltip. Tooltip clarifies why the button is available. */}
            {canDelete ? (
              <button
                type="button"
                onClick={(e) => { e.stopPropagation(); dispatch({ type: kind === 'buffer' ? 'deleteBuffer' : 'deleteZone', id: entity.id }); }}
                title={`Delete ${entity.name} — no loads stored`}
                aria-label={`Delete ${entity.name}`}
                className="ml-auto inline-flex items-center justify-center w-9 h-9 rounded-md border border-danger-200 text-danger-700 bg-white hover:bg-danger-50"
              >
                <Icon d={I.trash} className="w-3.5 h-3.5" />
              </button>
            ) : (
              // Keep the right-aligned spacing consistent
              <span className="ml-auto" aria-hidden="true" />
            )}
          </div>
          {/* Stats */}
          {kind === 'zone' && stats && (
            <div className="flex items-center gap-8">
              <Metric2 label="Bays" value={fmtNum(stats.bays)} />
              <Metric2 label="Loads" value={fmtNum(stats.loads)} />
              <Metric2 label="Bales" value={fmtNum(stats.bales)} />
              <Metric2 label="Weight" value={fmtKg(stats.weight)} />
            </div>
          )}
          {kind === 'buffer' && (
            <div className="flex items-center gap-8">
              <Metric2 label="Loads" value={fmtNum(stats.loads || 0)} />
              <Metric2 label="Bales" value={fmtNum(stats.bales || 0)} />
              <Metric2 label="Weight" value={fmtKg(stats.weight || 0)} />
            </div>
          )}
        </div>
      </div>
    );
  }

  // Full-screen Edit Warehouse overlay. Phase 1 ships the yard landing view;
  // Phase 2 adds the zone+bays view (drill in via "Configure bays" on any zone
  // row). View state is tracked here so the navigation lives in one place.
  function EditWarehouseOverlay({ open, onClose, yard, setYard, bufferZones, setBufferZones, pickingLists = [], setToast }) {
    const [searchInv, setSearchInv] = useState('');
    // 'yard' = list of zones + buffers · 'zone' = drilling into a zone's bays
    const [view, setView] = useState({ kind: 'yard' });
    // R63: drag state for reordering zones/buffers in the yard view
    const [dragItem, setDragItem] = useState(null);  // { id, kind: 'zone'|'buffer' }
    const [dropTarget, setDropTarget] = useState(null);  // { id, position: 'before'|'after' }

    // R62 fix: ALL hooks must be called unconditionally. Compute view targets
    // here (before the early return) so the fallback-useEffect below can be
    // declared without violating the Rules of Hooks.
    const currentZone = (view.kind === 'zone' || view.kind === 'bay')
      ? yard.find(z => z.id === view.zoneId) : null;
    const currentBay = view.kind === 'bay' && currentZone
      ? currentZone.bays.find(b => b.id === view.bayId) : null;
    const currentBuffer = view.kind === 'buffer'
      ? (bufferZones || []).find(b => b.id === view.bufferId) : null;

    // Reset view when overlay closes — next open starts at the yard view
    useEffect(() => {
      if (!open) {
        setView({ kind: 'yard' });
        setSearchInv('');
      }
    }, [open]);

    // Fall back gracefully if the targeted zone/bay/buffer disappears
    useEffect(() => {
      if (!open) return;
      if (view.kind === 'zone' && !currentZone) setView({ kind: 'yard' });
      if (view.kind === 'bay' && !currentBay) setView(currentZone ? { kind: 'zone', zoneId: currentZone.id } : { kind: 'yard' });
      if (view.kind === 'buffer' && !currentBuffer) setView({ kind: 'yard' });
    }, [open, view, currentZone, currentBay, currentBuffer]);

    if (!open) return null;

    // Active picking list = any list that's been created with loads
    const hasActiveList = (pickingLists || []).some(pl => pl.loads && pl.loads.length > 0);

    // Helper for auto-naming new bays based on the zone's existing pattern.
    // Detects numerical (Bay 5 → Bay 6) or alphabetical (Bay E → Bay F) and
    // continues. Falls back to "Bay N" using count.
    const nextBayName = (z) => {
      const names = (z.bays || []).map(b => b.name);
      const nums = names.map(n => (n.match(/(\d+)\s*$/) || [])[1]).filter(Boolean).map(Number);
      if (nums.length) return `Bay ${Math.max(...nums) + 1}`;
      const alphas = names.map(n => (n.match(/([A-Z])\s*$/i) || [])[1]).filter(Boolean);
      if (alphas.length) {
        const code = Math.max(...alphas.map(a => a.toUpperCase().charCodeAt(0)));
        return `Bay ${String.fromCharCode(code + 1)}`;
      }
      return `Bay ${(z.bays || []).length + 1}`;
    };

    const dispatch = (action) => {
      switch (action.type) {
        case 'updateZone':
          if (action.kind === 'buffer') {
            setBufferZones(prev => prev.map(z => z.id === action.id ? { ...z, ...action.patch } : z));
          } else {
            setYard(prev => prev.map(z => z.id === action.id ? { ...z, ...action.patch } : z));
          }
          break;
        case 'updateBay': {
          setYard(prev => prev.map(z => {
            if (z.id !== action.zoneId) return z;
            return {
              ...z,
              bays: z.bays.map(b => b.id === action.bayId ? { ...b, ...action.patch } : b),
            };
          }));
          break;
        }
        case 'addZone': {
          const usedLetters = new Set(yard.map(z => z.name.replace(/^Zone\s+/, '').trim()));
          let letter = 'A';
          for (let i = 0; i < 26; i++) {
            const c = String.fromCharCode(65 + i);
            if (!usedLetters.has(c)) { letter = c; break; }
          }
          const id = `Z${letter}-${Math.random().toString(36).slice(2, 5)}`;
          setYard(prev => [...prev, {
            id, name: `Zone ${letter}`, esName: `Zone ${letter}`, color: 'none',
            inventoryRule: 'NONE', lines: ['Apan 1', 'Apan 2'],
            lockedStorage: false, lockedProcessing: false,
            stackHeightsEnabled: false, defaultStackHeight: null,
            bays: [{ id: `${id}-1`, name: 'Bay 1', esName: 'Bay 1', accessible: true, loads: [] }],
          }]);
          setToast?.({ message: `Zone ${letter} added`, kind: 'success' });
          break;
        }
        case 'addBuffer': {
          const id = `buf-${Math.random().toString(36).slice(2, 5)}`;
          const n = bufferZones.length + 1;
          setBufferZones(prev => [...prev, {
            id, name: `Buffer ${n}`, lines: ['Apan 1', 'Apan 2'],
            lockedStorage: false, lockedProcessing: false,
            loads: [],
          }]);
          setToast?.({ message: `Buffer ${n} added`, kind: 'success' });
          break;
        }
        case 'deleteZone': {
          // R63: delete zone — gated to empty zones at the call site
          const z = yard.find(z => z.id === action.id);
          if (!z) break;
          const totalLoads = (z.bays || []).reduce((a, b) => a + (b.loads || []).length, 0);
          if (totalLoads > 0) { setToast?.({ message: `Can't delete — ${totalLoads} loads stored`, kind: 'error' }); break; }
          setYard(prev => prev.filter(zone => zone.id !== action.id));
          setView({ kind: 'yard' });
          setToast?.({ message: `${z.name} deleted`, kind: 'success' });
          break;
        }
        case 'deleteBuffer': {
          const b = bufferZones.find(b => b.id === action.id);
          if (!b) break;
          const ln = (b.loads || []).length;
          if (ln > 0) { setToast?.({ message: `Can't delete — ${ln} loads stored`, kind: 'error' }); break; }
          setBufferZones(prev => prev.filter(buf => buf.id !== action.id));
          setView({ kind: 'yard' });
          setToast?.({ message: `${b.name} deleted`, kind: 'success' });
          break;
        }
        case 'deleteBay': {
          // Gated to bays with no loads
          const z = yard.find(z => z.id === action.zoneId);
          if (!z) break;
          const bay = z.bays.find(b => b.id === action.bayId);
          if (!bay) break;
          if ((bay.loads || []).length > 0) { setToast?.({ message: `Can't delete — ${bay.loads.length} loads stored`, kind: 'error' }); break; }
          setYard(prev => prev.map(zz => zz.id !== action.zoneId ? zz : ({ ...zz, bays: zz.bays.filter(b => b.id !== action.bayId) })));
          setToast?.({ message: `${bay.name} deleted`, kind: 'success' });
          break;
        }
        case 'reorderZone': {
          // R63: drag-drop zone reordering (yard view)
          setYard(prev => {
            const idx = prev.findIndex(z => z.id === action.id);
            const tgtIdx = prev.findIndex(z => z.id === action.targetId);
            if (idx < 0 || tgtIdx < 0 || idx === tgtIdx) return prev;
            const next = [...prev];
            const [moved] = next.splice(idx, 1);
            let insertAt = next.findIndex(z => z.id === action.targetId);
            if (action.position === 'after') insertAt += 1;
            next.splice(insertAt, 0, moved);
            return next;
          });
          break;
        }
        case 'reorderBuffer': {
          setBufferZones(prev => {
            const idx = prev.findIndex(z => z.id === action.id);
            const tgtIdx = prev.findIndex(z => z.id === action.targetId);
            if (idx < 0 || tgtIdx < 0 || idx === tgtIdx) return prev;
            const next = [...prev];
            const [moved] = next.splice(idx, 1);
            let insertAt = next.findIndex(z => z.id === action.targetId);
            if (action.position === 'after') insertAt += 1;
            next.splice(insertAt, 0, moved);
            return next;
          });
          break;
        }
        case 'addBay': {
          // R61 Phase 2: auto-name from existing pattern + inherit zone's
          // default stack height (if stack heights are enabled for this zone).
          setYard(prev => prev.map(z => {
            if (z.id !== action.zoneId) return z;
            const name = nextBayName(z);
            const newBay = {
              id: `${z.id}-${Math.random().toString(36).slice(2, 5)}`,
              name, esName: name, accessible: true, loads: [],
              accessPattern: z.inventoryRule || 'NONE',
              lockedStorage: false, lockedProcessing: false,
              stackLimit: z.stackHeightsEnabled ? (z.defaultStackHeight ?? null) : null,
            };
            return { ...z, bays: [...z.bays, newBay] };
          }));
          break;
        }
        case 'bulkStackLimit': {
          // Apply value (or null) as the stackLimit on every bay in the zone.
          // Also stashes the value as zone.defaultStackHeight so new bays
          // inherit it.
          setYard(prev => prev.map(z => {
            if (z.id !== action.zoneId) return z;
            return {
              ...z,
              defaultStackHeight: action.value,
              bays: z.bays.map(b => ({ ...b, stackLimit: action.value })),
            };
          }));
          setToast?.({
            message: action.value == null ? 'Stack heights cleared' : `Stack height ${action.value} applied to all bays`,
            kind: 'success'
          });
          break;
        }
        case 'moveLoads': {
          // Move selected loads to a bay (dest.kind === 'bay') or buffer (dest.kind === 'buffer').
          // Loads are removed from their source bay; counts/weights update.
          const idSet = new Set(action.loadIds);
          let moved = [];
          // Remove from source
          setYard(prev => prev.map(z => ({
            ...z,
            bays: z.bays.map(b => {
              const keep = [];
              for (const l of b.loads) {
                if (idSet.has(l.id)) moved.push({ ...l });
                else keep.push(l);
              }
              return { ...b, loads: keep };
            }),
          })));
          // Append to destination
          if (action.dest.kind === 'bay') {
            setYard(prev => prev.map(z => {
              if (z.id !== action.dest.zoneId) return z;
              return {
                ...z,
                bays: z.bays.map(b => b.id === action.dest.bayId ? { ...b, loads: [...b.loads, ...moved] } : b),
              };
            }));
          } else if (action.dest.kind === 'buffer') {
            // R61 Phase 3: buffers now carry full loads[] so the moved loads
            // remain selectable + reorderable inside the buffer detail view.
            setBufferZones(prev => prev.map(b => b.id === action.dest.bufferId
              ? { ...b, loads: [...(b.loads || []), ...moved] }
              : b));
          }
          setToast?.({ message: `Moved ${moved.length} ${moved.length === 1 ? 'load' : 'loads'}`, kind: 'success' });
          break;
        }
        case 'moveLoadsFromBuffer': {
          // Move loads OUT of a buffer to a destination (bay or another buffer).
          // Used by the buffer detail view's multi-select Move action.
          const idSet = new Set(action.loadIds);
          let moved = [];
          setBufferZones(prev => prev.map(b => {
            if (b.id !== action.sourceBufferId) return b;
            const keep = [];
            for (const l of (b.loads || [])) {
              if (idSet.has(l.id)) moved.push({ ...l });
              else keep.push(l);
            }
            return { ...b, loads: keep };
          }));
          if (action.dest.kind === 'bay') {
            setYard(prev => prev.map(z => {
              if (z.id !== action.dest.zoneId) return z;
              return {
                ...z,
                bays: z.bays.map(b => b.id === action.dest.bayId ? { ...b, loads: [...b.loads, ...moved] } : b),
              };
            }));
          } else if (action.dest.kind === 'buffer') {
            setBufferZones(prev => prev.map(b => b.id === action.dest.bufferId
              ? { ...b, loads: [...(b.loads || []), ...moved] }
              : b));
          }
          setToast?.({ message: `Moved ${moved.length} ${moved.length === 1 ? 'load' : 'loads'}`, kind: 'success' });
          break;
        }
        case 'reorderLoad': {
          // R61 Phase 3: reorder a load within its container (bay or buffer).
          // position = 'before' | 'after' relative to targetLoadId.
          const reorder = (arr) => {
            const fromIdx = arr.findIndex(l => l.id === action.loadId);
            let toIdx = arr.findIndex(l => l.id === action.targetLoadId);
            if (fromIdx < 0 || toIdx < 0 || fromIdx === toIdx) return arr;
            const next = [...arr];
            const [m] = next.splice(fromIdx, 1);
            if (action.position === 'after') toIdx = fromIdx < toIdx ? toIdx : toIdx + 1;
            else                              toIdx = fromIdx < toIdx ? toIdx - 1 : toIdx;
            next.splice(toIdx, 0, m);
            return next;
          };
          if (action.container.kind === 'bay') {
            setYard(prev => prev.map(z => {
              if (z.id !== action.container.zoneId) return z;
              return {
                ...z,
                bays: z.bays.map(b => b.id === action.container.bayId ? { ...b, loads: reorder(b.loads) } : b),
              };
            }));
          } else if (action.container.kind === 'buffer') {
            setBufferZones(prev => prev.map(b => b.id === action.container.bufferId
              ? { ...b, loads: reorder(b.loads || []) }
              : b));
          }
          break;
        }
      }
    };

    // (currentZone / currentBay / currentBuffer + their fallback useEffect
    //  are now declared above the early return to satisfy the Rules of Hooks.)

    // Buffers first (matching Figma — Buffer appears at top of list), then zones
    const allEntities = [
      ...(bufferZones || []).map(b => ({ entity: b, kind: 'buffer' })),
      ...yard.map(z => ({ entity: z, kind: 'zone' })),
    ];

    return (
      <div className="fixed inset-0 z-50 bg-neutral-5 overflow-y-auto" role="dialog" aria-modal="true" aria-label="Edit warehouse">
        {/* Shared title strip (kept identical across views so the user never
            loses context that they're in Edit Warehouse mode) */}
        <div className="max-w-[1400px] mx-auto px-8 pt-8 pb-2 flex items-start justify-between gap-6 flex-wrap">
          <h1 className="text-3xl font-bold text-neutral-100">Edit warehouse</h1>
          <div className="flex items-center gap-2 flex-wrap">
            <div className="relative w-[280px]">
              <label className="absolute -top-2 left-2 bg-neutral-5 px-1 text-[11px] text-neutral-60 z-10">Search inventory</label>
              <input
                type="text"
                value={searchInv}
                onChange={e => setSearchInv(e.target.value)}
                placeholder="Load ID, supplier or order ref"
                className="w-full h-10 pl-9 pr-3 border border-neutral-10 rounded-md text-[14px] bg-white focus:outline-none focus:ring-2 focus:ring-safi-600 focus:border-safi-600"
              />
              <span className="absolute left-3 top-3 text-neutral-40 pointer-events-none">
                <Icon d={I.search} className="w-4 h-4" />
              </span>
            </div>
            {/* Add buttons are yard-view-only */}
            {view.kind === 'yard' && (
              <>
                <button
                  type="button"
                  onClick={() => dispatch({ type: 'addZone' })}
                  className="inline-flex items-center gap-1.5 px-4 py-2 rounded-md border border-neutral-10 bg-white text-[14px] font-medium text-neutral-100 hover:bg-neutral-5 min-h-[40px]"
                >
                  <Icon d={I.plus} className="w-3.5 h-3.5" />
                  Zone
                </button>
                <button
                  type="button"
                  onClick={() => dispatch({ type: 'addBuffer' })}
                  className="inline-flex items-center gap-1.5 px-4 py-2 rounded-md border border-neutral-10 bg-white text-[14px] font-medium text-neutral-100 hover:bg-neutral-5 min-h-[40px]"
                >
                  <Icon d={I.plus} className="w-3.5 h-3.5" />
                  Buffer
                </button>
              </>
            )}
          </div>
        </div>

        {/* View-specific body */}
        {view.kind === 'yard' ? (
          <div className="max-w-[1200px] mx-auto px-8 py-4 pb-28">
            {/* Active picking list warning — yard view only.
                Zone view shows its own scoped version (see EditWarehouseZoneBody). */}
            {hasActiveList && (
              <div className="mb-4 rounded-md border border-amber-300 bg-amber-50 px-4 py-3 flex items-start gap-3">
                <Icon d={I.errorCircle} className="w-5 h-5 text-amber-700 shrink-0 mt-0.5" />
                <div className="text-[13px] text-amber-900 leading-relaxed">
                  <strong className="font-semibold">Active picking list:</strong>{' '}
                  changes here may affect Forklift Operators currently picking material from active picking lists.
                  Review any structural changes carefully.
                </div>
              </div>
            )}
            <div className="space-y-3">
              {allEntities.map(({ entity, kind }) => {
                // R63: drag handlers — same-kind reordering only
                // (drop a zone among zones or a buffer among buffers).
                const isDragging = dragItem && dragItem.id === entity.id;
                const drop = dropTarget && dropTarget.id === entity.id ? dropTarget.position : null;
                const dragHandlers = {
                  draggable: true,
                  onDragStart: (e) => {
                    setDragItem({ id: entity.id, kind });
                    e.dataTransfer.effectAllowed = 'move';
                    try { e.dataTransfer.setData('text/plain', entity.id); } catch {}
                  },
                  onDragEnd: () => { setDragItem(null); setDropTarget(null); },
                  onDragOver: (e) => {
                    if (!dragItem || dragItem.kind !== kind || dragItem.id === entity.id) return;
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    const r = e.currentTarget.getBoundingClientRect();
                    const pos = (e.clientY - r.top) < r.height / 2 ? 'before' : 'after';
                    setDropTarget({ id: entity.id, position: pos });
                  },
                  onDrop: (e) => {
                    if (!dragItem || dragItem.kind !== kind) return;
                    e.preventDefault();
                    const pos = (dropTarget && dropTarget.id === entity.id) ? dropTarget.position : 'after';
                    dispatch({
                      type: kind === 'zone' ? 'reorderZone' : 'reorderBuffer',
                      id: dragItem.id, targetId: entity.id, position: pos,
                    });
                    setDragItem(null);
                    setDropTarget(null);
                  },
                };
                return (
                  <React.Fragment key={entity.id}>
                    {drop === 'before' && <div className="h-1 -my-0.5 rounded bg-safi-600" aria-hidden="true" />}
                    <div className={isDragging ? 'opacity-40' : ''}>
                      <EditWarehouseRow
                        entity={entity}
                        kind={kind}
                        dispatch={dispatch}
                        onOpen={(id) => setView(
                          kind === 'zone'
                            ? { kind: 'zone', zoneId: id }
                            : { kind: 'buffer', bufferId: id }
                        )}
                        dragHandlers={dragHandlers}
                      />
                    </div>
                    {drop === 'after' && <div className="h-1 -my-0.5 rounded bg-safi-600" aria-hidden="true" />}
                  </React.Fragment>
                );
              })}
              {allEntities.length === 0 && (
                <div className="rounded-lg border-2 border-dashed border-neutral-20 bg-white px-6 py-12 text-center text-[14px] text-neutral-60">
                  No zones or buffers yet. Use the + Zone or + Buffer button above to add one.
                </div>
              )}
            </div>
          </div>
        ) : view.kind === 'zone' && currentZone ? (
          <EditWarehouseZoneBody
            zone={currentZone}
            yard={yard}
            bufferZones={bufferZones}
            dispatch={dispatch}
            onBack={() => setView({ kind: 'yard' })}
            pickingLists={pickingLists}
            onOpenBay={(bayId) => setView({ kind: 'bay', zoneId: currentZone.id, bayId })}
          />
        ) : view.kind === 'bay' && currentBay && currentZone ? (
          <EditWarehouseDetailBody
            container={{ kind: 'bay', entity: currentBay, parentZone: currentZone }}
            yard={yard}
            bufferZones={bufferZones}
            dispatch={dispatch}
            onBack={() => setView({ kind: 'yard' })}
            onBackToZone={() => setView({ kind: 'zone', zoneId: currentZone.id })}
            pickingLists={pickingLists}
          />
        ) : view.kind === 'buffer' && currentBuffer ? (
          <EditWarehouseDetailBody
            container={{ kind: 'buffer', entity: currentBuffer }}
            yard={yard}
            bufferZones={bufferZones}
            dispatch={dispatch}
            onBack={() => setView({ kind: 'yard' })}
            pickingLists={pickingLists}
          />
        ) : null}

        {/* Footer */}
        <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-neutral-10 px-6 py-3 flex items-center justify-end gap-2 z-10">
          <button
            type="button"
            onClick={onClose}
            className="px-4 py-2 rounded-md border border-neutral-10 bg-white text-[13px] font-medium text-neutral-100 hover:bg-neutral-5 min-h-[40px]"
          >Cancel</button>
          <button
            type="button"
            onClick={onClose}
            className="px-4 py-2 rounded-md bg-safi-600 text-white text-[13px] font-semibold hover:bg-safi-700 min-h-[40px]"
          >Save</button>
        </div>
      </div>
    );
  }

  // High-emphasis metric pair (label small, value large/bold) for the spatial view
  const Metric2 = ({ label, value }) => (
    <div className="leading-tight">
      <div className="text-[13px] text-neutral-60">{label}</div>
      <div className="text-base font-bold text-neutral-100">{value}</div>
    </div>
  );

  // LoadRow - single tappable row.
  //   - Default mode: hover shows "Open load details" tooltip. Clicking is a no-op
  //     (conceptual - no real load details page exists).
  //   - Create mode: clicking toggles selection.
  //   - Three AI result chips inline next to the order ref. Shown only if analysed.
  //   - "On picking list" indicator when this load is on the active picking list (default mode only).
  const LoadRow = ({ load, isCreating, accessible, isSelected, onToggle, onPickingList, isAccessibleLoad, onReject, claimedByLine = null, lockedByOtherLine = false }) => {
    const openDetails = (e) => {
      e.stopPropagation();
      // Conceptual placeholder - would normally navigate to a load details page.
    };
    const handleRowClick = () => {
      if (!accessible) return;
      if (isCreating) onToggle();
      // Default mode: no-op. Tooltip on hover advertises the intent.
    };
    return (
      <div
        id={'load-' + load.id}
        onClick={handleRowClick}
        role="button"
        tabIndex={accessible ? 0 : -1}
        aria-pressed={isCreating ? isSelected : undefined}
        title={isCreating ? undefined : 'Open load details'}
        onKeyDown={(e) => {
          if (!accessible) return;
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleRowClick(); }
        }}
        className={
          'group flex items-start gap-3 pl-11 pr-3 py-4 transition-colors ' + // 16px vertical, 12px horizontal
          (accessible
            ? 'cursor-pointer hover:bg-safi-100 ' + (isCreating && isSelected ? 'bg-safi-50' : '')
            : 'opacity-60 cursor-not-allowed')
        }
      >
        {isCreating && (
          <input
            type="checkbox"
            checked={isSelected}
            onChange={onToggle}
            disabled={!accessible}
            className="mt-1 rounded text-safi-600 focus:ring-safi-500 disabled:opacity-40"

  // ============================================================================
  // R46: PAGE: QUALITY CONTROL
  //
  // Recreates the Safi UI Kit "Quality control" screen. Sample data covers 130
  // loads across a handful of suppliers; most are pending analysis (Average AI
  // results = "-", Create claim disabled), two have AI results + an active
  // Create claim button to demonstrate the analysed state.
  // ============================================================================
  // R50: supplier names are entirely fabricated. No real companies referenced.
  const QC_SUPPLIERS = [
    'Acme Recyclers', 'North Bay Materials', 'Riverside Reclaim', 'Apex Salvage',
    'Eastlake Sorting', 'Crestview Waste', 'Pine Ridge Yard', 'Oak Hollow Yard',
    'Summit Recycling', 'Maple Hub', 'Ironbridge Recovery', 'Harbour Salvage'
  ];
  const QC_MATERIALS = ['Clear PET Bales', 'Green PET Bales', 'Mixed PET Bales'];
  // Build 130 deterministic rows so the screen renders the same every reload.
  // Order refs follow the screenshot's 4500288xxx-XX pattern, dates step back
  // from 9 Jun 2026, suppliers cycle through the list. Two specific rows
  // (page 7, last two) carry analysis results.
  const QC_ROWS = (() => {
    const out = [];
    let dateDay = 9;
    const baseNum = 4500288078;
    for (let i = 0; i < 130; i++) {
      const supplier = QC_SUPPLIERS[i % QC_SUPPLIERS.length];
      const orderNum = baseNum + Math.floor(i / 3);
      const suffix = [10, 20, 30][i % 3];
      // Schedule dates step back by 1 day every 13 rows so a page mostly
      // shares the same date (matches the screenshot's repeated "9 Jun 2026").
      const day = Math.max(1, dateDay - Math.floor(i / 13));
      const material = i % 17 === 0 ? 'Green PET Bales' : (i % 23 === 0 ? 'Mixed PET Bales' : 'Clear PET Bales');
      // Rows at index 103 & 104 (the last two of page 7, matching the screenshot)
      // carry analysis results.
      let results = null;
      if (i === 103) {
        results = { type: 'green', primary: { label: 'Green PET', value: 79.7, ok: true }, secondary: { label: 'Non Target', value: 7.3, ok: false } };
      } else if (i === 104) {
        results = { type: 'pet', primary: { label: 'PET', value: 91.0, ok: true }, secondary: { label: 'Non PET', value: 9.0, ok: true } };
      }
      out.push({
        orderRef: `${orderNum}-${suffix}`,
        supplier,
        loadNo: '-',
        scheduledDay: day,
        material: results && i === 103 ? 'Green PET Bales' : material,
        results
      });
    }
    return out;
  })();

  // ============================================================================
  // R49: PAGE: STORE MATERIAL (forklift operator workflow, full-screen)
  //
  // Touch-sized for an iPad. The FO arrives with 3 / 6 / 9 / 12+ bales from
  // the lorry, walks to a zone+bay, then needs to log the addition in as few
  // taps as possible. Layout is two side-by-side columns:
  //   1) "How many bales?" - a large +/- stepper and quick-add chips.
  //   2) "Where?"          - zone tabs, then a touch-sized bay tile grid
  //                          reading from the live production yard.
  // A single full-width primary action confirms the addition. A running
  // session log shows the FO what they've added so far in this open flow.
  //
  // A persistent "Actual weight missing" banner reminds the FO to capture
  // the weight; it has an inline editor that updates the parent state.
  //
  // Confirming an addition appends an entry to the per-load storage map AND
  // appends a synthesised load object to the chosen yard bay so it shows up
  // in production management (requirement #6).
  // ============================================================================
  function StoreMaterialView({
    row, idx, yard, yardOps,
    setBuffer = () => {},
    stored = [],
    actualWeightOverride,
    totalBalesOverride,
    processedBales = 0,
    onAddStorage, onSetWeight, onToast,
    onDone, onCancel
  }) {
    // Default to 3 bales (most common stack height per the brief).
    const [bales, setBales] = useState(3);
    const [selectedZoneId, setSelectedZoneId] = useState(yard[0]?.id || null);
    const [selectedBayId, setSelectedBayId] = useState(null);
    // R55: ref + focus state for the horizontal bay row + minimap.
    const bayRowRef = useRef(null);
    const [focusBayId, setFocusBayId] = useState(null);
    // Session log - additions made in THIS open flow only. Cumulative load
    // storage lives in the parent state.
    const [sessionLog, setSessionLog] = useState([]);
    // Inline editor for the missing-weight banner.
    const [weightEditorOpen, setWeightEditorOpen] = useState(false);
    const [weightDraft, setWeightDraft] = useState('');

    const weightMissing = actualWeightOverride == null && idx % 2 === 0;

    // R53: zone "__buffer__" is a virtual destination (no real bays).
    const isBufferDest = selectedZoneId === '__buffer__';
    const selectedZone = isBufferDest ? null : (yard.find(z => z.id === selectedZoneId) || yard[0]);
    const selectedBay = isBufferDest
      ? null
      : (selectedZone?.bays.find(b => b.id === selectedBayId) || null);

    const stepBales = (d) => setBales(b => Math.max(1, Math.min(99, b + d)));
    const canAdd = bales > 0 && (isBufferDest || (selectedZone && selectedBay));
    const sessionTotal = sessionLog.reduce((a, e) => a + e.bales, 0);

    // R54: per-bale weight derived from actual load weight when known, so the
    // synthesised yard loads carry believable weights and "Total weight" sums
    // up correctly in the production warehouse view.
    const perBaleKg = (actualWeightOverride != null && totalBalesOverride != null && totalBalesOverride > 0)
      ? Math.round(actualWeightOverride / totalBalesOverride)
      : 250 + (idx % 30);

    // R55: tap-to-add helper used by the new bay row. Commits the current
    // bale count to the given zone/bay (or buffer) without any confirm step.
    const addBalesTo = (zoneId, bayId) => {
      if (bales <= 0) return;
      const isBuf = zoneId === '__buffer__';
      const entry = isBuf
        ? { zoneId: '__buffer__', bayId: null, bales }
        : { zoneId, bayId, bales };
      setSessionLog(prev => [...prev, entry]);
      onAddStorage?.(entry);
      if (isBuf && typeof setBuffer === 'function') {
        const uid = `qc-${idx}-buffer-${Date.now()}`;
        setBuffer(prev => [...prev, {
          uid,
          loadId: row.orderRef,
          supplier: row.supplier,
          lot: row.orderRef,
          bales,
          loadBales: totalBalesOverride || bales,
          weightPerBale: perBaleKg,
          sourceZoneId: '__qc__',
          sourceBayId: '__qc__'
        }]);
      }
      if (!isBuf && typeof yardOps?.addLoad === 'function') {
        const zoneObj = yard.find(z => z.id === zoneId);
        const bayObj = zoneObj?.bays.find(b => b.id === bayId);
        const synthLoad = {
          id: `qc-${idx}-${zoneId}-${bayId}-${Date.now()}`,
          supplier: row.supplier,
          lot: `${row.orderRef}-${sessionLog.length + 1}`,
          weight: bales * perBaleKg,
          bales,
          material: 'BLANCA',
          results: null,
          description: `From order ${row.orderRef}`,
          processedAt: null
        };
        yardOps.addLoad(zoneId, bayId, synthLoad);
      }
      const dest = isBuf ? 'the Buffer' : `Zone ${zoneId} · Bay ${bayId}`;
      onToast?.(`${bales} bales added to ${dest}`);
    };

    const handleAdd = () => {
      if (!canAdd) return;
      // 1) Build the storage entry. Buffer entries use a special zoneId so
      //    consumers (load details, yard) can branch on it.
      const entry = isBufferDest
        ? { zoneId: '__buffer__', bayId: null, bales }
        : { zoneId: selectedZone.id, bayId: selectedBay.id, bales };
      setSessionLog(prev => [...prev, entry]);
      onAddStorage?.(entry);
      // 2a) Buffer destination → push to the page-level buffer so the bales
      //     show up in the warehouse/picker views in Production Management.
      if (isBufferDest && typeof setBuffer === 'function') {
        const uid = `qc-${idx}-buffer-${Date.now()}`;
        setBuffer(prev => [...prev, {
          uid,
          loadId: row.orderRef,
          supplier: row.supplier,
          lot: row.orderRef,
          bales,
          loadBales: totalBalesOverride || bales,
          weightPerBale: perBaleKg,
          sourceZoneId: '__qc__',
          sourceBayId: '__qc__'
        }]);
      }
      // 2b) Zone+bay destination → append a synthesised load to the yard.
      if (!isBufferDest && typeof yardOps?.addLoad === 'function') {
        const synthLoad = {
          id: `qc-${idx}-${selectedZone.id}-${selectedBay.id}-${Date.now()}`,
          supplier: row.supplier,
          lot: `${row.orderRef}-${sessionLog.length + 1}`,
          weight: bales * perBaleKg,
          bales,
          material: 'BLANCA',
          results: null,
          description: `From order ${row.orderRef}`,
          processedAt: null
        };
        yardOps.addLoad(selectedZone.id, selectedBay.id, synthLoad);
      }
      // 3) Feedback + reset bay selection (keep bales for fast repeats).
      const dest = isBufferDest
        ? 'the Buffer'
        : `Zone ${selectedZone.id} · ${selectedBay.name || `Bay ${selectedBay.id}`}`;
      onToast?.(`${bales} bales added to ${dest}`);
      if (!isBufferDest) setSelectedBayId(null);
    };

    const handleSaveWeight = () => {
      const n = parseFloat(weightDraft);
      if (!Number.isFinite(n) || n <= 0) return;
      onSetWeight?.(Math.round(n));
      setWeightEditorOpen(false);
      setWeightDraft('');
    };

    // Large touch-sized chip button.
    const QuickChip = ({ n }) => (
      <button
        type="button"
        onClick={() => setBales(n)}
        aria-pressed={bales === n}
        className={
          'h-14 min-w-[64px] px-4 rounded-xl border-2 text-lg font-bold transition ' +
          (bales === n
            ? 'border-safi-600 bg-safi-50 text-safi-700'
            : 'border-neutral-10 bg-white text-neutral-100 hover:bg-neutral-5')
        }
      >
        {n}
      </button>
    );

    return (
      <div className="px-6 py-5">
        {/* R55: Top header simplified - back link + title. Cancel/Done moved to
            bottom right of the overlay per the v10 layout. */}
        <div className="flex items-start justify-between gap-4 mb-5 pb-3 border-b border-neutral-10">
          <div>
            <button onClick={onCancel} className="inline-flex items-center gap-1 text-[13px] text-neutral-60 hover:text-safi-600 mb-1">
              <Icon d={I.arrowL} className="w-3.5 h-3.5" />
              Back to load
            </button>
            <div className="text-lg font-bold text-neutral-100">Store bales</div>
            <div className="text-[13px] text-neutral-60">{row.supplier} #{row.orderRef}</div>
          </div>
        </div>

        {/* Missing weight banner */}
        {weightMissing && (
          <div className="mb-5 rounded-lg border border-amber-200 bg-amber-50 p-4">
            <div className="flex items-start justify-between gap-3 flex-wrap">
              <div className="flex items-start gap-2.5 min-w-0">
                <Icon d={I.warning} className="w-5 h-5 text-amber-700 shrink-0 mt-0.5" />
                <div>
                  <div className="text-[15px] font-semibold text-amber-900">Actual weight is missing</div>
                  <div className="text-[13px] text-amber-900/80 mt-0.5">Add it before this load is complete - you can do it now or once you've finished storing.</div>
                </div>
              </div>
              {!weightEditorOpen ? (
                <button
                  onClick={() => setWeightEditorOpen(true)}
                  className="shrink-0 px-4 py-2.5 rounded-lg bg-amber-600 text-white text-[13px] font-semibold hover:bg-amber-700 min-h-[44px]"
                >
                  Add weight
                </button>
              ) : (
                <div className="flex items-center gap-2 shrink-0">
                  <div className="relative">
                    <input
                      type="number"
                      autoFocus
                      placeholder="0"
                      value={weightDraft}
                      onChange={e => setWeightDraft(e.target.value)}
                      onKeyDown={e => { if (e.key === 'Enter') handleSaveWeight(); }}
                      className="w-32 px-3 py-2.5 pr-10 border border-neutral-10 rounded-lg text-[15px] bg-white"
                    />
                    <span className="absolute right-3 top-1/2 -translate-y-1/2 text-[13px] text-neutral-60">kg</span>
                  </div>
                  <button
                    onClick={handleSaveWeight}
                    className="px-4 py-2.5 rounded-lg bg-amber-600 text-white text-[13px] font-semibold hover:bg-amber-700 min-h-[44px]"
                  >Save</button>
                  <button
                    onClick={() => { setWeightEditorOpen(false); setWeightDraft(''); }}
                    className="px-3 py-2.5 rounded-lg border border-neutral-10 bg-white text-neutral-100 text-[13px] hover:bg-neutral-5 min-h-[44px]"
                  >Cancel</button>
                </div>
              )}
            </div>
          </div>
        )}

        {/* R54: Amazon-style storage breakdown — stat cards + stacked bar +
            locations pills. Replaces the previous accordion + headline. */}
        {(() => {
          const storedSoFar = stored.reduce((a, e) => a + e.bales, 0);
          const proc = processedBales || 0;
          const handled = storedSoFar + proc;
          const known = totalBalesOverride != null;
          const left = known ? Math.max(0, totalBalesOverride - handled) : null;
          const target = known ? totalBalesOverride : Math.max(1, handled);
          const sw = Math.min(100, Math.round(storedSoFar / target * 100));
          const pw = Math.min(100, Math.round(proc / target * 100));
          const lw = known ? Math.min(100, Math.round(left / target * 100)) : 0;
          // Aggregate locations.
          const locMap = new Map();
          stored.forEach(e => {
            const k = e.zoneId === '__buffer__' ? 'Buffer' : `Zone ${e.zoneId} · Bay ${e.bayId}`;
            locMap.set(k, (locMap.get(k) || 0) + e.bales);
          });
          const locs = Array.from(locMap.entries()).map(([label, bales]) => ({ label, bales, isBuf: label === 'Buffer' }));
          return (
            <div className="mb-5">
              <div className="flex items-baseline justify-between mb-2">
                <div className="text-[13px] text-neutral-60">
                  Storage breakdown{known ? ` · of ${target} total bales` : ''}
                </div>
                {known && handled >= target && (
                  <span className="inline-flex items-center gap-1 text-[13px] font-medium text-success-300">
                    <Icon d={I.checkCircle} className="w-3.5 h-3.5" />all bales handled
                  </span>
                )}
              </div>
              {/* R55: Processed dropped from the primary stat row — the FO can't
                   process from this flow, so it doesn't belong as a primary stat.
                   Surfaces below as a quiet note when processed > 0. */}
              <div className="grid grid-cols-2 gap-2">
                <div className="bg-neutral-5 rounded-lg p-3">
                  <div className="text-[13px] text-neutral-60 flex items-center gap-1.5">
                    <span className="inline-block w-2 h-2 rounded-full bg-safi-600"></span>
                    Stored in warehouse
                  </div>
                  <div className="text-2xl font-bold text-neutral-100 leading-tight mt-1">{storedSoFar}</div>
                  <div className="text-[13px] text-neutral-60">bales</div>
                </div>
                <div className="bg-neutral-5 rounded-lg p-3">
                  <div className="text-[13px] text-neutral-60 flex items-center gap-1.5">
                    <span className="inline-block w-2 h-2 rounded-full bg-amber-500"></span>
                    Left to store
                  </div>
                  <div className="text-2xl font-bold text-neutral-100 leading-tight mt-1">{known ? left : '—'}</div>
                  <div className="text-[13px] text-neutral-60">{known ? 'bales' : 'set Total bales'}</div>
                </div>
              </div>
              {known && (
                <div className="flex h-2 mt-3 rounded-full overflow-hidden bg-neutral-5">
                  <div className="h-full bg-safi-600 transition-all" style={{ width: sw + '%' }} />
                  <div className="h-full bg-success-300 transition-all" style={{ width: pw + '%', opacity: 0.85 }} />
                  <div className="h-full bg-amber-500 transition-all" style={{ width: lw + '%', opacity: 0.55 }} />
                </div>
              )}
              {proc > 0 && (
                <div className="mt-2 text-[13px] text-neutral-60 inline-flex items-center gap-1.5">
                  <Icon d={I.checkCircle} className="w-3.5 h-3.5 text-success-300" />
                  {proc} bales from this load have already been processed
                </div>
              )}
              {locs.length > 0 && (
                <div className="flex flex-wrap gap-1.5 mt-3">
                  {locs.map((l, i) => (
                    <span
                      key={i}
                      className={'inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-[13px] ' +
                        (l.isBuf
                          ? 'bg-safi-50 text-safi-700'
                          : 'bg-neutral-5 text-neutral-100')}
                    >
                      {l.label} <strong className="font-semibold">{l.bales}</strong>
                    </span>
                  ))}
                </div>
              )}
            </div>
          );
        })()}

        {/* Two-section layout: Quantity (left) + Location (right). Stack on narrow widths. */}
        <div className="grid grid-cols-1 lg:grid-cols-5 gap-5">
          {/* QUANTITY */}
          <div className="lg:col-span-2 bg-white border border-neutral-10 rounded-xl p-5">
            <div className="text-[13px] font-semibold uppercase tracking-wide text-neutral-60 mb-3">
              1. How many bales?
            </div>
            {/* R53: Large +/- stepper - the central number is now a keyboard-
                editable input so desktop users can type instead of tapping. */}
            <div className="flex items-center gap-3">
              <button
                onClick={() => stepBales(-1)}
                disabled={bales <= 1}
                aria-label="Decrease bales"
                className="w-16 h-16 rounded-xl border-2 border-neutral-10 bg-white text-3xl font-bold text-neutral-100 hover:bg-neutral-5 disabled:opacity-40"
              >−</button>
              <div className="flex-1 flex items-center justify-center h-16 rounded-xl bg-neutral-5 border-2 border-neutral-10 px-2">
                <input
                  type="number"
                  min={1}
                  max={99}
                  value={bales}
                  onChange={e => {
                    const v = parseInt(e.target.value, 10);
                    if (Number.isFinite(v)) setBales(Math.max(1, Math.min(99, v)));
                    else if (e.target.value === '') setBales(1);
                  }}
                  aria-label="Number of bales"
                  className="w-20 bg-transparent text-center text-4xl font-bold text-neutral-100 focus:outline-none focus:ring-2 focus:ring-safi-600 rounded"
                />
                <span className="ml-1 text-[13px] text-neutral-60">{bales === 1 ? 'bale' : 'bales'}</span>
              </div>
              <button
                onClick={() => stepBales(1)}
                aria-label="Increase bales"
                className="w-16 h-16 rounded-xl border-2 border-neutral-10 bg-white text-3xl font-bold text-neutral-100 hover:bg-neutral-5"
              >+</button>
            </div>
            {/* Quick-select chips (R53: renamed from "Quick set").
                R54: amber "All N" chip appears when total bales is known and
                there's still some left to store - stores the entire remaining
                load in one tap. */}
            <div className="mt-4">
              <div className="text-[13px] text-neutral-60 mb-2">Quick select</div>
              <div className="flex items-center gap-2 flex-wrap">
                {[3, 6, 9, 12].map(n => <QuickChip key={n} n={n} />)}
                {(() => {
                  const storedSoFar = stored.reduce((a, e) => a + e.bales, 0);
                  const left = (totalBalesOverride != null)
                    ? Math.max(0, totalBalesOverride - storedSoFar - processedBales)
                    : 0;
                  if (left <= 0) return null;
                  const isOn = bales === left;
                  return (
                    <button
                      type="button"
                      onClick={() => setBales(left)}
                      aria-pressed={isOn}
                      title="Store the remaining load in one go"
                      className={
                        'h-14 min-w-[64px] px-4 rounded-xl border-2 text-lg font-bold transition ' +
                        (isOn
                          ? 'border-amber-600 bg-amber-100 text-amber-900'
                          : 'border-amber-200 bg-amber-50 text-amber-900 hover:bg-amber-100')
                      }
                    >
                      All {left}
                    </button>
                  );
                })()}
              </div>
            </div>
          </div>

          {/* LOCATION */}
          <div className="lg:col-span-3 bg-white border border-neutral-10 rounded-xl p-5">
            <div className="text-[13px] font-semibold uppercase tracking-wide text-neutral-60 mb-3">
              2. Where?
            </div>
            {/* R53: Zone tabs + Buffer tab. Buffer is a special destination
                (no bays); selecting it auto-selects the buffer "bay" so the
                Add button is enabled immediately. */}
            <div className="flex items-center gap-2 flex-wrap mb-4">
              {yard.map(z => (
                <button
                  key={z.id}
                  onClick={() => { setSelectedZoneId(z.id); setSelectedBayId(null); }}
                  aria-pressed={selectedZoneId === z.id}
                  className={
                    'px-4 h-12 rounded-xl border-2 text-base font-semibold transition min-h-[48px] ' +
                    (selectedZoneId === z.id
                      ? 'border-safi-600 bg-safi-50 text-safi-700'
                      : 'border-neutral-10 bg-white text-neutral-100 hover:bg-neutral-5')
                  }
                >
                  Zone {z.id}
                </button>
              ))}
              <button
                key="__buffer__"
                onClick={() => { setSelectedZoneId('__buffer__'); setSelectedBayId('__buffer__'); }}
                aria-pressed={selectedZoneId === '__buffer__'}
                className={
                  'px-4 h-12 rounded-xl border-2 text-base font-semibold transition min-h-[48px] inline-flex items-center gap-2 ' +
                  (selectedZoneId === '__buffer__'
                    ? 'border-safi-600 bg-safi-50 text-safi-700'
                    : 'border-neutral-10 bg-white text-neutral-100 hover:bg-neutral-5')
                }
              >
                <span className="w-2 h-2 rounded-full bg-amber-400" aria-hidden="true" />
                Buffer
              </button>
            </div>
            {/* R55: replaced bay grid with a horizontal row + minimap, mirroring
                 the Production Management warehouse zone view but at a smaller
                 scale. Tap a bay = immediate add (no confirm step). */}
            {selectedZoneId === '__buffer__' ? (
              <div>
                <div className="text-[13px] text-neutral-60 mb-2">
                  Tap to send {bales} {bales === 1 ? 'bale' : 'bales'} to the buffer. No bay needed.
                </div>
                <button
                  onClick={() => addBalesTo('__buffer__', null)}
                  className="w-full rounded-xl border-2 border-neutral-10 bg-white hover:border-safi-300 hover:bg-safi-50 p-4 flex items-center gap-3 text-left transition"
                >
                  <span className="w-3 h-3 rounded-full" style={{ backgroundColor: '#16a34a' }} aria-hidden="true" />
                  <div className="flex-1">
                    <div className="text-[15px] font-bold text-neutral-100">Buffer</div>
                    <div className="text-[13px] text-neutral-60 mt-0.5">
                      Holds bales temporarily before processing
                      {(() => {
                        const sessionAdds = sessionLog
                          .filter(e => e.zoneId === '__buffer__')
                          .reduce((a, e) => a + e.bales, 0);
                        if (sessionAdds === 0) return null;
                        return <span className="ml-1 text-success-300 font-semibold">+{sessionAdds} today</span>;
                      })()}
                    </div>
                  </div>
                  <Icon d={I.plus} className="w-5 h-5 text-safi-600" />
                </button>
              </div>
            ) : (
              <>
                <div className="text-[13px] text-neutral-60 mb-2">
                  Tap a bay in Zone {selectedZone?.id} to store {bales} {bales === 1 ? 'bale' : 'bales'}
                </div>
                {/* Minimap - bars represent relative bale density per bay.
                    Click to scroll that bay into view. */}
                {selectedZone && selectedZone.bays.length > 6 && (() => {
                  const maxBales = Math.max(1, ...selectedZone.bays.map(b => b.loads.reduce((a, l) => a + l.bales, 0)));
                  // R56b: bars use the selected zone's identity colour so the
                  // store flow stays visually consistent with the warehouse view
                  // (where each zone is tagged with the same dot colour).
                  const zc = getZoneColor(selectedZone.color);
                  const barColor = zc.swatch && zc.swatch !== 'transparent' ? zc.swatch : '#0c87f5';
                  return (
                    <div className="mb-3 px-3 py-2 rounded-md bg-neutral-5 border border-neutral-10">
                      <div className="flex items-end gap-0.5 h-9 w-full" role="navigation" aria-label="Bay minimap - height = bay fullness">
                        {selectedZone.bays.map(b => {
                          const baleCount = b.loads.reduce((a, l) => a + l.bales, 0);
                          const isEmpty = baleCount === 0;
                          const pct = isEmpty ? 18 : Math.max(8, (baleCount / maxBales) * 100);
                          const isFocus = focusBayId === b.id;
                          const tileStyle = isEmpty
                            ? { height: `${pct}%`, backgroundColor: '#fff', border: '1px solid #d4d4d8', backgroundImage: 'repeating-linear-gradient(135deg, transparent, transparent 3px, #d4d4d8 3px, #d4d4d8 4px)' }
                            : { height: `${pct}%`, backgroundColor: barColor, opacity: 0.85 };
                          return (
                            <button
                              key={b.id}
                              onClick={() => {
                                setFocusBayId(b.id);
                                setTimeout(() => {
                                  const el = document.querySelector(`[data-store-bay="${b.id}"]`);
                                  if (el) el.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                                }, 0);
                              }}
                              title={`${b.name}: ${isEmpty ? 'Empty' : `${baleCount} bales`}`}
                              aria-label={`Jump to ${b.name}`}
                              className={'flex-1 rounded-t transition-opacity hover:opacity-100 ' + (isFocus ? 'outline outline-2 outline-safi-600 outline-offset-1 relative z-10' : '')}
                              style={tileStyle}
                            />
                          );
                        })}
                      </div>
                      <div className="mt-1.5 flex justify-between text-[11px] text-neutral-60">
                        <span>{selectedZone.bays[0].name}</span>
                        <span className="text-neutral-40">{selectedZone.bays.length} bays · height = fullness · click to jump</span>
                        <span>{selectedZone.bays[selectedZone.bays.length - 1].name}</span>
                      </div>
                      {/* R56: Legend - so empty pattern is interpretable, not just guessed at.
                          R56b: "Bales stored" swatch follows the active zone's colour. */}
                      <div className="mt-2 flex items-center gap-4 text-[11px] text-neutral-60">
                        <span className="inline-flex items-center gap-1.5">
                          <span className="inline-block w-3 h-3 rounded-sm" style={{ backgroundColor: barColor, opacity: 0.85 }} aria-hidden="true" />
                          Bales stored
                        </span>
                        <span className="inline-flex items-center gap-1.5">
                          <span
                            className="inline-block w-3 h-3 rounded-sm"
                            style={{ backgroundColor: '#fff', border: '1px solid #d4d4d8', backgroundImage: 'repeating-linear-gradient(135deg, transparent, transparent 2px, #d4d4d8 2px, #d4d4d8 3px)' }}
                            aria-hidden="true"
                          />
                          Empty bay
                        </span>
                      </div>
                    </div>
                  );
                })()}
                {/* Horizontal scrollable bay row. Each tile = tap to add. */}
                <div ref={bayRowRef} className="flex gap-2 overflow-x-auto pb-2 -mx-1 px-1">
                  {selectedZone?.bays.map(b => {
                    const baleCount = b.loads.reduce((a, l) => a + l.bales, 0);
                    const loadCount = b.loads.length;
                    const sessionAdds = sessionLog
                      .filter(e => e.zoneId === selectedZone.id && e.bayId === b.id)
                      .reduce((a, e) => a + e.bales, 0);
                    const fromThisLoad = stored
                      .filter(e => e.zoneId === selectedZone.id && e.bayId === b.id)
                      .reduce((a, e) => a + e.bales, 0);
                    const isEmpty = baleCount === 0;
                    const isFocus = focusBayId === b.id;
                    return (
                      <button
                        key={b.id}
                        data-store-bay={b.id}
                        onClick={() => addBalesTo(selectedZone.id, b.id)}
                        className={
                          'shrink-0 w-[160px] min-h-[100px] px-3 py-3 rounded-xl border-2 text-left transition flex flex-col justify-between relative ' +
                          (isFocus
                            ? 'border-safi-600 bg-safi-50'
                            : isEmpty
                              ? 'border-dashed border-neutral-10 bg-white hover:border-safi-300 hover:bg-safi-50'
                              : 'border-neutral-10 bg-white hover:border-safi-300 hover:bg-safi-50')
                        }
                      >
                        <div>
                          <div className="text-[15px] font-bold text-neutral-100">{b.name}</div>
                          <div className="text-[13px] text-neutral-60 mt-1">
                            {isEmpty
                              ? 'Empty'
                              : `${loadCount} ${loadCount === 1 ? 'load' : 'loads'} · ${fmtNum(baleCount)} bales`}
                          </div>
                        </div>
                        {fromThisLoad > 0 && (
                          <div className="text-[12px] text-safi-700 font-medium mt-2">
                            {fromThisLoad} from this load
                            {sessionAdds > 0 && <span className="ml-1 text-success-300">(+{sessionAdds} today)</span>}
                          </div>
                        )}
                        {sessionAdds > 0 && (
                          <span className="absolute top-2 right-2 inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded-full bg-success-300 text-white text-[11px] font-semibold">
                            +{sessionAdds}
                          </span>
                        )}
                      </button>
                    );
                  })}
                </div>
              </>
            )}
          </div>
        </div>

        {/* R55: Cancel + Done bottom-right, replacing the old Add bales CTA + session log. */}
        <div className="mt-6 flex items-center justify-end gap-3">
          <button
            onClick={onCancel}
            className="text-[13px] font-medium text-neutral-60 hover:text-neutral-100 hover:underline"
          >Cancel</button>
          <button
            onClick={onDone}
            className="px-5 py-2 rounded-lg bg-safi-600 text-white text-[13px] font-semibold hover:bg-safi-700"
          >Done</button>
        </div>
      </div>
    );
  }

  // ============================================================================
  // R47/R48: PAGE: LOAD OPERATIONS HUB (drilled in from the Quality Control table)
  //
  // R48: restructured into a 3-card information architecture matching the
  // Load Operations Hub spec:
  //   1) Load Summary       - identity + key dates/weights + Edit Details
  //   2) Operational Status - Analysis / Storage / Production status with
  //                            Analyse Material + Store Material actions, plus
  //                            a material-flow stepper at the top.
  //   3) Analysis History   - the stacked per-report cards.
  // ============================================================================
  function LoadDetailsView({
    row, idx,
    onBack,
    onStoreMaterial = () => {},
    buffer = [],
    stored = [],
    actualWeightOverride = null,
    loadNumberOverride = null,
    totalBalesOverride = null,
    analysisSessions = [],
    processedRecord = null,
    arrival = null,
    onSaveArrival = () => {},
    onSetWeight = () => {},
    onSetLoadNumber = () => {},
    onSetTotalBales = () => {},
    onAddAnalysisSession = () => {},
    onMarkProcessed = () => {},
    onGoBuffer = () => {},
    onGoPicklist = () => {},
    onNavigateToPicker = () => {},
    onNavigateToHistory = () => {}
  }) {
    // R53: inline editor states for the missing fields.
    const [editingWeight, setEditingWeight] = useState(false);
    const [editingLoadNo, setEditingLoadNo] = useState(false);
    const [weightDraft, setWeightDraft] = useState('');
    const [loadNoDraft, setLoadNoDraft] = useState('');
    // R53: Analyse-material splash modal.
    // R72: reused as the "camera session" black screen; on Complete it flips
    // storageRecOpen so the FO lands on the storage recommendation.
    const [analyseSplashOpen, setAnalyseSplashOpen] = useState(false);
    const [storageRecOpen, setStorageRecOpen] = useState(false);
    const [storageRecCount, setStorageRecCount] = useState(3);
    // R76: Mark/edit arrival overlay state.

    // R54: count of bales from THIS load currently in the shared buffer.

    // Deterministic demo values seeded off the row index so each load page
    // looks subtly different but stable across reloads.
    const rng = (seed, max) => Math.abs(Math.sin(seed * 13.37)) % 1 * max;

    const scheduledWeightKg = 25000 + Math.floor(rng(idx + 1, 6) * 1000) * 100;

    const SEEDED_REPORTS = idx % 3 === 0 ? [] : [

    const allSessions = [...analysisSessions, ...SEEDED_REPORTS];
    const isAnalysed = allSessions.length > 0;
    const photosCount = allSessions.reduce((a, s) => a + (s.photos || 0), 0);
    const lastAnalysisAt = isAnalysed ? (allSessions[0].at || '09 Jun 10:22') : null;
    // Latest session drives the headline AI chips.
    const latest = isAnalysed ? allSessions[0] : null;
    const targetUbc    = latest?.ubc    ?? (79 + Math.floor(rng(idx + 2, 9) * 10) / 10);
    const acceptableAl = latest?.alum   ?? (11 + Math.floor(rng(idx + 3, 5) * 10) / 10);
    const contamination = latest?.contam ?? (6 + Math.floor(rng(idx + 4, 4) * 10) / 10);
    // R49/R53: if the FO has stored bales via the Store Material flow, prefer
    // those entries over the demo's static bay list. Aggregate by zoneId|bayId
    // (or "__buffer__" when the FO chose the buffer destination).
    const aggregatedStorage = (() => {
      if (stored.length === 0) return null;
      const map = new Map();
      stored.forEach(e => {
        const k = `${e.zoneId}|${e.bayId || ''}`;
        map.set(k, (map.get(k) || 0) + e.bales);

        return { label: `Zone ${zoneId} · Bay ${bayId}`, bales };

            session (flipping the load's analysed state), close the camera
            overlay, and open the Storage recommendation overlay. */}

          <div
            className="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center p-6"
            role="dialog"
            aria-label="Camera session"

            <div className="text-white text-2xl font-medium mb-2">Photograph bales</div>
            <div className="text-white/60 text-[14px] max-w-md text-center mb-10">
              Point the camera at each bale face. Safi analyses in the background — tap Complete when you've captured enough.
            </div>
            <div className="w-32 h-32 rounded-full border-4 border-white/30 flex items-center justify-center mb-10">
              <Icon d={I.photo} className="w-14 h-14 text-white/70" />
            </div>
            <div className="flex items-center gap-3">
              <button
                onClick={() => setAnalyseSplashOpen(false)}
                className="px-5 py-2.5 rounded-lg border border-white/30 text-white/90 text-[14px] font-medium hover:bg-white/10"
              >Cancel</button>
              <button
                onClick={() => {
                  // R72: record a synthetic analysis session (same behaviour as before),
                  // then hand off to the storage recommendation overlay.
                  const synth = {
                    date: '9 Jun 2026',
                    at: '09 Jun 11:04',
                    photos: 6,
                    who: 'You',
                    ubc:    70 + Math.floor(rng(idx + 11, 25) * 10) / 10,
                    alum:   12 + Math.floor(rng(idx + 12, 6) * 10) / 10,
                    contam: 4 + Math.floor(rng(idx + 13, 6) * 10) / 10
                  };
                  onAddAnalysisSession(synth);
                  setAnalyseSplashOpen(false);
                  setStorageRecCount(3);
                  setStorageRecOpen(true);

                className="px-8 py-2.5 rounded-lg bg-safi-600 text-white text-[15px] font-semibold hover:bg-safi-700"
              >Complete</button>
            </div>
          </div>
        )}

        {/* R72: Storage recommendation overlay — surfaces the AI-recommended
            zone/bay for the load's composition, with delta-stepper for bale
            count and paths to override the location or report a problem. */}
        {storageRecOpen && (
          <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4" onClick={() => setStorageRecOpen(false)}>
            <div className="bg-white rounded-2xl shadow-xl w-full max-w-[620px] overflow-hidden" onClick={e => e.stopPropagation()}>
              {/* Header — title + close */}
              <div className="px-6 py-4 border-b border-neutral-10 flex items-start justify-between gap-3">
                <div>
                  <h3 className="text-[20px] font-bold text-neutral-100">Storage recommendation</h3>
                </div>
                <button
                  onClick={() => setStorageRecOpen(false)}
                  aria-label="Close"
                  className="w-9 h-9 rounded-lg border border-neutral-10 text-neutral-60 flex items-center justify-center hover:bg-neutral-5"
                >
                  <Icon d={I.close} className="w-4 h-4" />
                </button>
              </div>

              {/* Load context + chips above the purple card */}
              <div className="px-6 pt-4">
                <div className="text-[15px] font-medium text-neutral-100">Niagara · #4500289765-201</div>
                <div className="mt-2 flex items-center gap-2 flex-wrap">
                  <span className="inline-flex items-center px-2 py-0.5 rounded-md text-[12px] font-semibold border bg-neutral-5 text-neutral-80 border-neutral-10 whitespace-nowrap">Clear PET Bales</span>
                  <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-md text-[12px] font-semibold bg-amber-50 text-amber-800 border border-amber-100 whitespace-nowrap">
                    <Icon d={I.photo} className="w-3.5 h-3.5" />
                    8 bales analysed
                  </span>
                </div>
                <div className="mt-2 flex items-center gap-1.5 flex-wrap">
                  <span className="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-[13px] font-medium bg-rose-100 text-rose-900">
                    <Icon d={I.errorCircle} className="w-3.5 h-3.5" />
                    Transparent PET 88.4%
                  </span>
                  <span className="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-[13px] font-medium bg-success-100 text-success-300">
                    <Icon d={I.checkCircle} className="w-3.5 h-3.5" />
                    Coloured PET 4.2%
                  </span>
                  <span className="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-[13px] font-medium bg-success-100 text-success-300">
                    <Icon d={I.checkCircle} className="w-3.5 h-3.5" />
                    Contaminants 1.2%
                  </span>
                </div>
              </div>

              {/* Purple recommendation card */}
              <div className="px-6 pt-4 pb-1">
                <div className="rounded-xl border border-safi-100 bg-safi-50 p-4" style={{ borderLeft: '6px solid #6347FF' }}>
                  <div className="text-[13px] text-neutral-100 leading-relaxed">
                    Based on the material quality for the latest analyse, store the bales in the following location:
                  </div>
                  <div className="mt-2 text-[26px] font-semibold text-neutral-100 tracking-tight">Zone A · Bay 4</div>

                  {/* Stepper — delta buttons */}
                  <div className="mt-4">
                    <div className="text-[11px] text-neutral-60 uppercase tracking-wide mb-2">Adjust bales to store</div>
                    <div className="flex gap-1.5 flex-wrap">
                      {[-3, -2, -1, 0, 1, 2, 3].map(d => {
                        const isNeg = d < 0 || d === 0;
                        const label = d > 0 ? `+${d}` : d === 0 ? '0' : `−${Math.abs(d)}`;
                        return (
                          <button
                            key={d}
                            onClick={() => setStorageRecCount(prev => Math.max(0, prev + d))}
                            className={
                              'w-[52px] h-[52px] rounded-lg text-[15px] font-medium ' +
                              (isNeg
                                ? 'bg-white text-neutral-40 border border-neutral-10'
                                : 'bg-white text-neutral-100 border border-neutral-40')
                            }
                            aria-label={d === 0 ? 'Keep default' : (d > 0 ? `Add ${d}` : `Subtract ${Math.abs(d)}`)}
                          >{label}</button>
                        );
                      })}
                    </div>
                  </div>
                </div>
              </div>

              {/* Primary + secondary actions */}
              <div className="px-6 pt-4 pb-5">
                <button
                  onClick={() => {
                    setToast?.({ message: `${storageRecCount} bales stored in Zone A · Bay 4`, kind: 'success' });
                    setStorageRecOpen(false);
                  }}
                  className="w-full h-[60px] rounded-xl bg-safi-600 text-white text-[17px] font-semibold hover:bg-safi-700 inline-flex items-center justify-center gap-2"
                >
                  <Icon d={I.check} className="w-5 h-5" />
                  Store {storageRecCount} bales in Zone A · Bay 4
                </button>

                <button
                  onClick={() => {
                    setStorageRecOpen(false);
                    setStoreMode?.(true);
                  }}
                  className="mt-2.5 w-full h-12 rounded-lg border border-neutral-40 text-neutral-100 text-[14px] font-medium hover:bg-neutral-5 inline-flex items-center justify-center gap-1.5"
                >
                  <Icon d={I.list} className="w-4 h-4" />
                  Choose a different location
                </button>

                <div className="mt-3 pt-3 border-t border-neutral-10 flex items-center justify-between text-[12px] text-neutral-60">
                  <span>Storage is auto-saved</span>
                  <button className="text-neutral-100 inline-flex items-center gap-1">
                    <Icon d={I.warning} className="w-3.5 h-3.5" />
                    Report a problem
                  </button>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ---- 3) ANALYSIS HISTORY ---- */}
        <div className="bg-white border border-neutral-10 rounded-xl p-6">
          <h3 className="text-lg font-bold text-neutral-100 mb-4">Analysis History</h3>
          {REPORTS.length === 0 ? (
            <div className="text-[13px] text-neutral-60">No analyses have been recorded yet.</div>
          ) : (
            <div className="divide-y divide-neutral-10">
              {REPORTS.map((r, i) => (
                <div key={i} className={i === 0 ? 'pb-5' : 'py-5'}>
                  <h4 className="text-base font-bold text-neutral-100 mb-2">Report - {r.date}</h4>
                  <div className="text-[13px] text-neutral-60 mb-2">Average AI results</div>
                  <div className="flex items-center gap-2 flex-wrap mb-3">
                    <ResultChip label="Target UBC"           value={r.ubc}    ok={r.ubc >= 90} />
                    <ResultChip label="Acceptable Aluminium" value={r.alum}   ok={r.alum <= 5} />
                    <ResultChip label="Contamination"        value={r.contam} ok={r.contam <= 2} />
                  </div>
                  <div className="flex items-center gap-5 text-[13px] text-neutral-60">
                    <span className="inline-flex items-center gap-1.5">
                      <Icon d={I.chart} className="w-4 h-4" />
                      AI Bale
                    </span>
                    <span className="inline-flex items-center gap-1.5">
                      <Icon d={I.photo} className="w-4 h-4" />
                      {r.photos} photos
                    </span>
                    <span>{r.date}</span>
                    <span className="text-neutral-100">{r.who}</span>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    );
  }

  // ============================================================================
  // R77: squared status badge matching the Partner invites page badges -
  // solid colour tint, no icon, slight corner radius (rounded = 4px).
  // Colour mapping mirrors the invites page: green = done/positive state,
  // blue = in progress, purple = Safi primary, grey = terminal/neutral.
  // ============================================================================
  const QC_BADGE_COLORS = {
    green:  'bg-success-100 text-success-300',
    blue:   'bg-sky-100 text-sky-800',
    purple: 'bg-safi-100 text-safi-800',
    grey:   'bg-neutral-10 text-neutral-80'
  };
  function StatusBadge({ color = 'grey', children }) {
    return (
      <span className={'inline-flex items-center px-2 py-0.5 rounded text-[13px] font-medium ' + (QC_BADGE_COLORS[color] || QC_BADGE_COLORS.grey)}>
        {children}
      </span>
    );
  }

  // ============================================================================
  // R75: MARK LOAD AS ARRIVED - focused overlay opened from the QC table.
  // Captures the actual load weight and the dock the load is going to.
  // ============================================================================
  function ArriveModal({ row, initial = null, onCancel, onSave }) {
    // R76: initial lets the load details view reopen the overlay to edit an
    // existing arrival (e.g. lorry redirected to another dock).
    const [weight, setWeight] = useState(initial && initial.weight != null ? String(initial.weight) : '');
    const [dock, setDock] = useState((initial && initial.dock) || '');
    const weightNum = parseInt(weight, 10);
    const canSave = weightNum > 0 && dock.trim().length > 0;
    return (
      <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4" onClick={onCancel}>
        <div className="bg-white rounded-xl shadow-xl w-full max-w-md flex flex-col" role="dialog" aria-modal="true" aria-label="Mark load as arrived" onClick={e => e.stopPropagation()}>
          <div className="flex items-center justify-between px-5 py-4 border-b border-neutral-10">
            <h3 className="text-base font-bold text-neutral-100">{initial ? 'Edit arrival' : 'Mark load as arrived'}</h3>
            <button onClick={onCancel} className="p-1.5 rounded hover:bg-neutral-5 text-neutral-60" aria-label="Close">
              <Icon d={I.close} className="w-4 h-4" />
            </button>
          </div>
          <div className="p-5 space-y-4">
            <div className="text-[13px] text-neutral-60">
              {row.supplier} · Order {row.orderRef} · {row.material}
            </div>
            <div>
              <label htmlFor="arrive-weight" className="block text-[13px] text-neutral-60 mb-1">Load weight</label>
              <input
                id="arrive-weight"
                type="number"
                min="0"
                inputMode="numeric"
                placeholder="0 KG"
                value={weight}
                onChange={e => setWeight(e.target.value)}
                autoFocus
                className="w-full h-9 px-3 border border-neutral-10 rounded text-[13px] bg-white"
              />
            </div>
            <div>
              <label htmlFor="arrive-dock" className="block text-[13px] text-neutral-60 mb-1">Dock location</label>
              <input
                id="arrive-dock"
                type="text"
                placeholder="Enter..."
                value={dock}
                onChange={e => setDock(e.target.value)}
                className="w-full h-9 px-3 border border-neutral-10 rounded text-[13px] bg-white"
              />
            </div>
          </div>
          <div className="flex items-center justify-end gap-2 px-5 py-4 border-t border-neutral-10">
            <button onClick={onCancel} className="px-4 py-2 rounded-lg border border-neutral-10 text-[13px] font-medium text-neutral-100 bg-white hover:bg-neutral-5">
              Cancel
            </button>
            <button
              onClick={() => canSave && onSave({ weight: weightNum, dock: dock.trim() })}
              disabled={!canSave}
              className="px-4 py-2 rounded-lg bg-safi-600 text-white text-[13px] font-medium hover:bg-safi-700 disabled:opacity-40 disabled:cursor-not-allowed"
            >
              Save
            </button>
          </div>
        </div>
      </div>
    );
  }

  function QualityControlPage({ yard = [], yardOps = {}, buffer = [], setBuffer = () => {}, setAppPage = () => {}, setTab = () => {}, setPickerMode = () => {} }) {
    const ROWS_PER_PAGE = 15;
    const totalRows = QC_ROWS.length;
    const totalPages = Math.ceil(totalRows / ROWS_PER_PAGE);
    // Default to page 7 so the screen lands on the same 91-105 slice as the
    // reference screenshot (the two analysed rows at the bottom).
    const [page, setPage] = useState(7);
    // R47: clicking a row drills into the load details view. selectedRowIdx is
    // the index into QC_ROWS; null means we're on the table view.
    const [selectedRowIdx, setSelectedRowIdx] = useState(null);
    // R49: Store Material workflow state.
    //   storeMode: true when the FO has opened the Store Material flow
    //   loadStorage: map of QC row idx -> array of { zoneId, bayId, bales }
    //                (cumulative across sessions, drives the Operational Status
    //                 Storage section)
    //   loadActualWeights: map of QC row idx -> kg (overrides the missing flag
    //                on the Load Summary when the FO enters a weight mid-flow)
    const [storeMode, setStoreMode] = useState(false);
    const [loadStorage, setLoadStorage] = useState({});
    const [loadActualWeights, setLoadActualWeights] = useState({});
    // R53: extra per-load state
    //   loadNumbers     - inline-edited load number (overrides demo "Missing")
    //   loadAnalysisSessions - additional analysis sessions appended by the
    //                          "Analyse Material" flow; an entry being present
    //                          marks the load as Analysed.
    //   loadProcessed   - { windowId, completedAt } when the load has been
    //                     processed. Drives the new "Processed" stepper step.
    const [loadNumbers, setLoadNumbers] = useState({});
    const [loadAnalysisSessions, setLoadAnalysisSessions] = useState({});
    const [loadProcessed, setLoadProcessed] = useState({});
    // R54: optional total bales per load (entered via Edit modal). Drives the
    // Storage breakdown (Stored / Left to store / Processed = Total).
    const [loadTotalBales, setLoadTotalBales] = useState({});
    // R75: per-load arrival record - map of QC row idx -> { weight, dock }.
    // Set by the "Mark arrived" table action. The weight also feeds
    // loadActualWeights so the load details view reflects it.
    const [loadArrivals, setLoadArrivals] = useState({});
    const [arriveModalIdx, setArriveModalIdx] = useState(null);
    // R54: cross-page nav helpers. "Go to buffer" lands on the warehouse-layout
    // tab in bale-based mode so the Buffer card is visible. "Go to picking
    // list" lands on the warehouse-layout tab (where the picking list alert /
    // creation entry point lives).
    const goToBuffer = () => { setPickerMode('bale'); setTab('pw-layout'); setAppPage('production'); };
    const goToPicklist = () => { setTab('pw-layout'); setAppPage('production'); };
    // Lightweight toast for the Store Material flow ("3 bales added...").
    const [storeToast, setStoreToast] = useState(null);
    useEffect(() => {
      if (!storeToast) return;
      const t = setTimeout(() => setStoreToast(null), 2200);
      return () => clearTimeout(t);
    }, [storeToast]);

    if (selectedRowIdx !== null && storeMode) {
      return (
        <>
          <StoreMaterialView
            row={QC_ROWS[selectedRowIdx]}
            idx={selectedRowIdx}
            yard={yard}
            yardOps={yardOps}
            setBuffer={setBuffer}
            stored={loadStorage[selectedRowIdx] || []}
            actualWeightOverride={loadActualWeights[selectedRowIdx]}
            totalBalesOverride={loadTotalBales[selectedRowIdx]}
            processedBales={(loadProcessed[selectedRowIdx]?.bales) || 0}
            onAddStorage={(entry) => {
              setLoadStorage(prev => ({
                ...prev,
                [selectedRowIdx]: [...(prev[selectedRowIdx] || []), entry]
              }));
            }}
            onSetWeight={(w) => setLoadActualWeights(prev => ({ ...prev, [selectedRowIdx]: w }))}
            onToast={setStoreToast}
            onDone={() => setStoreMode(false)}
            onCancel={() => setStoreMode(false)}
          />
          {storeToast && (
            <div className="fixed top-4 right-4 z-50 inline-flex items-center gap-2 px-4 py-3 rounded-lg bg-success-300 text-white shadow-lg text-[13px] font-medium">
              <Icon d={I.checkCircle} className="w-5 h-5" />
              {storeToast}
            </div>
          )}
        </>
      );
    }
    if (selectedRowIdx !== null) {
      return (
        <LoadDetailsView
          row={QC_ROWS[selectedRowIdx]}
          idx={selectedRowIdx}
          buffer={buffer}
          stored={loadStorage[selectedRowIdx] || []}
          actualWeightOverride={loadActualWeights[selectedRowIdx]}
          loadNumberOverride={loadNumbers[selectedRowIdx]}
          totalBalesOverride={loadTotalBales[selectedRowIdx]}
          analysisSessions={loadAnalysisSessions[selectedRowIdx] || []}
          processedRecord={loadProcessed[selectedRowIdx]}
          arrival={loadArrivals[selectedRowIdx]}
          onSaveArrival={({ weight, dock }) => {
            setLoadArrivals(prev => ({ ...prev, [selectedRowIdx]: { weight, dock } }));
            setLoadActualWeights(prev => ({ ...prev, [selectedRowIdx]: weight }));
          }}
          onBack={() => setSelectedRowIdx(null)}
          onStoreMaterial={() => setStoreMode(true)}
          onSetWeight={(w) => setLoadActualWeights(prev => ({ ...prev, [selectedRowIdx]: w }))}
          onSetLoadNumber={(v) => setLoadNumbers(prev => ({ ...prev, [selectedRowIdx]: v }))}
          onSetTotalBales={(v) => setLoadTotalBales(prev => ({ ...prev, [selectedRowIdx]: v }))}
          onAddAnalysisSession={(s) => setLoadAnalysisSessions(prev => ({
            ...prev,
            [selectedRowIdx]: [s, ...(prev[selectedRowIdx] || [])]
          }))}
          onMarkProcessed={(rec) => setLoadProcessed(prev => ({ ...prev, [selectedRowIdx]: rec }))}
          onGoBuffer={goToBuffer}
          onGoPicklist={goToPicklist}
          onNavigateToPicker={goToBuffer}
          onNavigateToHistory={() => { setTab('history'); setAppPage('production'); }}
        />
      );
    }
    const startIdx = (page - 1) * ROWS_PER_PAGE;
    const endIdx = Math.min(startIdx + ROWS_PER_PAGE, totalRows);
    const visibleRows = QC_ROWS.slice(startIdx, endIdx);
    const goPrev = () => setPage(p => Math.max(1, p - 1));
    const goNext = () => setPage(p => Math.min(totalPages, p + 1));

    // Compact reusable field with a floating label sitting on the input's top border.
    const FloatField = ({ label, children, hasValue = false }) => (
      <div className="relative flex-1 min-w-[140px]">
        <label className={'absolute -top-2 left-3 px-1.5 bg-white text-[13px] z-10 ' + (hasValue ? 'text-safi-700' : 'text-neutral-60')}>
          {label}
        </label>
        {children}
      </div>
    );

    const fmtDate = (day) => {
      // 9 Jun 2026 style.
      const d = Math.max(1, day);
      return `${d} Jun 2026`;
    };

    return (
      <div className="px-8 py-6">
        {/* Page header */}
        <div className="flex items-start justify-between gap-4 flex-wrap mb-6">
          <h1 className="text-4xl font-bold tracking-tight text-neutral-100">Quality control</h1>
          <div className="flex items-center gap-2">
            {/* Import loads - split button with chevron */}
            <div className="inline-flex rounded-lg overflow-hidden border border-neutral-10">
              <button className="inline-flex items-center gap-2 px-3.5 py-2 bg-white text-neutral-100 text-[13px] font-medium hover:bg-neutral-5">
                <Icon d={I.arrowR} className="w-4 h-4 -rotate-90 text-neutral-60" />
                Import loads
              </button>
              <button className="px-2 bg-white text-neutral-100 hover:bg-neutral-5 border-l border-neutral-10" aria-label="More import options">
                <Icon d={I.chevron} className="w-4 h-4 text-neutral-60" />
              </button>
            </div>
            <button className="inline-flex items-center gap-1.5 px-4 py-2 rounded-lg bg-safi-600 text-white text-[13px] font-medium hover:bg-safi-700">
              <Icon d={I.plus} className="w-4 h-4" />
              Create load
            </button>
            <button className="p-2 rounded-lg border border-neutral-10 bg-white hover:bg-neutral-5" aria-label="More options">
              <Icon d={I.kebab} className="w-4 h-4 -rotate-90 text-neutral-60" strokeWidth={2.5} />
            </button>
          </div>
        </div>

        {/* Filter row */}
        <div className="flex items-stretch gap-3 mb-3 flex-wrap">
          <FloatField label="Search loads">
            <div className="relative">
              <Icon d={I.search} className="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-neutral-60" />
              <input
                placeholder="Enter..."
                className="w-full pl-9 pr-3 py-2.5 border border-neutral-10 rounded-lg text-[13px] bg-white"
              />
            </div>
          </FloatField>
          <FloatField label="Material">

              <tbody className="divide-y divide-neutral-10">
                {visibleRows.map((r, i) => {
                  const rowIdx = startIdx + i;
                  // R53: analysed = the load has any analysis history (seeded
                  // results OR the FO completed an Analyse session).
                  const analysed = !!r.results || (loadAnalysisSessions[rowIdx] && loadAnalysisSessions[rowIdx].length > 0);
                  // R75: arrival record for this row (badge + dock + weight).
                  const arrival = loadArrivals[rowIdx];
                  // R77: lifecycle flags for the Status column.
                  const isStoredRow = (loadStorage[rowIdx] || []).length > 0;
                  const isProcessedRow = !!loadProcessed[rowIdx];
                  return (
                    <tr
                      key={rowIdx}
                      onClick={() => setSelectedRowIdx(rowIdx)}
                      className="hover:bg-neutral-5/50 cursor-pointer"

                      {/* Order details = order ref above, load number below in muted text. */}
                      <td className="px-4 py-3">
                        <div className="font-semibold text-neutral-100">{r.orderRef}</div>
                        <div className="text-[13px] text-neutral-60 mt-0.5">{r.loadNo}</div>

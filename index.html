                      <td className="px-4 py-3 text-neutral-100">{r.supplier}</td>
                      <td className="px-4 py-3 text-neutral-100">{fmtDate(r.scheduledDay)}</td>
                      <td className="px-4 py-3 text-neutral-100">{r.material}</td>
                      <td className="px-4 py-3">
                        {analysed ? (
                          <div className="flex items-center gap-2 flex-wrap">
                            <span className={'inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[13px] font-medium ' + (r.results?.primary?.ok ? 'bg-success-100 text-success-300' : 'bg-rose-100 text-rose-900')}>
                              <Icon d={r.results?.primary?.ok ? I.checkCircle : I.errorCircle} className="w-3.5 h-3.5" />
                              {(r.results?.primary?.label) || 'Target UBC'} {((r.results?.primary?.value) ?? 70.0).toFixed(1)}%
                            </span>
                            <span className={'inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[13px] font-medium ' + (r.results?.secondary?.ok ? 'bg-success-100 text-success-300' : 'bg-rose-100 text-rose-900')}>
                              <Icon d={r.results?.secondary?.ok ? I.checkCircle : I.errorCircle} className="w-3.5 h-3.5" />
                              {(r.results?.secondary?.label) || 'Non PET'} {((r.results?.secondary?.value) ?? 12.0).toFixed(1)}%
                            </span>
                          </div>
                        ) : (
                          <span className="text-neutral-60">-</span>
                        )}
                      </td>
                      {/* R77: Status column. The dock + weight line sits directly
                          under the Arrived badge (they describe the same event),
                          left-aligned to the badge so the column reads as one
                          unit per state. */}
                      <td className="px-4 py-3 align-top">
                        {(arrival || isStoredRow || analysed || isProcessedRow) ? (
                          <div className="flex flex-col items-start gap-1.5">
                            {arrival && (
                              <div>
                                <StatusBadge color="green">Arrived</StatusBadge>
                                <div className="text-[13px] text-neutral-60 mt-1 whitespace-nowrap">
                                  Dock {arrival.dock} · {arrival.weight.toLocaleString()} kg
                                </div>
                              </div>
                            )}
                            {isStoredRow && <StatusBadge color="blue">Stored</StatusBadge>}
                            {analysed && <StatusBadge color="purple">Analysed</StatusBadge>}
                            {isProcessedRow && <StatusBadge color="grey">Processed</StatusBadge>}
                          </div>
                        ) : (
                          <span className="text-neutral-60">-</span>
                        )}
                      </td>
                      <td className="px-4 py-3 align-top">
                        <div className="flex items-center gap-2 flex-wrap">
                        {/* R75: Mark arrived - available until the load has an arrival record. */}
                        {!arrival && (
                          <button
                            onClick={(e) => { e.stopPropagation(); setArriveModalIdx(rowIdx); }}
                            className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-neutral-10 text-[13px] font-medium text-neutral-100 bg-white hover:bg-neutral-5"
                          >
                            <Icon d={I.checkCircle} className="w-3.5 h-3.5" />
                            Mark arrived
                          </button>
                        )}
                        {analysed ? (
                          <button
                            onClick={(e) => e.stopPropagation()}
                            className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-neutral-10 text-[13px] font-medium text-neutral-100 bg-white hover:bg-neutral-5"
                          >
                            <Icon d={I.claim} className="w-3.5 h-3.5" />
                            Create claim
                          </button>
                        ) : (
                          // R53: unanalysed rows get two CTAs - primary Analyse,
                          // secondary Store (opens the Store Material workflow).
                          <div className="flex items-center gap-2 flex-wrap">
                            <button
                              onClick={(e) => { e.stopPropagation(); setSelectedRowIdx(rowIdx); /* Land on hub; analyse modal opened from there */ }}
                              className="inline-flex items-center gap-1 px-3 py-1.5 rounded-lg bg-safi-600 text-white text-[13px] font-medium hover:bg-safi-700"
                            >
                              Analyse
                              <Icon d={I.chevronR} className="w-3.5 h-3.5" />
                            </button>
                            <button
                              onClick={(e) => { e.stopPropagation(); setSelectedRowIdx(rowIdx); setStoreMode(true); }}
                              className="inline-flex items-center gap-1 px-3 py-1.5 rounded-lg border border-neutral-10 text-[13px] font-medium text-neutral-100 bg-white hover:bg-neutral-5"
                            >
                              Store
                              <Icon d={I.chevronR} className="w-3.5 h-3.5" />
                            </button>
                          </div>
                        )}
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          {/* Pagination */}
          <div className="flex items-center justify-end gap-6 px-4 py-3 text-[13px] text-neutral-60 border-t border-neutral-10">
            <div className="flex items-center gap-2">
              <span>Rows per page:</span>
              <div className="inline-flex items-center gap-1 px-2 py-1 text-neutral-100">
                <span>15</span>
                <Icon d={I.chevron} className="w-3.5 h-3.5" />
              </div>
            </div>
            <div className="text-neutral-100">{startIdx + 1}–{endIdx} of {totalRows}</div>
            <div className="flex items-center gap-1">
              <button
                onClick={goPrev}
                disabled={page === 1}
                className="p-1.5 rounded hover:bg-neutral-5 disabled:opacity-40 disabled:cursor-not-allowed"
                aria-label="Previous page"
              >
                <Icon d={I.chevronR} className="w-4 h-4 rotate-180" />
              </button>
              <button
                onClick={goNext}
                disabled={page === totalPages}
                className="p-1.5 rounded hover:bg-neutral-5 disabled:opacity-40 disabled:cursor-not-allowed"
                aria-label="Next page"
              >
                <Icon d={I.chevronR} className="w-4 h-4" />
              </button>
            </div>
          </div>
        </div>

        {/* R75: Mark load as arrived overlay. */}
        {arriveModalIdx !== null && (
          <ArriveModal
            row={QC_ROWS[arriveModalIdx]}
            onCancel={() => setArriveModalIdx(null)}
            onSave={({ weight, dock }) => {
              setLoadArrivals(prev => ({ ...prev, [arriveModalIdx]: { weight, dock } }));
              setLoadActualWeights(prev => ({ ...prev, [arriveModalIdx]: weight }));
              setArriveModalIdx(null);
            }}
          />
        )}
      </div>
    );
  }

  // ----------------------------------------------------------------------------
  // PAGE: PRODUCTION MANAGEMENT (root of the prototype)
  // ----------------------------------------------------------------------------

  function ProductionManagementPage() {
    // R46: top-level routing state. 'production' shows the existing production
    // dashboard; 'quality-control' shows the new QC table. The nav drawer
    // toggles between them.
    const [appPage, setAppPage] = useState('production');
    // EN / ES language toggle (replaces the old role switcher)
    const [lang, setLang] = useState('en');
    // The "role" concept is gone - the SL is always the persona. Picker tab can still be visited.
    const role = 'SL';
    const setRole = () => {};

    // Tabs - accordion variant removed. Sticky is the default.
    // R41: default landing tab is now the (renamed) Warehouse layout — vertical-list tab removed.
    const [tab, setTab] = useState('pw-layout');

    // R39: editable warehouse - yard structure now lives in state so the SL can
    // create / rename / delete zones + bays + move loads at runtime.
    const [yard, setYard] = useState(INITIAL_YARD);
    // R61: Edit Warehouse mode — full-screen overlay toggleable from the
    // warehouse tab header, zone header, and bay header.
    const [editWarehouseOpen, setEditWarehouseOpen] = useState(false);
    // R61: buffer zones are first-class entities (name, lines, locks). The
    // existing `buffer` array (loads staged) is unchanged; buffer zones are
    // the named containers seen in Edit Warehouse + future bay-detail views.
    const [bufferZones, setBufferZones] = useState([
      // R61 Phase 3: buffers carry a full loads[] array (Phase 2 used
      // aggregate bales/weight counters; the detail view needs the loads
      // themselves so they can be selected, reordered, and moved out).
      // Aggregates shown elsewhere are derived from this array.
      { id: 'buf-default', name: 'Buffer', lines: ['Apan 1', 'Apan 2'], lockedStorage: false, lockedProcessing: false, loads: [
        { id: 'buf-l-1', supplier: 'rPet India', lot: 'LOT-buf-001', bales: 10, weight: 6500, results: { transparentPET: 98.5, colouredPET: 1.4, contaminants: 0.1 } },
        { id: 'buf-l-2', supplier: 'CLYNK Scotia', lot: 'LOT-buf-002', bales: 12, weight: 7807, results: { transparentPET: 94.2, colouredPET: 4.8, contaminants: 1.0 } },
      ] },
    ]);
    // R42: buffer lives at the page level so both the Warehouse tab (Buffer card
    // + buffer detail view) and the Picker (move/return/process actions) can
    // share it. Seeded so the bale-based Warehouse view shows realistic content
    // out of the box.
    const [buffer, setBuffer] = useState(SEED_BUFFER);
    // Mutator helpers - thin wrappers that keep call sites readable.
    const yardOps = {
      createZone: ({ name, color, bays = [], lines = ['Apan 1', 'Apan 2'] }) => setYard(prev => {
        const id = name.replace(/\s+/g, '').slice(0, 4).toUpperCase() + '-' + Date.now().toString(36).slice(-4);
        // R40: bays passed in are created together with the zone.
        const bayObjs = bays.map(bn => ({ id: bn, name: bn, esName: bn, accessible: true, loads: [] }));
        // R58: lines = which production lines this zone serves. Defaults to all.
        return [...prev, { id, name, esName: name, color: color || 'none', inventoryRule: 'NONE', bays: bayObjs, lines }];
      }),
      updateZone: (zoneId, patch) => setYard(prev => prev.map(z => z.id === zoneId ? { ...z, ...patch, esName: patch.name || z.esName } : z)),
      deleteZone: (zoneId) => setYard(prev => prev.filter(z => z.id !== zoneId)),
      createBays: (zoneId, names) => setYard(prev => prev.map(z => {
        if (z.id !== zoneId) return z;
        const newBays = names.map(name => ({ id: name, name, esName: name, accessible: true, loads: [] }));
        return { ...z, bays: [...z.bays, ...newBays] };
      })),
      updateBay: (zoneId, bayId, patch) => setYard(prev => prev.map(z => {
        if (z.id !== zoneId) return z;
        return { ...z, bays: z.bays.map(b => b.id === bayId ? { ...b, ...patch, esName: patch.name || b.esName } : b) };
      })),
      deleteBay: (zoneId, bayId) => setYard(prev => prev.map(z => {
        if (z.id !== zoneId) return z;
        return { ...z, bays: z.bays.filter(b => b.id !== bayId || b.loads.length > 0) };
      })),
      // R49: append a synthesised load object to a target bay. Used by the
      // Store Material workflow so bales stored from the QC load-details page
      // appear in the production warehouse view.
      addLoad: (zoneId, bayId, load) => setYard(prev => prev.map(z => {
        if (z.id !== zoneId) return z;
        return {
          ...z,
          bays: z.bays.map(b => b.id !== bayId ? b : { ...b, loads: [...b.loads, load] })
        };
      })),
      moveLoads: (fromZoneId, fromBayId, loadIds, toZoneId, toBayId) => setYard(prev => {
        const moved = [];
        const next = prev.map(z => {
          if (z.id !== fromZoneId) return z;
          return {
            ...z,
            bays: z.bays.map(b => {
              if (b.id !== fromBayId) return b;
              const keep = []; b.loads.forEach(l => { if (loadIds.includes(l.id)) moved.push(l); else keep.push(l); });
              return { ...b, loads: keep };
            })
          };
        });
        return next.map(z => {
          if (z.id !== toZoneId) return z;
          return {
            ...z,
            bays: z.bays.map(b => b.id === toBayId ? { ...b, loads: [...b.loads, ...moved] } : b)
          };
        });
      }),
    };

    // R35/R36: Picking list state - identified by (productionLine, shift).
    // Apan 1 / Apan 2 are PRODUCTION LINES. Each line can have multiple picking
    // lists, typically one per shift. Up to 6 unique slots (2 lines * 3 shifts).
    // R36: removed the header line switcher - all lists are visible everywhere
    // and the Picker has its own per-list filter dropdown.
    // Shape: [{ id, name, createdAt, productionLine, shift, createdBy, loads, note }]
    const [pickingLists, setPickingLists] = useState([]);
    // Which (productionLine, shift) the SL is currently building / editing.
    const [creationLine, setCreationLine] = useState('Apan 1');
    const [creationShift, setCreationShift] = useState('Shift 1');
    // Mock current user - in production this comes from auth.
    const currentUser = 'Kate Brooks';

    // R35/R36: Helpers for the multi-(line, shift) picking-list model.
    // upsertList accepts a composite key (line, shift) string.
    const KEY = (line, shift) => `${line}||${shift}`;
    const parseKey = (k) => { const [line, shift] = k.split('||'); return { line, shift }; };
    const upsertList = (key, list) => {
      const { line, shift } = parseKey(key);
      setPickingLists(prev => {
        const i = prev.findIndex(l => l.productionLine === line && l.shift === shift);
        if (list === null || list === undefined) {
          return i >= 0 ? prev.filter((_, j) => j !== i) : prev;
        }
        const withMeta = { ...list, productionLine: line, shift };
        if (i >= 0) { const next = [...prev]; next[i] = withMeta; return next; }
        return [...prev, withMeta];
      });
    };
    // Map loadId -> { productionLine, shift } across ALL picking lists.
    // A load can only be on ONE picking list. Used for "claimed" chips +
    // selection-claim validation when creating/editing another list.
    const loadClaimMap = (() => {
      const m = {};
      pickingLists.forEach(pl => pl.loads.forEach(({ loadId }) => {
        m[loadId] = { productionLine: pl.productionLine, shift: pl.shift };
      }));
      return m;
    })();

    // Processed load IDs (FO marks these as processed in the Picker tab)
    const [processed, setProcessed] = useState({}); // { loadId: { bales, weight, at } }

    // Active production window flag (so SL can start one from the confirm step)
    const [windowActive, setWindowActive] = useState(true);

    // SL workflow mode: 'default' (overview only) | 'create' (selecting loads) | 'confirm' (review modal)
    const [slMode, setSlMode] = useState('default');

    // Lifted: selection state for the in-progress picking list (was inside ShiftLeaderView).
    // Lifting lets the create-mode breadcrumb consult the count for its confirm-back dialog.
    const [selectionBales, setSelectionBales] = useState({});
    // Confirm-back-from-create dialog
    const [showConfirmBack, setShowConfirmBack] = useState(false);
    const onBreadcrumbBack = () => {
      if (Object.keys(selectionBales).length > 1) {
        setShowConfirmBack(true);
      } else {
        setSelectionBales({});
        setSlMode('default');
      }
    };

    // Toast - { message, kind: 'success' } | null
    const [toast, setToast] = useState(null);
    useEffect(() => {
      if (!toast) return;
      const t = setTimeout(() => setToast(null), 6000);
      return () => clearTimeout(t);
    }, [toast]);

    // Picker mode plant setting - 'load' (default) | 'bale'.
    // Lives in the global header toggle next to the language switch.
    // Load-based: FO processes whole loads, no buffer zone.
    // Bale-based: FO processes one bale at a time, buffer zone visible, reject + process require weight.
    const [pickerMode, setPickerMode] = useState('load');
    const bufferEnabled = pickerMode === 'bale';

    // Loads remaining to pick (for Picker tab badge) - summed across ALL lists.
    const loadsRemaining = pickingLists.reduce(
      (acc, pl) => acc + pl.loads.filter(({ loadId }) => !processed[loadId]).length, 0
    );
    const hasAnyList = pickingLists.length > 0;

    // R46: Quality Control route - short-circuit out of the production page.
    // R49: pass yard + yardOps so the Store Material flow can write to the
    // production warehouse.
    if (appPage === 'quality-control') {
      return (
        <LangContext.Provider value={lang}>
          <AppShell lang={lang} setLang={setLang} appPage={appPage} setAppPage={setAppPage}>
            <QualityControlPage
              yard={yard} yardOps={yardOps}
              buffer={buffer} setBuffer={setBuffer}
              setAppPage={setAppPage} setTab={setTab} setPickerMode={setPickerMode}
            />
          </AppShell>
        </LangContext.Provider>
      );
    }
    return (
      <LangContext.Provider value={lang}>
      <AppShell lang={lang} setLang={setLang} pickerMode={pickerMode} setPickerMode={setPickerMode} appPage={appPage} setAppPage={setAppPage}>
        <div className="px-8 py-6">
          {/* Page heading swaps when SL enters Create picking list mode */}
          {slMode === 'create' && tab === 'pw-layout' ? (
            <div>
              <nav aria-label="Breadcrumb" className="flex items-center gap-2 text-[13px] mb-2">
                <button
                  onClick={onBreadcrumbBack}
                  className="text-safi-600 hover:underline"
                >
                  {lang === 'es' ? 'Almacén' : 'Warehouse'}
                </button>
                <span className="text-neutral-40">/</span>
                <span className="text-neutral-100 font-medium">
                  {lang === 'es' ? 'Alimentación a la banda' : 'Create picking list'}
                </span>
              </nav>
              <div className="flex items-start justify-between gap-6">
                <div>
                  <h1 id="create-picking-list-h1" className="text-3xl font-bold tracking-tight text-neutral-100">
                    {lang === 'es' ? 'Alimentación a la banda' : 'Create picking list'}
                  </h1>
                  <p className="text-[13px] text-neutral-60 mt-1">
                    {lang === 'es'
                      ? 'Selecciona los lotes para enviar a los recolectores.'
                      : 'Select loads below to send to pickers.'}
                  </p>
                </div>
              </div>
            </div>
          ) : (
            <div className="mb-4">
              <h1 className="text-3xl font-bold tracking-tight text-neutral-100">
                {lang === 'es' ? 'Producción' : 'Production'}
              </h1>
            </div>
          )}

          {/* Tabs - hidden during Create picking list to keep focus on the workflow.
              R25: the original load-only Picker tab (id="picker") is no longer exposed
              in the nav - its component (ForkliftPickerView) is left in the source so
              we can reinstate it cheaply if needed. The merged tab now drives both
              load-based and bale-based flows via the header Picker mode toggle. */}
          {!(slMode === 'create' && tab === 'pw-layout') && (
            <div className="border-b border-neutral-10 mb-6 flex gap-6 text-[13px] overflow-x-auto">
              {/* R41: vertical-list tab removed; layout tab renamed to just "Warehouse". */}
              <Tab id="pw-layout" label={lang === 'es' ? 'Almacén' : 'Warehouse'} tab={tab} setTab={setTab} />
              <Tab id="picker-merged" label={lang === 'es' ? 'Recolección' : 'Picker'}                                    tab={tab} setTab={setTab}
                   badge={hasAnyList ? loadsRemaining : null} />
              {/* R70/R71: Line management & performance tab merges the previous Picker
                  planner + Dashboard + History tabs. Line-centric layout: active windows
                  side-by-side at top with live stats + input-quality chart, planning inline
                  when a line is idle, full historical windows embedded at the bottom. */}
              <Tab id="line-management" label={lang === 'es' ? 'Listas de picking' : 'Picking lists'} tab={tab} setTab={setTab} />
              {/* R29/R71: standalone History tab removed — historical data now lives inline
                  in the Line management & performance tab. */}
            </div>
          )}

          {/* R41: vertical-list (layout="sticky") tab removed. The component is retained in source.
              R42: buffer + setBuffer passed in so the Warehouse tab can render the Buffer card / detail. */}
          {tab === 'pw-layout' && <ShiftLeaderView
                                    buffer={buffer} setBuffer={setBuffer}
                                    layout="spatial"
                                    pickingLists={pickingLists} upsertList={upsertList} loadClaimMap={loadClaimMap}
                                    creationLine={creationLine} setCreationLine={setCreationLine}
                                    creationShift={creationShift} setCreationShift={setCreationShift}
                                    yard={yard} yardOps={yardOps}
                                    setTab={setTab} setRole={setRole}

  function TablePagination({ total, page, perPage = 5, onPage, lang = 'en' }) {

    if (total <= perPage) return null;

          <button
            onClick={() => onPage(Math.min(totalPages - 1, page + 1))}

  // =========================================================================
  // R65: HISTORY TAB REDESIGN — helpers, components, and derivation functions.
  // Production windows are rendered as collapsible cards with a nested shifts
  // × lines table. Clicking a row opens the side drawer (Figma-aligned data
  // table view) showing the loads processed for that specific shift+line.
  // =========================================================================

  // Status thresholds for deviation %, quality %, and aggregate row status.
  const devStatusFor = (dev) => {
    const a = Math.abs(dev);
    if (a <= 1) return 'ok';
    if (a <= 3) return 'warn';
    return 'bad';
  };
  const qualityStatusFor = (q, target = 90) => {
    if (q >= target) return 'ok';
    if (q >= target - 3) return 'warn';
    return 'bad';
  };
  const rowsAggregateStatus = (rows) => {
    let s = 'ok';
    for (const r of rows) {
      if (r.alerts > 0 || devStatusFor(r.deviation) === 'bad' || qualityStatusFor(r.quality) === 'bad') return 'bad';
      if (devStatusFor(r.deviation) === 'warn' || qualityStatusFor(r.quality) === 'warn') s = 'warn';
    }
    return s;
  };

  // Tailwind class lookups for the three status tones.
  const STATUS_BAR_BG = { ok: 'bg-emerald-500', warn: 'bg-amber-500', bad: 'bg-rose-500' };
  const STATUS_TEXT   = { ok: 'text-success-300', warn: 'text-amber-700', bad: 'text-rose-900' };
  const STATUS_CHIP   = {
    ok:   'bg-success-100 text-success-300',
    warn: 'bg-amber-50 text-amber-900',
    bad:  'bg-rose-100 text-rose-900',
  };

  // Format helpers.
  const fmtPctSigned = (n) => (n > 0 ? '+' : '') + n.toFixed(1) + '%';
  const fmtKgFull    = (n) => fmtNum(n) + ' kg';

  // Quality chip used in the drawer's loads table — green/amber/red per spec status.
  const HistoryQualityChip = ({ name, pct, status = 'ok' }) => (
    <span className={'inline-flex items-center gap-1 px-2 py-0.5 rounded-md text-[12px] font-semibold whitespace-nowrap ' + STATUS_CHIP[status]}>
      <Icon d={status === 'ok' ? I.checkCircle : I.errorCircle} className="w-3 h-3" />
      {name} {pct}%
    </span>
  );

  // Target input by window — fixed per window so the prototype's deviation values
  // demo a mix of in-spec, warning, and out-of-spec rows.
  const TARGET_INPUT_BY_WINDOW = {
    'pw-active': 92, 'pw-1': 70, 'pw-2': 95, 'pw-3': 75,
    'pw-4': 75, 'pw-5': 80, 'pw-6': 75, 'pw-7': 75, 'pw-8': 85,
  };
  const targetFor = (pw) => TARGET_INPUT_BY_WINDOW[pw.id] || Math.round((pw.actualInputPct + 5) / 5) * 5;

  // Derive shifts × lines for a production window.
  //   <  18 hrs       → 1 shift, no label
  //   18–36 hrs       → 3 shifts (day/evening/night)
  //   >  36 hrs       → day+night × up to 3 days
  // Each shift has 1–2 lines depending on bale count. Totals are distributed
  // deterministically so the table looks plausible without needing real data.
  const NOW_FROZEN = new Date('2026-05-26T17:00:00Z');
  function deriveShifts(pw) {
    const start = new Date(pw.startedAt);
    const end = pw.endedAt ? new Date(pw.endedAt) : NOW_FROZEN;
    const durHrs = Math.max(1, (end - start) / 36e5);

    let shiftDefs;
    if (durHrs < 18) {
      shiftDefs = [{ id: pw.id + '-main', label: null }];
    } else if (durHrs <= 36) {
      shiftDefs = [
        { id: pw.id + '-shift-day',     label: '09:00 – 17:00' },
        { id: pw.id + '-shift-evening', label: '17:00 – 01:00' },
        { id: pw.id + '-shift-night',   label: '01:00 – 09:00' },
      ];
    } else {
      const days = Math.min(3, Math.ceil(durHrs / 24));
      shiftDefs = [];
      for (let d = 0; d < days; d++) {
        shiftDefs.push({ id: `${pw.id}-d${d}-day`,   label: `Day ${d + 1} · Day shift` });
        shiftDefs.push({ id: `${pw.id}-d${d}-night`, label: `Day ${d + 1} · Night shift` });
      }
    }

    const numShifts = shiftDefs.length;
    const numLines = pw.balesProcessed >= 8 ? 2 : 1;
    const shiftFrac = 1 / numShifts;
    const lineFracs = numLines === 1 ? [1] : [0.55, 0.45];

    const target = targetFor(pw);
    const actual = pw.actualInputPct;
    const quality = (pw.specAverages && (pw.specAverages.transparent || pw.specAverages.light)) || 88;
    const hasIssues = pw.mismatches.length + pw.rejectedBales.length > 0;

    return shiftDefs.map((sd, sIdx) => ({
      ...sd,
      rows: Array.from({ length: numLines }, (_, lIdx) => {
        const variance = ((sIdx + lIdx) % 3) - 1; // -1, 0, +1
        const lineActual = Math.max(40, Math.min(100, +(actual + variance).toFixed(1)));
        const deviation = +(lineActual - target).toFixed(1);
        const baleFrac = shiftFrac * lineFracs[lIdx];
        const bales = Math.max(1, Math.round(pw.balesProcessed * baleFrac));
        const kg = Math.max(1, Math.round(pw.weightProcessed * baleFrac));
        const isAlertLine = hasIssues && sIdx === 0 && lIdx === 0;
        const alerts = isAlertLine ? (pw.mismatches.length + pw.rejectedBales.length) : 0;

        // R65: per-line quality chips. Line 1 (primary line) gets a single
        // Clear PET chip; Line 2 (secondary line, processes off-spec/contaminant
        // streams in the prototype) gets Green PET + Thermoforms chips.
        const chips = (() => {
          if (lIdx === 0) {
            const clearPct = Math.round(quality + variance);
            return [{
              name: 'Clear PET',
              pct: clearPct,
              status: clearPct >= 92 ? 'ok' : clearPct >= 88 ? 'warn' : 'bad',
            }];
          }
          const greenPct = Math.round(((pw.specAverages && pw.specAverages.coloured) || 11) + (sIdx % 2) * 2);
          const thermoPct = 3 + (sIdx % 3);
          return [
            { name: 'Green PET',   pct: greenPct,  status: greenPct  <= 6 ? 'ok' : greenPct  <= 9 ? 'warn' : 'bad' },
            { name: 'Thermoforms', pct: thermoPct, status: thermoPct <= 2 ? 'ok' : thermoPct <= 5 ? 'warn' : 'bad' },
          ];
        })();

        return {
          line: numLines === 1 ? 'Line 1' : (lIdx === 0 ? 'Line 1' : 'Line 2'),
          lineId: `${sd.id}-l${lIdx}`,
          target, actual: lineActual, deviation, quality, bales, kg, alerts,
          chips,
        };
      }),
    }));
  }

  // R65c: per-bale quality chips. BMP processes one bale at a time, so each
  // bale carries its own AI breakdown: Bottles/Jars (target, higher is better)
  // + Thermoforms, Non PET, Metal (contaminants, lower is better). Values are
  // synthesised deterministically from the bale id so they're stable across
  // renders and vary plausibly bale-to-bale.
  function perBaleChips(bale) {
    const seed = (bale.id || '').split('').reduce((s, c) => s + c.charCodeAt(0), 0) || 1;
    const r = (n) => ((seed * (n + 3) * 31) % 1000) / 1000;
    const bottles     = Math.round(80 + r(0) * 12);    // 80..92
    const thermoforms = Math.round(2 + r(1) * 13);     // 2..14
    const nonPet      = Math.round(1 + r(2) * 6);      // 1..7
    const metal       = Math.round(r(3) * 3);          // 0..3
    return [
      { name: 'Bottles/Jars', pct: bottles,     status: bottles     >= 85 ? 'ok' : bottles     >= 80 ? 'warn' : 'bad' },
      { name: 'Thermoforms',  pct: thermoforms, status: thermoforms <= 5  ? 'ok' : thermoforms <= 9  ? 'warn' : 'bad' },
      { name: 'Non PET',      pct: nonPet,      status: nonPet      <= 2  ? 'ok' : nonPet      <= 4  ? 'warn' : 'bad' },
      { name: 'Metal',        pct: metal,       status: metal       <= 1  ? 'ok' : metal       <= 2  ? 'warn' : 'bad' },
    ];
  }

  // R65d: derive the drawer's load-row data. Each row = one load processed
  // during the shift+line. Quality chips use BMP's material categories
  // (Bottles/Jars, Thermoforms, Non PET, Metal) — driven deterministically
  // from the load id so per-load values vary plausibly. Total bales and
  // source bay are synthesised for the prototype.
  function deriveProcessedLoads(pw) {
    const loads = pw.recentItems
      .filter(i => i.kind === 'load')
      .sort((a, b) => new Date(b.at) - new Date(a.at));
    return loads.map(load => {
      const seed = (load.id || '').split('').reduce((s, c) => s + c.charCodeAt(0), 0) || 1;
      const processed = load.bales || 1;
      // Total bales is plausibly larger than the count processed in this shift
      // — a load can span multiple shifts.
      const totalBales = Math.max(processed, processed + ((seed * 7) % 38) + 4);
      const sourceBay = `Bay ${(seed % 8) + 1}`;
      return {
        id: load.id,
        orderRef: load.lot,
        supplier: load.supplier,
        processed,
        totalBales,
        sourceBay,
        processedBy: load.processedBy,
        processedAt: load.at,
        kg: load.weight,
        chips: perBaleChips(load),
        note: load.note,
      };
    });
  }

  // Aggregate totals across shifts × lines. Average deviation is kg-weighted.
  function totalsFromShifts(shifts) {
    const rows = shifts.flatMap(s => s.rows);
    const bales  = rows.reduce((s, r) => s + r.bales,  0);
    const kg     = rows.reduce((s, r) => s + r.kg,     0);
    const alerts = rows.reduce((s, r) => s + r.alerts, 0);
    const totalKg = rows.reduce((s, r) => s + r.kg, 0);
    const avgDev = totalKg
      ? +(rows.reduce((s, r) => s + r.deviation * r.kg, 0) / totalKg).toFixed(1)
      : 0;
    return { bales, kg, alerts, avgDev, status: rowsAggregateStatus(rows) };
  }

        {open && (

  }

  // ==========================================================================
  // R70: ProductionView — merged Production tab.
  //
  // Line-centric layout: each production line has its own panel showing either
  // (a) an ACTIVE production window with target chips, quick stats, picking
  // performance, and an input-quality chart; or (b) an IDLE state with a plan
  // form offering manual (link to Warehouse) or AI (inline config) paths.
  //
  // Below both line panels sits a Recent windows section with a link out to
  // the full History tab for deep analytics.
  //
  // Applies the cross-cutting principles from the design brief:
  //   • Forecast vs actual — timeline/quality chart is the hero visual.
  //   • AI proposes, manager disposes — Start window is manager-initiated;
  //     Finish window overrides algorithmic run.
  // ==========================================================================

  const PRODUCTION_MATERIALS = ['Clear PET Bales', 'Green PET', 'HDPE Natural', 'HDPE Colour', 'Mixed PET'];
  const PRODUCTION_SPEC_GROUPS = ['Bottles/Jars', 'Thermoforms', 'Coloured PET', 'Contaminants', 'Non PET', 'Metal'];
  const DEFAULT_OP = (spec) => (spec === 'Bottles/Jars' ? '>=' : '<=');
  const DEFAULT_TARGET = (spec) => (spec === 'Bottles/Jars' ? 85 : spec === 'Thermoforms' ? 25 : 2);

  function ProductionView({ pickingLists = [], processed = {}, pickerMode = 'load', yard = [], lang = 'en', setToast = () => {}, setTab = () => {} }) {
    const tEN = (en, es) => lang === 'es' ? es : en;

    // Static seed for demo: Line 1 running with a Thermoforms target, Line 2 idle.
    const [lineState, setLineState] = useState({
      'Line 1': {
        active: true,
        material: 'Clear PET Bales',
        specGroup: 'Thermoforms',
        operator: '<=',
        targetPct: 25,
        actualPct: 24.6,
        deltaPct: -0.4,
        deltaDir: 'down',
        elapsed: '02:19:51',
        weightPerHr: 1020,
        bales: 301,
        weightKg: 150500,
        oee: 77,
        thermoformsPerHr: 19.1,
        thermoformsTarget: 20,
        contaminantsPerHr: 2.3,
        contaminantsTarget: 2,
        liveAvgPct: 74.1,
        liveAvgDelta: -1.3,
        updatedMins: 12,
        planMode: 'ai',
      },
      'Line 2': {
        active: false,
        material: '',
        specGroup: '',
        operator: '<=',
        targetPct: 0,
        planMode: 'ai',
      },
    });

    const updateLine = (line, patch) => setLineState(prev => ({ ...prev, [line]: { ...prev[line], ...patch } }));
    const startWindow = (line) => {
      const cfg = lineState[line];
      if (!cfg.material || !cfg.specGroup) {
        setToast?.({ message: tEN('Choose a material and spec group first', 'Elige material y grupo primero'), kind: 'error' });
        return;
      }
      // Seed sensible runtime values for a "just started" window.
      updateLine(line, {
        active: true,
        actualPct: 0, deltaPct: 0, deltaDir: 'up',
        elapsed: '00:00:12', weightPerHr: 0, bales: 0, weightKg: 0, oee: 0,
        thermoformsPerHr: 0, thermoformsTarget: cfg.specGroup === 'Thermoforms' ? cfg.targetPct : 20,
        contaminantsPerHr: 0, contaminantsTarget: cfg.specGroup === 'Contaminants' ? cfg.targetPct : 2,
        liveAvgPct: 0, liveAvgDelta: 0, updatedMins: 0,
      });
      setToast?.({ message: tEN(`${line} window started`, `${line} ventana iniciada`), kind: 'success' });
    };
    const finishWindow = (line) => {
      updateLine(line, { active: false });
      setToast?.({ message: tEN(`${line} window finished`, `${line} ventana finalizada`), kind: 'success' });
    };

    // Deterministic pseudo-random helper so demo data stays stable across renders.
    const seededVariation = (i, base, amplitude, freq = 5) => {
      const trend = Math.sin(i / freq) * amplitude;
      const noise = (((i * 13 + 7) % 11) - 5) * (amplitude * 0.15);
      return base + trend + noise;
    };

    // ------------------------------------------------------------------------
    // Input quality this shift — SVG chart. Y axis 60-100%. Two data series:
    // per-bale (thin light) + rolling average (thick purple). Target dashed
    // green line at the material target (75% for a Thermoforms <= 25% run).
    // ------------------------------------------------------------------------
    const InputQualityChart = ({ line, targetOnTargetPct = 75, liveAvgPct }) => {
      const N = 60;
      const perBale = Array.from({ length: N }, (_, i) => Math.max(60, Math.min(95, seededVariation(i, 74, 8, 6))));
      const rolling = perBale.map((_, i) => {
        const start = Math.max(0, i - 9);
        const win = perBale.slice(start, i + 1);
        return win.reduce((s, v) => s + v, 0) / win.length;
      });

      const chartW = 800, chartH = 200;
      const padL = 40, padR = 20, padT = 12, padB = 34;
      const plotW = chartW - padL - padR;
      const plotH = chartH - padT - padB;
      const yMin = 60, yMax = 100;
      const yScale = (v) => padT + (1 - (v - yMin) / (yMax - yMin)) * plotH;
      const xScale = (i) => padL + (i / (N - 1)) * plotW;

      const perBalePath = perBale.map((v, i) => `${i === 0 ? 'M' : 'L'} ${xScale(i)} ${yScale(v)}`).join(' ');
      const rollingPath = rolling.map((v, i) => `${i === 0 ? 'M' : 'L'} ${xScale(i)} ${yScale(v)}`).join(' ');
      const targetY = yScale(targetOnTargetPct);

      return (
        <svg viewBox={`0 0 ${chartW} ${chartH}`} className="w-full h-48" role="img">
          <title>Input quality this shift</title>
          <rect x={padL} y={padT} width={plotW} height={plotH} fill="#F6F3FE" opacity="0.4" />

          <line x1={padL} y1={yScale(100)} x2={padL + plotW} y2={yScale(100)} stroke="#E7E7E8" strokeWidth="0.5" />
          <line x1={padL} y1={yScale(80)} x2={padL + plotW} y2={yScale(80)} stroke="#E7E7E8" strokeWidth="0.5" />
          <line x1={padL} y1={yScale(60)} x2={padL + plotW} y2={yScale(60)} stroke="#E7E7E8" strokeWidth="0.5" />

          <text x={padL - 6} y={yScale(100) + 4} textAnchor="end" fontSize="10" fill="#6E6D77">100%</text>
          <text x={padL - 6} y={yScale(80) + 4} textAnchor="end" fontSize="10" fill="#6E6D77">80%</text>
          <text x={padL - 6} y={yScale(60) + 4} textAnchor="end" fontSize="10" fill="#6E6D77">60%</text>

          <line x1={padL} y1={targetY} x2={padL + plotW} y2={targetY} stroke="#15803D" strokeWidth="1" strokeDasharray="4 4" />
          <text x={padL + plotW - 4} y={targetY - 4} textAnchor="end" fontSize="10" fill="#15803D" fontWeight="500">target</text>

          <path d={perBalePath} fill="none" stroke="#B0A1FE" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round" opacity="0.7" />
          <path d={rollingPath} fill="none" stroke="#6347FF" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />

          <text x={padL - 4} y={chartH - 6} textAnchor="start" fontSize="10" fill="#6E6D77">bales processed → {N}</text>
        </svg>
      );
    };

    // ------------------------------------------------------------------------
    // Panel components
    // ------------------------------------------------------------------------
    const ActiveLinePanel = ({ line, color, data }) => {
      return (
        <div className="bg-white border border-neutral-10 rounded-xl overflow-hidden" style={{ borderLeft: `6px solid ${color}` }}>
          {/* Header */}
          <div className="px-5 py-4 flex items-center justify-between gap-3 flex-wrap border-b border-neutral-10">
            <div className="flex items-center gap-3">
              <span className="px-2.5 py-1 rounded-full text-[12px] font-semibold" style={{ background: color, color: 'white' }}>{line}</span>
              <span className="inline-flex items-center gap-1.5 text-[13px] font-semibold" style={{ color }}>
                <span className="w-2 h-2 rounded-full" style={{ background: color }} />
                {tEN('Active window', 'Ventana activa')}
              </span>
              <span className="text-[12px] text-neutral-60">{tEN('Elapsed', 'Transcurrido')} {data.elapsed}</span>
            </div>
            <button
              onClick={() => finishWindow(line)}
              className="h-10 px-4 border border-neutral-10 rounded-md text-[13px] font-medium text-neutral-100 hover:bg-neutral-5"
            >
              {tEN('Finish window', 'Finalizar ventana')}
            </button>
          </div>

          {/* Meta: Material + Target specifications */}
          <div className="px-5 py-4 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <div className="text-[12px] text-neutral-60 mb-1.5">{tEN('Material', 'Material')}</div>
              <span className="inline-flex items-center px-3 py-1 rounded-full bg-neutral-5 text-neutral-100 text-[14px] font-semibold border border-neutral-10">{data.material}</span>
            </div>
            <div>
              <div className="text-[12px] text-neutral-60 mb-1.5">{tEN('Target specifications', 'Especificaciones objetivo')}</div>
              <span className="inline-flex items-center px-3 py-1 rounded-full bg-safi-50 text-safi-700 text-[14px] font-semibold border border-safi-100">
                {data.specGroup} · {data.operator === '<=' ? '≤' : '≥'} {data.targetPct}%
              </span>
            </div>
          </div>

          {/* Quick stats: Actual input, Elapsed, Weight/hr */}
          <div className="px-5 pb-4 grid grid-cols-3 gap-4">
            <div>
              <div className="text-[12px] text-neutral-60">{tEN('Actual input', 'Entrada real')}</div>
              <div className="text-[22px] font-semibold mt-0.5" style={{ color: Math.abs(data.deltaPct) <= 2 ? '#15803D' : '#B45309' }}>
                {data.actualPct.toFixed(1)}%
              </div>
            </div>
            <div>
              <div className="text-[12px] text-neutral-60">{tEN('Elapsed', 'Transcurrido')}</div>
              <div className="text-[22px] font-semibold text-neutral-100 mt-0.5">{data.elapsed}</div>
            </div>
            <div>
              <div className="text-[12px] text-neutral-60">{tEN('Weight / hour', 'Peso / hora')}</div>
              <div className="text-[22px] font-semibold text-neutral-100 mt-0.5">≈ {fmtNum(data.weightPerHr)}<span className="text-[13px] text-neutral-60 font-normal"> kg/h</span></div>
            </div>
          </div>

          {/* Picking performance card */}
          <div className="px-5 pb-5">
            <div className="text-[15px] font-bold text-neutral-100 mb-3">{tEN('Picking performance', 'Rendimiento de recolección')}</div>
            <div className="bg-neutral-5 border border-neutral-10 rounded-lg p-4">
              <div className="grid grid-cols-3 gap-4 mb-4">
                <div>
                  <div className="text-[12px] text-neutral-60">{tEN('Bales', 'Pacas')}</div>
                  <div className="text-[22px] font-bold text-neutral-100 mt-0.5">{fmtNum(data.bales)}</div>
                </div>
                <div>
                  <div className="text-[12px] text-neutral-60">{tEN('Weight', 'Peso')}</div>
                  <div className="text-[22px] font-bold text-neutral-100 mt-0.5">{fmtNum(data.weightKg)} kg</div>
                </div>

            onClick={() => setToast?.({ message: tEN('Assign picker — coming soon', 'Asignar picker — próximamente'), kind: 'info' })}
            className="inline-flex items-center gap-2 text-[13px] font-semibold hover:opacity-80"
            style={{ color: '#6347FF' }}
          >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4">
              <path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <line x1="19" y1="8" x2="19" y2="14" />
              <line x1="22" y1="11" x2="16" y2="11" />
            </svg>
            {tEN('Assign picker', 'Asignar picker')}
          </button>
        </div>

    return (
      <Fragment>
        <div className="mb-5">
          <div className="text-2xl font-bold text-neutral-100">{tEN('Picking lists', 'Listas de picking')}</div>
          <div className="text-[13px] text-neutral-60 mt-1">
            {tEN(
              'Plan windows per line, watch Safi build live picking lists for each operator, and review historical performance.',
              'Planifica ventanas por línea, ve cómo Safi crea listas de picking en vivo para cada operador y revisa el rendimiento histórico.'
            )}
          </div>
        </div>

        <div className="mb-8">
          <div className="text-[13px] font-semibold text-neutral-80 uppercase tracking-wide mb-3">
            {tEN('Active windows', 'Ventanas activas')}
          </div>
          {/* R70b: side-by-side layout on lg+ screens (iPad landscape and up); stacked on narrower. */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <LinePanel line="Line 1" color="#16A34A" />
            <LinePanel line="Line 2" color="#2563EB" />

        {/* R73: Live AI picking queue + Safi explainer + Operators on shift — visible when at least one line is running. */}

            {tEN('History', 'Historial')}

          {/* R71: full History surface embedded inline (replaces the compact recent-windows list). */}

  // R29/R30/R65: HistoryView — collapsible window cards with nested shift × line tables.
  // Supplier filter sits above; clicking a row opens the side drawer with per-shift detail.
  function HistoryView({ processed, pickerMode = 'load', lang = 'en', yard = [] }) {
    const tEN = (en, es) => lang === 'es' ? es : en;
    const [supplierQuery, setSupplierQuery] = useState('');
    const [drawerSel, setDrawerSel] = useState(null); // { pw, shift, row }
    const [page, setPage] = useState(0);
    const perPage = 5;
    const cardRefs = useRef({});
    // Active window expanded by default; others collapsed for breadth-on-demand.
    const [openWindowIds, setOpenWindowIds] = useState(() => {
      const active = PRODUCTION_WINDOWS.find(w => w.endedAt === null);
      return active ? new Set([active.id]) : new Set();
    });

    // Filter by supplier — matches against any supplier in recentItems / mismatches / rejectedBales.
    const matchesSupplier = (w) => {
      if (!supplierQuery.trim()) return true;
      const q = supplierQuery.trim().toLowerCase();
      const pool = [
        ...w.recentItems.map(x => x.supplier),
        ...w.mismatches.map(x => x.supplier),
        ...w.rejectedBales.map(x => x.supplier),
      ];
      return pool.some(s => (s || '').toLowerCase().includes(q));
    };

    // Active first, then most-recent-first by startedAt.
    const orderedWindows = [...PRODUCTION_WINDOWS].sort((a, b) => {
      if (a.endedAt === null && b.endedAt !== null) return -1;
      if (b.endedAt === null && a.endedAt !== null) return 1;
      return new Date(b.startedAt) - new Date(a.startedAt);
    });
    const visibleWindows = orderedWindows.filter(matchesSupplier);
    const pagedWindows = visibleWindows.slice(page * perPage, (page + 1) * perPage);

    // Reset to first page whenever the filter changes.
    useEffect(() => { setPage(0); }, [supplierQuery]);

    const active = orderedWindows.find(w => w.endedAt === null);
    // R31: load-based processing doesn't weigh material, so mismatches don't apply.
    const showMismatches = pickerMode === 'bale';
    const activeAlerts = active
      ? { mismatches: showMismatches ? active.mismatches.length : 0, rejected: active.rejectedBales.length }
      : { mismatches: 0, rejected: 0 };
    const hasActiveAlert = activeAlerts.mismatches + activeAlerts.rejected > 0;

    // R30: single-line date range with hyphen separator. Active window reads "X - ongoing".
    const fmtDateRange = (started, ended) => {
      const fmt = (d) => new Date(d).toLocaleString('en-GB', {
        day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false
      });
      if (!ended) return `${fmt(started)} - ${tEN('ongoing', 'en curso')}`;
      return `${fmt(started)} - ${fmt(ended)}`;
    };

    const toggleWindow = (id) => {
      setOpenWindowIds(prev => {
        const next = new Set(prev);
        next.has(id) ? next.delete(id) : next.add(id);
        return next;
      });
    };

    // Review (active-window banner): expand the active window's card AND scroll
    // it into view. Lets the user see the alert in context rather than opening
    // a drawer prematurely.
    const reviewActive = () => {
      if (!active) return;
      setOpenWindowIds(prev => new Set([...prev, active.id]));
      setTimeout(() => {
        const el = cardRefs.current[active.id];
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 100);
    };

    const handleRowClick = (pw, shift, row) => setDrawerSel({ pw, shift, row });

    return (
      <Fragment>
        {/* Supplier search filter */}
        <div className="mb-4 max-w-md">
          <FieldsetInput
            label={tEN('Search by supplier', 'Buscar por proveedor')}
            focused={!!supplierQuery}
          >
            <div className="relative">
              <Icon d={I.search} className="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-neutral-60" />
              <input
                type="text"
                value={supplierQuery}
                onChange={e => setSupplierQuery(e.target.value)}
                placeholder={tEN('Supplier name', 'Nombre del proveedor')}
                className="w-full h-14 pl-11 pr-4 bg-transparent text-base text-neutral-100 placeholder-neutral-40 focus:outline-none"
              />
            </div>
          </FieldsetInput>
        </div>

        {/* Active window alert — mismatches or rejected bales need the SL's eyes */}
        {hasActiveAlert && (
          <div className="mb-4 rounded-lg border border-amber-300 bg-amber-50 px-4 py-3 flex items-start gap-3">
            <Icon d={I.errorCircle} className="w-5 h-5 text-amber-700 mt-0.5 shrink-0" />
            <div className="flex-1 min-w-0">
              <div className="font-semibold text-amber-900 text-[15px]">
                {tEN('Attention needed for the ongoing production window', 'Atención necesaria para la ventana de producción en curso')}
              </div>
              <div className="text-[13px] text-amber-900 mt-0.5">
                {[
                  activeAlerts.mismatches > 0 && (activeAlerts.mismatches === 1
                    ? tEN('1 weight mismatch identified', '1 discrepancia de peso identificada')
                    : tEN(`${activeAlerts.mismatches} weight mismatches identified`, `${activeAlerts.mismatches} discrepancias de peso identificadas`)),
                  activeAlerts.rejected > 0 && (activeAlerts.rejected === 1
                    ? tEN('1 bale rejected', '1 paca rechazada')
                    : tEN(`${activeAlerts.rejected} bales rejected`, `${activeAlerts.rejected} pacas rechazadas`)),
                ].filter(Boolean).join(' · ')}
              </div>
            </div>
            <button
              onClick={reviewActive}
              className="shrink-0 px-3 py-2 rounded border border-amber-300 bg-white text-amber-900 text-[13px] font-medium hover:bg-amber-100"
            >
              {tEN('Review', 'Revisar')}
            </button>
          </div>
        )}

        {/* R65b: Filter bar — date range, material, line, alerts toggle.
            Non-functional placeholders in the prototype; chevron implies a dropdown. */}
        <div className="mb-3 flex items-center gap-2 flex-wrap">
          <button
            type="button"
            className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md border border-neutral-10 bg-white text-[13px] font-medium text-neutral-100 hover:bg-neutral-5"
          >
            <Icon d={I.calendar} className="w-4 h-4 text-neutral-60" />
            {tEN('Last 30 days', 'Últimos 30 días')}
            <Icon d={I.chevron} className="w-3.5 h-3.5 text-neutral-60" />
          </button>
          <button
            type="button"
            className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md border border-neutral-10 bg-white text-[13px] font-medium text-neutral-100 hover:bg-neutral-5"
          >
            {tEN('All materials', 'Todos los materiales')}
            <Icon d={I.chevron} className="w-3.5 h-3.5 text-neutral-60" />
          </button>
          <button
            type="button"
            className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md border border-neutral-10 bg-white text-[13px] font-medium text-neutral-100 hover:bg-neutral-5"
          >
            {tEN('All lines', 'Todas las líneas')}
            <Icon d={I.chevron} className="w-3.5 h-3.5 text-neutral-60" />
          </button>
          <button
            type="button"
            className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md border border-neutral-10 bg-white text-[13px] font-medium text-neutral-100 hover:bg-neutral-5"
          >
            <Icon d={I.warning} className="w-4 h-4 text-neutral-60" />
            {tEN('Has alerts', 'Con alertas')}
          </button>
        </div>

        {/* Production window cards */}
        <div className="space-y-3">
          {pagedWindows.map(w => {
            const shifts = deriveShifts(w);
            return (
              <div key={w.id} ref={el => { cardRefs.current[w.id] = el; }}>
                <HistoryWindowCard
                  pw={w}
                  shifts={shifts}
                  open={openWindowIds.has(w.id)}
                  onToggle={() => toggleWindow(w.id)}
                  onRowClick={handleRowClick}
                  lang={lang}
                  fmtDateRange={fmtDateRange}
                  isActive={w.endedAt === null}
                />
              </div>
            );
          })}
          {visibleWindows.length === 0 && (
            <div className="bg-white border border-neutral-10 rounded-xl px-5 py-12 text-center text-[13px] text-neutral-60">
              {tEN('No windows match this supplier search.', 'Ninguna ventana coincide con esta búsqueda.')}
            </div>
          )}
        </div>

        {/* Pagination — rendered only when there's more than one page of windows. */}
        {visibleWindows.length > perPage && (
          <div className="mt-3 bg-white border border-neutral-10 rounded-xl overflow-hidden">
            <TablePagination total={visibleWindows.length} page={page} perPage={perPage} onPage={setPage} lang={lang} />
          </div>
        )}

        {/* Right-side drawer for a specific shift × line */}
        {drawerSel && (
          <ProductionWindowDrawer
            pw={drawerSel.pw}
            shift={drawerSel.shift}
            row={drawerSel.row}
            lang={lang}
            onClose={() => setDrawerSel(null)}
            fmtDateRange={fmtDateRange}
          />
        )}
      </Fragment>
    );
  }

  // R65: ProductionWindowDrawer — Figma-aligned shift × line detail drawer.
  // Header carries window + shift + line, high-level stats (target/actual/
  // deviation/bales/weight), then the alert banner (when applicable, at the
  // TOP of the body because alerts matter most), then a wide loads data table
  // with AI quality chips per load (Clear PET / Coloured PET / Contaminants).
  function ProductionWindowDrawer({ pw, shift, row, lang, onClose, fmtDateRange }) {
    const tEN = (en, es) => lang === 'es' ? es : en;
    const range = fmtDateRange(pw.startedAt, pw.endedAt);
    const hasShiftLabel = !!shift.label;
    const loads = deriveProcessedLoads(pw);
    const ds = devStatusFor(row.deviation);
    const fmtAt = (d) => new Date(d).toLocaleString('en-GB', {
      day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit', hour12: false,
    });

    // Build the alert list from the window's mismatches. R65d: rejected-bale
    // alerts are no longer surfaced here — the table itself carries the load
    // detail, and the rejected-bales workflow is handled elsewhere.
    const alerts = [];
    if (row.alerts > 0) {
      pw.mismatches.forEach(m => {
        alerts.push({
          severity: 'warn',
          message: tEN(
            `Weight mismatch on order ${m.lot} — ${fmtKg(m.totalReceived)} declared, ${fmtKg(m.processedWeight)} processed (loss ${m.lossPct.toFixed(1)}%)`,
            `Discrepancia de peso en pedido ${m.lot} — ${fmtKg(m.totalReceived)} declarado, ${fmtKg(m.processedWeight)} procesado (pérdida ${m.lossPct.toFixed(1)}%)`
          ),
        });
      });
    }

    return (
      <div className="fixed inset-0 z-50 flex justify-end" onClick={onClose}>
        <div className="absolute inset-0 bg-black/30" />
        <aside
          role="dialog"
          aria-label={tEN('Production window detail', 'Detalle de ventana de producción')}
          onClick={e => e.stopPropagation()}
          className="relative bg-white w-full max-w-[960px] h-full overflow-y-auto shadow-2xl"
        >
          {/* Header — window label, shift + line subtitle, export + close */}
          <div className="sticky top-0 bg-white border-b border-neutral-10 px-6 py-5 z-10">
            <div className="flex items-start justify-between gap-4">
              <div className="min-w-0">
                <div className="text-[20px] font-medium text-neutral-100 leading-tight">
                  {tEN('Production window', 'Ventana de producción')}: {range}
                </div>
                <div className="mt-1.5 flex items-center gap-3 flex-wrap">
                  {hasShiftLabel && <span className="text-[16px] font-bold text-neutral-100">{tEN('Shift', 'Turno')} {shift.label}</span>}
                  {hasShiftLabel && <span className="text-neutral-40">·</span>}
                  <span className="text-[16px] font-bold text-neutral-100">{row.line}</span>
                  <span className="inline-flex items-center px-2 py-0.5 rounded-md text-[12px] font-semibold border bg-neutral-5 text-neutral-80 border-neutral-10">{pw.material}</span>
                </div>
              </div>
              <div className="flex items-center gap-2 shrink-0">
                <button
                  type="button"
                  className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md border border-neutral-10 text-[13px] font-medium text-neutral-100 hover:bg-neutral-5"
                >
                  <Icon d={I.download} className="w-4 h-4" />
                  {tEN('Export CSV', 'Exportar CSV')}
                </button>
                <button
                  type="button"
                  onClick={onClose}
                  aria-label={tEN('Close drawer', 'Cerrar panel')}
                  className="w-9 h-9 inline-flex items-center justify-center rounded-md hover:bg-neutral-5 text-neutral-60"
                >
                  <Icon d={I.close} className="w-4 h-4" />
                </button>
              </div>
            </div>

            {/* High-level stats — kept at the top */}
            <div className="mt-4 grid grid-cols-5 gap-3">
              <div className="rounded-md border border-neutral-10 px-3 py-2.5">
                <div className="text-[11px] text-neutral-60 uppercase tracking-wide">{tEN('Target', 'Objetivo')}</div>
                <div className="text-[18px] font-bold text-neutral-100">{row.target}%</div>
              </div>
              <div className="rounded-md border border-neutral-10 px-3 py-2.5">
                <div className="text-[11px] text-neutral-60 uppercase tracking-wide">{tEN('Actual', 'Real')}</div>
                <div className="text-[18px] font-bold text-neutral-100">{row.actual}%</div>
              </div>
              <div className="rounded-md border border-neutral-10 px-3 py-2.5">
                <div className="text-[11px] text-neutral-60 uppercase tracking-wide">{tEN('Deviation', 'Desviación')}</div>
                <div className={'text-[18px] font-bold ' + STATUS_TEXT[ds]}>{fmtPctSigned(row.deviation)}</div>
              </div>
              <div className="rounded-md border border-neutral-10 px-3 py-2.5">
                <div className="text-[11px] text-neutral-60 uppercase tracking-wide">{tEN('Bales', 'Pacas')}</div>
                <div className="text-[18px] font-bold text-neutral-100">{fmtNum(row.bales)}</div>
              </div>
              <div className="rounded-md border border-neutral-10 px-3 py-2.5">
                <div className="text-[11px] text-neutral-60 uppercase tracking-wide">{tEN('Weight', 'Peso')}</div>
                <div className="text-[18px] font-bold text-neutral-100">{fmtKgFull(row.kg)}</div>
              </div>
            </div>
          </div>

          {/* Alerts banner — top of body. Alerts are critical so they lead. */}
          {alerts.length > 0 && (
            <div className="px-6 pt-5">
              {alerts.map((a, i) => (
                <div
                  key={i}
                  className={'rounded-lg px-4 py-3 mb-2 flex items-start gap-3 border ' + (a.severity === 'bad' ? 'bg-rose-50 border-rose-300' : 'bg-amber-50 border-amber-300')}
                >
                  <Icon d={I.warning} className={'w-5 h-5 mt-0.5 shrink-0 ' + (a.severity === 'bad' ? 'text-rose-700' : 'text-amber-700')} />
                  <div className="min-w-0 text-[14px]">
                    <span className={'font-bold ' + (a.severity === 'bad' ? 'text-rose-900' : 'text-amber-900')}>
                      {a.severity === 'bad' ? tEN('Alert', 'Alerta') : tEN('Warning', 'Aviso')}
                    </span>
                    <span className="text-neutral-100"> · {a.message}</span>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Loads processed table — one row per load processed in this shift+line.
              Columns match the agreed schema: Order ref · Supplier · Quality (chips)
              · Processed · Total bales · Production line · Source bay · Processed by
              · Processed at. */}
          <div className="px-6 py-5">
            <div className="flex items-center justify-between mb-3">
              <h3 className="text-[14px] font-bold text-neutral-100">
                {tEN('Loads processed', 'Lotes procesados')}
                <span className="ml-2 text-neutral-60 font-normal">
                  {loads.length} {loads.length === 1 ? tEN('load', 'lote') : tEN('loads', 'lotes')}
                </span>
              </h3>
            </div>

            {loads.length === 0 ? (
              <div className="rounded-lg border border-neutral-10 px-4 py-8 text-center text-[13px] text-neutral-60">
                {tEN('No loads recorded for this shift yet.', 'No hay lotes registrados para este turno todavía.')}
              </div>
            ) : (
              <div className="border border-neutral-10 rounded-lg overflow-hidden">
                <div className="overflow-x-auto">
                  <table className="w-full text-[13px]">
                    <thead>
                      <tr className="bg-neutral-5 text-neutral-60 text-left">
                        <th className="font-semibold px-3 py-2.5 w-[120px]">{tEN('Order reference', 'Ref. pedido')}</th>
                        <th className="font-semibold px-3 py-2.5 w-[130px]">{tEN('Supplier', 'Proveedor')}</th>
                        <th className="font-semibold px-3 py-2.5 min-w-[280px]">{tEN('Quality', 'Calidad')}</th>
                        <th className="font-semibold px-3 py-2.5 w-[80px] text-right">{tEN('Processed', 'Procesadas')}</th>
                        <th className="font-semibold px-3 py-2.5 w-[90px] text-right">{tEN('Total bales', 'Total pacas')}</th>
                        <th className="font-semibold px-3 py-2.5 w-[90px]">{tEN('Production line', 'Línea')}</th>
                        <th className="font-semibold px-3 py-2.5 w-[90px]">{tEN('Source bay', 'Bahía')}</th>
                        <th className="font-semibold px-3 py-2.5 w-[130px]">{tEN('Processed by', 'Procesado por')}</th>
                        <th className="font-semibold px-3 py-2.5 w-[110px]">{tEN('Processed at', 'Procesado a las')}</th>
                      </tr>
                    </thead>
                    <tbody>
                      {loads.map(load => (
                        <tr key={load.id} className="border-t border-neutral-10 hover:bg-safi-50">
                          <td className="px-3 py-3 align-top">
                            <a href="#" onClick={(e) => e.preventDefault()} className="text-safi-700 hover:underline font-medium whitespace-nowrap">#{load.orderRef}</a>
                          </td>
                          <td className="px-3 py-3 align-top text-neutral-100">{load.supplier}</td>
                          <td className="px-3 py-3 align-top">
                            <div className="flex flex-wrap gap-1">
                              {load.chips.map(c => (
                                <HistoryQualityChip key={c.name} name={c.name} pct={c.pct} status={c.status} />
                              ))}
                            </div>
                          </td>
                          <td className="px-3 py-3 align-top text-right text-neutral-100">{fmtNum(load.processed)}</td>
                          <td className="px-3 py-3 align-top text-right text-neutral-100">{fmtNum(load.totalBales)}</td>
                          <td className="px-3 py-3 align-top text-neutral-100">{row.line}</td>
                          <td className="px-3 py-3 align-top text-neutral-100">{load.sourceBay}</td>
                          <td className="px-3 py-3 align-top text-neutral-100">{load.processedBy}</td>
                          <td className="px-3 py-3 align-top text-neutral-100 whitespace-nowrap">{fmtAt(load.processedAt)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </div>
        </aside>
      </div>
    );
  }

  function MaterialFilter() {
    return (
      <div className="bg-white border border-slate-200 rounded-lg px-3 py-2 min-w-[220px]">
        <div className="text-[13px] uppercase tracking-wide text-slate-500">Material filter</div>
        <div className="flex items-center justify-between gap-2 text-sm font-medium text-slate-900">

        </div>

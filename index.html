              <div className="mt-3 inline-flex items-center gap-2 px-3 py-2 rounded bg-amber-50 text-amber-900 text-[13px]">
                <Icon d={I.lock} className="w-4 h-4" />
                This bay is blocked by {bay.blockedBy}. Loads here can’t be added to the picking list until the bays in front are cleared.
              </div>
            )}
          </div>
          {bay.loads.length === 0 ? (
            <div className="px-6 py-10 text-center text-neutral-60 text-[13px]">
              No loads have been stored in this bay yet
            </div>
          ) : (
            <>
              {/* Select all loads - visible during Create picking list when the bay has > 1 load */}
              {isCreating && bay.loads.length > 1 && (() => {
                const bayKeys = bay.loads.map(l => `${zone.id}|${bay.id}|${l.id}`);
                const allSel = bay.accessible && bayKeys.every(k => selectionBales[k] != null);
                const someSel = bayKeys.some(k => selectionBales[k] != null);
                const toggleAll = () => {
                  if (!bay.accessible) return;
                  setSelectionBales(prev => {
                    const next = { ...prev };
                    if (allSel) {
                      bayKeys.forEach(k => { delete next[k]; });
                    } else {
                      bay.loads.forEach(l => {
                        const k = `${zone.id}|${bay.id}|${l.id}`;
                        if (next[k] == null) next[k] = l.bales;
                      });
                    }
                    return next;
                  });
                };
                return (
                  <label className={
                    'flex items-center gap-3 px-4 py-3 border-b border-neutral-10 cursor-pointer text-[13px] font-medium ' +
                    (bay.accessible ? 'text-neutral-80 hover:bg-neutral-5' : 'text-neutral-40 cursor-not-allowed')
                  }>
                    <input
                      type="checkbox"
                      className="rounded text-safi-600 focus:ring-safi-500 disabled:opacity-40"
                      checked={allSel}
                      ref={el => { if (el) el.indeterminate = someSel && !allSel; }}
                      onChange={toggleAll}
                      disabled={!bay.accessible}
                      aria-label={`Select all loads in ${bay.esName}`}
                    />
                    <span>
                      {allSel ? `All ${bay.loads.length} loads selected` : `Select all ${bay.loads.length} loads`}
                    </span>
                  </label>
                );
              })()}
              {/* R74: Select all loads — bulk-move selection mode. Mirrors the
                  create-workflow select-all so the SL can move a whole bay's
                  loads without ticking them one at a time. */}
              {!isCreating && selectionMode && bay.loads.length > 1 && (() => {
                const allSel = bay.loads.every(l => bulkSelected.has(l.id));
                const someSel = bay.loads.some(l => bulkSelected.has(l.id));
                const toggleAll = () => {
                  setBulkSelected(prev => {
                    const next = new Set(prev);
                    if (allSel) bay.loads.forEach(l => next.delete(l.id));
                    else bay.loads.forEach(l => next.add(l.id));
                    return next;
                  });
                };
                return (
                  <label className="flex items-center gap-3 pl-4 pr-3 py-3 border-b border-neutral-10 cursor-pointer text-[13px] font-medium text-neutral-80 hover:bg-neutral-5">
                    <input
                      type="checkbox"
                      className="w-5 h-5 rounded text-safi-600 focus:ring-safi-500"
                      checked={allSel}
                      ref={el => { if (el) el.indeterminate = someSel && !allSel; }}
                      onChange={toggleAll}
                      aria-label={lang === 'es' ? `Seleccionar todos los lotes de ${bayName(bay, lang)}` : `Select all loads in ${bayName(bay, lang)}`}
                    />
                    <span>
                      {allSel
                        ? (lang === 'es' ? `Los ${bay.loads.length} lotes seleccionados` : `All ${bay.loads.length} loads selected`)
                        : (lang === 'es' ? `Seleccionar los ${bay.loads.length} lotes` : `Select all ${bay.loads.length} loads`)}
                    </span>
                  </label>
                );
              })()}
              <div className="divide-y divide-neutral-10">
                {bay.loads.map(load => {
                  const key = `${zone.id}|${bay.id}|${load.id}`;
                  const access = accessibilityOf(zone, bay, load);
                  const lifoOk = isLifoSelectable(zone, bay, load, selectionBales, pickerMode);
                  const alreadySelected = selectionBales[key] != null;
                  // R39: selection mode for bulk-move. Overrides isCreating treatment.
                  if (!isCreating && selectionMode) {
                    const isBulkSel = bulkSelected.has(load.id);
                    return (
                      <label key={load.id} className={'flex items-center gap-3 pl-4 pr-3 py-3 cursor-pointer ' + (isBulkSel ? 'bg-safi-50' : 'hover:bg-neutral-5')}>
                        <input
                          type="checkbox"
                          checked={isBulkSel}
                          onChange={() => setBulkSelected(prev => {
                            const next = new Set(prev);
                            if (next.has(load.id)) next.delete(load.id); else next.add(load.id);
                            return next;
                          })}
                          className="w-5 h-5 rounded text-safi-600 focus:ring-safi-500"
                        />
                        <div className="flex-1 min-w-0">
                          <div className="text-neutral-100">{load.supplier} <span className="text-neutral-40 text-sm">#{load.lot}</span></div>
                          <div className="text-[13px] text-neutral-60 mt-0.5">{fmtNum(load.bales)} bales · {fmtKg(load.weight)}</div>
                        </div>
                      </label>
                    );
                  }
                  // R35: loadClaimMap is loadId -> {productionLine, shift}. A load on
                  // ANOTHER (line, shift) combination is locked from this list.
                  const claimOwner = loadClaimMap[load.id] || null;
                  const isOwnedByThisDraft = claimOwner && claimOwner.productionLine === creationLine && claimOwner.shift === creationShift;
                  const lockedByOther = isCreating && claimOwner && !isOwnedByThisDraft
                    ? `${claimOwner.productionLine} · ${claimOwner.shift}` : false;
                  const accessible = !isCreating || ((bay.accessible && (lifoOk || alreadySelected)) && !lockedByOther);
                  let onPickingList = false;
                  let claimLabel = null;
                  if (!isCreating && claimOwner) {
                    claimLabel = `${claimOwner.productionLine} · ${claimOwner.shift}`;
                    const owningList = pickingLists.find(pl => pl.productionLine === claimOwner.productionLine && pl.shift === claimOwner.shift);
                    const entry = owningList?.loads.find(l => l.loadId === load.id);
                    if (entry) onPickingList = entry.bales != null && entry.bales < load.bales
                      ? { partial: true, bales: entry.bales, label: claimLabel }
                      : { partial: false, label: claimLabel };
                  }
                  return (
                    <LoadRow
                      key={load.id}
                      load={load}
                      isCreating={isCreating}
                      accessible={accessible}
                      isAccessibleLoad={access.status === 'accessible'}
                      isSelected={alreadySelected}
                      onToggle={() => toggleLoad(key)}
                      onPickingList={onPickingList}
                      claimedByLine={claimLabel}
                      lockedByOtherLine={lockedByOther}
                      onReject={() => setRejectModal({ zone, bay, load, accessibleBales: access.accessibleBales })}
                    />
                  );
                })}
              </div>
              {/* R39: bulk-move action bar - appears when at least one load is ticked in selection mode. */}
              {!isCreating && selectionMode && bulkSelected.size > 0 && (
                <div className="sticky bottom-4 z-30 mt-3 mx-4 mb-4 px-4 py-3 rounded-lg bg-neutral-100 text-white shadow-lg flex items-center justify-between gap-3 flex-wrap">
                  <div className="text-sm font-medium">
                    {bulkSelected.size} {bulkSelected.size === 1 ? (lang === 'es' ? 'lote seleccionado' : 'load selected') : (lang === 'es' ? 'lotes seleccionados' : 'loads selected')}
                  </div>
                  <div className="flex items-center gap-2">
                    <button
                      onClick={() => { setBulkSelected(new Set()); }}
                      className="px-3 py-1.5 rounded border border-white/20 text-white text-[13px] font-medium hover:bg-white/10"
                    >
                      {lang === 'es' ? 'Limpiar' : 'Clear'}
                    </button>
                    <button
                      onClick={() => setEditor({ type: 'moveLoads', fromZoneId: zone.id, fromBayId: bay.id, loadIds: Array.from(bulkSelected) })}
                      className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded bg-safi-600 text-white text-[13px] font-medium hover:bg-safi-700"
                    >
                      <Icon d={I.arrowR} className="w-3.5 h-3.5" />
                      {lang === 'es'
                        ? `Mover ${bulkSelected.size} ${bulkSelected.size === 1 ? 'lote' : 'lotes'}`
                        : `Move ${bulkSelected.size} ${bulkSelected.size === 1 ? 'load' : 'loads'}`}
                    </button>
                  </div>
                </div>
              )}
            </>
          )}
        </div>
      );
    };

    // R39: when the move modal closes successfully, clear the selection.
    useEffect(() => {
      if (!editor) { /* may have been move - clear selection if so */ setBulkSelected(prev => prev.size > 0 ? new Set() : prev); }
    }, [editor]);

    // R45: close any open bale-menu when clicking elsewhere on the page.
    useEffect(() => {
      if (!openBaleMenu) return;
      const close = () => setOpenBaleMenu(null);
      document.addEventListener('mousedown', close);
      return () => document.removeEventListener('mousedown', close);
    }, [openBaleMenu]);

    // R45: decrement a buffer item by one bale (used by both "return" and "process").
    const decrementBufferBale = (uid) => {
      setBuffer(prev => prev
        .map(b => b.uid === uid ? { ...b, bales: b.bales - 1 } : b)
        .filter(b => b.bales > 0));
    };

    // R45: return a single bale from a buffer item back to its source zone/bay.
    // The data model doesn't actually shrink the source bay's loads when bales
    // were moved to the buffer (loads stay intact, buffer tracks the slice), so
    // "returning" just removes the buffer slice and shows a toast.
    const returnBaleToWarehouse = (item, idx) => {
      decrementBufferBale(item.uid);
      const sourceLabel = `${item.sourceZoneId} · ${item.sourceBayId}`;
      setToast?.({
        message: lang === 'es'
          ? `Paca devuelta a ${sourceLabel} (#${item.lot})`
          : `Bale returned to ${sourceLabel} (#${item.lot})`,
        kind: 'success'
      });
      setOpenBaleMenu(null);
    };

    // R45: open the existing Process modal in single-bale buffer mode.
    const openProcessForBale = (item, idx) => {
      setProcessBaleModal({ item, idx });
      setOpenBaleMenu(null);
    };

    // R42: buffer detail view. Mirrors the bay-detail layout:
    // - breadcrumb (Yard overview / Buffer)
    // - title + summary line (items, bales, weight)
    // - per-item rows showing supplier + lot + (looked-up) material chips, with
    //   a prominent "X of Y bales in buffer" metric on the right
    const renderBuffer = () => {
      const bufferBales = buffer.reduce((a, b) => a + b.bales, 0);
      const bufferWeight = buffer.reduce((a, b) => a + Math.round(b.bales * b.weightPerBale), 0);
      // Look up each item against the live yard so we can show the existing
      // green material chips and the per-load context (zone · bay source).
      const resolved = buffer.map(item => {
        let load = null, sourceZone = null, sourceBay = null;
        for (const z of yard) {
          for (const b of z.bays) {
            const ld = b.loads.find(l => l.id === item.loadId);
            if (ld) { load = ld; sourceZone = z; sourceBay = b; break; }
          }
          if (load) break;
        }
        return { item, load, sourceZone, sourceBay };
      });
      // Toggle a buffer item's expand state.
      const toggleExpand = (uid) => setExpandedBufferLoads(prev => {
        const next = new Set(prev);
        if (next.has(uid)) next.delete(uid); else next.add(uid);
        return next;
      });
      return (
        <div className="bg-white border border-neutral-10 rounded-xl">
          {/* R52: header simplified. Title has no leading dot. Stats use the
              same Metric2 (Bales / Weight) pattern as the Buffer card on the
              yard overview so the design stays consistent across views. */}
          <div className="p-5 border-b border-neutral-10">
            <nav aria-label="Breadcrumb" className="flex items-center gap-2 text-[13px] flex-wrap">
              <button onClick={goOverview} className="text-safi-600 hover:underline">
                {tr('yardOverview', lang)}
              </button>
              <span className="text-neutral-40">/</span>
              <span className="text-neutral-100 font-medium">{lang === 'es' ? 'Búfer' : 'Buffer'}</span>
            </nav>
            <div className="mt-2">
              <div className="flex items-center gap-2">
                {/* R55: green dot to match the Buffer card on the yard overview. */}
                <span className="w-3 h-3 rounded-full" style={{ backgroundColor: '#16a34a' }} aria-hidden="true" />
                <h3 className="text-2xl font-bold text-neutral-100">{lang === 'es' ? 'Búfer' : 'Buffer'}</h3>
              </div>
              <div className="flex items-center gap-6 mt-2 flex-wrap">
                <Metric2 label={tr('loads', lang)}  value={fmtNum(buffer.length)} />
                <Metric2 label={tr('bales', lang)}  value={fmtNum(bufferBales)} />
                <Metric2 label={tr('weight', lang)} value={fmtKg(bufferWeight)} />
              </div>
            </div>
          </div>

          {buffer.length === 0 ? (
            <div className="px-6 py-10 text-center text-neutral-60 text-[13px]">
              {lang === 'es' ? 'No hay pacas en el búfer todavía' : 'No bales in the buffer yet'}
            </div>
          ) : (
            // R51: rows are now grouped BY LOAD with a prominent bale count on the
            // left. Each row collapses by default; tapping it expands to the
            // individual bale list (each bale keeps its kebab menu for return /
            // process). This is what the SL scans: "10 from Acme, 20 from
            // North Bay, 5 from Riverside".
            <div className="divide-y divide-neutral-10">
              {resolved.map(({ item, load, sourceZone, sourceBay }) => {
                // R54: items coming from QC carry __qc__ markers — render as "Quality control" instead of "Zone __qc__ · Bay __qc__".
                const sourceLabel = item.sourceZoneId === '__qc__'
                  ? (lang === 'es' ? 'Control de calidad' : 'Quality control')
                  : `${sourceZone ? zoneName(sourceZone, lang) : `Zone ${item.sourceZoneId}`} · ${sourceBay ? bayName(sourceBay, lang) : `Bay ${item.sourceBayId}`}`;
                const buffWeight = Math.round(item.bales * item.weightPerBale);
                const expanded = expandedBufferLoads.has(item.uid);
                return (
                  <div key={item.uid}>
                    {/* R52: Per-load summary row - matches the bay detail row style.
                        Supplier + #LOT + AI chips on one line, "N bales · X kg" on
                        the next. Big bale-count headline removed for consistency. */}
                    <button
                      type="button"
                      onClick={() => toggleExpand(item.uid)}
                      aria-expanded={expanded}
                      className="w-full text-left px-5 py-4 flex items-start gap-4 hover:bg-neutral-5/40 focus:outline-none focus:bg-neutral-5/40"
                    >
                      <div className="min-w-0 flex-1">
                        <div className="flex items-center gap-2 flex-wrap text-neutral-100">
                          <span className="font-medium">{item.supplier}</span>
                          <span className="text-neutral-40 text-[13px]">#{item.lot}</span>
                          {load && <AIResultChips load={load} />}
                        </div>
                        <div className="text-[13px] text-neutral-60 mt-1">
                          {/* R55: bold the bale count so it stands out at a glance. */}
                          <span className="font-bold text-neutral-100">{fmtNum(item.bales)} {tr('bales', lang).toLowerCase()}</span> · {fmtKg(buffWeight)}
                          {' · '}{lang === 'es' ? 'Origen' : 'From'}: {sourceLabel}
                        </div>
                      </div>
                      <div className="shrink-0 self-center text-neutral-60">
                        <Icon
                          d={I.chevron}
                          className={'w-5 h-5 transition-transform ' + (expanded ? 'rotate-180' : '')}
                        />
                      </div>
                    </button>
                    {/* Expanded: individual bales with their kebab menu. */}
                    {expanded && (
                      <div className="bg-neutral-5/30 border-t border-neutral-10">
                        {Array.from({ length: item.bales }).map((_, bIdx) => {
                          const baleNo = String(bIdx + 1).padStart(3, '0');
                          const menuKey = `${item.uid}-${bIdx}`;
                          const menuOpen = openBaleMenu === menuKey;
                          return (
                            <div key={bIdx} className="group relative px-5 py-3 pl-10 flex items-center justify-between gap-3 hover:bg-white">
                              <div className="flex items-center gap-3 text-[13px]">
                                <span className="text-neutral-60">{lang === 'es' ? 'Lote' : 'Load'} #{baleNo}</span>
                                <span className="text-neutral-40">·</span>
                                <span className="text-neutral-60">{fmtKg(Math.round(item.weightPerBale))}</span>
                              </div>
                              <div className="shrink-0">
                                <button
                                  type="button"
                                  onMouseDown={(e) => e.stopPropagation()}
                                  onClick={(e) => { e.stopPropagation(); setOpenBaleMenu(menuOpen ? null : menuKey); }}
                                  aria-haspopup="menu"
                                  aria-expanded={menuOpen}
                                  aria-label={lang === 'es' ? 'Más opciones' : 'More options'}
                                  className={'p-1.5 rounded text-neutral-60 hover:bg-neutral-10 hover:text-neutral-100 focus:outline-none focus:ring-2 focus:ring-safi-600 ' + (menuOpen ? 'opacity-100 bg-neutral-10' : 'opacity-0 group-hover:opacity-100 focus:opacity-100')}
                                >
                                  <Icon d={I.kebab} className="w-4 h-4" strokeWidth={2.5} />
                                </button>
                                {menuOpen && (
                                  <div
                                    role="menu"
                                    onMouseDown={(e) => e.stopPropagation()}
                                    className="absolute right-3 top-9 z-20 w-56 bg-white rounded-lg shadow-lg border border-neutral-10 py-1"
                                  >
                                    <button
                                      role="menuitem"
                                      onClick={(e) => { e.stopPropagation(); returnBaleToWarehouse(item, bIdx); }}
                                      className="w-full text-left px-3 py-2 text-[13px] text-neutral-100 hover:bg-neutral-5 flex items-center gap-2"
                                    >
                                      <Icon d={I.undo} className="w-4 h-4 text-neutral-60" />
                                      {lang === 'es' ? 'Devolver al almacén' : 'Return to warehouse'}
                                    </button>
                                    <button
                                      role="menuitem"
                                      onClick={(e) => { e.stopPropagation(); openProcessForBale(item, bIdx); }}
                                      className="w-full text-left px-3 py-2 text-[13px] text-neutral-100 hover:bg-neutral-5 flex items-center gap-2"
                                    >
                                      <Icon d={I.factory} className="w-4 h-4 text-neutral-60" />
                                      {lang === 'es' ? 'Procesar paca' : 'Process bale'}
                                    </button>
                                  </div>
                                )}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    };

    const renderContent = () => {
      if (view.level === 'zone') return renderZone();
      if (view.level === 'bay') return renderBay();
      if (view.level === 'buffer') return renderBuffer();
      return renderOverview();
    };

    return (
      <>
        {renderContent()}
        {rejectModal && (
          <RejectMaterialModal
            source="load"
            zone={rejectModal.zone}
            bay={rejectModal.bay}
            load={rejectModal.load}
            remaining={{
              bales: rejectModal.accessibleBales,
              weight: Math.round(rejectModal.accessibleBales * (rejectModal.load.weight / rejectModal.load.bales)),
              loads: 1
            }}
            avgWeight={rejectModal.load.weight / rejectModal.load.bales}
            lang={lang}
            pickerMode={pickerMode}
            onCancel={() => setRejectModal(null)}
            onConfirm={({ bales, reason, weight }) => {
              setRejectModal(null);
              setToast?.({
                message: (lang === 'es'
                  ? `Rechazadas ${bales} pacas de #${rejectModal.load.lot} (${reason}, ${fmtKg(weight)})`
                  : `Rejected ${bales} bales from #${rejectModal.load.lot} (${reason}, ${fmtKg(weight)})`),
                kind: 'success'
              });
            }}
          />
        )}
        {editor && (
          <WarehouseEditorModal
            editor={editor}
            yard={yard}
            yardOps={yardOps}
            lang={lang}
            setToast={setToast}
            onClose={() => setEditor(null)}
          />
        )}
        {/* R45: process-a-single-bale modal triggered from the buffer kebab menu.
            Reuses the existing ProcessMaterialModal with a synthetic single-bale
            bufferItems slice so the modal opens in bale-source mode and the FO
            just needs to enter the weight. */}
        {processBaleModal && (() => {
          const { item } = processBaleModal;
          const singleBaleSlice = [{
            uid: item.uid,
            loadId: item.loadId,
            supplier: item.supplier,
            lot: item.lot,
            bales: 1,
            weightPerBale: item.weightPerBale,
            sourceZoneId: item.sourceZoneId,
            sourceBayId: item.sourceBayId
          }];
          return (
            <ProcessMaterialModal
              source="buffer"
              bufferItems={singleBaleSlice}
              avgWeight={item.weightPerBale}
              lang={lang}
              pickerMode="bale"
              onCancel={() => setProcessBaleModal(null)}
              onConfirm={({ bales, weight }) => {
                decrementBufferBale(item.uid);
                const pid = `bufferbale-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`;
                setProcessed(prev => ({
                  ...prev,
                  [pid]: { bales, weight, at: new Date().toISOString(), partial: true, source: 'Buffer' }
                }));
                setProcessBaleModal(null);
                setToast?.({
                  message: lang === 'es'
                    ? `Procesada 1 paca (${fmtKg(weight)})`
                    : `Processed 1 bale (${fmtKg(weight)})`,
                  kind: 'success'
                });
              }}
            />
          );
        })()}
      </>
    );
  }

  // -------------------------------------------------------------------------
  // R39: WarehouseEditorModal - handles all warehouse editing flows from the
  // layout tab. Picks the right form based on editor.type. Each flow validates
  // and calls the corresponding yardOps mutator, then closes.
  // -------------------------------------------------------------------------
  function WarehouseEditorModal({ editor, yard, yardOps, lang = 'en', setToast, onClose }) {
    const tEN = (en, es) => lang === 'es' ? es : en;
    const Title = ({ children }) => <h3 className="font-bold text-lg text-neutral-100">{children}</h3>;
    const Field = ({ label, children }) => (
      <div>
        <label className="block text-[13px] font-semibold text-neutral-80 mb-1.5">{label}</label>
        {children}
      </div>
    );
    const TextInput = (props) => (
      <input
        type="text"
        {...props}
        className={'w-full h-11 px-3 border border-neutral-10 rounded-lg text-base text-neutral-100 bg-white focus:outline-none focus:ring-2 focus:ring-safi-600 ' + (props.className || '')}
      />
    );
    const Footer = ({ onCancel, onConfirm, confirmLabel, confirmDanger, confirmDisabled }) => (
      <div className="mt-6 flex gap-2 justify-end">
        <button onClick={onCancel} className="px-4 py-2.5 rounded-lg border border-neutral-10 text-[13px] font-medium hover:bg-neutral-5 min-h-[44px]">
          {tEN('Cancel', 'Cancelar')}
        </button>
        <button
          disabled={confirmDisabled}
          onClick={onConfirm}
          className={'px-4 py-2.5 rounded-lg text-[13px] font-medium min-h-[44px] ' + (
            confirmDisabled ? 'bg-neutral-10 text-neutral-40 cursor-not-allowed' :
              confirmDanger ? 'bg-rose-600 text-white hover:bg-rose-700' :
                'bg-safi-600 text-white hover:bg-safi-700'
          )}
        >{confirmLabel}</button>
      </div>
    );

    // Build flow components inline. Each handles its own local state.
    const CreateZoneForm = () => {
      const [name, setName] = useState('');
      const [colorId, setColorId] = useState('none');
      // R58: which production lines this zone serves. Default = all lines.
      // At least one must remain selected (validated below).
      const [lines, setLines] = useState([...PRODUCTION_LINES_ALL]);
      const toggleLine = (line) => setLines(prev =>
        prev.includes(line) ? prev.filter(l => l !== line) : [...prev, line]
      );
      // R40: bays managed inline. Starts with one bay defaulted to "Bay 1".
      const [bays, setBays] = useState([{ key: 'b1', name: 'Bay 1' }]);
      const addBay = () => {
        // Pick the next numeric "Bay N" that doesn't clash with what's already in the list.
        const existing = new Set(bays.map(b => b.name.trim().toLowerCase()));
        let n = bays.length + 1;
        while (existing.has(`bay ${n}`.toLowerCase())) n += 1;
        setBays(prev => [...prev, { key: `b${Date.now()}`, name: `Bay ${n}` }]);
      };
      const trimmed = name.trim();
      const duplicate = trimmed && yard.some(z => (z.name || '').toLowerCase() === trimmed.toLowerCase());
      // Bay validation: all non-empty + unique within the new zone.
      const bayNames = bays.map(b => b.name.trim());
      const baysAllFilled = bayNames.every(n => n.length > 0);
      const baysUnique = new Set(bayNames.map(n => n.toLowerCase())).size === bayNames.length;
      const baysValid = bays.length > 0 && baysAllFilled && baysUnique;
      // R58: a zone must serve at least one production line; otherwise it's
      // inaccessible to anyone and there's no purpose to creating it.
      const linesValid = lines.length > 0;
      const canSave = !!trimmed && !duplicate && baysValid && linesValid;
      return (
        <div className="bg-white rounded-xl shadow-xl w-full max-w-lg p-6 max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
          <Title>{tEN('Create zone', 'Crear zona')}</Title>
          <p className="text-[13px] text-neutral-60 mt-1">{tEN('Name your new zone, pick a colour, and add bays.', 'Nombra tu nueva zona, elige un color y añade filas.')}</p>
          <div className="mt-5 space-y-4">
            <Field label={tEN('Zone name', 'Nombre de la zona')}>
              <TextInput value={name} onChange={e => setName(e.target.value)} placeholder={tEN('e.g. Zone D', 'p. ej. Zona D')} />
              {duplicate && <p className="text-[13px] text-rose-700 mt-1.5">{tEN('A zone with that name already exists.', 'Ya existe una zona con ese nombre.')}</p>}
            </Field>
            <Field label={tEN('Colour', 'Color')}>
              <div className="grid grid-cols-6 gap-2">
                {ZONE_COLORS.map(c => (
                  <button
                    key={c.id}
                    type="button"
                    onClick={() => setColorId(c.id)}
                    aria-pressed={colorId === c.id}
                    className={'h-10 rounded-lg border-2 flex items-center justify-center transition ' + (colorId === c.id ? 'border-safi-600 ring-2 ring-safi-200' : 'border-neutral-10 hover:border-neutral-40')}
                    title={c.label}
                  >
                    {c.id === 'none' ? (
                      <span className="text-[13px] text-neutral-60">—</span>
                    ) : (
                      <span className="w-5 h-5 rounded-full" style={{ backgroundColor: c.swatch }} />
                    )}
                  </button>
                ))}
              </div>
              <p className="text-[13px] text-neutral-60 mt-1.5">{getZoneColor(colorId).label}</p>
            </Field>
            {/* R58: production-line association. A zone can feed all lines (default)
                or be restricted to specific lines. Restricted zones only show up for
                FOs and SLs working on the matching line. */}
            <Field label={tEN('Production lines', 'Líneas de producción')}>
              <div className="grid grid-cols-2 gap-2">
                {PRODUCTION_LINES_ALL.map(line => {
                  const checked = lines.includes(line);
                  const accent = line === 'Apan 1'
                    ? (checked ? 'border-sky-500 bg-sky-50 text-sky-900' : 'border-neutral-10 bg-white text-neutral-100 hover:border-sky-200')
                    : (checked ? 'border-amber-500 bg-amber-50 text-amber-900' : 'border-neutral-10 bg-white text-neutral-100 hover:border-amber-200');
                  return (
                    <button
                      key={line}
                      type="button"
                      onClick={() => toggleLine(line)}
                      aria-pressed={checked}
                      className={'min-h-[52px] flex items-center gap-3 px-3 py-2 rounded-lg border-2 transition text-left ' + accent}
                    >
                      <span
                        className={
                          'w-5 h-5 rounded border-2 flex items-center justify-center shrink-0 ' +
                          (checked
                            ? (line === 'Apan 1' ? 'bg-sky-600 border-sky-600' : 'bg-amber-600 border-amber-600')
                            : 'bg-white border-neutral-20')
                        }
                        aria-hidden="true"
                      >
                        {checked && <Icon d={I.check} className="w-3 h-3 text-white" />}
                      </span>
                      <div className="flex-1 min-w-0">
                        <div className="text-[15px] font-bold leading-tight">{line}</div>
                      </div>
                    </button>
                  );
                })}
              </div>
              <p className="text-[13px] text-neutral-60 mt-2">
                {lines.length === PRODUCTION_LINES_ALL.length
                  ? tEN('Material from this zone can be fed to any production line.', 'El material de esta zona puede alimentar cualquier línea de producción.')
                  : lines.length === 0
                    ? tEN('Select at least one line so this zone is reachable.', 'Selecciona al menos una línea para que la zona sea accesible.')
                    : tEN(`Material from this zone is restricted to ${lines.join(' & ')}.`, `El material de esta zona está restringido a ${lines.join(' y ')}.`)}
              </p>
              {!linesValid && <p className="text-[13px] text-rose-700 mt-1.5">{tEN('Pick at least one production line.', 'Selecciona al menos una línea.')}</p>}
            </Field>
            {/* R40: inline bay editor. Always starts with one default bay. */}
            <Field label={tEN('Bays', 'Filas')}>
              <div className="space-y-2">
                {bays.map((b, i) => (
                  <div key={b.key} className="flex items-center gap-2">
                    <TextInput
                      value={b.name}
                      onChange={e => setBays(prev => prev.map((bay, j) => j === i ? { ...bay, name: e.target.value } : bay))}
                      placeholder={`Bay ${i + 1}`}
                    />
                    {/* New zones have no loads yet, so delete is always allowed - except when only one bay remains. */}
                    <button
                      type="button"
                      disabled={bays.length === 1}
                      onClick={() => setBays(prev => prev.filter((_, j) => j !== i))}
                      title={bays.length === 1 ? tEN('A zone needs at least one bay.', 'Una zona necesita al menos una fila.') : tEN('Remove bay', 'Eliminar fila')}
                      className={'p-2 rounded ' + (bays.length === 1 ? 'text-neutral-40 cursor-not-allowed' : 'text-rose-700 hover:bg-rose-50')}
                      aria-label="Remove bay"
                    >
                      <Icon d={I.trash} className="w-4 h-4" />
                    </button>
                  </div>
                ))}
                <button
                  type="button"
                  onClick={addBay}
                  className="inline-flex items-center gap-1.5 px-3 py-2 rounded border border-dashed border-neutral-10 text-[13px] font-medium text-neutral-80 hover:bg-neutral-5"
                >
                  <Icon d={I.plus} className="w-4 h-4" />
                  {tEN('Add another bay', 'Añadir otra fila')}
                </button>
                {!baysUnique && <p className="text-[13px] text-rose-700 mt-1.5">{tEN('Bay names must be unique within the zone.', 'Los nombres de filas deben ser únicos dentro de la zona.')}</p>}
                {baysUnique && !baysAllFilled && <p className="text-[13px] text-rose-700 mt-1.5">{tEN('Bay names cannot be empty.', 'Los nombres de filas no pueden estar vacíos.')}</p>}
              </div>
            </Field>
          </div>
          <Footer
            onCancel={onClose}
            onConfirm={() => {
              const finalBays = bayNames.filter(Boolean);
              yardOps.createZone({ name: trimmed, color: colorId, bays: finalBays, lines });
              setToast?.({
                message: tEN(
                  `Zone "${trimmed}" created with ${finalBays.length} bay${finalBays.length === 1 ? '' : 's'}.`,
                  `Zona "${trimmed}" creada con ${finalBays.length} fila${finalBays.length === 1 ? '' : 's'}.`),
                kind: 'success'
              });
              onClose();
            }}
            confirmLabel={tEN('Create zone', 'Crear zona')}
            confirmDisabled={!canSave}
          />
        </div>
      );
    };

    const EditZoneForm = () => {
      const zone = yard.find(z => z.id === editor.zoneId);
      const [name, setName] = useState(zone?.name || '');
      const [colorId, setColorId] = useState(zone?.color || 'none');
      // R58: lines multi-select. Falls back to all lines for legacy zones.
      const [lines, setLines] = useState(() => zone ? [...zoneLines(zone)] : [...PRODUCTION_LINES_ALL]);
      const toggleLine = (line) => setLines(prev =>
        prev.includes(line) ? prev.filter(l => l !== line) : [...prev, line]
      );
      const [confirmDelete, setConfirmDelete] = useState(false);
      if (!zone) return null;
      const totalLoads = zone.bays.reduce((a, b) => a + b.loads.length, 0);
      const trimmed = name.trim();
      const duplicate = trimmed && yard.some(z => z.id !== zone.id && (z.name || '').toLowerCase() === trimmed.toLowerCase());
      const linesValid = lines.length > 0;
      const canSave = !!trimmed && !duplicate && linesValid;
      const canDelete = totalLoads === 0 && zone.bays.every(b => b.loads.length === 0);
      return (
        <div className="bg-white rounded-xl shadow-xl w-full max-w-lg p-6" onClick={e => e.stopPropagation()}>
          <Title>{tEN('Edit zone', 'Editar zona')}</Title>
          <div className="mt-5 space-y-4">
            <Field label={tEN('Zone name', 'Nombre de la zona')}>
              <TextInput value={name} onChange={e => setName(e.target.value)} />
              {duplicate && <p className="text-[13px] text-rose-700 mt-1.5">{tEN('A zone with that name already exists.', 'Ya existe una zona con ese nombre.')}</p>}
            </Field>
            <Field label={tEN('Colour', 'Color')}>
              <div className="grid grid-cols-6 gap-2">
                {ZONE_COLORS.map(c => (
                  <button
                    key={c.id}
                    type="button"
                    onClick={() => setColorId(c.id)}
                    aria-pressed={colorId === c.id}
                    className={'h-10 rounded-lg border-2 flex items-center justify-center transition ' + (colorId === c.id ? 'border-safi-600 ring-2 ring-safi-200' : 'border-neutral-10 hover:border-neutral-40')}
                    title={c.label}
                  >
                    {c.id === 'none' ? <span className="text-[13px] text-neutral-60">—</span> : <span className="w-5 h-5 rounded-full" style={{ backgroundColor: c.swatch }} />}
                  </button>
                ))}
              </div>
            </Field>
            {/* R58: production-line association — same multi-select pattern as
                Create Zone, so SLs/managers can adjust constraints over time. */}
            <Field label={tEN('Production lines', 'Líneas de producción')}>
              <div className="grid grid-cols-2 gap-2">
                {PRODUCTION_LINES_ALL.map(line => {
                  const checked = lines.includes(line);
                  const accent = line === 'Apan 1'
                    ? (checked ? 'border-sky-500 bg-sky-50 text-sky-900' : 'border-neutral-10 bg-white text-neutral-100 hover:border-sky-200')
                    : (checked ? 'border-amber-500 bg-amber-50 text-amber-900' : 'border-neutral-10 bg-white text-neutral-100 hover:border-amber-200');
                  return (
                    <button
                      key={line}
                      type="button"
                      onClick={() => toggleLine(line)}
                      aria-pressed={checked}
                      className={'min-h-[52px] flex items-center gap-3 px-3 py-2 rounded-lg border-2 transition text-left ' + accent}
                    >
                      <span
                        className={
                          'w-5 h-5 rounded border-2 flex items-center justify-center shrink-0 ' +
                          (checked
                            ? (line === 'Apan 1' ? 'bg-sky-600 border-sky-600' : 'bg-amber-600 border-amber-600')
                            : 'bg-white border-neutral-20')
                        }
                        aria-hidden="true"
                      >
                        {checked && <Icon d={I.check} className="w-3 h-3 text-white" />}
                      </span>
                      <div className="text-[15px] font-bold leading-tight">{line}</div>
                    </button>
                  );
                })}
              </div>
              <p className="text-[13px] text-neutral-60 mt-2">
                {lines.length === PRODUCTION_LINES_ALL.length
                  ? tEN('Material from this zone can be fed to any production line.', 'El material de esta zona puede alimentar cualquier línea de producción.')
                  : lines.length === 0
                    ? tEN('Select at least one line so this zone is reachable.', 'Selecciona al menos una línea para que la zona sea accesible.')
                    : tEN(`Material from this zone is restricted to ${lines.join(' & ')}.`, `El material de esta zona está restringido a ${lines.join(' y ')}.`)}
              </p>
              {!linesValid && <p className="text-[13px] text-rose-700 mt-1.5">{tEN('Pick at least one production line.', 'Selecciona al menos una línea.')}</p>}
            </Field>
            <div className="pt-3 border-t border-neutral-10">
              <button
                disabled={!canDelete}
                onClick={() => setConfirmDelete(true)}
                className={'inline-flex items-center gap-1.5 px-3 py-2 rounded border text-[13px] font-medium ' + (canDelete ? 'border-rose-300 text-rose-700 hover:bg-rose-50' : 'border-neutral-10 text-neutral-40 cursor-not-allowed')}
                title={canDelete ? '' : tEN('Only empty zones can be deleted', 'Solo se pueden eliminar zonas vacías')}
              >
                <Icon d={I.trash} className="w-4 h-4" />
                {tEN('Delete zone', 'Eliminar zona')}
              </button>
              {!canDelete && (
                <p className="text-[13px] text-neutral-60 mt-1.5">
                  {tEN('Only empty zones can be deleted. Move or process all loads first.', 'Solo se pueden eliminar zonas vacías. Mueve o procesa todas las cargas primero.')}
                </p>
              )}
            </div>
          </div>
          {confirmDelete ? (
            <div className="mt-6 p-4 rounded-lg bg-rose-50 border border-rose-200">
              <p className="text-sm text-rose-900 font-semibold">{tEN(`Delete "${zone.name}"?`, `¿Eliminar "${zone.name}"?`)}</p>
              <p className="text-[13px] text-rose-800 mt-1">{tEN('This cannot be undone.', 'No se puede deshacer.')}</p>
              <div className="mt-3 flex items-center gap-2 justify-end">
                <button onClick={() => setConfirmDelete(false)} className="px-3 py-2 rounded border border-neutral-10 text-[13px] font-medium bg-white">{tEN('Cancel', 'Cancelar')}</button>
                <button onClick={() => { yardOps.deleteZone(zone.id); setToast?.({ message: tEN(`Zone "${zone.name}" deleted.`, `Zona "${zone.name}" eliminada.`), kind: 'success' }); onClose(); }} className="px-3 py-2 rounded bg-rose-600 text-white text-[13px] font-medium">{tEN('Delete', 'Eliminar')}</button>
              </div>
            </div>
          ) : (
            <Footer
              onCancel={onClose}
              onConfirm={() => { yardOps.updateZone(zone.id, { name: trimmed, color: colorId, lines }); setToast?.({ message: tEN('Zone updated.', 'Zona actualizada.'), kind: 'success' }); onClose(); }}
              confirmLabel={tEN('Save changes', 'Guardar cambios')}
              confirmDisabled={!canSave}
            />
          )}
        </div>
      );
    };

    const CreateBaysForm = () => {
      const zone = yard.find(z => z.id === editor.zoneId);
      const [names, setNames] = useState(['']);
      if (!zone) return null;
      const trimmed = names.map(n => n.trim()).filter(Boolean);
      const seen = new Set();
      const existing = new Set(zone.bays.map(b => b.name.toLowerCase()));
      const dups = trimmed.filter(n => {
        const key = n.toLowerCase();
        const isDup = seen.has(key) || existing.has(key);
        seen.add(key);
        return isDup;
      });
      const canSave = trimmed.length > 0 && dups.length === 0;
      return (
        <div className="bg-white rounded-xl shadow-xl w-full max-w-lg p-6" onClick={e => e.stopPropagation()}>
          <Title>{tEN(`Create bays in ${zone.name}`, `Crear filas en ${zone.name}`)}</Title>
          <p className="text-[13px] text-neutral-60 mt-1">{tEN('Add one or more bays. Names must be unique.', 'Añade una o más filas. Los nombres deben ser únicos.')}</p>
          <div className="mt-5 space-y-2">
            {names.map((n, i) => (
              <div key={i} className="flex items-center gap-2">
                <TextInput value={n} onChange={e => setNames(prev => prev.map((v, j) => j === i ? e.target.value : v))} placeholder={tEN(`Bay name`, `Nombre de la fila`)} />
                {names.length > 1 && (
                  <button onClick={() => setNames(prev => prev.filter((_, j) => j !== i))} className="p-2 rounded text-neutral-60 hover:bg-neutral-5" aria-label="Remove"><Icon d={I.close} className="w-4 h-4" /></button>
                )}
              </div>
            ))}
            <button
              onClick={() => setNames(prev => [...prev, ''])}
              className="inline-flex items-center gap-1.5 px-3 py-2 rounded border border-dashed border-neutral-10 text-[13px] font-medium text-neutral-80 hover:bg-neutral-5"
            >
              <Icon d={I.plus} className="w-4 h-4" />
              {tEN('Add another bay', 'Añadir otra fila')}
            </button>
            {dups.length > 0 && <p className="text-[13px] text-rose-700 mt-1.5">{tEN('Bay names must be unique within the zone.', 'Los nombres deben ser únicos dentro de la zona.')}</p>}
          </div>
          <Footer
            onCancel={onClose}
            onConfirm={() => { yardOps.createBays(zone.id, trimmed); setToast?.({ message: tEN(`${trimmed.length} bay${trimmed.length === 1 ? '' : 's'} created in ${zone.name}.`, `${trimmed.length} fila${trimmed.length === 1 ? '' : 's'} creada${trimmed.length === 1 ? '' : 's'} en ${zone.name}.`), kind: 'success' }); onClose(); }}
            confirmLabel={tEN(`Create ${trimmed.length || ''} ${trimmed.length === 1 ? 'bay' : 'bays'}`.replace('  ', ' '), `Crear ${trimmed.length || ''} fila${trimmed.length === 1 ? '' : 's'}`.replace('  ', ' '))}
            confirmDisabled={!canSave}
          />
        </div>
      );
    };

    const EditBaysForm = () => {
      const zone = yard.find(z => z.id === editor.zoneId);
      const [rows, setRows] = useState(zone ? zone.bays.map(b => ({ id: b.id, name: b.name, originalName: b.name, empty: b.loads.length === 0, deleted: false })) : []);
      if (!zone) return null;
      const trimmedNames = rows.filter(r => !r.deleted).map(r => r.name.trim());
      const namesUnique = new Set(trimmedNames.map(n => n.toLowerCase())).size === trimmedNames.length;
      const canSave = trimmedNames.every(n => n.length > 0) && namesUnique;
      return (
        <div className="bg-white rounded-xl shadow-xl w-full max-w-lg p-6" onClick={e => e.stopPropagation()}>
          <Title>{tEN(`Edit bays in ${zone.name}`, `Editar filas en ${zone.name}`)}</Title>
          <p className="text-[13px] text-neutral-60 mt-1">{tEN('Rename or delete bays. Only empty bays can be deleted.', 'Renombra o elimina filas. Solo las filas vacías se pueden eliminar.')}</p>
          <div className="mt-5 space-y-2 max-h-[50vh] overflow-y-auto">
            {rows.map((r, i) => (
              <div key={r.id} className={'flex items-center gap-2 ' + (r.deleted ? 'opacity-40' : '')}>
                <TextInput
                  value={r.name}
                  disabled={r.deleted}
                  onChange={e => setRows(prev => prev.map((row, j) => j === i ? { ...row, name: e.target.value } : row))}
                />
                <button
                  onClick={() => setRows(prev => prev.map((row, j) => j === i ? { ...row, deleted: !row.deleted } : row))}
                  disabled={!r.empty}
                  title={!r.empty ? tEN('Bay has loads - move them first.', 'La fila tiene cargas - muévelas primero.') : ''}
                  className={'p-2 rounded ' + (!r.empty ? 'text-neutral-40 cursor-not-allowed' : r.deleted ? 'bg-neutral-5 text-neutral-100' : 'text-rose-700 hover:bg-rose-50')}
                  aria-label="Delete"
                >
                  <Icon d={r.deleted ? I.close : I.trash} className="w-4 h-4" />
                </button>
              </div>
            ))}
          </div>
          <Footer
            onCancel={onClose}
            onConfirm={() => {
              rows.forEach(r => {
                if (r.deleted) { yardOps.deleteBay(zone.id, r.id); }
                else if (r.name.trim() !== r.originalName) { yardOps.updateBay(zone.id, r.id, { name: r.name.trim() }); }
              });
              setToast?.({ message: tEN('Bay changes saved.', 'Cambios guardados.'), kind: 'success' });
              onClose();
            }}
            confirmLabel={tEN('Save changes', 'Guardar cambios')}
            confirmDisabled={!canSave}
          />
        </div>
      );
    };

    const EditBayForm = () => {
      const zone = yard.find(z => z.id === editor.zoneId);
      const bay = zone?.bays.find(b => b.id === editor.bayId);
      const [name, setName] = useState(bay?.name || '');
      const [confirmDelete, setConfirmDelete] = useState(false);
      if (!bay) return null;
      const trimmed = name.trim();
      const duplicate = trimmed && zone.bays.some(b => b.id !== bay.id && b.name.toLowerCase() === trimmed.toLowerCase());
      const canSave = !!trimmed && !duplicate;
      const canDelete = bay.loads.length === 0;
      return (
        <div className="bg-white rounded-xl shadow-xl w-full max-w-lg p-6" onClick={e => e.stopPropagation()}>
          <Title>{tEN('Edit bay', 'Editar fila')}</Title>
          <div className="mt-5 space-y-4">
            <Field label={tEN('Bay name', 'Nombre de la fila')}>
              <TextInput value={name} onChange={e => setName(e.target.value)} />
              {duplicate && <p className="text-[13px] text-rose-700 mt-1.5">{tEN('A bay with that name already exists in this zone.', 'Ya existe una fila con ese nombre en esta zona.')}</p>}
            </Field>
            <div className="pt-3 border-t border-neutral-10">
              <button
                disabled={!canDelete}
                onClick={() => setConfirmDelete(true)}
                className={'inline-flex items-center gap-1.5 px-3 py-2 rounded border text-[13px] font-medium ' + (canDelete ? 'border-rose-300 text-rose-700 hover:bg-rose-50' : 'border-neutral-10 text-neutral-40 cursor-not-allowed')}
              >
                <Icon d={I.trash} className="w-4 h-4" />
                {tEN('Delete bay', 'Eliminar fila')}
              </button>
              {!canDelete && (
                <p className="text-[13px] text-neutral-60 mt-1.5">{tEN('Only empty bays can be deleted. Move or process all loads first.', 'Solo se pueden eliminar filas vacías. Mueve o procesa todas las cargas primero.')}</p>
              )}
            </div>
          </div>
          {confirmDelete ? (
            <div className="mt-6 p-4 rounded-lg bg-rose-50 border border-rose-200">
              <p className="text-sm text-rose-900 font-semibold">{tEN(`Delete "${bay.name}"?`, `¿Eliminar "${bay.name}"?`)}</p>
              <div className="mt-3 flex items-center gap-2 justify-end">
                <button onClick={() => setConfirmDelete(false)} className="px-3 py-2 rounded border border-neutral-10 text-[13px] font-medium bg-white">{tEN('Cancel', 'Cancelar')}</button>
                <button onClick={() => { yardOps.deleteBay(zone.id, bay.id); setToast?.({ message: tEN(`Bay "${bay.name}" deleted.`, `Fila "${bay.name}" eliminada.`), kind: 'success' }); onClose(); }} className="px-3 py-2 rounded bg-rose-600 text-white text-[13px] font-medium">{tEN('Delete', 'Eliminar')}</button>
              </div>
            </div>
          ) : (
            <Footer
              onCancel={onClose}
              onConfirm={() => { yardOps.updateBay(zone.id, bay.id, { name: trimmed }); setToast?.({ message: tEN('Bay updated.', 'Fila actualizada.'), kind: 'success' }); onClose(); }}
              confirmLabel={tEN('Save changes', 'Guardar cambios')}
              confirmDisabled={!canSave}
            />
          )}
        </div>
      );
    };

    const MoveLoadsForm = () => {
      const [toZoneId, setToZoneId] = useState(yard.find(z => z.id !== editor.fromZoneId)?.id || '');
      const targetZone = yard.find(z => z.id === toZoneId);
      const validBays = targetZone ? targetZone.bays.filter(b => b.id !== editor.fromBayId) : [];
      const [toBayId, setToBayId] = useState(validBays[0]?.id || '');
      const [confirmed, setConfirmed] = useState(false);
      // Re-derive when target zone changes
      useEffect(() => {
        const nextValid = targetZone ? targetZone.bays.filter(b => b.id !== editor.fromBayId) : [];
        setToBayId(nextValid[0]?.id || '');
      }, [toZoneId]);
      const count = editor.loadIds.length;
      const fromZone = yard.find(z => z.id === editor.fromZoneId);
      const fromBay = fromZone?.bays.find(b => b.id === editor.fromBayId);
      const canMove = !!toBayId;
      const bulk = count > 1;
      const goConfirm = () => {
        if (bulk && !confirmed) { setConfirmed(true); return; }
        yardOps.moveLoads(editor.fromZoneId, editor.fromBayId, editor.loadIds, toZoneId, toBayId);
        setToast?.({
          message: tEN(`${count} load${count === 1 ? '' : 's'} moved to ${targetZone?.name} · ${validBays.find(b => b.id === toBayId)?.name}.`,
                       `${count} lote${count === 1 ? '' : 's'} movido${count === 1 ? '' : 's'} a ${targetZone?.name} · ${validBays.find(b => b.id === toBayId)?.name}.`),
          kind: 'success'
        });
        onClose();
      };
      return (
        <div className="bg-white rounded-xl shadow-xl w-full max-w-lg p-6" onClick={e => e.stopPropagation()}>
          <Title>{tEN(bulk ? `Move ${count} loads` : 'Move load', bulk ? `Mover ${count} lotes` : 'Mover lote')}</Title>
          <p className="text-[13px] text-neutral-60 mt-1">
            {tEN(`From ${fromZone?.name} · ${fromBay?.name}`, `Desde ${fromZone?.name} · ${fromBay?.name}`)}
          </p>
          <div className="mt-5 space-y-4">
            <Field label={tEN('Target zone', 'Zona destino')}>
              <select value={toZoneId} onChange={e => setToZoneId(e.target.value)} className="w-full h-11 px-3 border border-neutral-10 rounded-lg text-base text-neutral-100 bg-white focus:outline-none focus:ring-2 focus:ring-safi-600">
                {yard.map(z => <option key={z.id} value={z.id} disabled={z.bays.length === 0}>{z.name}</option>)}
              </select>
            </Field>
            <Field label={tEN('Target bay', 'Fila destino')}>
              <select value={toBayId} onChange={e => setToBayId(e.target.value)} className="w-full h-11 px-3 border border-neutral-10 rounded-lg text-base text-neutral-100 bg-white focus:outline-none focus:ring-2 focus:ring-safi-600">
                {validBays.map(b => <option key={b.id} value={b.id}>{b.name}</option>)}
              </select>
            </Field>
          </div>
          {bulk && confirmed ? (
            <div className="mt-5 p-4 rounded-lg bg-amber-50 border border-amber-200">
              <p className="text-sm text-amber-900 font-semibold">{tEN(`Confirm moving ${count} loads?`, `¿Confirmar mover ${count} lotes?`)}</p>
              <p className="text-[13px] text-amber-800 mt-1">{tEN(`This will move all ${count} loads in one go to ${targetZone?.name} · ${validBays.find(b => b.id === toBayId)?.name}.`, `Se moverán los ${count} lotes a ${targetZone?.name} · ${validBays.find(b => b.id === toBayId)?.name}.`)}</p>
              <div className="mt-3 flex items-center gap-2 justify-end">
                <button onClick={() => setConfirmed(false)} className="px-3 py-2 rounded border border-neutral-10 text-[13px] font-medium bg-white">{tEN('Back', 'Atrás')}</button>
                <button onClick={goConfirm} className="px-3 py-2 rounded bg-safi-600 text-white text-[13px] font-medium">{tEN(`Yes, move ${count} loads`, `Sí, mover ${count} lotes`)}</button>
              </div>
            </div>
          ) : (
            <Footer
              onCancel={onClose}
              onConfirm={goConfirm}
              confirmLabel={bulk ? tEN(`Move ${count} loads`, `Mover ${count} lotes`) : tEN('Move load', 'Mover lote')}
              confirmDisabled={!canMove}
            />
          )}
        </div>
      );
    };

    return (
      <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4" onClick={onClose}>
        {/* R62: legacy create/edit zone & bay modals removed — Edit Warehouse
            overlay is now the single editing surface. MoveLoadsForm stays
            because it's still triggered from the bulk-move bay action. */}
        {editor.type === 'moveLoads' && <MoveLoadsForm />}
      </div>
    );
  }

  // ===========================================================================
  // R61: EDIT WAREHOUSE — Phase 1 (Yard overview)
  //
  // Full-screen overlay accessed from the warehouse tab. Mimics the Figma
  // landing (15987-9401): a flat list of zones + buffer zones with row-level
  // editing (name, production lines multi-select, locks), a search-inventory
  // input top-right, +Zone / +Buffer add buttons, footer Cancel/Save.
  //
  // Locks improvement: replaces the two separate Figma lock buttons with a
  // single MUI-style split button. Primary action toggles "Lock entirely";
  // dropdown exposes Lock for storage / Lock for processing independently.
  // Stored as zone.lockedStorage + zone.lockedProcessing booleans.
  // ===========================================================================

  // Split-button lock control. Lockedness is two independent booleans.
  function SplitLock({ lockedStorage = false, lockedProcessing = false, onChange }) {
    const [open, setOpen] = useState(false);
    const both = lockedStorage && lockedProcessing;
    const none = !lockedStorage && !lockedProcessing;
    let label = 'Lock';
    if (both) label = 'Locked';
    else if (lockedStorage) label = 'Storage locked';
    else if (lockedProcessing) label = 'Processing locked';

    // Lock state drives the visual treatment
    const cls = none
      ? 'bg-white border-neutral-10 text-neutral-100 hover:bg-neutral-5'
      : 'bg-amber-50 border-amber-300 text-amber-700 hover:bg-amber-100';

    return (
      <div className="relative inline-flex">
        <button
          type="button"
          onClick={() => onChange({ lockedStorage: !both, lockedProcessing: !both })}
          title={both ? 'Click to unlock entirely' : 'Click to lock entirely'}
          className={'inline-flex items-center gap-1.5 px-3 py-1.5 rounded-l-md border border-r-0 text-[13px] font-medium min-h-[36px] ' + cls}
        >
          <Icon d={I.lock} className="w-3.5 h-3.5" />
          {label}
        </button>
        <button
          type="button"
          onClick={() => setOpen(!open)}
          aria-haspopup="menu"
          aria-expanded={open}
          className={'inline-flex items-center px-2 rounded-r-md border text-[13px] font-medium min-h-[36px] ' + cls}
        >
          <Icon d={I.chevron} className="w-3 h-3" />
        </button>
        {open && (
          <>
            <div className="fixed inset-0 z-30" onClick={() => setOpen(false)} />
            <div className="absolute top-full right-0 mt-1 z-40 bg-white border border-neutral-10 rounded-md shadow-lg w-[240px] py-1">
              <button
                type="button"
                onClick={() => { onChange({ lockedStorage: true, lockedProcessing: true }); setOpen(false); }}
                className="w-full text-left px-3 py-2 text-[13px] hover:bg-neutral-5 flex items-center gap-2"
              >
                <Icon d={I.lock} className="w-3.5 h-3.5 text-neutral-80" />
                <span>Lock entirely</span>
              </button>
              <button
                type="button"
                onClick={() => { onChange({ lockedStorage: !lockedStorage, lockedProcessing }); setOpen(false); }}
                className="w-full text-left px-3 py-2 text-[13px] hover:bg-neutral-5 flex items-center justify-between"
              >
                <span>{lockedStorage ? 'Unlock storage' : 'Lock for storage'}</span>
                {lockedStorage && <Icon d={I.check} className="w-3.5 h-3.5 text-safi-600" />}
              </button>
              <button
                type="button"
                onClick={() => { onChange({ lockedStorage, lockedProcessing: !lockedProcessing }); setOpen(false); }}
                className="w-full text-left px-3 py-2 text-[13px] hover:bg-neutral-5 flex items-center justify-between"
              >
                <span>{lockedProcessing ? 'Unlock processing' : 'Lock for processing'}</span>
                {lockedProcessing && <Icon d={I.check} className="w-3.5 h-3.5 text-safi-600" />}
              </button>
              {!none && (
                <>
                  <hr className="my-1 border-neutral-10" />
                  <button
                    type="button"
                    onClick={() => { onChange({ lockedStorage: false, lockedProcessing: false }); setOpen(false); }}
                    className="w-full text-left px-3 py-2 text-[13px] hover:bg-neutral-5 text-neutral-60"
                  >
                    Unlock all
                  </button>
                </>
              )}
            </div>
          </>
        )}
      </div>
    );
  }

  // Production-lines multi-select dropdown shown in the row.
  // R63: adds an "Any" quick-toggle that selects every available line.
  function ProductionLinesDropdown({ lines = [], onChange }) {
    const [open, setOpen] = useState(false);
    const allLines = ['Apan 1', 'Apan 2'];
    const allActive = lines.length === allLines.length && allLines.every(l => lines.includes(l));
    const toggle = (line) => {
      const next = lines.includes(line) ? lines.filter(l => l !== line) : [...lines, line];
      onChange(next);
    };
    const toggleAny = () => onChange(allActive ? [] : [...allLines]);
    return (
      <div className="relative">
        <label className="absolute -top-2 left-2 bg-white px-1 text-[11px] text-neutral-60 z-10">
          Production lines
        </label>
        <button
          type="button"
          onClick={() => setOpen(!open)}
          className="min-w-[200px] h-9 pl-2.5 pr-2 border border-neutral-10 rounded-md text-[14px] bg-white flex items-center gap-1.5 hover:bg-neutral-5"
        >
          <div className="flex items-center gap-1 flex-1">
            {lines.length === 0 ? (
              <span className="text-neutral-40 text-[13px]">Select</span>
            ) : allActive ? (
              <span className="px-2 py-0.5 bg-safi-50 text-safi-700 rounded-full text-[12px] font-medium">Any</span>
            ) : (
              lines.map(l => (
                <span key={l} className="px-2 py-0.5 bg-neutral-5 rounded-full text-[12px] text-neutral-100">{l}</span>
              ))
            )}
          </div>
          <Icon d={I.chevron} className="w-3 h-3 text-neutral-60 shrink-0" />
        </button>
        {open && (
          <>
            <div className="fixed inset-0 z-30" onClick={() => setOpen(false)} />
            <div className="absolute top-full left-0 mt-1 z-40 bg-white border border-neutral-10 rounded-md shadow-lg w-full py-1">
              {/* R63: Any = select all lines. Treated as a single selection visually. */}
              <button
                type="button"
                onClick={toggleAny}
                className="w-full text-left px-3 py-2 text-[13px] hover:bg-neutral-5 flex items-center justify-between border-b border-neutral-10"
              >
                <span className="font-medium">Any (all lines)</span>
                {allActive && <Icon d={I.check} className="w-3.5 h-3.5 text-safi-600" />}
              </button>
              {allLines.map(line => {
                const active = lines.includes(line);
                return (
                  <button
                    key={line}
                    type="button"
                    onClick={() => toggle(line)}
                    className="w-full text-left px-3 py-2 text-[13px] hover:bg-neutral-5 flex items-center justify-between"
                  >
                    <span>{line}</span>
                    {active && <Icon d={I.check} className="w-3.5 h-3.5 text-safi-600" />}
                  </button>
                );
              })}
            </div>
          </>
        )}
      </div>
    );
  }

  // ─────────────────────────────────────────────────────────────────────────
  // R61 Phase 2 — Zone + bays view (Figma 15987-11388)
  // ─────────────────────────────────────────────────────────────────────────

  // Simple Access Pattern picker — used inside each bay edit card.
  // Reflects bay.accessPattern with a fallback to zone.inventoryRule.
  function AccessPatternSelect({ value, onChange }) {
    return (
      <div className="relative">
        <label className="absolute -top-2 left-2 bg-white px-1 text-[10px] text-neutral-60 z-10">Access</label>
        <select
          value={value || 'NONE'}
          onChange={e => onChange(e.target.value)}
          className="h-9 pl-2.5 pr-7 rounded-md border border-neutral-10 text-[13px] font-medium text-neutral-100 bg-white appearance-none cursor-pointer focus:outline-none focus:ring-2 focus:ring-safi-600 min-w-[88px]"
        >
          <option value="NONE">None</option>
          <option value="FIFO">FIFO</option>
          <option value="LIFO">LIFO</option>
        </select>
        <Icon d={I.chevron} className="w-3 h-3 text-neutral-60 absolute right-2 top-3 pointer-events-none" />
      </div>
    );
  }

  // Compact quality chip for a single load. Uses the existing load.results
  // (transparentPET / colouredPET / contaminants); we render the headline
  // transparent PET % with red/green styling around the 92% spec threshold.
  function LoadQualityChip({ load }) {
    const tp = load.results?.transparentPET;
    if (tp == null) {
      return (
        <span className="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] text-neutral-60 bg-neutral-5 border border-neutral-10">
          Not analysed
        </span>
      );
    }
    const inSpec = tp >= 92;
    return (
      <span className={
        'inline-flex items-center gap-1 px-1.5 py-0.5 rounded text-[10px] font-semibold border ' +
        (inSpec ? 'bg-success-50 text-success-700 border-success-100' : 'bg-danger-50 text-danger-700 border-danger-200')
      }>
        <span aria-hidden="true">{inSpec ? '✓' : '⚠'}</span>
        Transparent PET {tp.toFixed(1)}%
      </span>
    );
  }

  // BayEditCard — appears in the horizontal row inside the zone view. Shows
  // the bay's name, access pattern, lock, optional stack height + the full
  // list of loads with checkboxes (no drag — per R61 spec, drag for load
  // reorder only lives in the bay detail view, Phase 3).
  // R64: whole card is click-to-open (same pattern as the zone cards). Inner
  // controls stopPropagation so they don't trigger the navigation. The
  // chevron button is gone.
  function BayEditCard({ bay, zone, selectedLoadIds, onToggleSelect, onSelectAllInBay, dispatch, onOpen }) {
    const accessPattern = bay.accessPattern || zone.inventoryRule || 'NONE';
    const allSelected = bay.loads.length > 0 && bay.loads.every(l => selectedLoadIds.has(l.id));
    const someSelected = bay.loads.some(l => selectedLoadIds.has(l.id));
    const stop = (e) => e.stopPropagation();
    return (
      <div
        role={onOpen ? 'button' : undefined}
        tabIndex={onOpen ? 0 : undefined}
        onClick={onOpen ? () => onOpen(bay.id) : undefined}
        onKeyDown={onOpen ? (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onOpen(bay.id); } } : undefined}
        data-bay-id={bay.id}
        className={
          'shrink-0 w-[340px] border border-neutral-10 rounded-lg bg-white p-3 flex flex-col transition ' +
          (onOpen ? 'cursor-pointer hover:border-safi-300 hover:shadow-sm focus:outline-none focus:ring-2 focus:ring-safi-600' : '')
        }
      >
        {/* Header: name + access + lock + (optional) stack height */}
        <div className="space-y-2 pb-3 mb-3 border-b border-neutral-10" onClick={stop}>
          <div className="flex items-center gap-1.5">
            <div className="relative flex-1">
              <label className="absolute -top-2 left-2 bg-white px-1 text-[10px] text-neutral-60 z-10">Bay name</label>
              <input
                type="text"
                value={bay.name}
                onChange={e => dispatch({ type: 'updateBay', zoneId: zone.id, bayId: bay.id, patch: { name: e.target.value } })}
                onClick={stop}
                className="w-full h-9 px-2.5 border border-neutral-10 rounded-md text-[13px] font-semibold text-neutral-100 bg-white focus:outline-none focus:ring-2 focus:ring-safi-600 focus:border-safi-600"
              />
            </div>
          </div>
          <div className="flex items-center gap-1.5 flex-wrap">
            <AccessPatternSelect
              value={accessPattern}
              onChange={v => dispatch({ type: 'updateBay', zoneId: zone.id, bayId: bay.id, patch: { accessPattern: v } })}
            />
            <SplitLock
              lockedStorage={!!bay.lockedStorage}
              lockedProcessing={!!bay.lockedProcessing}
              onChange={({ lockedStorage, lockedProcessing }) => dispatch({
                type: 'updateBay', zoneId: zone.id, bayId: bay.id,
                patch: { lockedStorage, lockedProcessing },
              })}
            />
          </div>
          {zone.stackHeightsEnabled && (
            <div className="flex items-center gap-1.5">
              <span className="text-[12px] text-neutral-60">Stack height:</span>
              <input
                type="number"
                value={bay.stackLimit ?? ''}
                onChange={e => dispatch({
                  type: 'updateBay', zoneId: zone.id, bayId: bay.id,
                  patch: { stackLimit: e.target.value ? Math.max(1, Number(e.target.value)) : null },
                })}
                placeholder="—"
                min="1"
                className="w-14 h-7 px-1.5 border border-neutral-10 rounded text-[12px] text-center"
              />
              <span className="text-[11px] text-neutral-60">bales high</span>
            </div>
          )}
        </div>

        {/* R64: Select-all + loads — stopPropagation so clicking a load
            checkbox doesn't trigger the card-level navigation. */}
        <div className="flex items-center justify-between text-[12px] mb-2" onClick={stop}>
          <span className="text-neutral-60">{bay.loads.length} {bay.loads.length === 1 ? 'load' : 'loads'}</span>
          {bay.loads.length > 0 && (
            <button
              type="button"
              onClick={(e) => { e.stopPropagation(); onSelectAllInBay(bay, !allSelected); }}
              className="text-safi-700 font-semibold hover:underline"
            >
              {allSelected ? 'Deselect all' : 'Select all'}
            </button>
          )}
        </div>

        {/* Loads — full details, no truncation (cards are wide enough) */}
        <div className="flex-1 space-y-1.5 max-h-[440px] overflow-y-auto pr-1" onClick={stop}>
          {bay.loads.length === 0 ? (
            <div className="text-[12px] text-neutral-60 px-2 py-4 text-center border border-dashed border-neutral-20 rounded">
              No loads in this bay
            </div>
          ) : (
            bay.loads.map(load => {
              const isSelected = selectedLoadIds.has(load.id);
              return (
                <label
                  key={load.id}
                  onClick={stop}
                  className={
                    'flex items-start gap-2 px-2 py-2 rounded border cursor-pointer transition ' +
                    (isSelected ? 'border-safi-300 bg-safi-50/40' : 'border-neutral-10 hover:bg-neutral-5')
                  }
                >
                  <input
                    type="checkbox"
                    checked={isSelected}
                    onChange={() => onToggleSelect(load.id)}
                    onClick={stop}
                    className="mt-1 shrink-0 cursor-pointer"
                  />
                  <div className="flex-1 min-w-0">
                    <div className="text-[13px] font-semibold text-neutral-100">{load.supplier}</div>
                    <div className="text-[11px] text-neutral-60">
                      #{load.lot} · {load.bales} bales · {fmtKg(load.weight)}
                    </div>
                    <div className="mt-1">
                      <LoadQualityChip load={load} />
                    </div>
                  </div>
                </label>
              );
            })
          )}
        </div>
      </div>
    );
  }

  // Floating action bar — appears at the bottom of the zone view when ≥1
  // load is selected. Lets the SL move the selection to another bay or to a
  // buffer zone, then clear selection.
  function MoveLoadsBar({ count, sourceZoneId, sourceBayId, yard, bufferZones, onMove, onCancel }) {
    const [showPicker, setShowPicker] = useState(false);
    const [destKind, setDestKind] = useState('bay');
    const otherZones = yard;
    const initialZone = otherZones[0]?.id;
    const initialZoneObj = otherZones.find(z => z.id === initialZone);
    const [destZoneId, setDestZoneId] = useState(initialZone);
    const [destBayId, setDestBayId] = useState(
      initialZoneObj?.bays.find(b => !(initialZone === sourceZoneId && b.id === sourceBayId))?.id ||
      initialZoneObj?.bays[0]?.id || null
    );
    const [destBufferId, setDestBufferId] = useState(bufferZones[0]?.id || null);

    const currentZone = otherZones.find(z => z.id === destZoneId);
    useEffect(() => {
      // When zone changes, default bay = first non-source
      if (!currentZone) return;
      const valid = currentZone.bays.find(b => !(destZoneId === sourceZoneId && b.id === sourceBayId)) || currentZone.bays[0];
      setDestBayId(valid?.id || null);
    }, [destZoneId]);

    const sameAsSource = destKind === 'bay' && destZoneId === sourceZoneId && destBayId === sourceBayId;
    const canMove = destKind === 'bay' ? (!!destZoneId && !!destBayId && !sameAsSource) : !!destBufferId;

    return (
      <div className="fixed bottom-14 left-0 right-0 z-40 px-6 pb-2 pointer-events-none">
        <div className="max-w-[1400px] mx-auto rounded-lg bg-neutral-100 text-white shadow-xl flex items-center justify-between px-4 py-2.5 gap-3 pointer-events-auto flex-wrap">
          <span className="font-semibold text-[14px]">
            {count} {count === 1 ? 'load' : 'loads'} selected
          </span>
          {!showPicker ? (
            <div className="flex items-center gap-2">
              <button
                type="button"
                onClick={() => setShowPicker(true)}
                className="px-3 py-1.5 rounded-md bg-white text-neutral-100 text-[13px] font-semibold hover:bg-neutral-10 inline-flex items-center gap-1.5 min-h-[36px]"
              >
                Move to…
                <Icon d={I.chevron} className="w-3 h-3" />
              </button>
              <button
                type="button"
                onClick={onCancel}
                className="px-3 py-1.5 rounded-md text-white/90 text-[13px] hover:bg-white/10 min-h-[36px]"
              >
                Cancel
              </button>
            </div>
          ) : (
            <div className="flex items-center gap-2 flex-wrap">
              {/* Destination kind tabs */}
              <div className="inline-flex bg-neutral-80 rounded-md p-0.5">
                <button
                  type="button"
                  onClick={() => setDestKind('bay')}
                  className={'px-2.5 py-1 rounded text-[12px] font-semibold ' + (destKind === 'bay' ? 'bg-white text-neutral-100' : 'text-white/80')}
                >Bay</button>
                <button
                  type="button"
                  onClick={() => setDestKind('buffer')}
                  className={'px-2.5 py-1 rounded text-[12px] font-semibold ' + (destKind === 'buffer' ? 'bg-white text-neutral-100' : 'text-white/80')}
                >Buffer</button>
              </div>
              {destKind === 'bay' ? (
                <>
                  <select
                    value={destZoneId || ''}
                    onChange={e => setDestZoneId(e.target.value)}
                    className="h-8 px-2 rounded text-[12px] bg-white text-neutral-100 border border-neutral-10"
                  >
                    {yard.map(z => <option key={z.id} value={z.id}>{z.name}</option>)}
                  </select>
                  <select
                    value={destBayId || ''}
                    onChange={e => setDestBayId(e.target.value)}
                    className="h-8 px-2 rounded text-[12px] bg-white text-neutral-100 border border-neutral-10"
                  >
                    {(currentZone?.bays || []).map(b => {
                      const isSource = currentZone.id === sourceZoneId && b.id === sourceBayId;
                      return <option key={b.id} value={b.id} disabled={isSource}>{b.name}{isSource ? ' — source' : ''}</option>;
                    })}
                  </select>
                </>
              ) : (
                <select
                  value={destBufferId || ''}
                  onChange={e => setDestBufferId(e.target.value)}
                  className="h-8 px-2 rounded text-[12px] bg-white text-neutral-100 border border-neutral-10"
                >
                  {bufferZones.length === 0 && <option value="">No buffers yet</option>}
                  {bufferZones.map(b => <option key={b.id} value={b.id}>{b.name}</option>)}
                </select>
              )}
              <button
                type="button"
                disabled={!canMove}
                onClick={() => {
                  if (destKind === 'bay') onMove({ kind: 'bay', zoneId: destZoneId, bayId: destBayId });

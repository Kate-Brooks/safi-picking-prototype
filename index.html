<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Safi — Production Management prototype</title>
  <style>
    /* Circular XX TT — Safi brand typeface */
    @font-face { font-family: 'Circular XX TT'; font-style: normal; font-weight: 400; src: url('CircularXXTT-Book.ttf') format('truetype'); font-display: swap; }
    @font-face { font-family: 'Circular XX TT'; font-style: italic; font-weight: 400; src: url('CircularXXTT-BookItalic.ttf') format('truetype'); font-display: swap; }
    @font-face { font-family: 'Circular XX TT'; font-style: normal; font-weight: 450; src: url('CircularXXTT-Regular.ttf') format('truetype'); font-display: swap; }
    @font-face { font-family: 'Circular XX TT'; font-style: italic; font-weight: 450; src: url('CircularXXTT-Italic.ttf') format('truetype'); font-display: swap; }
    @font-face { font-family: 'Circular XX TT'; font-style: normal; font-weight: 500; src: url('CircularXXTT-Medium.ttf') format('truetype'); font-display: swap; }
    @font-face { font-family: 'Circular XX TT'; font-style: italic; font-weight: 500; src: url('CircularXXTT-MediumItalic.ttf') format('truetype'); font-display: swap; }
    @font-face { font-family: 'Circular XX TT'; font-style: normal; font-weight: 700; src: url('CircularXXTT-Bold.ttf') format('truetype'); font-display: swap; }
    @font-face { font-family: 'Circular XX TT'; font-style: italic; font-weight: 700; src: url('CircularXXTT-BoldItalic.ttf') format('truetype'); font-display: swap; }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            safi: {
              50:  '#F4F2FF',
              100: '#E8E3FF', // Figma Primary/200 (light tint)
              200: '#D2CAFF',
              300: '#B0A1FE',
              400: '#8A77F8',
              500: '#7458FF',
              600: '#6347FF', // Figma Primary/400 (primary)
              700: '#4A33CC',
              800: '#3A2899',
              900: '#241B66'
            },
            success: {
              100: '#EAF7ED', // toast bg
              200: '#2FB554',
              300: '#1B5E20'
            },
            neutral: {
              5:   '#F3F3F4',
              10:  '#E7E7E8',
              40:  '#9E9EA5',
              60:  '#6E6D77',
              80:  '#3D3D4A',
              100: '#0D0C1D'
            }
          },
          fontFamily: { sans: ['"Circular XX TT"', 'system-ui', 'sans-serif'] }
        }
      }
    };
  </script>
  <style>
    html, body { font-family: 'Circular XX TT', system-ui, sans-serif; background: #fafafa; }
    .scrollbar-thin::-webkit-scrollbar { width: 8px; height: 8px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 4px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    /* Focus ring matches Safi purple */
    *:focus-visible { outline: 2px solid #6347FF; outline-offset: 2px; border-radius: 4px; }
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
    /* Flash highlight used when jumping to a load row via the picking-list card link */
    @keyframes flashHighlight { 0% { background-color: #E8E3FF; } 100% { background-color: transparent; } }
    .flash-highlight { animation: flashHighlight 1.6s ease-out; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-presets="env,react">
  /* eslint-disable */
  const { useState, useMemo, useEffect, useRef, Fragment } = React;

  // ----------------------------------------------------------------------------
  // MOCK DATA — anonymised warehouse layout for the prototype.
  // Zones, Bays, Loads with supplier + lot ref + weight + bales.
  // Materials: BLANCA, AMERICANA, AZUL, 50/50.
  // Some bays are "blocked" — physically inaccessible because other bays sit in
  // front of them. The SL cannot put a blocked bay on the picking list.
  // ----------------------------------------------------------------------------

  // Clear PET Bottles spec — three result components per analysed load.
  //   transparentPET >= 92    (higher is in-spec, green)
  //   colouredPET   <= 6      (lower is in-spec, green)
  //   contaminants  <= 2      (lower is in-spec, green)
  const SPEC = {
    transparentPET: { label: 'Transparent PET', op: '>=', target: 92 },
    colouredPET:    { label: 'Coloured PET',    op: '<=', target: 6  },
    contaminants:   { label: 'Contaminants',    op: '<=', target: 2  }
  };

  // Helper: build a load object.
  // results === null → load has not been AI-analysed yet, no chips shown.
  // results: { transparentPET, colouredPET, contaminants } each as percentages summing to ~100.
  const L = (supplier, lot, weight, bales, results = null) => ({
    id: lot,
    supplier,
    lot,
    weight,
    bales,
    results,
    processedAt: null
  });

  const inSpec = (spec, v) => spec.op === '>=' ? v >= spec.target : v <= spec.target;

  // Average bay quality → 4-bucket heat colour (red → amber → green) + grey for un-analysed.
  // Score = average count of in-spec components (0–3) across analysed loads in the bay.
  const bayQuality = (bay) => {
    const analysed = bay.loads.filter(l => l.results);
    if (analysed.length === 0) {
      return { score: null, color: '#D4D4D8', label: 'Not analysed' };
    }
    const totalScore = analysed.reduce((acc, l) => {
      let s = 0;
      Object.keys(SPEC).forEach(k => { if (inSpec(SPEC[k], l.results[k])) s++; });
      return acc + s;
    }, 0);
    const avg = totalScore / analysed.length;
    if (avg >= 2.75) return { score: avg, color: '#16A34A', label: 'All specs met' };
    if (avg >= 2.0)  return { score: avg, color: '#84CC16', label: 'Mostly in spec' };
    if (avg >= 1.0)  return { score: avg, color: '#F59E0B', label: 'Mixed' };
    return { score: avg, color: '#EF4444', label: 'Below spec' };
  };

  // Yard structure. `accessible: false` means this bay is blocked by another bay
  // in front of it — the FO physically cannot reach it for picking right now.
  // r = { transparentPET, colouredPET, contaminants } shorthand
  const r = (t, c, x) => ({ transparentPET: t, colouredPET: c, contaminants: x });

  // Auto-generated extra bays so Zone A grows to ~40 bays for the realistic-scale test.
  // States rotate through: dense (8 loads), partial, empty, blocked.
  const extraSuppliers = [
    'Supplier A', 'Supplier B', 'Supplier C', 'Supplier D', 'Supplier E',
    'Supplier F', 'Supplier G', 'Supplier H', 'Supplier I', 'Supplier J',
    'Supplier K', 'Supplier L', 'Supplier M', 'Supplier N', 'Supplier O',
    'Supplier P'
  ];
  const buildZoneABays = () => {
    const out = [];
    for (let i = 6; i <= 40; i++) {
      const mod = i % 7;
      const idLabel = i.toString().padStart(2, '0');
      const mkLoad = (j, q) => {
        const supplier = extraSuppliers[(i + j) % extraSuppliers.length];
        const lot = `LOT-A${idLabel}${j.toString().padStart(2, '0')}`;
        const analysed = (i + j) % 4 !== 0;
        const tp = q ?? (93 + ((i + j) % 6) - 2);
        const cp = Math.max(2, Math.round((100 - tp) * 0.7 * 10) / 10);
        const ct = Math.max(0.2, Math.round((100 - tp - cp) * 10) / 10);
        return L(supplier, lot, 11000 + ((i * 137 + j * 41) % 9000), 18 + ((i + j) % 25), analysed ? r(tp, cp, ct) : null);
      };
      if (mod === 0) {
        // Empty
        out.push({ id: `A${i}`, esName: `Bay A${i}`, accessible: true, loads: [] });
      } else if (mod === 1) {
        // Dense — 8 loads
        out.push({
          id: `A${i}`, esName: `Bay A${i}`, accessible: true,
          loads: Array.from({ length: 8 }, (_, j) => mkLoad(j))
        });
      } else if (mod === 6 && i > 10) {
        // Blocked (only after A10 so the first few stay accessible)
        out.push({
          id: `A${i}`, esName: `Bay A${i}`, accessible: false, blockedBy: `A${i - 2}`,
          loads: Array.from({ length: 2 + (i % 4) }, (_, j) => mkLoad(j))
        });
      } else {
        // Partial fill
        const cap = 3 + (i % 5);
        const fill = Math.max(1, Math.floor(cap / 2) + (i % 2));
        out.push({
          id: `A${i}`, esName: `Bay A${i}`, accessible: true,
          loads: Array.from({ length: fill }, (_, j) => mkLoad(j))
        });
      }
    }
    return out;
  };

  // Each bay carries a `capacity` (max loads it can physically hold).
  // current loads vs capacity → "Empty" | "Capacity for N load" | "Full" chip.
  const YARD = [
    {
      id: 'A',
      name: 'Zone A',
      esName: 'Zone A',
      bays: [
        {
          id: 'A1', name: 'Bay A1', esName: 'Bay A1', accessible: true,
          loads: [
            L('Supplier A',  'LOT-A001', 14870, 25, r(95.2, 4.5, 0.3)),
            L('Supplier B',  'LOT-A002', 14829, 20, r(96.4, 3.4, 0.2))
          ]
        },
        {
          id: 'A2', name: 'Bay A2', esName: 'Bay A2', accessible: true,
          loads: [
            L('Supplier C',  'LOT-A003', 12964, 22, r(89.0, 8.3, 2.7)),
            L('Supplier D',  'LOT-A004', 12747, 32, r(96.1, 3.5, 0.4))
          ]
        },
        {
          id: 'A3', name: 'Bay A3', esName: 'Bay A3', accessible: true,
          loads: [
            L('Supplier E',  'LOT-A005', 17812, 33) // un-analysed
          ]
        },
        {
          id: 'A4', name: 'Bay A4', esName: 'Bay A4', accessible: false, blockedBy: 'A2',
          loads: [
            L('Supplier F',  'LOT-A006', 16100, 30, r(94.2, 5.0, 0.8)),
            L('Supplier G',  'LOT-A007', 18560, 38, r(87.5, 7.6, 4.9))
          ]
        },
        {
          id: 'A5', name: 'Bay A5', esName: 'Bay A5', accessible: true,
          loads: []
        },
        ...buildZoneABays()
      ]
    },
    {
      id: 'B',
      name: 'Zone B',
      esName: 'Zone B',
      bays: [
        {
          // Bay with 5 loads — demonstrates the "Show all loads (N more)" expander in sticky tab
          id: 'B5', name: 'Bay B5', esName: 'Bay B5', accessible: true,
          loads: [
            L('Supplier H',  'LOT-B001', 13779, 28, r(93.1, 5.4, 1.5)),
            L('Supplier I',  'LOT-B002',  8845, 20, r(88.3, 9.0, 2.7)),
            L('Supplier J',  'LOT-B003', 14260, 30, r(95.0, 4.6, 0.4)),
            L('Supplier K',  'LOT-B004', 12880, 24, r(91.8, 6.2, 2.0)),
            L('Supplier L',  'LOT-B005', 10250, 22)
          ]
        },
        {
          id: 'B9', name: 'Bay B9', esName: 'Bay B9', accessible: true,
          loads: [
            L('Supplier M',  'LOT-B006', 17986, 52, r(94.7, 4.1, 1.2))
          ]
        },
        {
          id: 'B10', name: 'Bay B10', esName: 'Bay B10', accessible: true,
          loads: [
            L('Supplier N',  'LOT-B007', 20330, 25, r(96.0, 3.6, 0.4)),
            L('Supplier O',  'LOT-B008', 11337, 20, r(82.4, 11.8, 5.8))
          ]
        }
      ]
    },
    {
      id: 'C',
      name: 'Zone C',
      esName: 'Zone C',
      bays: [
        {
          id: 'C2', name: 'Bay C2', esName: 'Bay C2', accessible: true,
          loads: [
            L('Supplier P',  'LOT-C001',  6276, 38, r(94.1, 4.7, 1.2)),
            L('Supplier A',  'LOT-C002', 15540, 45, r(95.8, 3.5, 0.7))
          ]
        },
        {
          id: 'C5', name: 'Bay C5', esName: 'Bay C5', accessible: true,
          loads: [
            L('Supplier B',  'LOT-C003', 15858, 28, r(93.4, 5.2, 1.4)),
            L('Supplier C',  'LOT-C004', 13420, 30, r(86.3, 9.1, 4.6))
          ]
        },
        {
          id: 'C17', name: 'Bay C17', esName: 'Bay C17', accessible: false, blockedBy: 'C5',
          loads: [
            L('Supplier D',  'LOT-C005', 14100, 26, r(95.0, 4.5, 0.5))
          ]
        },
        {
          id: 'C18', name: 'Bay C18', esName: 'Bay C18', accessible: true,
          loads: []
        }
      ]
    }
  ];

  // Active production target (top-of-page card)
  const ACTIVE_WINDOW = {
    material: 'BLANCA',
    targetInput: 90.0,
    elapsed: '02:14:08',
    balesProcessed: 64,
    weightProcessed: 32480,
    actualInput: 89.4
  };

  // ----------------------------------------------------------------------------
  // UTILITIES
  // ----------------------------------------------------------------------------

  const fmtKg = (n) => (n ?? 0).toLocaleString('en-US') + ' kg';
  const fmtNum = (n) => (n ?? 0).toLocaleString('en-US');
  const sum = (arr, fn) => arr.reduce((a, b) => a + fn(b), 0);

  // Aggregate stats for a bay or zone given its loads array
  const bayStats  = (bay)  => ({
    loads: bay.loads.length,
    bales: sum(bay.loads, l => l.bales),
    weight: sum(bay.loads, l => l.weight)
  });
  const zoneStats = (zone) => zone.bays.reduce((acc, b) => {
    const s = bayStats(b);
    return {
      loads: acc.loads + s.loads,
      bales: acc.bales + s.bales,
      weight: acc.weight + s.weight,
      bays: acc.bays + 1
    };
  }, { loads: 0, bales: 0, weight: 0, bays: 0 });

  // Load-status chip: shows bale count, or "Empty" for a bay/zone with no loads.
  // Square-ish corners distinguish status chips from AI chips.
  const CapacityChip = ({ bales, variant }) => {
    if (bales === 0) {
      const prefix = variant === 'zone' ? 'Zone' : 'Bay';
      return (
        <span className="inline-flex items-center justify-center px-2.5 py-1 rounded-md text-[12px] font-bold whitespace-nowrap bg-neutral-5 text-neutral-60">
          {prefix} empty
        </span>
      );
    }
    return (
      <span className="inline-flex items-center justify-center px-2.5 py-1 rounded-md text-[12px] font-bold whitespace-nowrap bg-sky-100 text-sky-900">
        Bales: {fmtNum(bales)}
      </span>
    );
  };

  // AIResultChips — three chips per analysed load (Transparent PET / Coloured PET / Contaminants).
  // Each chip is green/red against its spec. Returns null if the load hasn't been analysed.
  const AIResultChips = ({ load, onPickingList }) => {
    if (!load.results) {
      return <span className="text-xs text-neutral-60">Not analysed yet</span>;
    }
    const order = ['transparentPET', 'colouredPET', 'contaminants'];
    return (
      <div className="flex items-center gap-1.5 flex-wrap">
        {order.map(key => {
          const spec = SPEC[key];
          const value = load.results[key];
          const good = inSpec(spec, value);
          const cls = good
            ? 'bg-success-100 text-success-300'
            : 'bg-rose-100 text-rose-900';
          const icon = good ? I.checkCircle : I.errorCircle;
          return (
            <span
              key={key}
              className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[12px] font-medium ${cls}`}
            >
              <Icon d={icon} className="w-3.5 h-3.5" />
              {spec.label} {value.toFixed(1)}%
            </span>
          );
        })}
      </div>
    );
  };

  // ZoneBayFilter — multi-select dropdown of every bay grouped by zone.
  // When selections are made, the parent filters the warehouse to show only those bays
  // (and force-expands their zones).
  function ZoneBayFilter({ value, onChange, yard }) {
    const [open, setOpen] = useState(false);
    const wrapRef = useRef(null);
    useEffect(() => {
      if (!open) return;
      const onDoc = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
      document.addEventListener('mousedown', onDoc);
      return () => document.removeEventListener('mousedown', onDoc);
    }, [open]);
    const count = value.size;
    const toggle = (k) => {
      const next = new Set(value);
      next.has(k) ? next.delete(k) : next.add(k);
      onChange(next);
    };
    const clear = () => onChange(new Set());
    return (
      <div className="relative w-[180px]" ref={wrapRef}>
        <button
          type="button"
          onClick={() => setOpen(v => !v)}
          className={
            'w-full text-left pl-3 pr-9 py-2 text-sm rounded-md bg-white border truncate ' +
            (open ? 'border-safi-600' : 'border-neutral-10')
          }
          aria-haspopup="listbox"
          aria-expanded={open}
        >
          <span className={'block truncate whitespace-nowrap ' + (count > 0 ? 'text-neutral-100' : 'text-neutral-40')}>
            {count > 0 ? `${count} bay${count === 1 ? '' : 's'} selected` : 'Select zone or bay'}
          </span>
        </button>
        <label className={
          'absolute -top-2 left-3 px-1 bg-white text-[11px] font-medium ' +
          (open ? 'text-safi-600' : 'text-neutral-60')
        }>Zone & bay</label>
        <Icon d={open ? I.chevron : I.chevron} className={
          'w-4 h-4 absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none ' +
          (open ? 'text-safi-600 rotate-180' : 'text-neutral-60')
        } />
        {open && (
          <div className="absolute z-30 mt-1 w-[280px] left-0 bg-white border border-neutral-10 rounded-md shadow-lg max-h-[320px] overflow-y-auto scrollbar-thin py-1">
            {count > 0 && (
              <div className="px-3 py-2 border-b border-neutral-10 flex justify-between items-center">
                <span className="text-xs text-neutral-60">{count} selected</span>
                <button onClick={clear} className="text-xs font-medium text-safi-700 hover:underline">Clear</button>
              </div>
            )}
            {yard.map(zone => (
              <Fragment key={zone.id}>
                <div className="px-3 pt-2 pb-1 text-[11px] uppercase tracking-wide text-neutral-60 font-semibold">{zone.esName}</div>
                {zone.bays.map(bay => {
                  const k = `${zone.id}|${bay.id}`;
                  const checked = value.has(k);
                  return (
                    <label key={k} className="flex items-center gap-3 px-3 py-2 text-sm cursor-pointer hover:bg-neutral-5">
                      <input
                        type="checkbox"
                        checked={checked}
                        onChange={() => toggle(k)}
                        className="rounded text-safi-600 focus:ring-safi-500"
                      />
                      <span className="text-neutral-100">{zone.esName}: {bay.esName}</span>
                    </label>
                  );
                })}
              </Fragment>
            ))}
          </div>
        )}
      </div>
    );
  }

  // CapacityFilter — multi-select with Capacity / Full / Empty options.
  function CapacityFilter({ value, onChange }) {
    const options = ['Capacity', 'Full', 'Empty'];
    const [open, setOpen] = useState(false);
    const wrapRef = useRef(null);
    useEffect(() => {
      if (!open) return;
      const onDoc = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
      document.addEventListener('mousedown', onDoc);
      return () => document.removeEventListener('mousedown', onDoc);
    }, [open]);
    const count = value.size;
    const toggle = (v) => {
      const next = new Set(value);
      next.has(v) ? next.delete(v) : next.add(v);
      onChange(next);
    };
    return (
      <div className="relative w-[150px]" ref={wrapRef}>
        <button
          type="button"
          onClick={() => setOpen(v => !v)}
          className={
            'w-full text-left pl-3 pr-9 py-2 text-sm rounded-md bg-white border truncate ' +
            (open ? 'border-safi-600' : 'border-neutral-10')
          }
          aria-haspopup="listbox"
          aria-expanded={open}
        >
          <span className={count > 0 ? 'text-neutral-100' : 'text-neutral-40'}>
            {count === 0 ? 'All capacities' : Array.from(value).join(', ')}
          </span>
        </button>
        <label className={
          'absolute -top-2 left-3 px-1 bg-white text-[11px] font-medium ' +
          (open ? 'text-safi-600' : 'text-neutral-60')
        }>Capacity</label>
        <Icon d={I.chevron} className={
          'w-4 h-4 absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none ' +
          (open ? 'text-safi-600 rotate-180' : 'text-neutral-60')
        } />
        {open && (
          <div className="absolute z-30 mt-1 w-[220px] left-0 bg-white border border-neutral-10 rounded-md shadow-lg py-1">
            {options.map(opt => (
              <label key={opt} className="flex items-center gap-3 px-3 py-2 text-sm cursor-pointer hover:bg-neutral-5">
                <input
                  type="checkbox"
                  checked={value.has(opt)}
                  onChange={() => toggle(opt)}
                  className="rounded text-safi-600 focus:ring-safi-500"
                />
                <span className="text-neutral-100">{opt}</span>
              </label>
            ))}
            {count > 0 && (
              <div className="px-3 py-2 border-t border-neutral-10">
                <button onClick={() => onChange(new Set())} className="text-xs font-medium text-safi-700 hover:underline">
                  Clear
                </button>
              </div>
            )}
          </div>
        )}
      </div>
    );
  }

  // ============================================================================
  // SPATIAL LAYOUT VIEW — top-down map of the yard.
  //
  // Overview: Production area on the left + zones stacked on the right
  //           (Unloading bay sits between Zone B and Zone C, same width).
  //           Each zone shows high-emphasis metrics + a fill bar.
  // Zone view: clickable breadcrumb, zone metrics, zoom controls,
  //           horizontal scrolling row of bay tiles (matching real warehouse
  //           layout), minimap above for jumping in large zones.
  // Bay view:  full load list (LoadRow re-used).
  // ============================================================================
  function SpatialLayoutView({ yard, isCreating, selectionBales, setSelectionBales, pickingList }) {
    const [view, setView] = useState({ level: 'overview' });
    const [zoom, setZoom] = useState(1); // 0 compact, 1 medium, 2 detail
    const bayRowRef = useRef(null);

    const goOverview = () => setView({ level: 'overview' });
    const goZone = (zoneId) => setView({ level: 'zone', zoneId });
    const goBay = (zoneId, bayId) => setView({ level: 'bay', zoneId, bayId });

    // Reusable clickable breadcrumb
    const Breadcrumbs = ({ zone, bay }) => (
      <nav aria-label="Breadcrumb" className="flex items-center gap-2 text-[13px] flex-wrap">
        <button
          onClick={goOverview}
          disabled={!zone}
          className={zone ? 'text-safi-600 hover:underline' : 'text-neutral-100 font-medium'}
        >
          Yard overview
        </button>
        {zone && (
          <>
            <span className="text-neutral-40">/</span>
            <button
              onClick={() => goZone(zone.id)}
              disabled={!bay}
              className={bay ? 'text-safi-600 hover:underline' : 'text-neutral-100 font-medium'}
            >
              {zone.esName}
            </button>
          </>
        )}
        {bay && (
          <>
            <span className="text-neutral-40">/</span>
            <span className="text-neutral-100 font-medium">{bay.esName}</span>
          </>
        )}
      </nav>
    );

    // Horizontal fill bar — accessible (numeric label always visible). Uses sky
    // tones so it's clearly distinct from the primary purple CTA.
    const FillBar = ({ value, max, suffix }) => {
      const pct = max > 0 ? Math.min(100, Math.max(2, (value / max) * 100)) : 0;
      return (
        <div className="w-full">
          <div className="h-2 bg-neutral-5 rounded-full overflow-hidden" aria-hidden="true">
            <div className="h-full bg-sky-500 rounded-full transition-all" style={{ width: value === 0 ? '0%' : `${pct}%` }} />
          </div>
          <div className="mt-1.5 text-[13px] text-neutral-60">
            <span className="font-bold text-neutral-100">{fmtNum(value)}</span>{suffix ? ` ${suffix}` : ''}
          </div>
        </div>
      );
    };

    // ---- OVERVIEW: production + zones (B & C separated by Unloading bay) ----
    const renderOverview = () => {
      const maxBales = Math.max(1, ...yard.map(z => zoneStats(z).bales));
      // Insert the Unloading bay between the 2nd and 3rd zones if possible
      const items = [];
      yard.forEach((z, i) => {
        items.push({ kind: 'zone', zone: z });
        if (i === 1) items.push({ kind: 'unloading' });
      });
      return (
        <div className="bg-white border border-neutral-10 rounded-xl p-6">
          <div className="text-[13px] font-semibold uppercase tracking-wide text-neutral-60 mb-3">Yard overview · top-down view</div>
          <div className="flex gap-3" style={{ minHeight: 420 }}>
            {/* Production area on the left */}
            <div className="w-[180px] shrink-0 flex flex-col">
              <div className="flex-1 bg-neutral-5 border-2 border-dashed border-neutral-10 rounded-lg flex flex-col items-center justify-center text-center px-4 relative">
                <div className="absolute top-3 right-3 text-neutral-40" title="Forklift access">
                  <Icon d={I.truck} className="w-5 h-5" />
                </div>
                <div className="font-bold text-neutral-100 text-base">Production</div>
                <div className="text-[13px] text-neutral-60 mt-1">Line / by-products</div>
              </div>
            </div>

            {/* Zones stacked + unloading bay slotted between them */}
            <div className="flex-1 flex flex-col gap-3">
              {items.map((item, i) => {
                if (item.kind === 'unloading') {
                  return (
                    <div key={'unloading-' + i} className="rounded-lg border-2 border-dashed border-neutral-10 bg-neutral-5 px-5 py-3 flex items-center gap-3 text-[13px] text-neutral-60">
                      <Icon d={I.truck} className="w-5 h-5 text-neutral-60" />
                      <span className="font-semibold uppercase tracking-wide text-neutral-80">Unloading bay</span>
                      <span className="text-neutral-60">Lorries park here</span>
                    </div>
                  );
                }
                const zone = item.zone;
                const z = zoneStats(zone);
                return (
                  <button
                    key={zone.id}
                    onClick={() => goZone(zone.id)}
                    className="flex-1 rounded-lg border border-neutral-10 bg-white px-5 py-4 text-left transition hover:border-safi-300 hover:shadow-sm focus:outline-none focus:ring-2 focus:ring-safi-600"
                  >
                    <div className="flex items-start justify-between gap-6">
                      {/* Left: name + headline metrics */}
                      <div>
                        <div className="font-bold text-neutral-100 text-xl">{zone.esName}</div>
                        <div className="flex items-center gap-6 mt-2">
                          <Metric2 label="Bays"   value={fmtNum(z.bays)} />
                          <Metric2 label="Loads"  value={fmtNum(z.loads)} />
                          <Metric2 label="Bales"  value={fmtNum(z.bales)} />
                          <Metric2 label="Weight" value={fmtKg(z.weight)} />
                        </div>
                      </div>
                      {/* Right: fill bar */}
                      <div className="w-[180px] shrink-0">
                        <div className="text-[13px] uppercase tracking-wide text-neutral-60 mb-2">Bales stored</div>
                        <FillBar value={z.bales} max={maxBales} suffix="bales" />
                      </div>
                    </div>
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      );
    };

    // ---- ZONE VIEW: minimap, zoom, horizontal scrolling bay row ------------
    const renderZone = () => {
      const zone = yard.find(z => z.id === view.zoneId);
      if (!zone) {
        return (
          <div className="bg-white border border-neutral-10 rounded-xl p-8 text-center text-[13px] text-neutral-60">
            Zone not found.
            <button onClick={goOverview} className="ml-2 text-safi-600 underline">Back to overview</button>
          </div>
        );
      }
      const maxBalesInZone = Math.max(1, ...zone.bays.map(b => bayStats(b).bales));
      const z = zoneStats(zone);
      const tileWidth = zoom === 0 ? 48 : zoom === 1 ? 120 : 200;
      const tileHeight = zoom === 0 ? 64 : zoom === 1 ? 120 : 170;

      // Scroll to a bay in the main row when clicked in the minimap
      const scrollToBay = (idx) => {
        const wrap = bayRowRef.current;
        if (!wrap) return;
        const child = wrap.children[idx];
        if (child) child.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      };

      return (
        <div className="bg-white border border-neutral-10 rounded-xl p-6">
          <Breadcrumbs zone={zone} />

          <div className="mt-3 mb-4 flex items-end justify-between gap-6 flex-wrap">
            <div>
              <h3 className="text-2xl font-bold text-neutral-100">{zone.esName}</h3>
              <div className="flex items-center gap-6 mt-2">
                <Metric2 label="Bays"   value={fmtNum(z.bays)} />
                <Metric2 label="Loads"  value={fmtNum(z.loads)} />
                <Metric2 label="Bales"  value={fmtNum(z.bales)} />
                <Metric2 label="Weight" value={fmtKg(z.weight)} />
              </div>
            </div>
            {/* Zoom controls */}
            <div className="flex items-center gap-2 text-[13px]" role="group" aria-label="Zoom level">
              <span className="text-neutral-60">Zoom</span>
              <button
                onClick={() => setZoom(z => Math.max(0, z - 1))}
                disabled={zoom === 0}
                aria-label="Zoom out"
                className="w-8 h-8 rounded border border-neutral-10 text-neutral-80 hover:bg-neutral-5 disabled:opacity-40 flex items-center justify-center"
              >−</button>
              <span className="font-medium text-neutral-100 min-w-[70px] text-center">
                {zoom === 0 ? 'Overview' : zoom === 1 ? 'Medium' : 'Detail'}
              </span>
              <button
                onClick={() => setZoom(z => Math.min(2, z + 1))}
                disabled={zoom === 2}
                aria-label="Zoom in"
                className="w-8 h-8 rounded border border-neutral-10 text-neutral-80 hover:bg-neutral-5 disabled:opacity-40 flex items-center justify-center"
              >+</button>
            </div>
          </div>

          {/* Directional flow indicator above the bay row */}
          <div className="flex items-center gap-2 text-[13px] text-neutral-60 mb-2">
            <Icon d={I.truck} className="w-4 h-4 text-neutral-40" />
            <span>Pick from left to right — bays are numbered in pick order →</span>
          </div>

          {/* Minimap — all bays as tiny bars. Height = bales. Colour = average quality. */}
          {zone.bays.length > 8 && (
            <div className="mb-3 px-3 py-2 rounded-md bg-neutral-5 border border-neutral-10">
              <div className="flex items-end gap-0.5 h-8" role="navigation" aria-label="Bay minimap — heat-mapped by average load quality">
                {zone.bays.map((b, idx) => {
                  const s = bayStats(b);
                  const pct = maxBalesInZone > 0 ? Math.max(8, (s.bales / maxBalesInZone) * 100) : 8;
                  const q = bayQuality(b);
                  return (
                    <button
                      key={b.id}
                      onClick={() => scrollToBay(idx)}
                      title={`${b.esName} · ${fmtNum(s.bales)} bales · ${q.label}`}
                      aria-label={`Jump to ${b.esName} — ${q.label}`}
                      className="flex-1 min-w-[6px] rounded-t transition-opacity hover:opacity-80"
                      style={{ height: `${pct}%`, backgroundColor: q.color }}
                    />
                  );
                })}
              </div>
              <div className="mt-1 flex justify-between text-[13px] text-neutral-60">
                <span>{zone.bays[0]?.esName}</span>
                <span className="text-neutral-40">{zone.bays.length} bays · height = bales · colour = avg quality · click to jump</span>
                <span>{zone.bays[zone.bays.length - 1]?.esName}</span>
              </div>
              {/* Legend */}
              <div className="mt-2 pt-2 border-t border-neutral-10 flex items-center gap-3 flex-wrap text-[13px] text-neutral-60">
                <span className="font-medium text-neutral-80">Quality:</span>
                <span className="inline-flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm" style={{ backgroundColor: '#16A34A' }} />All specs met</span>
                <span className="inline-flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm" style={{ backgroundColor: '#84CC16' }} />Mostly in spec</span>
                <span className="inline-flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm" style={{ backgroundColor: '#F59E0B' }} />Mixed</span>
                <span className="inline-flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm" style={{ backgroundColor: '#EF4444' }} />Below spec</span>
                <span className="inline-flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm" style={{ backgroundColor: '#D4D4D8' }} />Not analysed</span>
              </div>
            </div>
          )}

          {/* Horizontal scrollable bay row */}
          <div
            ref={bayRowRef}
            className="flex gap-2 overflow-x-auto pb-3 pt-1 scrollbar-thin"
            role="list"
          >
            {zone.bays.map((bay, idx) => {
              const s = bayStats(bay);
              const blocked = isCreating && !bay.accessible;
              const empty = s.bales === 0;
              const bayLoadKeys = bay.loads.map(l => `${zone.id}|${bay.id}|${l.id}`);
              const allSelected = isCreating && bay.accessible && bayLoadKeys.length > 0 && bayLoadKeys.every(k => selectionBales[k] != null);
              const someSelected = isCreating && bayLoadKeys.some(k => selectionBales[k] != null);
              const toggleAllInBay = (e) => {
                e.stopPropagation();
                if (!isCreating || !bay.accessible || bayLoadKeys.length === 0) return;
                setSelectionBales(prev => {
                  const next = { ...prev };
                  if (allSelected) {
                    bayLoadKeys.forEach(k => { delete next[k]; });
                  } else {
                    bay.loads.forEach(l => {
                      const k = `${zone.id}|${bay.id}|${l.id}`;
                      if (next[k] == null) next[k] = l.bales;
                    });
                  }
                  return next;
                });
              };
              return (
                <button
                  key={bay.id}
                  onClick={() => goBay(zone.id, bay.id)}
                  className={
                    'shrink-0 rounded-lg border text-left transition focus:outline-none focus:ring-2 focus:ring-safi-600 bg-white ' +
                    (blocked ? 'border-neutral-10 bg-neutral-5 opacity-70'
                      : (someSelected ? 'border-safi-300 ring-1 ring-safi-200 bg-safi-50/40'
                        : 'border-neutral-10 hover:border-safi-300 hover:shadow-sm'))
                  }
                  style={{ width: tileWidth, height: tileHeight }}
                  role="listitem"
                >
                  <div className="h-full flex flex-col p-2">
                    <div className="flex items-start justify-between gap-1">
                      <span className="font-bold text-[13px] text-neutral-100 truncate">
                        {bay.esName.replace('Bay ', '')}
                      </span>
                      <div className="flex items-center gap-1 shrink-0">
                        {blocked && <Icon d={I.lock} className="w-3 h-3 text-neutral-60" />}
                        {isCreating && bay.accessible && bayLoadKeys.length > 0 && (
                          <input
                            type="checkbox"
                            checked={allSelected}
                            ref={el => { if (el) el.indeterminate = someSelected && !allSelected; }}
                            onChange={toggleAllInBay}
                            onClick={(e) => e.stopPropagation()}
                            aria-label={`Select all loads in ${bay.esName}`}
                            title={allSelected ? 'Remove this bay from picking list' : 'Add this whole bay to picking list'}
                            className="rounded text-safi-600 focus:ring-safi-500 cursor-pointer"
                          />
                        )}
                      </div>
                    </div>
                    {zoom === 0 ? (
                      // Compact: just a fill bar + bale count
                      <div className="mt-auto">
                        <div className="h-1.5 bg-neutral-5 rounded-full overflow-hidden">
                          <div className="h-full bg-sky-500" style={{ width: empty ? '0%' : `${Math.max(8, Math.min(100, (s.bales / maxBalesInZone) * 100))}%` }} />
                        </div>
                        <div className="text-[13px] text-neutral-60 mt-1 truncate">{empty ? '—' : fmtNum(s.bales)}</div>
                      </div>
                    ) : zoom === 1 ? (
                      // Medium: name + loads + bales + fill bar
                      <>
                        <div className="text-[13px] text-neutral-60 mt-1">
                          Loads <span className="font-bold text-neutral-100">{s.loads}</span>
                        </div>
                        <div className="text-[13px] text-neutral-60">
                          Bales <span className="font-bold text-neutral-100">{empty ? '—' : fmtNum(s.bales)}</span>
                        </div>
                        <div className="mt-auto">
                          <div className="h-1.5 bg-neutral-5 rounded-full overflow-hidden">
                            <div className="h-full bg-sky-500" style={{ width: empty ? '0%' : `${Math.max(8, Math.min(100, (s.bales / maxBalesInZone) * 100))}%` }} />
                          </div>
                        </div>
                      </>
                    ) : (
                      // Detail: name + all metrics + fill bar
                      <>
                        <div className="grid grid-cols-2 gap-1 mt-2 text-[13px]">
                          <div><div className="text-neutral-60">Loads</div><div className="font-bold text-neutral-100">{s.loads}</div></div>
                          <div><div className="text-neutral-60">Bales</div><div className="font-bold text-neutral-100">{empty ? '—' : fmtNum(s.bales)}</div></div>
                        </div>
                        <div className="text-[13px] text-neutral-60 mt-1">Weight</div>
                        <div className="text-[13px] font-bold text-neutral-100 truncate">{empty ? '—' : fmtKg(s.weight)}</div>
                        <div className="mt-auto">
                          <div className="h-2 bg-neutral-5 rounded-full overflow-hidden">
                            <div className="h-full bg-sky-500" style={{ width: empty ? '0%' : `${Math.max(8, Math.min(100, (s.bales / maxBalesInZone) * 100))}%` }} />
                          </div>
                        </div>
                      </>
                    )}
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      );
    };

    // ---- BAY VIEW: load list ------------------------------------------------
    const renderBay = () => {
      const zone = yard.find(z => z.id === view.zoneId);
      const bay = zone?.bays.find(b => b.id === view.bayId);
      if (!zone || !bay) {
        return (
          <div className="bg-white border border-neutral-10 rounded-xl p-8 text-center text-[13px] text-neutral-60">
            Bay not found.
            <button onClick={goOverview} className="ml-2 text-safi-600 underline">Back to overview</button>
          </div>
        );
      }
      const s = bayStats(bay);
      const toggleLoad = (key) => {
        if (!isCreating) return;
        setSelectionBales(prev => {
          if (prev[key] != null) { const n = { ...prev }; delete n[key]; return n; }
          const [zid, bid, lid] = key.split('|');
          const zz = YARD.find(z => z.id === zid);
          const bb = zz?.bays.find(b => b.id === bid);
          const ld = bb?.loads.find(l => l.id === lid);
          return { ...prev, [key]: ld?.bales || 0 };
        });
      };
      return (
        <div className="bg-white border border-neutral-10 rounded-xl">
          <div className="p-6 border-b border-neutral-10">
            <Breadcrumbs zone={zone} bay={bay} />
            <div className="mt-3 flex items-center justify-between gap-6 flex-wrap">
              <div>
                <h3 className="text-2xl font-bold text-neutral-100">{bay.esName}</h3>
                <div className="flex items-center gap-6 mt-2">
                  <Metric2 label="Loads"  value={fmtNum(s.loads)} />
                  <Metric2 label="Bales"  value={fmtNum(s.bales)} />
                  <Metric2 label="Weight" value={fmtKg(s.weight)} />
                </div>
              </div>
              <CapacityChip bales={s.bales} />
            </div>
            {isCreating && !bay.accessible && (
              <div className="mt-3 inline-flex items-center gap-2 px-3 py-2 rounded bg-amber-50 text-amber-900 text-[13px]">
                <Icon d={I.lock} className="w-4 h-4" />
                This bay is blocked by {bay.blockedBy}. Loads here can’t be added to the picking list until the bays in front are cleared.
              </div>
            )}
          </div>
          {bay.loads.length === 0 ? (
            <div className="px-6 py-10 text-center text-neutral-60 text-[13px]">
              No loads have been stored in this bay yet
            </div>
          ) : (
            <>
              {/* Select all loads — visible during Create picking list when the bay has > 1 load */}
              {isCreating && bay.loads.length > 1 && (() => {
                const bayKeys = bay.loads.map(l => `${zone.id}|${bay.id}|${l.id}`);
                const allSel = bay.accessible && bayKeys.every(k => selectionBales[k] != null);
                const someSel = bayKeys.some(k => selectionBales[k] != null);
                const toggleAll = () => {
                  if (!bay.accessible) return;
                  setSelectionBales(prev => {
                    const next = { ...prev };
                    if (allSel) {
                      bayKeys.forEach(k => { delete next[k]; });
                    } else {
                      bay.loads.forEach(l => {
                        const k = `${zone.id}|${bay.id}|${l.id}`;
                        if (next[k] == null) next[k] = l.bales;
                      });
                    }
                    return next;
                  });
                };
                return (
                  <label className={
                    'flex items-center gap-3 px-4 py-3 border-b border-neutral-10 cursor-pointer text-[13px] font-medium ' +
                    (bay.accessible ? 'text-neutral-80 hover:bg-neutral-5' : 'text-neutral-40 cursor-not-allowed')
                  }>
                    <input
                      type="checkbox"
                      className="rounded text-safi-600 focus:ring-safi-500 disabled:opacity-40"
                      checked={allSel}
                      ref={el => { if (el) el.indeterminate = someSel && !allSel; }}
                      onChange={toggleAll}
                      disabled={!bay.accessible}
                      aria-label={`Select all loads in ${bay.esName}`}
                    />
                    <span>
                      {allSel ? `All ${bay.loads.length} loads selected` : `Select all ${bay.loads.length} loads`}
                    </span>
                  </label>
                );
              })()}
              <div className="divide-y divide-neutral-10">
                {bay.loads.map(load => {
                  const key = `${zone.id}|${bay.id}|${load.id}`;
                  const accessible = !isCreating || bay.accessible;
                  let onPickingList = false;
                  if (!isCreating && pickingList) {
                    const entry = pickingList.loads.find(l => l.loadId === load.id);
                    if (entry) onPickingList = entry.bales != null && entry.bales < load.bales
                      ? { partial: true, bales: entry.bales }
                      : true;
                  }
                  return (
                    <LoadRow
                      key={load.id}
                      load={load}
                      isCreating={isCreating}
                      accessible={accessible}
                      isSelected={selectionBales[key] != null}
                      onToggle={() => toggleLoad(key)}
                      onPickingList={onPickingList}
                    />
                  );
                })}
              </div>
            </>
          )}
        </div>
      );
    };

    if (view.level === 'zone') return renderZone();
    if (view.level === 'bay') return renderBay();
    return renderOverview();
  }

  // High-emphasis metric pair (label small, value large/bold) for the spatial view
  const Metric2 = ({ label, value }) => (
    <div className="leading-tight">
      <div className="text-[13px] text-neutral-60">{label}</div>
      <div className="text-base font-bold text-neutral-100">{value}</div>
    </div>
  );

  // LoadRow — single tappable row.
  //   - Default mode: clicking the row "opens" load details. External icon visible on hover.
  //   - Create mode: clicking toggles selection.
  //   - Three AI result chips inline next to the order ref. Shown only if analysed.
  //   - "On picking list" indicator when this load is on the active picking list (default mode only).
  const LoadRow = ({ load, isCreating, accessible, isSelected, onToggle, onPickingList }) => {
    const openDetails = (e) => {
      e.stopPropagation();
      window.open('about:blank', '_blank');
    };
    const handleRowClick = () => {
      if (!accessible) return;
      if (isCreating) onToggle();
      else window.open('about:blank', '_blank');
    };
    return (
      <div
        id={'load-' + load.id}
        onClick={handleRowClick}
        role="button"
        tabIndex={accessible ? 0 : -1}
        aria-pressed={isCreating ? isSelected : undefined}
        onKeyDown={(e) => {
          if (!accessible) return;
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleRowClick(); }
        }}
        className={
          'group flex items-start gap-3 pl-11 pr-4 py-3 transition-colors ' + // nest under bay title
          (accessible
            ? 'cursor-pointer hover:bg-safi-100 ' + (isCreating && isSelected ? 'bg-safi-50' : '')
            : 'opacity-60 cursor-not-allowed')
        }
      >
        {isCreating && (
          <input
            type="checkbox"
            checked={isSelected}
            onChange={onToggle}
            disabled={!accessible}
            className="mt-1 rounded text-safi-600 focus:ring-safi-500 disabled:opacity-40"
            aria-label={`Select load ${load.lot}`}
            onClick={e => e.stopPropagation()}
          />
        )}
        <div className="flex-1 min-w-0">
          {/* Top line: supplier name (default text, turns purple on row hover), lot, and the three AI chips inline */}
          <div className="flex items-center gap-2 flex-wrap">
            <span className="text-neutral-100 group-hover:text-safi-600 transition-colors">{load.supplier}</span>
            <span className="text-neutral-40 text-sm">#{load.lot}</span>
            <AIResultChips load={load} />
          </div>
          <div className="text-xs text-neutral-60 mt-1 flex items-center gap-2 flex-wrap">
            <span>{fmtNum(load.bales)} bales · {fmtKg(load.weight)}</span>
            {onPickingList && (
              <span className="inline-flex items-center gap-1 px-1.5 py-0.5 rounded text-[11px] font-medium bg-safi-100 text-safi-700">
                <Icon d={I.list} className="w-3 h-3" />
                {typeof onPickingList === 'object' && onPickingList.partial
                  ? `On picking list (${onPickingList.bales}/${load.bales} bales)`
                  : 'On picking list'}
              </span>
            )}
          </div>
        </div>
        {/* External-link icon — Primary/400, visible on hover */}
        <button
          onClick={openDetails}
          aria-label={`View details for load ${load.lot}`}
          className="opacity-0 group-hover:opacity-100 focus:opacity-100 transition-opacity p-1.5 rounded text-safi-600 hover:bg-white shrink-0 mt-0.5"
        >
          <Icon d={I.external} className="w-4 h-4" />
        </button>
      </div>
    );
  };

  // ----------------------------------------------------------------------------
  // ICONS (inline SVG so the prototype works fully offline of the CDN if needed)
  // ----------------------------------------------------------------------------
  const Icon = ({ d, className = 'w-5 h-5', stroke = 'currentColor' }) => (
    <svg viewBox="0 0 24 24" fill="none" stroke={stroke} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" className={className} aria-hidden="true">
      {Array.isArray(d) ? d.map((p, i) => <path key={i} d={p} />) : <path d={d} />}
    </svg>
  );
  const I = {
    menu:     'M3 6h18 M3 12h18 M3 18h18',
    search:   ['M11 19a8 8 0 100-16 8 8 0 000 16z', 'M21 21l-4.3-4.3'],
    user:     ['M20 21a8 8 0 10-16 0', 'M12 11a4 4 0 100-8 4 4 0 000 8z'],
    chevron:  'M6 9l6 6 6-6',
    chevronR: 'M9 6l6 6-6 6',

    check:    'M5 12l5 5L20 7',

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Safi - Production Management prototype</title>
  <style>
    /* Circular XX TT - Safi brand typeface */
    @font-face { font-family: 'Circular XX TT'; font-style: normal; font-weight: 400; src: url('CircularXXTT-Book.ttf') format('truetype'); font-display: swap; }
    @font-face { font-family: 'Circular XX TT'; font-style: italic; font-weight: 400; src: url('CircularXXTT-BookItalic.ttf') format('truetype'); font-display: swap; }
    @font-face { font-family: 'Circular XX TT'; font-style: normal; font-weight: 450; src: url('CircularXXTT-Regular.ttf') format('truetype'); font-display: swap; }
    @font-face { font-family: 'Circular XX TT'; font-style: italic; font-weight: 450; src: url('CircularXXTT-Italic.ttf') format('truetype'); font-display: swap; }
    @font-face { font-family: 'Circular XX TT'; font-style: normal; font-weight: 500; src: url('CircularXXTT-Medium.ttf') format('truetype'); font-display: swap; }
    @font-face { font-family: 'Circular XX TT'; font-style: italic; font-weight: 500; src: url('CircularXXTT-MediumItalic.ttf') format('truetype'); font-display: swap; }
    @font-face { font-family: 'Circular XX TT'; font-style: normal; font-weight: 700; src: url('CircularXXTT-Bold.ttf') format('truetype'); font-display: swap; }
    @font-face { font-family: 'Circular XX TT'; font-style: italic; font-weight: 700; src: url('CircularXXTT-BoldItalic.ttf') format('truetype'); font-display: swap; }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            safi: {
              50:  '#F4F2FF',
              100: '#E8E3FF', // Figma Primary/200 (light tint)
              200: '#D2CAFF',
              300: '#B0A1FE',
              400: '#8A77F8',
              500: '#7458FF',
              600: '#6347FF', // Figma Primary/400 (primary)
              700: '#4A33CC',
              800: '#3A2899',
              900: '#241B66'
            },
            success: {
              100: '#EAF7ED', // toast bg
              200: '#2FB554',
              300: '#1B5E20'
            },
            neutral: {
              5:   '#F3F3F4',
              10:  '#E7E7E8',
              40:  '#9E9EA5',
              60:  '#6E6D77',
              80:  '#3D3D4A',
              100: '#0D0C1D'
            }
          },
          fontFamily: { sans: ['"Circular XX TT"', 'system-ui', 'sans-serif'] }
        }
      }
    };
  </script>
  <style>
    html, body { font-family: 'Circular XX TT', system-ui, sans-serif; background: #fafafa; }
    .scrollbar-thin::-webkit-scrollbar { width: 8px; height: 8px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 4px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    /* Focus ring matches Safi purple */
    *:focus-visible { outline: 2px solid #6347FF; outline-offset: 2px; border-radius: 4px; }
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
    /* Flash highlight used when jumping to a load row via the picking-list card link */
    @keyframes flashHighlight { 0% { background-color: #E8E3FF; } 100% { background-color: transparent; } }
    .flash-highlight { animation: flashHighlight 1.6s ease-out; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Pinned to @babel/standalone@7 — v8 (released Jun 2026) broke the env preset for
       inline browser usage and turned the page white. Keep this pinned. -->
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>

  <script type="text/babel" data-presets="env,react">
  /* eslint-disable */
  const { useState, useMemo, useEffect, useRef, Fragment } = React;

  // ----------------------------------------------------------------------------
  // MOCK DATA - anonymised warehouse layout for the prototype.
  // Zones, Bays, Loads with supplier + lot ref + weight + bales.
  // Materials: BLANCA, AMERICANA, AZUL, 50/50.
  // Some bays are "blocked" - physically inaccessible because other bays sit in
  // front of them. The SL cannot put a blocked bay on the picking list.
  // ----------------------------------------------------------------------------

  // Clear PET Bottles spec - three result components per analysed load.
  //   transparentPET >= 92    (higher is in-spec, green)
  //   colouredPET   <= 6      (lower is in-spec, green)
  //   contaminants  <= 2      (lower is in-spec, green)
  const SPEC = {
    transparentPET: { label: 'Transparent PET', op: '>=', target: 92 },
    colouredPET:    { label: 'Coloured PET',    op: '<=', target: 6  },
    contaminants:   { label: 'Contaminants',    op: '<=', target: 2  }
  };

  // Material types for clear PET bottle loads (per spec: BLANCA, AMERICANA, AZUL, 50/50).
  // We deterministically assign one to every load based on the lot ref so the same
  // load always shows the same material across screens.
  const MATERIALS = ['BLANCA', 'AMERICANA', 'AZUL', '50/50'];
  const materialFor = (lot) => {
    if (!lot) return MATERIALS[0];
    let h = 0;
    for (let i = 0; i < lot.length; i++) h = (h * 31 + lot.charCodeAt(i)) >>> 0;
    return MATERIALS[h % MATERIALS.length];
  };

  // Helper: build a load object.
  // results === null → load has not been AI-analysed yet, no chips shown.
  // results: { transparentPET, colouredPET, contaminants } each as percentages summing to ~100.
  // description: optional free-text note left by an operator (R34 - surfaced in row view).
  const LOAD_DESCRIPTIONS = {
    'LOT-A001': 'Caps still on some bales, double-check at the line.',
    'LOT-A003': 'High moisture in 2 bales - flag for QC.',
    'LOT-A006': 'Mixed batch from 2 trailers, separated by colour.',
    'LOT-B-L321': 'Operator note: handle gently, soft strapping.',
    'LOT-B-L987': 'Damaged bale wrap on one unit.',
    'LOT-C001': 'Priority - customer waiting on this lot.',
    'LOT-C004': 'Contaminants flagged on intake - second look needed.',
  };
  const L = (supplier, lot, weight, bales, results = null) => ({
    id: lot,
    supplier,
    lot,
    weight,
    bales,
    material: materialFor(lot),
    results,
    description: LOAD_DESCRIPTIONS[lot] || null,
    processedAt: null
  });

  const inSpec = (spec, v) => spec.op === '>=' ? v >= spec.target : v <= spec.target;

  // ---- i18n -----------------------------------------------------------------
  const TXT = {
    bay:           { en: 'Bay',           es: 'Fila' },
    bays:          { en: 'Bays',          es: 'Filas' },
    zone:          { en: 'Zone',          es: 'Isla' },
    zones:         { en: 'Zones',         es: 'Islas' },
    load:          { en: 'Load',          es: 'Lote' },
    loads:         { en: 'Loads',         es: 'Lotes' },
    bale:          { en: 'Bale',          es: 'Paca' },
    bales:         { en: 'Bales',         es: 'Pacas' },
    weight:        { en: 'Weight',        es: 'Peso' },
    yardOverview:  { en: 'Yard overview', es: 'Vista del patio' },
    goodMaterial:  { en: 'Good material', es: 'Material Bueno' },
    selectAll:     { en: 'Select all',    es: 'Seleccionar todo' },
    empty:         { en: 'empty',         es: 'vacío' },
    blockedBy:     { en: 'Blocked by',    es: 'Bloqueado por' }
  };
  const tr = (key, lang) => (TXT[key] && TXT[key][lang]) || (TXT[key] && TXT[key].en) || key;
  const zoneName = (zone, lang) => `${tr('zone', lang)} ${zone.id}`;
  const bayName  = (bay,  lang) => `${tr('bay',  lang)} ${bay.id}`;
  const LangContext = React.createContext('en');

  // ---- Tooltip ---------------------------------------------------------------
  // Fast on-hover open (≤100ms), Safi-style white panel with subtle shadow,
  // supports rich children. Wrapper className can be customised so the trigger
  // participates in parent layout (flex grow, etc.).
  function Tooltip({ children, content, side = 'top', className = 'inline-block' }) {
    const [open, setOpen] = useState(false);
    const [coords, setCoords] = useState({ left: 0, top: 0 });
    const wrapRef = useRef(null);
    const timer = useRef(null);
    const show = () => {
      clearTimeout(timer.current);
      timer.current = setTimeout(() => {
        const r = wrapRef.current?.getBoundingClientRect();
        if (r) setCoords({ left: r.left + r.width / 2, top: side === 'top' ? r.top : r.bottom });
        setOpen(true);
      }, 80);
    };
    const hide = () => {
      clearTimeout(timer.current);
      setOpen(false);
    };
    return (
      <Fragment>
        <span
          ref={wrapRef}
          onMouseEnter={show}
          onMouseLeave={hide}
          onFocus={show}
          onBlur={hide}
          className={className}
        >
          {children}
        </span>
        {open && (
          <div
            role="tooltip"
            style={{
              position: 'fixed',
              left: coords.left,
              top: coords.top + (side === 'top' ? -8 : 8),
              transform: side === 'top' ? 'translate(-50%, -100%)' : 'translate(-50%, 0)',
              zIndex: 60,
              pointerEvents: 'none'
            }}
            className="bg-white text-neutral-100 text-[13px] rounded-md shadow-[0_8px_24px_-8px_rgba(0,0,0,0.15),0_0_0_1px_rgba(0,0,0,0.05)] border border-neutral-10 px-3 py-2 max-w-xs"
          >
            {content}
          </div>
        )}
      </Fragment>
    );
  }

  // Average bay quality → 4-bucket heat colour (red → amber → green) + grey for un-analysed.
  // Score = average count of in-spec components (0–3) across analysed loads in the bay.
  const bayQuality = (bay) => {
    const analysed = bay.loads.filter(l => l.results);
    if (analysed.length === 0) {
      return { score: null, color: '#D4D4D8', label: 'Not analysed' };
    }
    const totalScore = analysed.reduce((acc, l) => {
      let s = 0;
      Object.keys(SPEC).forEach(k => { if (inSpec(SPEC[k], l.results[k])) s++; });
      return acc + s;
    }, 0);
    const avg = totalScore / analysed.length;
    if (avg >= 2.75) return { score: avg, color: '#16A34A', label: 'All specs met' };
    if (avg >= 2.0)  return { score: avg, color: '#84CC16', label: 'Mostly in spec' };
    if (avg >= 1.0)  return { score: avg, color: '#F59E0B', label: 'Mixed' };
    return { score: avg, color: '#EF4444', label: 'Below spec' };
  };

  // Yard structure. `accessible: false` means this bay is blocked by another bay
  // in front of it - the FO physically cannot reach it for picking right now.
  // r = { transparentPET, colouredPET, contaminants } shorthand
  const r = (t, c, x) => ({ transparentPET: t, colouredPET: c, contaminants: x });

  // Auto-generated extra bays so Zone A grows to ~40 bays for the realistic-scale test.
  // States rotate through: dense (8 loads), partial, empty, blocked.
  const extraSuppliers = [
    'Supplier A', 'Supplier B', 'Supplier C', 'Supplier D', 'Supplier E',
    'Supplier F', 'Supplier G', 'Supplier H', 'Supplier I', 'Supplier J',
    'Supplier K', 'Supplier L', 'Supplier M', 'Supplier N', 'Supplier O',
    'Supplier P'
  ];
  const buildZoneABays = () => {
    const out = [];
    for (let i = 6; i <= 40; i++) {
      const mod = i % 7;
      const idLabel = i.toString().padStart(2, '0');
      const mkLoad = (j, q) => {
        const supplier = extraSuppliers[(i + j) % extraSuppliers.length];
        const lot = `LOT-A${idLabel}${j.toString().padStart(2, '0')}`;
        const analysed = (i + j) % 4 !== 0;
        const tp = q ?? (93 + ((i + j) % 6) - 2);
        const cp = Math.max(2, Math.round((100 - tp) * 0.7 * 10) / 10);
        const ct = Math.max(0.2, Math.round((100 - tp - cp) * 10) / 10);
        return L(supplier, lot, 11000 + ((i * 137 + j * 41) % 9000), 18 + ((i + j) % 25), analysed ? r(tp, cp, ct) : null);
      };
      if (mod === 0) {
        // Empty
        out.push({ id: `A${i}`, esName: `Bay A${i}`, accessible: true, loads: [] });
      } else if (mod === 1) {
        // Dense - 8 loads
        out.push({
          id: `A${i}`, esName: `Bay A${i}`, accessible: true,
          loads: Array.from({ length: 8 }, (_, j) => mkLoad(j))
        });
      } else if (mod === 6 && i > 10) {
        // Blocked (only after A10 so the first few stay accessible)
        out.push({
          id: `A${i}`, esName: `Bay A${i}`, accessible: false, blockedBy: `A${i - 2}`,
          loads: Array.from({ length: 2 + (i % 4) }, (_, j) => mkLoad(j))
        });
      } else {
        // Partial fill
        const cap = 3 + (i % 5);
        const fill = Math.max(1, Math.floor(cap / 2) + (i % 2));
        out.push({
          id: `A${i}`, esName: `Bay A${i}`, accessible: true,
          loads: Array.from({ length: fill }, (_, j) => mkLoad(j))
        });
      }
    }
    return out;
  };

  // Each bay carries a `capacity` (max loads it can physically hold).
  // current loads vs capacity → "Empty" | "Capacity for N load" | "Full" chip.
  // R39: ZONE_COLORS palette for the editable warehouse. `id` is internal,
  // `swatch` is the small visual chip, `accent` is the subtle background used
  // on zone cards / borders, and `border` is the left rule on the zone card.
  const ZONE_COLORS = [
    { id: 'none',       label: 'No colour',   swatch: 'transparent', accent: 'transparent', border: 'transparent' },
    { id: 'red',        label: 'Red',         swatch: '#ef4444', accent: 'rgba(239, 68, 68, 0.06)',  border: '#fca5a5' },
    { id: 'orange',     label: 'Orange',      swatch: '#f97316', accent: 'rgba(249, 115, 22, 0.06)', border: '#fdba74' },
    { id: 'yellow',     label: 'Yellow',      swatch: '#facc15', accent: 'rgba(250, 204, 21, 0.10)', border: '#fde68a' },
    { id: 'lightGreen', label: 'Light green', swatch: '#84cc16', accent: 'rgba(132, 204, 22, 0.08)', border: '#bef264' },
    { id: 'darkGreen',  label: 'Dark green',  swatch: '#16a34a', accent: 'rgba(22, 163, 74, 0.06)',  border: '#86efac' },
    { id: 'turquoise',  label: 'Turquoise',   swatch: '#06b6d4', accent: 'rgba(6, 182, 212, 0.06)',  border: '#7dd3fc' },
    { id: 'lightBlue',  label: 'Light blue',  swatch: '#38bdf8', accent: 'rgba(56, 189, 248, 0.06)', border: '#7dd3fc' },
    { id: 'darkBlue',   label: 'Dark blue',   swatch: '#1d4ed8', accent: 'rgba(29, 78, 216, 0.06)',  border: '#93c5fd' },
    { id: 'purple',     label: 'Purple',      swatch: '#a855f7', accent: 'rgba(168, 85, 247, 0.06)', border: '#d8b4fe' },
    { id: 'pink',       label: 'Pink',        swatch: '#ec4899', accent: 'rgba(236, 72, 153, 0.06)', border: '#f9a8d4' },
    { id: 'grey',       label: 'Grey',        swatch: '#6b7280', accent: 'rgba(107, 114, 128, 0.06)', border: '#d4d4d8' },
  ];
  const getZoneColor = (id) => ZONE_COLORS.find(c => c.id === id) || ZONE_COLORS[0];

  // R58: production-line association. A zone "serves" a line if the line is
  // listed in zone.lines. Backwards-compat: a zone with no `lines` field (or
  // empty/undefined) is treated as serving ALL lines — so existing seed data
  // and pre-R58 zones keep working without modification.
  const PRODUCTION_LINES_ALL = ['Apan 1', 'Apan 2'];
  const zoneLines = (zone) =>
    (zone && Array.isArray(zone.lines) && zone.lines.length > 0)
      ? zone.lines
      : PRODUCTION_LINES_ALL;
  const zoneServesLine = (zone, line) => zoneLines(zone).includes(line);
  const zoneServesAllLines = (zone) => zoneLines(zone).length === PRODUCTION_LINES_ALL.length;
  // Tag colour to match the line: Apan 1 = sky, Apan 2 = amber (R57 convention).
  const lineTagClasses = (line) => line === 'Apan 1'
    ? 'bg-sky-50 text-sky-800 border-sky-200'
    : 'bg-amber-50 text-amber-800 border-amber-200';

  // Small inline chip — used wherever a zone surface (card, header, etc.) needs
  // to declare its line restriction. R66: when a zone serves all production
  // lines (the default "Any" state), render an "Any production line" badge in
  // a neutral tone so it's still visible at-a-glance — previously this case
  // rendered nothing, which was easy to miss.
  const lineRestrictionTag = (zone, lang) => {
    if (!zone) return null;
    if (zoneServesAllLines(zone)) {
      return (
        <span
          className="inline-flex items-center px-2 py-0.5 rounded-md text-[12px] font-semibold border bg-neutral-5 text-neutral-80 border-neutral-10 whitespace-nowrap"
          title={lang === 'es' ? 'Cualquier línea de producción puede recibir material de esta zona' : 'Any production line can receive material from this zone'}
        >
          {lang === 'es' ? 'Cualquier línea' : 'Any production line'}
        </span>
      );
    }
    const zLines = zoneLines(zone);
    // Single-line restriction — render one coloured chip ("Apan 2 only").
    if (zLines.length === 1) {
      const line = zLines[0];
      const onlyTxt = lang === 'es' ? 'solo' : 'only';
      return (
        <span
          className={'inline-flex items-center gap-1 px-2 py-0.5 rounded-md text-[12px] font-semibold border whitespace-nowrap ' + lineTagClasses(line)}
          title={lang === 'es' ? `Material restringido a ${line}` : `Material restricted to ${line}`}
        >
          {line} {onlyTxt}
        </span>
      );
    }
    // Multi-line but not all — render the lines joined.
    return (
      <span className="inline-flex items-center px-2 py-0.5 rounded-md text-[12px] font-semibold border bg-neutral-5 text-neutral-80 border-neutral-10 whitespace-nowrap">
        {zLines.join(' · ')}
      </span>
    );
  };

  const INITIAL_YARD = [
    {
      // Zone A - no inventory rule. Loads can be selected and picked in any order
      // (no LIFO/FIFO blocking). Used for plants that pick by quality/priority.
      id: 'A',
      name: 'Zone A',
      esName: 'Zone A',
      color: 'red',
      inventoryRule: 'NONE',
      // R58: serves both production lines (default).
      lines: ['Apan 1', 'Apan 2'],
      bays: [
        {
          id: 'A1', name: 'Bay A1', esName: 'Bay A1', accessible: true,
          loads: [
            L('Supplier A',  'LOT-A001', 14870, 25, r(95.2, 4.5, 0.3)),
            L('Supplier B',  'LOT-A002', 14829, 20, r(96.4, 3.4, 0.2))
          ]
        },
        {
          id: 'A2', name: 'Bay A2', esName: 'Bay A2', accessible: true,
          loads: [
            L('Supplier C',  'LOT-A003', 12964, 22, r(89.0, 8.3, 2.7)),
            L('Supplier D',  'LOT-A004', 12747, 32, r(96.1, 3.5, 0.4))
          ]
        },
        {
          id: 'A3', name: 'Bay A3', esName: 'Bay A3', accessible: true,
          loads: [
            L('Supplier E',  'LOT-A005', 17812, 33) // un-analysed
          ]
        },
        {
          id: 'A4', name: 'Bay A4', esName: 'Bay A4', accessible: false, blockedBy: 'A2',
          loads: [
            L('Supplier F',  'LOT-A006', 16100, 30, r(94.2, 5.0, 0.8)),
            L('Supplier G',  'LOT-A007', 18560, 38, r(87.5, 7.6, 4.9))
          ]
        },
        {
          id: 'A5', name: 'Bay A5', esName: 'Bay A5', accessible: true,
          loads: []
        },
        ...buildZoneABays()
      ]
    },
    {
      // Zone B - LIFO yard. 5 bays. Each bay has 8-12 loads of 20-25 bales each.
      // Loads are stored in `loads` array in PICK ORDER: index 0 = front/accessible
      // (most recently stacked, LIFO), subsequent indexes are blocked until the
      // load in front of them is cleared.
      id: 'B',
      name: 'Zone B',
      esName: 'Zone B',
      color: 'yellow',
      inventoryRule: 'LIFO',
      // R58: serves both production lines (default).
      lines: ['Apan 1', 'Apan 2'],
      bays: (() => {
        const layout = [
          { id: '1', loadIds: ['B-L123', 'B-L456', 'B-L321', 'B-L654', 'B-L987', 'B-L741', 'B-L852', 'B-L963', 'B-L159'] },
          { id: '2', loadIds: ['B-L123', 'B-L456', 'B-L357', 'B-L468', 'B-L579', 'B-L680', 'B-L791', 'B-L802', 'B-L913', 'B-L024'] },
          { id: '3', loadIds: ['B-L456', 'B-L135', 'B-L246', 'B-L789', 'B-L890', 'B-L901', 'B-L012', 'B-L234'] },
          { id: '4', loadIds: ['B-L789', 'B-L345', 'B-L567', 'B-L678', 'B-L890', 'B-L912', 'B-L023', 'B-L134', 'B-L245', 'B-L356', 'B-L467'] },
          { id: '5', loadIds: ['B-L789', 'B-L578', 'B-L689', 'B-L790', 'B-L801', 'B-L912', 'B-L023', 'B-L134', 'B-L245', 'B-L356', 'B-L467', 'B-L578'] }
        ];
        const suppliers = ['Supplier H', 'Supplier I', 'Supplier J', 'Supplier K', 'Supplier L', 'Supplier M', 'Supplier N', 'Supplier O'];
        return layout.map(({ id, loadIds }) => ({
          id, name: `Bay ${id}`, esName: `Bay ${id}`, accessible: true,
          loads: loadIds.map((lot, i) => {
            const seed = lot.charCodeAt(lot.length - 1);
            const tp = 90 + (seed % 8);
            const cp = Math.max(1, Math.round((100 - tp) * 0.65 * 10) / 10);
            const ct = Math.max(0.2, Math.round((100 - tp - cp) * 10) / 10);
            const analysed = (seed + i) % 4 !== 0;
            // 20-25 bales per load, ~640 kg/bale (typical PET bale weight) for realism
            const bales = 20 + ((seed * 3 + i * 5) % 6); // 20-25
            return L(
              suppliers[(seed + i) % suppliers.length],
              `LOT-${lot}`,
              bales * (620 + (seed * 7 + i * 3) % 80), // 620-700 kg/bale → ~12,400-17,500 kg/load
              bales,
              analysed ? r(tp, cp, ct) : null
            );
          })
        }));
      })()
    },
    {
      id: 'C',
      name: 'Zone C',
      esName: 'Zone C',
      color: 'darkBlue',
      inventoryRule: 'FIFO',
      // R58: this zone is restricted to Apan 2 only — used in the prototype to
      // demonstrate the line-association feature. The FO sees Zone C only when
      // their Picker tab is feeding Apan 2; the SL can only put Zone C bays on
      // an Apan 2 picking list (Apan 1 lists show Zone C as disabled).
      lines: ['Apan 2'],
      bays: [
        {
          id: 'C2', name: 'Bay C2', esName: 'Bay C2', accessible: true,
          loads: [
            L('Supplier P',  'LOT-C001',  6276, 38, r(94.1, 4.7, 1.2)),
            L('Supplier A',  'LOT-C002', 15540, 45, r(95.8, 3.5, 0.7))
          ]
        },
        {
          id: 'C5', name: 'Bay C5', esName: 'Bay C5', accessible: true,
          loads: [

  const FIFO_TOP_LOAD_BALES = 20;

  // Accessibility of a load within a bay, given the zone's inventory rule and
  // (optionally) a set of loadIds that are scheduled on the active picking list.
  //
  // Returns: {
  //   status: 'accessible' | 'blocked' | 'blocked-clearable-via-list',
  //   accessibleBales: number,   // bales the FO can act on right now
  //   blockedBy: load|null,      // the load immediately in front of this one
  //   reason: string             // i18n-friendly explanation
  // }
  //
  // - LIFO: only the FIRST load in `bay.loads` is accessible. All its bales.
  // - FIFO: the FIRST load gets up to FIFO_TOP_LOAD_BALES (20) bales accessible.
  //         Subsequent loads are blocked.
  // - If a blocked load's blockers (all preceding loads in the bay) are also on
  //   the picking list, it becomes 'blocked-clearable-via-list' - still selectable
  //   by the SL because the FO will unblock it by clearing the list in order.
  // R25/R31: Sequential-selection rule during picking-list creation.
  // Bale-based mode (default): a load is only selectable if every load ahead of
  //   it in the same bay is already in `selectionBales` (or it's the first load).
  //   Loads are stored in pick order so this enforces front-to-back picking.
  // Load-based mode (R31): no sequential constraint - loads in a bay can be
  //   selected in any order. The forklift picks whole loads so positional
  //   accessibility isn't a per-bale concern.
  // The function name is kept for compatibility.
  const isLifoSelectable = (zone, bay, load, selectionBales, pickerMode = 'load') => {
    if (pickerMode === 'load') return true;
    const idx = bay.loads.findIndex(l => l.id === load.id);
    if (idx <= 0) return true;
    for (let i = 0; i < idx; i++) {
      const k = `${zone.id}|${bay.id}|${bay.loads[i].id}`;
      if (selectionBales[k] == null) return false;
    }
    return true;
  };

  const accessibilityOf = (zone, bay, load, pickingListLoadIds = null) => {
    const idx = bay.loads.findIndex(l => l.id === load.id);
    if (idx < 0) return { status: 'accessible', accessibleBales: load.bales, blockedBy: null, reason: '' };
    if (!bay.accessible) {
      return { status: 'blocked', accessibleBales: 0, blockedBy: null, reason: 'Bay blocked' };
    }
    // No inventory rule -> every load fully accessible, no blocking
    if (!zone.inventoryRule || zone.inventoryRule === 'NONE') {
      return { status: 'accessible', accessibleBales: load.bales, blockedBy: null, reason: '' };
    }
    if (idx === 0) {
      if (zone.inventoryRule === 'FIFO') {
        return { status: 'accessible', accessibleBales: Math.min(load.bales, FIFO_TOP_LOAD_BALES), blockedBy: null, reason: '' };
      }
      return { status: 'accessible', accessibleBales: load.bales, blockedBy: null, reason: '' };
    }
    // Blocked - check if all loads ahead of this one are on the picking list
    const blockers = bay.loads.slice(0, idx);
    const blockedBy = blockers[blockers.length - 1];
    if (pickingListLoadIds && blockers.every(b => pickingListLoadIds.has(b.id))) {
      return { status: 'blocked-clearable-via-list', accessibleBales: 0, blockedBy, reason: 'Will unblock as list is picked' };
    }
    return { status: 'blocked', accessibleBales: 0, blockedBy, reason: `Blocked by ${blockedBy?.lot || 'preceding load'}` };
  };

  // ============================================================================
  // SPATIAL LAYOUT VIEW - top-down map of the yard.

  // Zone view: clickable breadcrumb, zone metrics, full-detail bay tiles in a
  //           single horizontal row, with a heat-mapped minimap above.
  // Bay view:  full load list (LoadRow re-used).
  // ============================================================================
  function SpatialLayoutView({ yard, isCreating, selectionBales, setSelectionBales, pickingList, pickingLists = [], loadClaimMap = {}, creationLine = 'Apan 1', creationShift = 'Shift 1', lang = 'en', bayFilter, setSlMode, pickerMode = 'load', setToast, yardOps = {}, buffer = [], setBuffer = () => {}, setProcessed = () => {}, onEditWarehouse = () => {} }) {
    const [view, setView] = useState({ level: 'overview' });

    const [focusBayId, setFocusBayId] = useState(null);

    const [showAllSuppliers, setShowAllSuppliers] = useState({});
    // R24: yard-overview display mode - 'progress' (fill bar) | 'kpi' (KPI cards) | 'density' (R25 bale-density tiles).
    // The toggle in the overview header lets the user flip between the three.
    const [overviewMode, setOverviewMode] = useState('progress');

    // { zone, bay, load, accessibleBales } | null
    const [rejectModal, setRejectModal] = useState(null);

    // openBaleMenu = `${uid}-${idx}` of the bale row whose menu is open (or null).

    const [openBaleMenu, setOpenBaleMenu] = useState(null);
    const [processBaleModal, setProcessBaleModal] = useState(null);
    // R51: which buffer items have their individual-bale list expanded.
    // Default: all collapsed. Stored as a Set of buffer item uids.
    const [expandedBufferLoads, setExpandedBufferLoads] = useState(() => new Set());
    // R39: warehouse editor modal state.
    // Shapes:
    //   { type: 'createZone' }
    //   { type: 'editZone', zoneId }
    //   { type: 'createBays', zoneId }
    //   { type: 'editBays', zoneId }
    //   { type: 'editBay', zoneId, bayId }
    //   { type: 'moveLoads', fromZoneId, fromBayId, loadIds }
    const [editor, setEditor] = useState(null);
    // R39: bay-view selection mode for bulk-move. When true, checkboxes appear
    // per load and a floating action bar shows selected count + "Move N".
    const [selectionMode, setSelectionMode] = useState(false);
    const [bulkSelected, setBulkSelected] = useState(new Set());

    const goOverview = () => { setFocusBayId(null); setView({ level: 'overview' }); };

    // R42: buffer detail view - only reachable from the Buffer card on the
    // yard overview (bale-based mode only).
    const goBuffer = () => { setFocusBayId(null); setView({ level: 'buffer' }); };

    // R37: compute the bay's claim state during create/edit. Returns:
    // - null if no external claims (loads are free)
    // - { kind: 'all-same', label } when EVERY load in the bay is on the SAME other list
    // - { kind: 'all-mixed' } when every load is on some other list but they differ
    // - { kind: 'partial' } when some (not all) loads are claimed by other lists
    const bayClaimSummary = (bay) => {
      if (!isCreating || !bay || bay.loads.length === 0) return null;
      const externalClaims = bay.loads
        .map(l => loadClaimMap[l.id])
        .filter(c => c && (c.productionLine !== creationLine || c.shift !== creationShift));
      if (externalClaims.length === 0) return null;
      if (externalClaims.length === bay.loads.length) {
        const first = externalClaims[0];
        const allSame = externalClaims.every(c => c.productionLine === first.productionLine && c.shift === first.shift);
        if (allSame) return { kind: 'all-same', label: `${first.productionLine} - ${first.shift}` };
        return { kind: 'all-mixed' };

      return { kind: 'partial' };
    };
    // R38: bay-claim chip matches the load-level "On picking list" chip styling -

    const BayClaimChip = ({ summary }) => {

    useEffect(() => {

    // R25: DensityDots - row of blue squares where each square = 100 bales (rounded).
    // Used in the yard-overview Density tab and on bay tiles as a lightweight
    // density preview. `size` controls the tile dimensions:
    //   - lg: 20px squares for zone overview, wrapped in a Tooltip showing the
    //         bale count this tile represents (R27).
    //   - sm: 8px squares for bay tiles (super lightweight per R25 spec) - no
    //         tooltip since they're too small to be useful interaction targets.
    const DensityDots = ({ bales, size = 'lg' }) => {
      const count = bales > 0 ? Math.max(1, Math.round(bales / 100)) : 0;

      // holds the remainder (or `bales` itself when count === 1).
      const balesIn = (i) => (i === count - 1) ? (bales - 100 * i) : 100;
      return (
        <div className={'flex flex-wrap ' + gapCls}>
          {Array.from({ length: count }).map((_, i) => {

                  className={tileCls + ' bg-sky-500 cursor-default focus:outline-none focus:ring-2 focus:ring-safi-600 focus:ring-offset-1'}
                  tabIndex={0}
                  role="img"
                  aria-label={label}

            );

    };

    // Horizontal fill bar - accessible (numeric label always visible). Uses sky
    // tones so it's clearly distinct from the primary purple CTA.
    const FillBar = ({ value, max, suffix }) => {
      const pct = max > 0 ? Math.min(100, Math.max(2, (value / max) * 100)) : 0;
      return (
        <div className="w-full">
          <div className="h-2 bg-neutral-5 rounded-full overflow-hidden" aria-hidden="true">
            <div className="h-full bg-sky-500 rounded-full transition-all" style={{ width: value === 0 ? '0%' : `${pct}%` }} />
          </div>
          <div className="mt-1.5 text-[13px] text-neutral-60">
            <span className="font-bold text-neutral-100">{fmtNum(value)}</span>{suffix ? ` ${suffix}` : ''}
          </div>
        </div>
      );
    };

    // ---- OVERVIEW: just zones - no Production / Unloading containers --------
    // R24/R25: a Progress / KPI / Density pill toggle in the top-right swaps the
    // per-zone display between the original "Bales stored" fill bar, a row of
    // four KPI cards, and (R25) a square-grid bale-density visualization. KPI
    // cards are styled per Figma 15679:67181 - white bg, neutral-5 border, a
    // tinted purple divider under the title, 24px metric value. Density tiles:
    // each square = 100 bales (rounded). The grid uses the same column layout
    // for every zone so cards line up vertically across Zone A / Zone B / Zone C
    // for easy side-by-side scanning.
    const renderOverview = () => {
      const maxBales = Math.max(1, ...yard.map(z => zoneStats(z).bales));
      const isKpiMode = overviewMode === 'kpi';
      const isDensityMode = overviewMode === 'density';
      // R56: Graphic mode - a wordless, non-interactive way to read zone fullness.
      // Each zone renders as a simplified minimap: bar height = bay fullness,
      // hatched pattern = empty bay. Pure visual scan, no numbers.
      const isGraphicMode = overviewMode === 'graphic';

      // Pill toggle - matches the styling of Buffer / No buffer and English / Español.
      const ViewToggle = () => (
        <div className="flex items-center gap-1 bg-slate-100 rounded-full p-1 text-[13px]">
          {[
            { id: 'progress', label: lang === 'es' ? 'Progreso' : 'Progress' },
            { id: 'kpi',      label: 'KPI' },
            { id: 'density',  label: lang === 'es' ? 'Densidad' : 'Density' },
            { id: 'graphic',  label: lang === 'es' ? 'Gráfico'  : 'Graphic' },
          ].map(opt => (
            <button
              key={opt.id}
              type="button"
              onClick={() => setOverviewMode(opt.id)}
              aria-pressed={overviewMode === opt.id}
              className={
                'px-3 py-1 rounded-full transition-colors ' +
                (overviewMode === opt.id
                  ? 'bg-white text-neutral-100 font-medium shadow-sm'
                  : 'text-neutral-60 hover:text-neutral-100')
              }
            >
              {opt.label}
            </button>
          ))}
        </div>
      );

      // Single KPI card - notched-fieldset pattern per Figma 725:9342. The label
      // and its icon float on the top border of the card, breaking the stroke so
      // the header reads as a chip embedded in the outline. Tighter padding and
      // a left-aligned value remove the empty space that the earlier layout had.
      const KpiCard = ({ icon, label, value }) => (
        <div className="relative bg-white border border-neutral-10 rounded-md px-3.5 pt-3.5 pb-3">
          {/* Floating header - sits on top of the border (white bg punches through the stroke). */}
          <div className="absolute -top-2 left-3 bg-white px-1.5 flex items-center gap-1.5">
            <Icon d={icon} className="w-3.5 h-3.5 text-neutral-60" strokeWidth={1.75} />
            <span className="text-[13px] text-neutral-60 leading-none">{label}</span>
          </div>
          <div className="text-2xl font-medium text-neutral-100 leading-tight truncate" title={value}>
            {value}
          </div>
        </div>
      );

      return (
        <div className="bg-white border border-neutral-10 rounded-xl p-6">
          {/* Header row: title + KPI/Progress toggle + Create zone (R39) */}
          <div className="flex items-center justify-between gap-3 mb-3 flex-wrap">
            <div className="text-[13px] font-semibold uppercase tracking-wide text-neutral-60">
              {tr('yardOverview', lang)} · {lang === 'es' ? 'vista superior' : 'top-down view'}
            </div>
            <div className="flex items-center gap-2 flex-wrap">
              <ViewToggle />
              {/* R62: legacy Create zone button removed — use Edit warehouse instead */}
              {/* R61: Edit warehouse — opens the full-screen editor */}
              {!isCreating && (
                <button
                  onClick={onEditWarehouse}
                  className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-white border border-neutral-10 text-neutral-100 text-[13px] font-medium hover:bg-neutral-5"
                >
                  <Icon d={I.edit} className="w-3.5 h-3.5" />
                  {lang === 'es' ? 'Editar almacén' : 'Edit warehouse'}
                </button>
              )}
            </div>
          </div>

          <div className="flex flex-col gap-3">
            {/* R42: Buffer card - bale-based mode only, default (non-creating) only.
                Shows bales + weight totals (no bays/loads) and opens a buffer detail
                view when clicked. Sits above the yard's zones because the buffer is
                where material is staged before processing. */}
            {pickerMode === 'bale' && !isCreating && (() => {
              const bufferBales = buffer.reduce((a, b) => a + b.bales, 0);
              const bufferWeight = buffer.reduce((a, b) => a + Math.round(b.bales * b.weightPerBale), 0);
              // R55: Loads on the buffer card = the count of distinct buffer items.
              const bufferLoads = buffer.length;
              return (
                <div
                  key="__buffer__"
                  role="button"
                  tabIndex={0}
                  onClick={goBuffer}
                  onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); goBuffer(); } }}
                  className="rounded-lg border border-neutral-10 bg-white px-5 py-4 text-left transition cursor-pointer hover:border-safi-300 hover:shadow-sm focus:outline-none focus:ring-2 focus:ring-safi-600"
                >
                  <div className="flex items-start justify-between gap-6 flex-wrap">
                    <div className="flex-1 min-w-[280px]">
                      <div className="flex items-center gap-2">
                        {/* R55: Buffer gets a green dot to align with the zone colour treatment. */}
                        <span className="w-3 h-3 rounded-full" style={{ backgroundColor: '#16a34a' }} aria-hidden="true" />
                        <div className="font-bold text-neutral-100 text-xl">
                          {lang === 'es' ? 'Búfer' : 'Buffer'}
                        </div>
                      </div>
                      <div className="flex items-center gap-6 mt-2 flex-wrap">
                        <Metric2 label={tr('loads', lang)} value={fmtNum(bufferLoads)} />
                        <Metric2 label={tr('bales', lang)} value={fmtNum(bufferBales)} />
                        <Metric2 label={tr('weight', lang)} value={fmtKg(bufferWeight)} />
                      </div>
                    </div>
                    {/* Right: bale count visualisation - blue fill bar across remaining space. */}
                    <div className="flex-[2] min-w-[280px] pt-[38px]">
                      <div className="text-[13px] text-neutral-60 mb-1">
                        {lang === 'es' ? 'Pacas en búfer' : 'Bales in buffer'}
                      </div>
                      <FillBar value={bufferBales} max={Math.max(1, bufferBales, ...yard.map(z => zoneStats(z).bales))} suffix={tr('bales', lang).toLowerCase()} />
                    </div>
                  </div>
                </div>
              );
            })()}
            {yard.map(zone => {
              const z = zoneStats(zone);
              if (isKpiMode) {
                const kpis = [
                  { icon: I.bays,   label: tr('bays',   lang), value: fmtNum(z.bays)   },
                  { icon: I.box,    label: tr('loads',  lang), value: fmtNum(z.loads)  },
                  { icon: I.bales,  label: tr('bales',  lang), value: fmtNum(z.bales)  },
                  { icon: I.weight, label: tr('weight', lang), value: fmtKg(z.weight)  },
                ];
                return (
                  <div
                    key={zone.id}
                    role="button"
                    tabIndex={0}
                    onClick={() => goZone(zone.id)}
                    onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); goZone(zone.id); } }}
                    className="rounded-lg border border-neutral-10 bg-white px-5 py-4 text-left transition cursor-pointer hover:border-safi-300 hover:shadow-sm focus:outline-none focus:ring-2 focus:ring-safi-600"
                  >
                    <div className="flex items-center gap-3 mb-3 flex-wrap">
                      {/* R55: coloured zone dot for at-a-glance identification. */}
                      {(() => { const zc = getZoneColor(zone.color); return zc.id !== 'none' ? <span className="w-3 h-3 rounded-full" style={{ backgroundColor: zc.swatch }} aria-hidden="true" /> : null; })()}
                      <div className="font-bold text-neutral-100 text-xl">{zoneName(zone, lang)}</div>
                      {lineRestrictionTag(zone, lang)}
                      {zone.inventoryRule && zone.inventoryRule !== 'NONE' && (
                        <span className="inline-flex items-center px-2 py-0.5 rounded-full bg-neutral-5 border border-neutral-10 text-[13px] font-semibold text-neutral-80">
                          {zone.inventoryRule}
                        </span>
                      )}
                    </div>
                    {/* KPI cards - identical 4-col grid for every zone so the columns
                        line up vertically across Zones A / B / C. Drops to 2 cols on narrow widths. */}
                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                      {kpis.map(k => (
                        <KpiCard key={k.label} icon={k.icon} label={k.label} value={k.value} />
                      ))}
                    </div>
                  </div>
                );
              }
              if (isGraphicMode) {
                // R56: Graphic mode. The whole point is "no words" - it's a
                // visual-scan view. Each bay is a vertical bar; height encodes
                // how full it is relative to the fullest bay in this zone (so
                // a quiet zone still reads as readable, not flat). Empty bays
                // render as low hatched tiles. Non-interactive bars; the card
                // itself is still clickable to drill into the zone.
                const bayBales = zone.bays.map(b => bayStats(b).bales);
                const maxBayBales = Math.max(1, ...bayBales);
                const zc = getZoneColor(zone.color);
                return (
                  <div
                    key={zone.id}
                    role="button"
                    tabIndex={0}
                    onClick={() => goZone(zone.id)}
                    onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); goZone(zone.id); } }}
                    className="rounded-lg border border-neutral-10 bg-white px-5 py-4 text-left transition cursor-pointer hover:border-safi-300 hover:shadow-sm focus:outline-none focus:ring-2 focus:ring-safi-600"
                  >
                    <div className="flex items-center gap-3 mb-3 flex-wrap">
                      {zc.id !== 'none' && <span className="w-3 h-3 rounded-full" style={{ backgroundColor: zc.swatch }} aria-hidden="true" />}
                      <div className="font-bold text-neutral-100 text-xl">{zoneName(zone, lang)}</div>
                      {lineRestrictionTag(zone, lang)}
                      {zone.inventoryRule && zone.inventoryRule !== 'NONE' && (
                        <span className="inline-flex items-center px-2 py-0.5 rounded-full bg-neutral-5 border border-neutral-10 text-[13px] font-semibold text-neutral-80">
                          {zone.inventoryRule}
                        </span>
                      )}
                    </div>
                    {/* Simplified minimap - bars only, no axis labels, no numbers.
                        Height = bay fullness. Hatched = empty. Pure visual signal.
                        R56b: bars use the zone's identity colour, matching the dot
                        and the store-flow minimap when that zone is selected. */}
                    <div
                      className="rounded-md bg-neutral-5 border border-neutral-10 px-3 py-2"
                      role="img"
                      aria-label={`Zone ${zone.id} fullness graphic: ${z.bays} bays, ${fmtNum(z.bales)} bales`}
                    >
                      <div className="flex items-end gap-0.5 h-16 w-full">
                        {zone.bays.map((b, i) => {
                          const balesInBay = bayBales[i];
                          const isEmpty = balesInBay === 0;
                          const pct = isEmpty ? 14 : Math.max(8, (balesInBay / maxBayBales) * 100);
                          const barColor = zc.swatch && zc.swatch !== 'transparent' ? zc.swatch : '#0c87f5';
                          const style = isEmpty
                            ? { height: `${pct}%`, backgroundColor: '#fff', border: '1px solid #d4d4d8', backgroundImage: 'repeating-linear-gradient(135deg, transparent, transparent 3px, #d4d4d8 3px, #d4d4d8 4px)' }
                            : { height: `${pct}%`, backgroundColor: barColor, opacity: 0.85 };
                          return (
                            <div
                              key={b.id}
                              className="flex-1 rounded-t"
                              style={style}
                              aria-hidden="true"
                            />
                          );
                        })}
                      </div>
                    </div>
                  </div>
                );
              }
              if (isDensityMode) {
                // R25: Density view. Each square = 100 bales (rounded). Big tiles per
                // Figma screenshot 5 Frame 4552 / 4553 - blue (sky-500), 20px square,
                // 4px gap, wraps. Label below shows precise count for the data-curious.
                return (
                  <div
                    key={zone.id}
                    role="button"
                    tabIndex={0}
                    onClick={() => goZone(zone.id)}
                    onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); goZone(zone.id); } }}
                    className="rounded-lg border border-neutral-10 bg-white px-5 py-4 text-left transition cursor-pointer hover:border-safi-300 hover:shadow-sm focus:outline-none focus:ring-2 focus:ring-safi-600"
                  >
                    <div className="flex items-center gap-3 mb-3 flex-wrap">
                      {/* R55: coloured zone dot for at-a-glance identification. */}
                      {(() => { const zc = getZoneColor(zone.color); return zc.id !== 'none' ? <span className="w-3 h-3 rounded-full" style={{ backgroundColor: zc.swatch }} aria-hidden="true" /> : null; })()}
                      <div className="font-bold text-neutral-100 text-xl">{zoneName(zone, lang)}</div>
                      {lineRestrictionTag(zone, lang)}
                      {zone.inventoryRule && zone.inventoryRule !== 'NONE' && (
                        <span className="inline-flex items-center px-2 py-0.5 rounded-full bg-neutral-5 border border-neutral-10 text-[13px] font-semibold text-neutral-80">
                          {zone.inventoryRule}
                        </span>
                      )}
                    </div>
                    <div className="flex items-start gap-6 flex-wrap">
                      {/* Left: compact bays / loads / bales / weight summary */}
                      <div className="min-w-[260px] flex items-center gap-6 flex-wrap">
                        <Metric2 label={tr('bays',  lang)} value={fmtNum(z.bays)} />
                        <Metric2 label={tr('loads', lang)} value={fmtNum(z.loads)} />
                        <Metric2 label={tr('bales', lang)} value={fmtNum(z.bales)} />
                        <Metric2 label={tr('weight', lang)} value={fmtKg(z.weight)} />
                      </div>
                      {/* Right: density tiles */}
                      <div className="flex-1 min-w-[260px]">
                        <div className="text-[13px] text-neutral-60 mb-1.5">
                          {lang === 'es' ? 'Pacas almacenadas' : 'Bales stored'}
                        </div>
                        <DensityDots bales={z.bales} size="lg" />
                        <div className="mt-2 text-[13px] text-neutral-60">
                          <span className="font-bold text-neutral-100">{fmtNum(z.bales)}</span> {tr('bales', lang).toLowerCase()}
                        </div>
                      </div>
                    </div>
                  </div>
                );
              }
              return (
                // Entire card is the clickable zone target - clicking anywhere (including the
                // bales-stored fill bar on the right) navigates into the zone.
                <div
                  key={zone.id}
                  role="button"
                  tabIndex={0}
                  onClick={() => goZone(zone.id)}
                  onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); goZone(zone.id); } }}
                  className="rounded-lg border border-neutral-10 bg-white px-5 py-4 text-left transition cursor-pointer hover:border-safi-300 hover:shadow-sm focus:outline-none focus:ring-2 focus:ring-safi-600"
                >
                  <div className="flex items-start justify-between gap-6 flex-wrap">
                    <div className="flex-1 min-w-[280px]">
                      <div className="flex items-center gap-2">
                        {/* R55: coloured zone dot for at-a-glance identification. */}
                        {(() => { const zc = getZoneColor(zone.color); return zc.id !== 'none' ? <span className="w-3 h-3 rounded-full" style={{ backgroundColor: zc.swatch }} aria-hidden="true" /> : null; })()}
                        <div className="font-bold text-neutral-100 text-xl">{zoneName(zone, lang)}</div>
                      {lineRestrictionTag(zone, lang)}
                      </div>
                      <div className="flex items-center gap-6 mt-2 flex-wrap">
                        <Metric2 label={tr('bays',  lang)} value={fmtNum(z.bays)} />
                        <Metric2 label={tr('loads', lang)} value={fmtNum(z.loads)} />
                        <Metric2 label={tr('bales', lang)} value={fmtNum(z.bales)} />
                        <Metric2 label={tr('weight', lang)} value={fmtKg(z.weight)} />
                      </div>
                    </div>
                    {/* Right: fill bar - wide so it dominates the white space.
                        Push down so the label aligns with the metric labels row (Bays / Loads / Bales / Weight). */}
                    <div className="flex-[2] min-w-[280px] pt-[38px]">
                      <div className="text-[13px] text-neutral-60 mb-1">
                        {lang === 'es' ? 'Pacas almacenadas' : 'Bales stored'}
                      </div>
                      <FillBar value={z.bales} max={maxBales} suffix={tr('bales', lang).toLowerCase()} />
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* R56: Legend strip - only shown in Graphic mode, where the bars carry
              all the meaning and the symbols need decoding once. */}
          {isGraphicMode && (
            <div className="mt-3 flex items-center justify-end gap-5 text-[12px] text-neutral-60">
              <span className="inline-flex items-center gap-1.5">
                {lang === 'es' ? 'Altura = llenado de fila' : 'Height = bay fullness'}
              </span>
              <span className="inline-flex items-center gap-1.5">
                <span className="inline-block w-3 h-3 rounded-sm" style={{ backgroundColor: '#0c87f5', opacity: 0.85 }} aria-hidden="true" />
                {lang === 'es' ? 'Pacas almacenadas' : 'Bales stored'}
              </span>
              <span className="inline-flex items-center gap-1.5">
                <span
                  className="inline-block w-3 h-3 rounded-sm"
                  style={{ backgroundColor: '#fff', border: '1px solid #d4d4d8', backgroundImage: 'repeating-linear-gradient(135deg, transparent, transparent 2px, #d4d4d8 2px, #d4d4d8 3px)' }}
                  aria-hidden="true"
                />
                {lang === 'es' ? 'Fila vacía' : 'Empty bay'}
              </span>
            </div>
          )}

        </div>
      );
    };

    // ---- ZONE VIEW: minimap, zoom, horizontal scrolling bay row ------------
    const renderZone = () => {
      const zone = yard.find(z => z.id === view.zoneId);
      if (!zone) {
        return (
          <div className="bg-white border border-neutral-10 rounded-xl p-8 text-center text-[13px] text-neutral-60">
            Zone not found.
            <button onClick={goOverview} className="ml-2 text-safi-600 underline">Back to overview</button>
          </div>
        );
      }
      const maxBalesInZone = Math.max(1, ...zone.bays.map(b => bayStats(b).bales));
      const z = zoneStats(zone);

      // Bays render in their natural pick order. Focused bays just scroll into view +
      // get a Primary outline - they don't reorder.
      const reorderedBays = zone.bays;

      const scrollToBay = (id) => {
        setFocusBayId(id);
        // Defer to next tick so the focus state has rendered before we scroll
        setTimeout(() => {
          const wrap = bayRowRef.current;
          if (!wrap) return;
          const child = wrap.querySelector(`[data-bay-id="${id}"]`);
          if (child) child.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }, 0);
      };

      return (
        <div className="bg-white border border-neutral-10 rounded-xl p-5">
          <Breadcrumbs zone={zone} />

          {/* Tight yard header: title, single-line metrics, then minimap */}
          <div className="mt-2 mb-3 flex items-start justify-between gap-3 flex-wrap">
            <div>
              <div className="flex items-center gap-2 flex-wrap">
                {(() => { const zc = getZoneColor(zone.color); return zc.id !== 'none' ? <span className="w-3 h-3 rounded-full" style={{ backgroundColor: zc.swatch }} /> : null; })()}
                <h3 className="text-2xl font-bold text-neutral-100">{zoneName(zone, lang)}</h3>
                {lineRestrictionTag(zone, lang)}
              </div>
              <div className="text-[13px] text-neutral-60 mt-1">
                {z.bays} {tr('bays', lang).toLowerCase()} · {z.loads} {tr('loads', lang).toLowerCase()} · {fmtNum(z.bales)} {tr('bales', lang).toLowerCase()} · {fmtKg(z.weight)}
              </div>
            </div>
            {/* R52: zone-level actions trimmed to just "Edit zone" (secondary).
                Create bays / Edit bays moved out of this header. */}
            {/* R62: legacy "Edit zone" button removed — use Edit warehouse instead */}
            {!isCreating && (
              <div className="flex items-center gap-2 flex-wrap">
                <button
                  onClick={onEditWarehouse}
                  className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded border border-neutral-10 text-[13px] font-medium text-neutral-100 bg-white hover:bg-neutral-5"
                >
                  <Icon d={I.edit} className="w-3.5 h-3.5" />
                  {lang === 'es' ? 'Editar almacén' : 'Edit warehouse'}
                </button>
              </div>
            )}
          </div>

          {/* R58: SL is creating a picking list for a specific creationLine
              but this zone doesn't serve that line. We show the zone (so the SL
              keeps spatial context — see UX writeup) but disable bay selection
              and surface a clear amber banner explaining the constraint. */}
          {isCreating && !zoneServesLine(zone, creationLine) && (
            <div className="mb-3 rounded-lg border border-amber-200 bg-amber-50 px-4 py-3 flex items-start gap-3">
              <Icon d={I.warning} className="w-5 h-5 text-amber-700 shrink-0 mt-0.5" />
              <div className="flex-1 min-w-0 text-[13px]">
                <div className="font-semibold text-amber-900">
                  {lang === 'es'
                    ? `${zoneName(zone, lang)} no alimenta ${creationLine}`
                    : `${zoneName(zone, lang)} doesn't feed ${creationLine}`}
                </div>
                <div className="text-amber-800 mt-0.5">
                  {lang === 'es'
                    ? `Esta zona está restringida a ${zoneLines(zone).join(' y ')}. Cambia la línea de tu lista de recolección si quieres añadir cargas desde aquí.`
                    : `This zone is restricted to ${zoneLines(zone).join(' & ')}. Change the line on your picking list if you want to add loads from here.`}
                </div>
              </div>
            </div>
          )}

          {/* Directional flow indicator (picking list workflow only) */}
          {isCreating && (
            <div className="flex items-center gap-2 text-[13px] text-neutral-60 mb-2">
              <Icon d={I.truck} className="w-4 h-4 text-neutral-40" />
              <span>
                {lang === 'es'
                  ? 'Recoge de izquierda a derecha, las filas están numeradas en orden de recolección →'
                  : 'Pick from left to right, bays are numbered in pick order →'}
              </span>
            </div>
          )}

          {/* Minimap - heat-mapped by quality + selected step highlighting.
              R31: empty bays render with a diagonal striped pattern so the SL can
              spot empties at a glance, both in default mode and during picking-list
              creation. Added "Empty bay" legend item. */}
          {zone.bays.length > 8 && (
            <div className="mb-3 px-3 py-2 rounded-md bg-neutral-5 border border-neutral-10">
              <div className="flex items-end gap-0.5 h-12 w-full" role="navigation" aria-label="Bay minimap - heat-mapped by average load quality">
                {zone.bays.map((b) => {
                  const s = bayStats(b);
                  // Empty bays render at minimum height so the striped pattern is visible
                  // (rather than collapsing to a sliver invisible to the SL).
                  const isEmpty = s.bales === 0 || b.loads.length === 0;
                  const pct = isEmpty
                    ? 24
                    : (maxBalesInZone > 0 ? Math.max(8, (s.bales / maxBalesInZone) * 100) : 8);
                  const q = bayQuality(b);
                  const isFocus = focusBayId === b.id;
                  const tipContent = (
                    <div>
                      <div className="font-bold text-neutral-100">{bayName(b, lang)}</div>
                      <ul className="mt-1.5 space-y-0.5 text-[13px] text-neutral-80">
                        {isEmpty ? (
                          <li className="text-neutral-80">{lang === 'es' ? 'Fila vacía' : 'Empty bay'}</li>
                        ) : (
                          <>
                            <li>{tr('loads', lang)}: <span className="font-semibold text-neutral-100">{s.loads}</span></li>
                            <li>{tr('bales', lang)}: <span className="font-semibold text-neutral-100">{fmtNum(s.bales)}</span></li>
                          </>
                        )}
                      </ul>
                    </div>
                  );
                  // Empty bay style: light grey background with diagonal stripes.
                  // Filled bay style: solid quality colour.
                  const tileStyle = isEmpty
                    ? {
                        height: `${pct}%`,
                        backgroundColor: '#ffffff',
                        border: '1px solid #d4d4d8',
                        backgroundImage:
                          'repeating-linear-gradient(135deg, transparent, transparent 3px, #d4d4d8 3px, #d4d4d8 4px)'
                      }
                    : { height: `${pct}%`, backgroundColor: q.color };
                  return (
                    <Tooltip key={b.id} content={tipContent} className="flex-1 flex items-end h-full">
                      <button
                        onClick={() => scrollToBay(b.id)}
                        aria-label={`Jump to ${bayName(b, lang)} - ${isEmpty ? (lang === 'es' ? 'Fila vacía' : 'Empty bay') : q.label}`}
                        aria-pressed={isFocus}
                        className={
                          'w-full rounded-t transition-opacity hover:opacity-80 ' +
                          (isFocus ? 'outline outline-2 outline-safi-600 outline-offset-1 relative z-10' : '')
                        }
                        style={tileStyle}
                      />
                    </Tooltip>
                  );
                })}
              </div>
              {/* Endpoint labels in their own row so selected-bay outline doesn't clash */}
              <div className="mt-2 flex justify-between text-[13px] text-neutral-60">
                <span>{bayName(zone.bays[0], lang)}</span>
                <span className="text-neutral-40">
                  {zone.bays.length} {tr('bays', lang).toLowerCase()} ·
                  {lang === 'es' ? ' altura = pacas · color = calidad media · clic para saltar' : ' height = bales · colour = avg quality · click to jump'}
                </span>
                <span>{bayName(zone.bays[zone.bays.length - 1], lang)}</span>
              </div>
              {/* Legend */}
              <div className="mt-2 pt-2 border-t border-neutral-10 flex items-center gap-3 flex-wrap text-[13px] text-neutral-60">
                <span className="font-medium text-neutral-80">{lang === 'es' ? 'Calidad:' : 'Quality:'}</span>
                <span className="inline-flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm" style={{ backgroundColor: '#16A34A' }} />{lang === 'es' ? 'Todas las especificaciones cumplidas' : 'All specs met'}</span>
                <span className="inline-flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm" style={{ backgroundColor: '#84CC16' }} />{lang === 'es' ? 'Mayormente en especificación' : 'Mostly in spec'}</span>
                <span className="inline-flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm" style={{ backgroundColor: '#F59E0B' }} />{lang === 'es' ? 'Mixto' : 'Mixed'}</span>
                <span className="inline-flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm" style={{ backgroundColor: '#EF4444' }} />{lang === 'es' ? 'Por debajo de especificación' : 'Below spec'}</span>
                <span className="inline-flex items-center gap-1.5"><span className="w-3 h-3 rounded-sm" style={{ backgroundColor: '#D4D4D8' }} />{lang === 'es' ? 'No analizado' : 'Not analysed'}</span>
                <span className="inline-flex items-center gap-1.5">
                  <span
                    className="w-3 h-3 rounded-sm border border-neutral-40"
                    style={{
                      backgroundImage: 'repeating-linear-gradient(135deg, transparent, transparent 1.5px, #d4d4d8 1.5px, #d4d4d8 2.5px)'
                    }}
                  />
                  {lang === 'es' ? 'Fila vacía' : 'Empty bay'}
                </span>
              </div>
            </div>
          )}

          {/* Horizontal scrollable bay row - all tiles same size (largest) */}
          <div
            ref={bayRowRef}
            className="flex gap-3 overflow-x-auto pb-3 pt-1 scrollbar-thin items-stretch"
            role="list"
          >
            {reorderedBays.map((bay) => {
              const s = bayStats(bay);
              // R58: a bay is also "blocked" for selection when the SL is
              // creating a list for a line this zone doesn't serve.
              const lineBlocked = isCreating && !zoneServesLine(zone, creationLine);
              const blocked = isCreating && (!bay.accessible || lineBlocked);
              const empty = s.bales === 0;
              const bayLoadKeys = bay.loads.map(l => `${zone.id}|${bay.id}|${l.id}`);
              const allSelected = isCreating && bay.accessible && bayLoadKeys.length > 0 && bayLoadKeys.every(k => selectionBales[k] != null);
              const someSelected = isCreating && bayLoadKeys.some(k => selectionBales[k] != null);
              const isFocus = focusBayId === bay.id;
              // Aggregate suppliers by weight + their weighted-avg Transparent PET %
              const supplierAgg = {};
              bay.loads.forEach(l => {
                if (!supplierAgg[l.supplier]) supplierAgg[l.supplier] = { weight: 0, qSum: 0, qWeight: 0 };
                supplierAgg[l.supplier].weight += l.weight;
                if (l.results) {
                  supplierAgg[l.supplier].qSum += l.results.transparentPET * l.weight;
                  supplierAgg[l.supplier].qWeight += l.weight;
                }
              });
              const suppliers = Object.entries(supplierAgg)
                .map(([name, v]) => ({
                  name,
                  weight: v.weight,
                  avgQuality: v.qWeight > 0 ? v.qSum / v.qWeight : null
                }))
                .sort((a, b) => b.weight - a.weight);
              const showAll = !!showAllSuppliers[bay.id];
              const visibleSuppliers = showAll ? suppliers : suppliers.slice(0, 1);
              const hiddenCount = suppliers.length - visibleSuppliers.length;

              const toggleAllInBay = (e) => {
                e.stopPropagation();
                // R58: also block when this zone doesn't serve the creationLine.
                if (!isCreating || !bay.accessible || bayLoadKeys.length === 0 || lineBlocked) return;
                setSelectionBales(prev => {
                  const next = { ...prev };
                  if (allSelected) {
                    bayLoadKeys.forEach(k => { delete next[k]; });
                  } else {
                    bay.loads.forEach(l => {
                      const k = `${zone.id}|${bay.id}|${l.id}`;
                      if (next[k] == null) next[k] = l.bales;
                    });
                  }
                  return next;
                });
              };
              return (
                <div
                  key={bay.id}
                  data-bay-id={bay.id}
                  role="listitem"
                  className={
                    'shrink-0 w-[260px] rounded-lg border transition bg-white overflow-hidden ' +
                    (blocked ? 'border-neutral-10 bg-neutral-5 opacity-70'
                      : (isFocus ? 'border-2 border-safi-600 ring-2 ring-safi-200'
                        : (someSelected ? 'border-safi-300 ring-1 ring-safi-200 bg-safi-50/40'
                          : 'border-neutral-10 hover:border-safi-300 hover:shadow-sm')))
                  }
                >
                  <button
                    onClick={() => goBay(zone.id, bay.id)}
                    className="w-full text-left p-3 focus:outline-none focus:ring-2 focus:ring-safi-600 rounded-lg"
                  >
                    <div className="flex items-start justify-between gap-2">
                      <span className="font-bold text-[15px] text-neutral-100 truncate">
                        {bay.id}
                      </span>
                      <div className="flex items-center gap-2 shrink-0">
                        {blocked && (
                          <span
                            title={lang === 'es' ? 'Bloqueada por la fila de delante' : 'Blocked by the bay in front'}
                            className="inline-flex items-center gap-1 px-1.5 py-0.5 rounded text-[13px] font-medium bg-neutral-10 text-neutral-80"
                          >
                            <Icon d={I.lock} className="w-3 h-3" />
                          </span>
                        )}
                        {isCreating && bay.accessible && bayLoadKeys.length > 0 && (
                          <input
                            type="checkbox"
                            checked={allSelected}
                            ref={el => { if (el) el.indeterminate = someSelected && !allSelected; }}
                            onChange={toggleAllInBay}
                            onClick={(e) => e.stopPropagation()}
                            aria-label={`${tr('selectAll', lang)} ${bayName(bay, lang)}`}
                            title={lang === 'es'
                              ? (allSelected ? 'Eliminar esta fila de la lista' : 'Añadir esta fila a la lista')
                              : (allSelected ? 'Remove this bay from picking list' : 'Add this whole bay to picking list')}
                            className="rounded text-safi-600 focus:ring-safi-500 cursor-pointer w-5 h-5"
                          />
                        )}
                      </div>
                    </div>
                    {/* R38: bay claim chip on its own row so it doesn't crowd the bay name. */}
                    {(() => {
                      const summary = bayClaimSummary(bay);
                      return summary ? (
                        <div className="mt-2">
                          <BayClaimChip summary={summary} />
                        </div>
                      ) : null;
                    })()}
                    {/* Metrics on one line for density */}
                    <div className="mt-2 grid grid-cols-3 gap-2 text-[13px]">
                      <div>
                        <div className="text-neutral-60">{tr('loads', lang)}</div>
                        <div className="font-bold text-neutral-100">{s.loads}</div>
                      </div>
                      <div>
                        <div className="text-neutral-60">{tr('bales', lang)}</div>
                        <div className="font-bold text-neutral-100">{empty ? '-' : fmtNum(s.bales)}</div>
                      </div>
                      <div>
                        <div className="text-neutral-60">{tr('weight', lang)}</div>
                        <div className="font-bold text-neutral-100 truncate" title={empty ? '' : fmtKg(s.weight)}>{empty ? '-' : fmtKg(s.weight)}</div>
                      </div>
                    </div>
                    {/* Bales fill bar - sits between metrics and suppliers */}
                    {!empty && (
                      <div className="mt-3">
                        <div className="flex items-center justify-between text-[13px] text-neutral-60 mb-1">
                          <span>{lang === 'es' ? 'Pacas almacenadas' : 'Bales stored'}</span>
                          <span className="text-neutral-40">{Math.round((s.bales / maxBalesInZone) * 100)}%</span>
                        </div>
                        <div className="h-1.5 bg-neutral-5 rounded-full overflow-hidden">
                          <div className="h-full bg-sky-500" style={{ width: `${Math.max(8, Math.min(100, (s.bales / maxBalesInZone) * 100))}%` }} />
                        </div>
                        {/* R25: lightweight density preview - small sky-blue squares, each = 100 bales. */}
                        <div className="mt-2">
                          <DensityDots bales={s.bales} size="sm" />
                        </div>
                      </div>
                    )}
                  </button>
                  {/* Suppliers + Good material chip (with %) + expander */}
                  {!empty && (
                    <div className="px-3 pb-3 pt-2 border-t border-neutral-10/60">
                      <ul className="space-y-1">
                        {visibleSuppliers.map(sup => {
                          const inSpec = sup.avgQuality == null || sup.avgQuality >= 90;
                          const chipCls = inSpec
                            ? 'bg-success-100 text-success-300'
                            : 'bg-rose-100 text-rose-900';
                          return (
                            <li key={sup.name} className="flex items-center justify-between gap-2 text-[13px]">
                              <span className="text-neutral-100 truncate">{sup.name}</span>
                              <span className={`inline-flex items-center gap-1 px-1.5 py-0.5 rounded-full text-[13px] font-medium shrink-0 ${chipCls}`}>
                                <Icon d={inSpec ? I.checkCircle : I.errorCircle} className="w-3.5 h-3.5" />
                                {tr('goodMaterial', lang)}{sup.avgQuality != null ? ` ${sup.avgQuality.toFixed(1)}%` : ''}
                              </span>
                            </li>
                          );
                        })}
                      </ul>
                      {hiddenCount > 0 && (
                        <button
                          onClick={() => setShowAllSuppliers(s => ({ ...s, [bay.id]: true }))}
                          className="mt-2 text-[13px] font-medium text-safi-700 hover:underline"
                        >
                          {lang === 'es' ? `Mostrar ${hiddenCount} más` : `Show ${hiddenCount} more`}
                        </button>
                      )}
                      {showAll && suppliers.length > 1 && (
                        <button
                          onClick={() => setShowAllSuppliers(s => ({ ...s, [bay.id]: false }))}
                          className="mt-2 text-[13px] font-medium text-neutral-60 hover:underline"
                        >
                          {lang === 'es' ? 'Mostrar menos' : 'Show fewer'}
                        </button>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    };

    // ---- BAY VIEW: load list ------------------------------------------------
    const renderBay = () => {
      const zone = yard.find(z => z.id === view.zoneId);
      const bay = zone?.bays.find(b => b.id === view.bayId);
      if (!zone || !bay) {
        return (
          <div className="bg-white border border-neutral-10 rounded-xl p-8 text-center text-[13px] text-neutral-60">
            Bay not found.
            <button onClick={goOverview} className="ml-2 text-safi-600 underline">Back to overview</button>
          </div>
        );
      }
      const s = bayStats(bay);
      // R58: lock load selection when SL's creationLine doesn't match the zone.
      const bayLineBlocked = isCreating && zone && !zoneServesLine(zone, creationLine);
      const toggleLoad = (key) => {
        if (!isCreating || bayLineBlocked) return;
        setSelectionBales(prev => {
          if (prev[key] != null) { const n = { ...prev }; delete n[key]; return n; }
          const [zid, bid, lid] = key.split('|');
          const zz = yard.find(z => z.id === zid);
          const bb = zz?.bays.find(b => b.id === bid);
          const ld = bb?.loads.find(l => l.id === lid);
          return { ...prev, [key]: ld?.bales || 0 };
        });
      };
      return (
        <div className="bg-white border border-neutral-10 rounded-xl">
          {/* R58: line-mismatch banner — same copy + treatment as the zone view,
              so the SL who drilled into a bay still sees why selection is off. */}
          {bayLineBlocked && (
            <div className="m-5 mb-0 rounded-lg border border-amber-200 bg-amber-50 px-4 py-3 flex items-start gap-3">
              <Icon d={I.warning} className="w-5 h-5 text-amber-700 shrink-0 mt-0.5" />
              <div className="flex-1 min-w-0 text-[13px]">
                <div className="font-semibold text-amber-900">
                  {lang === 'es'
                    ? `${zoneName(zone, lang)} no alimenta ${creationLine}`
                    : `${zoneName(zone, lang)} doesn't feed ${creationLine}`}
                </div>
                <div className="text-amber-800 mt-0.5">
                  {lang === 'es'
                    ? `Restringida a ${zoneLines(zone).join(' y ')}. Cambia la línea de tu lista para añadir cargas desde aquí.`
                    : `Restricted to ${zoneLines(zone).join(' & ')}. Change the line on your picking list to add loads from here.`}
                </div>
              </div>
            </div>
          )}
          <div className="p-5 border-b border-neutral-10">
            <Breadcrumbs zone={zone} bay={bay} />
            <div className="mt-2 flex items-center justify-between gap-6 flex-wrap">
              <div>
                <div className="flex items-center gap-3 flex-wrap">
                  <h3 className="text-2xl font-bold text-neutral-100">{bayName(bay, lang)}</h3>
                  {/* R66: production-line badge inherited from the parent zone.
                      Surfaces "Any production line" when the zone is unrestricted,
                      or the specific line restriction otherwise. */}
                  {lineRestrictionTag(zone, lang)}
                  {zone.inventoryRule && zone.inventoryRule !== 'NONE' && (
                    <span
                      className="inline-flex items-center px-2 py-0.5 rounded-full bg-neutral-5 border border-neutral-10 text-[13px] font-semibold text-neutral-80"
                      title={zone.inventoryRule === 'LIFO' ? 'Last in, first out' : 'First in, first out'}
                    >
                      {zone.inventoryRule}
                    </span>
                  )}
                  {/* R37: bay-claim summary chip during create/edit. */}
                  <BayClaimChip summary={bayClaimSummary(bay)} />
                </div>
                <div className="text-[13px] text-neutral-60 mt-1">
                  In {zoneName(zone, lang)} · {s.loads} {tr('loads', lang).toLowerCase()} · {fmtNum(s.bales)} {tr('bales', lang).toLowerCase()} · {fmtKg(s.weight)}
                </div>
              </div>
              <div className="flex items-center gap-2 flex-wrap">
                <CapacityChip bales={s.bales} />
                {/* R39: bay-level edit + bulk-select actions, default mode only. */}
                {!isCreating && (
                  <>
                    {/* R62: legacy "Edit bay" button removed — use Edit warehouse instead */}
                    <button
                      onClick={onEditWarehouse}
                      className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded border border-neutral-10 text-[13px] font-medium text-neutral-100 bg-white hover:bg-neutral-5"
                    >
                      <Icon d={I.edit} className="w-3.5 h-3.5" />
                      {lang === 'es' ? 'Editar almacén' : 'Edit warehouse'}
                    </button>
                    {bay.loads.length > 0 && yard.length > 1 && (
                      <button
                        onClick={() => { setSelectionMode(v => !v); setBulkSelected(new Set()); }}
                        aria-pressed={selectionMode}
                        className={'inline-flex items-center gap-1.5 px-3 py-1.5 rounded border text-[13px] font-medium ' + (selectionMode ? 'border-safi-600 bg-safi-50 text-safi-700' : 'border-neutral-10 text-neutral-100 bg-white hover:bg-neutral-5')}
                      >
                        <Icon d={selectionMode ? I.check : I.list} className="w-3.5 h-3.5" />
                        {selectionMode ? (lang === 'es' ? 'Cancelar selección' : 'Done selecting') : (lang === 'es' ? 'Mover cargas' : 'Move loads')}
                      </button>
                    )}
                  </>
                )}
              </div>
            </div>
            {isCreating && !bay.accessible && (
